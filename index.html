<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e17">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Triple Trigger Tracker</title>
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e17;--card:#111827;--border:#1a2035;--text:#e4e8ee;--muted:#5a6a7a;--accent:#60a5fa;--green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;--blue-bg:#1e3a5f;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.header{padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50}
.header-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px}
.signal-badge{font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 10px;border-radius:6px}
.refresh-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--accent);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:var(--font)}
.content{padding-bottom:68px}
.pf-toggle{display:flex;margin:12px 16px 0;background:var(--card);border-radius:8px;padding:3px}
.pf-toggle button{flex:1;padding:8px 0;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);transition:all .2s}
.pf-toggle .active{background:var(--blue-bg);color:var(--accent)}.pf-toggle .inactive{background:transparent;color:var(--muted)}
.section-pad{padding:12px 16px}
.pos-card{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);overflow:hidden;min-width:0}
.pos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pos-ticker{font-size:15px;font-weight:700}.pos-badge{font-size:10px;padding:1px 6px;border-radius:4px}
.pos-sub{font-size:11px;color:var(--muted);margin-top:2px}
.pos-price-val{font-size:15px;font-weight:600;font-family:var(--mono)}
.pos-pnl{font-size:11px;font-family:var(--mono)}
.tranche-bar{display:flex;gap:4px}.tranche-seg{flex:1;height:6px;border-radius:3px}
.stat-row{display:flex;gap:8px}.stat-box{flex:1;background:var(--bg);border-radius:6px;padding:6px 8px}
.stat-label{font-size:10px;color:var(--muted)}.stat-val{font-size:13px;font-family:var(--mono);font-weight:600}
.btn-row{display:flex;gap:6px;margin-top:8px}
.btn-sm{padding:6px 10px;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:var(--font);color:var(--muted);text-align:center}
.btn-sm:active{opacity:.6}.btn-accent{color:var(--accent)}.btn-red{color:var(--red);border-color:#3b1111}
.signal-grid{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
/* Refined Grid (v3.71): flexible chip strip — replaces the fixed 6-column grid. */
.sig-hdr-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border)}
.sig-hdr-row div{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.sig-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--bg)}
.sig-ident{flex:1 1 auto;min-width:0}
.chip-strip{flex:0 1 auto;display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end}
.sig-right{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:44px;text-align:right}
.chip{min-width:44px;border-radius:7px;padding:3px 6px;text-align:center;border:1px solid transparent;line-height:1.18;cursor:pointer}
.chip .chip-lbl{font-size:8px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--muted)}
.chip .chip-val{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text)}
.chip .chip-sub{font-size:8px;font-family:var(--mono);line-height:1.1}
.chip-lo{font-size:7px;color:#67e8f9;font-family:var(--mono);margin-top:1px}
.chip-dim{background:transparent;border-color:#2a2f45}
.chip-dim .chip-val{color:#8a90a6}
.chip-faint{background:transparent;border-style:dashed;opacity:.85}
@keyframes twShieldPulse{0%,100%{box-shadow:0 0 0 0 #ef444455}50%{box-shadow:0 0 0 4px #ef444400}}
.tw-shield{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-family:var(--mono);font-weight:700;padding:1px 5px;border-radius:9px;margin-left:4px;cursor:pointer;vertical-align:middle}
.tw-shield.clear{color:#34d399;background:#34d39915;border:1px solid #34d39940}
.tw-shield.firing{color:#fca5a5;background:#7f1d1d;border:1px solid #ef4444;animation:twShieldPulse 1.6s ease-in-out infinite}
.sig-cell{text-align:center}
.sig-ind{width:18px;height:18px;border-radius:50%;margin:0 auto 2px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000}
.sig-ind.buy{background:#34d399;box-shadow:0 0 8px #34d39950}
.sig-ind.hold{background:transparent;border:none;color:#888;font-size:10px;letter-spacing:-0.3px}
.sig-ind.track{background:#60a5fa;box-shadow:0 0 8px #60a5fa50}
.sig-ind.warn{background:#fbbf24;box-shadow:0 0 8px #fbbf2450}
.sig-ind.sell{background:#f87171;box-shadow:0 0 8px #f8717150;animation:sigPulse 1.5s ease-in-out infinite}
.sig-ind.none{background:transparent;border:2px solid #333}
.sig-ind.filled{background:transparent;border:1.5px solid #888;color:#888;font-size:11px;font-weight:700}
@keyframes sigPulse{0%,100%{box-shadow:0 0 8px #f8717150}50%{box-shadow:0 0 16px #f87171aa}}
.sig-sub{font-size:8px;color:var(--muted);font-family:var(--mono);text-align:center;line-height:1.2}
.sig-sub.buy-sub{color:#34d399}.sig-sub.track-sub{color:#60a5fa}.sig-sub.warn-sub{color:#fbbf24}.sig-sub.sell-sub{color:#f87171}
.sell-card{background:var(--card);border-radius:8px;padding:12px;margin-bottom:8px}
.wl-card{background:var(--card);border-radius:8px;padding:12px;border:1px solid var(--border);overflow:hidden}
.wl-trig{flex:1;max-width:33%;background:var(--bg);border-radius:4px;padding:4px;text-align:center;min-width:0;overflow:hidden}
.wl-trig-label{font-size:9px;color:var(--muted)}.wl-trig-val{font-size:11px;font-family:var(--mono)}
.wl-trig-phil{font-size:9px;font-family:var(--mono);color:var(--muted)}
.alloc-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.monthly-banner{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.monthly-banner .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.monthly-banner .mo-label{font-size:15px;font-weight:700;font-family:var(--mono)}
.monthly-banner .mo-deadline{font-size:11px;color:var(--amber);font-family:var(--mono)}
.monthly-pills{display:flex;gap:4px}
.mo-pill{font-size:10px;padding:5px 10px;border-radius:12px;font-family:var(--mono);font-weight:600;background:var(--bg);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.mo-pill:active{opacity:.7}
.mo-pill.done{background:#0d332033;color:var(--green);border-color:#34d39944}
.mo-pill.active{background:var(--blue-bg);color:var(--accent);border-color:var(--accent);box-shadow:0 0 6px rgba(96,165,250,.2)}
.mo-pill.all-done{background:#0d332033;color:var(--green);border-color:#34d39944}
.alloc-waiting{opacity:.4;filter:grayscale(1);pointer-events:none;transition:all .3s ease}
.alloc-waiting input{pointer-events:none}
.alloc-stock{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center}
.input-row{display:flex;gap:8px;margin-bottom:12px}
.input-box{flex:1;background:var(--card);border-radius:8px;padding:10px}
.input-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.input-field{display:flex;align-items:center}
.input-field span{font-size:12px;color:var(--muted);margin-right:4px}
.input-field input{background:transparent;border:none;color:var(--text);font-size:16px;font-family:var(--mono);font-weight:600;width:100%;outline:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;z-index:100}
.modal-sheet{width:100%;max-width:480px;margin:0 auto;background:var(--card);border-radius:16px 16px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
.modal-field input,.modal-field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:15px;font-family:var(--mono);outline:none}
.modal-done{width:100%;padding:12px;background:var(--blue-bg);color:var(--accent);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:8px}
.navbar{position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid var(--border);display:flex;justify-content:center;z-index:50}
.navbar-inner{display:flex;max-width:960px;width:100%}
.nav-btn{flex:1;padding:8px 0 10px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--font);position:relative}
.nav-btn .nav-icon{font-size:18px}.nav-btn .nav-label{font-size:10px}
.settings-section{padding:16px}
.settings-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.settings-title{font-size:13px;font-weight:600;margin-bottom:8px}
.settings-desc{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.settings-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;margin-bottom:8px}
.settings-save{padding:8px 16px;background:var(--blue-bg);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
.settings-save:active{opacity:.6}
.tr-row{display:flex;align-items:center;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px;gap:8px}
.tr-signal{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;min-width:44px;text-align:center}
/* FIX #2: Base grid layouts for mobile */
.pos-grid,.wl-grid,.alloc-grid{display:flex;flex-direction:column;gap:10px}
@media(min-width:580px){
  .header{padding:16px 24px 12px}.section-pad{padding:16px 24px}.pf-toggle{margin:16px 24px 0}
  .pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .sig-row,.sig-hdr-row{padding:12px 16px}
  .wl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .alloc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-sheet{max-width:500px;border-radius:16px;margin:auto}.modal-overlay{align-items:center}
  .settings-section{padding:16px 24px}
}
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:6px 10px;border-radius:10px;font-size:13px;animation:alertSlide .3s ease-out}
.alert-item.buy{background:linear-gradient(135deg,#0d332040,#0d332080);border:1px solid #34d39940}
.alert-item.sell{background:linear-gradient(135deg,#33170d40,#33170d80);border:1px solid #f8717140}
.alert-item.watch{background:linear-gradient(135deg,#332d0d40,#332d0d80);border:1px solid #fbbf2440}
.alert-item.info{background:linear-gradient(135deg,#0d1a3340,#0d1a3380);border:1px solid #60a5fa40}
.alert-item.critical{background:linear-gradient(135deg,#33000040,#33000080);border:1px solid #ef444480;animation:alertSlide .3s ease-out,alertPulse 2s ease-in-out infinite}
.alert-item.watchlist-buy{background:linear-gradient(135deg,#1a330d40,#1a330d80);border:2px solid #34d399;animation:alertSlide .3s ease-out,alertPulse 2s ease-in-out infinite;font-size:14px}
.nav-badge{position:absolute;top:0;right:50%;transform:translateX(20px);min-width:16px;height:16px;border-radius:8px;background:#34d399;color:#000;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;animation:navBadgePulse 2s ease-in-out infinite}
@keyframes navBadgePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.8}}
@keyframes alertPulse{0%,100%{opacity:1}50%{opacity:.7}}
.alert-icon{font-size:20px;flex-shrink:0}
.alert-text{flex:1;line-height:1.35}
.alert-text strong{font-weight:700}
.alert-dismiss{font-size:18px;color:var(--muted);cursor:pointer;padding:4px 8px;flex-shrink:0}
@keyframes alertSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
/* Buy signal modal */
.buy-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;animation:buyFadeIn .3s ease-out}
.buy-modal{width:90%;max-width:400px;border-radius:20px;padding:28px 24px;text-align:center;
  background:linear-gradient(145deg,#0a2e1a,#0d3320,#0a2e1a);
  border:2px solid #34d399;box-shadow:0 0 40px #34d39940,0 0 80px #34d39920;animation:buyPulseGlow 2s ease-in-out infinite}
.buy-modal-icon{font-size:64px;margin-bottom:8px;animation:buyBounce 1s ease-in-out infinite}
.buy-modal-title{font-size:28px;font-weight:800;color:#34d399;letter-spacing:-0.5px;margin-bottom:4px;text-transform:uppercase}
.buy-modal-stock{font-size:22px;font-weight:700;color:var(--text);margin:12px 0 4px}
.buy-modal-signal{display:inline-block;font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;margin:4px 2px}
.buy-modal-price{font-size:18px;font-family:var(--mono);font-weight:600;color:var(--text);margin:14px 0 6px}
.buy-modal-detail{font-size:12px;color:var(--muted);margin-bottom:4px}
.buy-modal-dismiss{width:100%;padding:14px;margin-top:20px;background:#34d39920;color:#34d399;border:2px solid #34d39960;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:0.5px}
.buy-modal-dismiss:active{opacity:.6}
@keyframes buyFadeIn{from{opacity:0}to{opacity:1}}
@keyframes buyPulseGlow{0%,100%{box-shadow:0 0 40px #34d39940,0 0 80px #34d39920}50%{box-shadow:0 0 60px #34d39960,0 0 120px #34d39940}}
@keyframes buyBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
/* DP Slider */
.dp-slider-wrap{margin-top:6px;padding:8px 0 4px}
.dp-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(to right,#0d3b2e 0%,#0d3b2e var(--pct),#172554 var(--pct),#172554 100%);outline:none;cursor:pointer}
.dp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--text);border:2px solid var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(0,0,0,.4)}
.dp-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--text);border:2px solid var(--accent);cursor:pointer}
.dp-slider-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:2px;padding:0 2px}
/* Import diff modal */
.diff-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;animation:buyFadeIn .3s ease-out}
.diff-modal{width:92%;max-width:520px;max-height:82vh;background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
.diff-modal-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.diff-modal-header h2{font-size:16px;font-weight:700}
.diff-modal-header .diff-summary{font-size:11px;color:var(--muted)}
.diff-modal-body{overflow-y:auto;padding:10px 14px 16px;flex:1}
.diff-stock{margin-bottom:10px;background:var(--bg);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.diff-stock.diff-new{border-color:#34d39940}
.diff-stock-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.diff-stock-ticker{font-size:14px;font-weight:700;font-family:var(--mono)}
.diff-stock-name{font-size:11px;color:var(--muted)}
.diff-stock-badge{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700}
.diff-stock-badge.new{background:#34d39920;color:var(--green)}
.diff-stock-badge.changed{background:#60a5fa20;color:var(--accent)}
.diff-changes{display:flex;flex-wrap:wrap;gap:4px}
.diff-chip{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:5px;background:var(--card);border:1px solid var(--border);line-height:1.3}
.diff-chip .diff-field{color:var(--muted);margin-right:4px}
.diff-chip .diff-old{color:var(--red);text-decoration:line-through;margin-right:3px}
.diff-chip .diff-arrow{color:var(--muted);margin-right:3px}
.diff-chip .diff-new-val{color:var(--green)}
.diff-chip .diff-set{color:var(--accent)}
.diff-chip .diff-cleared{color:var(--red);font-style:italic}
.diff-dismiss{width:100%;padding:13px;background:var(--bg);color:var(--accent);border:none;border-top:1px solid var(--border);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}
.diff-dismiss:active{opacity:.6}
.diff-no-changes{text-align:center;padding:24px;color:var(--muted);font-size:13px}
.diff-stock-badge.removed{background:#f8717120;color:var(--red)}
.diff-stock.diff-removed{border-color:#f8717140;opacity:.85}
.diff-tranche-list{font-family:var(--mono);font-size:10px;line-height:1.55;margin-top:4px;padding:6px 8px;background:var(--card);border-radius:4px;border:1px solid var(--border)}
.diff-tranche-line{display:flex;justify-content:space-between;gap:8px;padding:1px 0}
.diff-tranche-line.added{color:var(--green)}
.diff-tranche-line.removed{color:var(--red);text-decoration:line-through;opacity:.75}
.diff-tranche-line.same{color:var(--muted)}
.diff-tranche-summary{font-size:10px;color:var(--muted);margin:6px 0 2px;font-family:var(--mono)}
.diff-section-hdr{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 4px 6px;padding-top:4px;border-top:1px solid var(--border)}
.diff-section-hdr:first-child{margin-top:4px;padding-top:0;border-top:none}
/* ============ RISKLIST ============ */
/* Pool 3 speculative positions with pre-committed buy prices. Personal portfolio only. */
.rl-cap-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.rl-cap-bar.warn{border-color:#d97706}
.rl-cap-row{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--muted);margin-bottom:6px}
.rl-cap-row .rl-cap-val{font-family:var(--mono);font-weight:600;color:var(--text)}
.rl-cap-row .rl-cap-val.warn{color:#d97706}
.rl-cap-row .rl-cap-val.over{color:var(--red)}
.rl-cap-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.rl-cap-fill{height:100%;background:#d97706;transition:width .3s}
.rl-cap-fill.under{background:var(--green)}
.rl-cap-fill.over{background:var(--red)}
.rl-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;overflow:hidden}
.rl-card.eligible{border-color:#34d399;box-shadow:0 0 12px #34d39920}
.rl-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}

function getGrid(pfKey){
  if(pfKey){
    const pf=portfolios[pfKey];if(!pf||!pf.gridStocks)return[];
    return pf.gridStocks.filter(t=>stocks[t]);
  }
  // Union of all portfolios' grid stocks (for notifications, push sync, etc.)
  const all=new Set();
  Object.values(portfolios).forEach(pf=>{if(pf.gridStocks)pf.gridStocks.forEach(t=>{if(stocks[t])all.add(t);});});
  return[...all];
}
// Check if stock is on ANY portfolio's grid
function isOnAnyGrid(t){return Object.values(portfolios).some(pf=>pf.gridStocks&&pf.gridStocks.includes(t));}
// Check if stock is on a specific portfolio's grid
function isOnGrid(t,pfKey){return portfolios[pfKey]?.gridStocks?.includes(t)||false;}
// Risk bucket membership is per-portfolio (v3.31). isRisk(t,pfKey) checks one portfolio; isRiskAnywhere checks union.
function isRisk(t,pfKey){return portfolios[pfKey]?.riskStocks?.includes(t)||false;}
function isRiskAnywhere(t){return Object.values(portfolios).some(pf=>pf.riskStocks&&pf.riskStocks.includes(t));}
// Watchlist: stocks not on any portfolio's grid and not in any portfolio's risk bucket
function getWatchlist(){return Object.keys(stocks).filter(t=>!isOnAnyGrid(t)&&!isRiskAnywhere(t)&&stocks[t]?.status!=="risklist");}
// Speculative stocks for a given portfolio (or union if no key supplied — caller should always pass a key for portfolio-scoped renders)
function getSpeculative(pfKey){
  if(pfKey){const pf=portfolios[pfKey];if(!pf||!pf.riskStocks)return[];return pf.riskStocks.filter(t=>stocks[t]);}
  // No key: return union across all portfolios (used by global checks)
  const all=new Set();Object.values(portfolios).forEach(pf=>{if(pf.riskStocks)pf.riskStocks.forEach(t=>{if(stocks[t])all.add(t);});});
  return Array.from(all);
}
function posShares(p){if(!p?.tranches)return 0;return p.tranches.reduce((s,t)=>s+(t.bought-t.sold),0);}
function posAvgPrice(p){if(!p?.tranches)return 0;let c=0,s=0;p.tranches.forEach(t=>{const sh=t.bought-t.sold;if(sh>0){c+=sh*t.buyPrice;s+=sh;}});return s>0?c/s:0;}
function posTranchesOwned(p){if(!p?.tranches)return 0;return p.tranches.filter(t=>(t.bought-t.sold)>0).length;}
// Capital-recovery sell (framework §5, June 2 2026 redesign). At the fair-value anchor,
// sell exactly enough shares to recover total invested capital in the position, then hold
// the residual forever. Invested capital = Σ (open shares × buyPrice) over open tranches.
// Trophy tranches are excluded — they keep their own 25% trailing-stop discipline.
function posInvestedCapital(p){if(!p?.tranches)return 0;let c=0;p.tranches.forEach(t=>{if(t.signal==="trophy")return;const sh=t.bought-t.sold;if(sh>0)c+=sh*t.buyPrice;});return c;}
// Shares to sell at the anchor to recover invested capital, and the residual left to ride.
// anchorPrice is the current-year fair-value anchor (Sticker for PT/HIGHGR, 20Cap for Buffett).
// Capped at open non-trophy shares (degenerate case: heavy averaging-up → recovery may need
// nearly the whole position; framework documents this as intended, no special-casing).
function capitalRecoverySizing(p,anchorPrice){
  if(!p?.tranches||!anchorPrice||anchorPrice<=0)return null;
  const openShares=p.tranches.reduce((s,t)=>t.signal==="trophy"?s:s+Math.max(0,t.bought-t.sold),0);
  if(openShares<=0)return null;
  const invested=posInvestedCapital(p);
  const sell=Math.min(openShares,invested/anchorPrice);
  return{sellShares:sell,residualShares:Math.max(0,openShares-sell),invested,anchorPrice};
}
function timeAgo(ts){if(!ts)return"—";const d=Date.now()-ts,m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);if(m<1)return"just now";if(m<60)return m+"m ago";if(h<24)return h+"h ago";return dy+"d ago";}

function calcFreshness(ts){
  if(!ts)return{label:"no date",color:"var(--red)",stale:true,days:null};
  const days=Math.floor((Date.now()-ts)/86400000);
  if(days<30)return{label:new Date(ts).toLocaleDateString("en-GB",{day:"numeric",month:"short"}),color:"var(--green)",stale:false,days};
  if(days<90){const mo=Math.round(days/30);return{label:mo+"mo ago",color:"var(--muted)",stale:false,days};}

  const mo=Math.round(days/30);return{label:"⚠ "+mo+"mo ago",color:"var(--red)",stale:true,days};
}

// Earnings calendar: format and classify earnings date relative to today and lastCalcDate
function earningsInfo(s){

  const daysUntil=Math.ceil((ed-now)/86400000);

  // Upcoming: within next 30 days
  if(daysUntil>0&&daysUntil<=30)return{label:"📅 "+fmt,color:"var(--accent)",status:"upcoming",days:daysUntil,soon:daysUntil<=14};
  // Just reported: in the past, check if triggers are stale

  // Far future (>30 days)
  if(daysUntil>30)return{label:"📅 "+fmt,color:"var(--muted)",status:"future",days:daysUntil,soon:false};
  // Old (>90 days ago)
  return null;
}

// 13F filing deadlines: 45 days after end of each calendar quarter.
// Q1 (Mar 31) → May 15, Q2 (Jun 30) → Aug 14, Q3 (Sep 30) → Nov 14, Q4 (Dec 31) → Feb 14 next year.
// Returns {date, qLabel, daysUntil, qEndDays} where qEndDays is days since the quarter ended (negative = future).
function next13FDeadline(){
  const now=new Date();const y=now.getFullYear();
  // [quarter-end date, deadline date, quarter label]
  const slots=[
    [new Date(y-1,11,31),new Date(y,1,14),`Q4 ${y-1}`],
    [new Date(y,2,31),new Date(y,4,15),`Q1 ${y}`],
    [new Date(y,5,30),new Date(y,7,14),`Q2 ${y}`],
    [new Date(y,8,30),new Date(y,10,14),`Q3 ${y}`],
    [new Date(y,11,31),new Date(y+1,1,14),`Q4 ${y}`],
  ];
  // Find the next deadline that hasn't passed yet, OR if just passed (within 14d), keep showing it as "filing window closed".
  const today=now.setHours(0,0,0,0);
  let chosen=null;
  for(const[qEnd,deadline,qLab]of slots){
    const ddl=new Date(deadline).setHours(0,0,0,0);
    if(ddl>=today){chosen={qEnd,deadline:new Date(deadline),qLabel:qLab};break;}
    // If deadline was within last 14 days, still show this one (filing-window-closed reminder)
    if((today-ddl)/86400000<=14){chosen={qEnd,deadline:new Date(deadline),qLabel:qLab};break;}
  }
  if(!chosen)return null;
  const daysUntil=Math.ceil((chosen.deadline-Date.now())/86400000);
  const qEndDays=Math.ceil((Date.now()-chosen.qEnd)/86400000); // positive = quarter already ended
  return{date:chosen.deadline,qLabel:chosen.qLabel,daysUntil,qEndDays};
}

// Update the 13F header chip. Called from render(). Short, dense; no clutter when far away.
function render13F(){
  const el=document.getElementById("filing-13f");if(!el)return;
  const f=next13FDeadline();if(!f){el.innerHTML="";return;}
  const d=f.date.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  let col="var(--muted)";let pre="13F";
  if(f.daysUntil<0){col="var(--green)";pre="13F ✓";} // deadline passed, in 14d post-window
  else if(f.daysUntil<=14)col="var(--amber)"; // filing window active
  else if(f.daysUntil<=30)col="var(--accent)"; // approaching
  const suffix=f.daysUntil>0?` (${f.daysUntil}d)`:f.daysUntil===0?" (today)":` (${-f.daysUntil}d ago)`;
  el.innerHTML=`<span style="font-family:var(--mono);font-size:10px;color:${col}">${pre} ${d}${suffix}</span>`;
}

// Trailing stops are retained ONLY for trophy tranches (tr.signal === "trophy", e.g. ASML) —
// a deliberate user-chosen long-hold backstop, kept per explicit instruction (Jun 2 2026).
// Everything else uses the framework §5 capital-recovery mechanic instead:
//   - Pool 1 non-Tier-1 (PT/HIGHGR/Buffett): recover at the fair-value anchor.
//   - Pool 3 / risk bucket non-Tier-1: recover at 2× average cost (see riskRecoveryAnchor).
//   - Caca: recover at Sticker / 20Cap.
//   - Tier 1 (any pool, incl. CSU in Pool 3): forever-hold, tripwires only.
// Pool 1 exit triggers: capital recovery at anchor, moat failure (s.gate === false), Layer 2 recycle.
function usesTrailingStop(ticker,pfKey,tr){
  if(tr&&tr.signal==="trophy")return true; // trophy keeps its 25% trailing stop
  return false; // all other tranches use the capital-recovery mechanic
}
// Pool 3 (risk bucket, non-Tier-1) fair-value anchor = 2× average cost. Tier 1 risk names
// (e.g. CSU) are forever-hold and have no anchor. Returns null when not applicable.
function riskRecoveryAnchor(ticker,pfKey){
  if(!isRisk(ticker,pfKey))return null;
  if(isOperationalTier1(ticker))return null;
  // Per-ticker toggle (v3.80): "sticker" → use Sticker (MOS×2) as the sell anchor instead
  // of the default "2x" (2× average cost). Falls back to 2× cost when no Sticker is available.
  if(riskAnchorMode(ticker)==="sticker"){
    const st=riskStickerAnchor(ticker);
    if(st&&st>0)return st;
  }
  const pos=portfolios[pfKey]?.positions?.[ticker];
  const avg=posAvgPrice(pos);
  return avg>0?+(avg*2).toFixed(2):null;
}
// v3.80: per-ticker risk sell-anchor mode. "2x" (default) = 2× average cost (pure risk);
// "sticker" = use Sticker (MOS×2) as the sell trigger. Stored in settings.riskAnchorMode.
function riskAnchorMode(ticker){return (settings.riskAnchorMode&&settings.riskAnchorMode[ticker])||"2x";}
function setRiskAnchorMode(ticker,mode){
  if(!settings.riskAnchorMode)settings.riskAnchorMode={};
  settings.riskAnchorMode[ticker]=mode;
  save();render();
}
function toggleRiskAnchorMode(ticker){
  setRiskAnchorMode(ticker,riskAnchorMode(ticker)==="sticker"?"2x":"sticker");
}
// Sticker = MOS×2 from consensus inputs. Returns null when no MOS available (e.g. a pure
// gut-conviction Pool 3 name with no 4M write-up) — caller falls back to 2× cost.
function riskStickerAnchor(ticker){
  const s=stocks[ticker];
  return s?.cons?.mos?+(s.cons.mos*2).toFixed(2):null;
}
// True when "sticker" mode is requested but no Sticker exists — UI shows the fallback note.
function riskStickerUnavailable(ticker){return riskAnchorMode(ticker)==="sticker"&&!riskStickerAnchor(ticker);}
// v3.80: render the Pool 3 risk-bucket sell-anchor block (anchor display + mode toggle) for a
// non-Tier-1 risk position. Shared by the Personal and Caca card branches so the toggle and
// labels stay identical in both. `pk` selects the portfolio (anchor + sizing are per-portfolio).
function riskAnchorCardBlock(ticker,pk,s,pos,cp){
  const _rAnchor=riskRecoveryAnchor(ticker,pk);

  let h="";
  if(_rAnchor&&_rAnchor>0){

      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:10px">
        <span style="color:var(--red);font-weight:700">⚠ RECOVER CAPITAL — at/above ${_rModeLabel}</span>
        <span style="font-family:var(--mono);color:var(--red);font-weight:600">${fmt(_rAnchor.toFixed(2),s.currency)}</span></div>`;
      if(szlR)h+=`<div style="margin-top:2px;font-size:9px;color:var(--red);font-family:var(--mono)">sell ${szlR.sellShares.toFixed(2)} sh · hold ${szlR.residualShares.toFixed(2)} forever</div>`;
    }else{
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:10px">
        <span style="color:var(--muted)">recover capital at ${fmt(_rAnchor.toFixed(2),s.currency)} (${_rModeLabel})</span>
        <span style="font-family:var(--mono);color:var(--muted)">+${_rGap.toFixed(0)}% away</span></div>`;
    }

    h+=`<div style="margin-top:4px;font-size:10px;color:var(--muted)">${_note}</div><div>${_rToggleBtn}</div>`;

// Buffett Category: wide-moat low-growth stocks evaluated by Ten Cap + PBT only (no MOS/Sticker)

// High-Growth Phil Town: gr>=16% stocks where Ten Cap->20Cap (OE*20) and PBT->DMOS (MOS*0.9).
// Column reuse: s.cons.tenCap stores 20Cap value, s.cons.pbt stores DMOS value. MOS unchanged.

// Label helpers — slot T3 is stored in cons.tenCap, slot T2 in cons.pbt.

// ============ COMPOUNDER TIER v2 (Stages A + B, May 27 2026) ============
// Operational Tier 1 per framework §10.2 (g_sustainable rule, evaluated annually each January).
// RULE (Jun 4 2026): Tier 1 ≡ compounderPriority in [1.0, 2.0). Any 1.x compounder is Tier 1 by
// definition — forever-hold, P-MOS 4th slot, tripwires-only, no trailing stop — and the ⭐T1 star,
// P-MOS plumbing, and tripwire shield all key off isOperationalTier1() so they follow automatically.
// To demote a stock to Tier 2, set its compounderPriority to 2.x (tap the C-badge). To promote,
// set it below 2.0. There is no membership list: the C-value IS the governance state.
// NOTE: compounderPriority is localStorage-only (set via setCompounderPriority), not seeded in this
// file. A stale 1.x value will auto-promote on load — keep C-values current.
function isOperationalTier1(t){const c=(stocks[(t||"").toUpperCase()]||{}).compounderPriority;return c!=null&&c>=1&&c<2;}
// Visual marker — small gold "⭐T1" badge shown next to ticker on Tier 1 rows.
// Returns empty string for non-Tier-1 so it's safe to inject everywhere without conditional logic upstream.
function tier1Marker(t){return isOperationalTier1(t)?`<span style="font-size:9px;color:#fbbf24;background:#fbbf2420;border:1px solid #fbbf2444;padding:1px 4px;border-radius:3px;margin-left:4px;font-family:var(--mono);font-weight:600" title="Operational Tier 1 — see framework §10.2">⭐T1</span>`:"";}

// ---- Stage B: P-MOS (Premium MOS) — Tier 1 only ----
// P-MOS = Sticker × 0.75 = (MOS × 2) × 0.75 = MOS × 1.5. Never muted (0.75 < 1.0 by construction).
function pmosPrice(s){return s?.cons?.mos!=null?+(s.cons.mos*1.5).toFixed(2):null;}
// Raw firing: price <= pmosPrice. Suppression NOT applied here — that's pmosFires().
function pmosFiresRaw(s){const pm=pmosPrice(s);return pm!=null&&s?.currentPrice!=null&&s.currentPrice<=pm;}
// Suppression rule (framework §2.6): P-MOS suppresses when any OTHER firing signal has trigger
// price ≤ pmosPrice. "Deeper" means lower-as-multiple-of-Sticker. Worked CSU example:
// TenCap at 0.82×Sticker is SHALLOWER than P-MOS at 0.75×Sticker → does NOT suppress.
// MOS at 0.50×Sticker IS deeper than P-MOS → DOES suppress.
function isPmosSuppressed(t){
  const s=stocks[t];if(!s?.signals||!s.cons)return false;
  const pm=pmosPrice(s);if(pm==null)return false;
  if(s.signals.mos&&s.cons.mos!=null&&s.cons.mos<=pm)return true;
  if(s.signals.pbt&&s.cons.pbt!=null&&s.cons.pbt<=pm)return true;
  if(s.signals.tenCap&&s.cons.tenCap!=null&&s.cons.tenCap<=pm)return true;
  return false;
}
// Operational P-MOS firing: Tier 1 only, raw firing AND not suppressed AND gate not failed.
// FIX v3.70: Buffett structural exclusion (framework §2.6) — Buffett never gets P-MOS, even
// if a stock is somehow both buffett-category and operational Tier 1. Defensive: no current stock
// satisfies both, but this hardens the invariant at the single chokepoint all callers use.
function pmosFires(t){
  const s=stocks[t];if(!s||!isOperationalTier1(t)||isBuffett(t)||s.gate===false)return false;
  if(!pmosFiresRaw(s))return false;
  if(isPmosSuppressed(t))return false;
  return true;
}
// Slot weight in allocation denominator (framework §7, operations §2 Signal Function Hierarchy).
// Personal: standard slots = 1.0, P-MOS = 0.6 (P-MOS deploys 3% vs standard 5% — asymmetric).
// Caca: all weights 1.0 (P-MOS sized 3% flat with other Caca triggers at 3%). Stage B preserves
// the legacy Caca double-MOS rule for non-Tier-1 PT (retired in Stage D's Caca rewrite).
function slotWeight(t,sigKey,pfKey){
  if(pfKey==='personal'&&sigKey==='pmos'&&isOperationalTier1(t))return 0.6;
  return 1.0;
}

// ============ STAGE E (v3.78, Jun 2 2026): CAPITAL-RECOVERY-AT-FAIR-VALUE NOTIFICATION ============
// Framework §5 (June 2 2026 redesign): non-Tier-1 positions trigger a CAPITAL-RECOVERY action
// when price crosses the fair-value anchor from below — sell exactly enough shares to recover
// total invested capital (shares = invested capital ÷ anchor price), then hold the residual
// forever. No half-sell fraction, no trailing stop. Anchor = Sticker for PT/HIGHGR, 20Cap
// (OE/share × 20) for Buffett. Tier 1 suppressed entirely (forever-hold, §9). Pool 3 (risk
// bucket) suppressed here — handled by its own 2×-cost capital-recovery path. Caca and Personal
// both notified — the §5 mechanic applies to both portfolios uniformly.
//
// Scope of Stage E: client-side push notification + dismissable in-app alert. The user executes
// the capital-recovery sale manually in IBKR (Highest-Cost lot matching) after notification.

// Compute fair-value anchor for a position. Returns null if none applies (Tier 1, or missing
// inputs). Pool 3 non-Tier-1 → 2× average cost. PT/HIGHGR → Sticker. Buffett → 20Cap.
function fairValueThreshold(t,pk){
  if(isOperationalTier1(t))return null;
  if(isRisk(t,pk))return riskRecoveryAnchor(t,pk); // Pool 3 non-Tier-1: 2× average cost
  const s=stocks[t];if(!s)return null;
  if(isBuffett(t))return activationPrice(s,t); // 20Cap = OE/share × 20
  return s.cons?.mos?+(s.cons.mos*2).toFixed(2):null; // Sticker
}

// Last-seen "above FVT" state per position. Module-level Map (not persisted) — seeded at
// app boot from current prices so the first refresh doesn't false-fire on positions that
// were already above FVT when the user opened the app. Entries deleted when shares drop
// to 0 so re-buys start fresh.
let prevAboveFVT={};

// Detect new fair-value crossings from below since last check. Returns list of fires.
// Mutates prevAboveFVT state as a side-effect (matches the pattern of checkNewSignals).
function checkFairValueCrossings(){
  const fires=[];
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.entries(pf.positions).forEach(([t,pos])=>{
      const s=stocks[t];if(!s?.currentPrice)return;
      const key=`${pk}-${t}`;
      const shares=posShares(pos);
      if(shares<=0){delete prevAboveFVT[key];return;}
      const fvt=fairValueThreshold(t,pk);
      if(fvt==null){delete prevAboveFVT[key];return;}
      const isAbove=s.currentPrice>fvt;
      const wasAbove=prevAboveFVT[key];
      // Fire only on transition from below → above. First-observation (wasAbove===undefined)
      // never fires regardless of current state — the init seed populates wasAbove so this
      // branch is only hit if a new position was added mid-session above FVT, in which case
      // suppressing is the correct conservative default (no false sell signal).
      if(isAbove&&wasAbove===false){
        fires.push({pk,ticker:t,price:s.currentPrice,fvt,pfName:pf.name,buf:isBuffett(t),risk:isRisk(t,pk)});
      }
      prevAboveFVT[key]=isAbove;
    });
  });
  return fires;
}

// Seed prevAboveFVT from current state. Called at app boot AFTER load() so portfolios are
// populated. Mirrors the prevSignals snapshot at startup.
function seedPrevAboveFVT(){
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.entries(pf.positions).forEach(([t,pos])=>{
      const s=stocks[t];if(!s?.currentPrice)return;
      if(posShares(pos)<=0)return;
      const fvt=fairValueThreshold(t,pk);
      if(fvt==null)return;
      prevAboveFVT[`${pk}-${t}`]=s.currentPrice>fvt;
    });
  });
}

// v3.79 server-port helper: build the capital-recovery descriptor array shipped in the /triggers
// payload so the Worker can fire the §5 sell notification closed-app. One entry per portfolio in
// which the ticker is an OWNED, NON-Tier-1 position with a valid anchor. Tier 1 (forever-hold) and
// any non-owned / no-anchor position contribute nothing → []. Reuses the same client functions the
// open-app path uses (fairValueThreshold, posInvestedCapital, capitalRecoverySizing) so the two
// paths can never diverge. anchor/invested are in the stock's NATIVE quote units (matching
// currentPrice); the Worker applies priceMult to the anchor exactly as it does to price.
function buildRecoveryEntries(ticker,s){
  if(isOperationalTier1(ticker))return []; // forever-hold — no anchor, never recover
  const out=[];
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    const pos=pf.positions?.[ticker];if(!pos)return;
    const fvt=fairValueThreshold(ticker,pk);if(fvt==null)return; // no applicable anchor
    const sz=capitalRecoverySizing(pos,fvt);if(!sz||sz.openShares<=0&&!(sz.sellShares>0||sz.residualShares>0))return;
    // openShares = non-trophy open shares; recompute via sizing inputs (capitalRecoverySizing caps
    // sellShares at openShares, so sell+residual === openShares). Guard against fully-trophy/empty.
    const openShares=sz.sellShares+sz.residualShares;
    if(openShares<=0)return;
    const anchorLabel=isRisk(ticker,pk)?(riskAnchorMode(ticker)==="sticker"&&riskStickerAnchor(ticker)?"Sticker":"2× cost"):(isBuffett(ticker)?"20Cap":"Sticker");
    out.push({
      anchor:fvt,
      anchorLabel,
      invested:sz.invested,
      openShares,
      pf:pk,
      pfName:pf.name,
      currency:s.currency
    });
  });
  return out;
}

// ============ STAGE F (v3.69, May 27 2026): TRIPWIRE STATUS — T1 / T3 / T6 ============
// Tripwire firing state is stored as boolean flags on the stock object (t1Firing, t3Firing,
// t6Firing). The CSV is the persistence layer; `watchlist.md` evidence folder is the system

// non-Tier-1 stock with a stale firing flag in its CSV is masked at render — the flag

//
// MANUAL TOGGLE: there is no auto-fire logic. Tripwires fire by user determination, made
// against primary-source evidence per the methodology in trigger_calculation_standard.md
// Part 7. The toggle action requires confirm() because firing initiates the §7 protocol:
//   - T1/T3: no immediate position action, 4M re-audit within 30 days.
//   - T6:    half-weight reduction at market next session, then re-audit.

// FIRING ≠ DEMOTION: during the audit window, Tier 1 treatment (forever-hold, P-MOS

// action — the user sets the ticker's compounderPriority to 2.x (tap the C-badge) when

function tripwireState(t){

// Manual toggle. Confirmation step is mandatory because firing initiates the §7 protocol.

function sigCount(t){
  const s=stocks[t];if(!s?.signals||s.gate===false)return 0;
  const buf=isBuffett(t);
  let n=(buf?0:(s.signals.mos?1:0))+(s.signals.tenCap?1:0)+(s.signals.pbt?1:0);
  if(pmosFires(t))n++;
  return n;
}
// Sticker Ceiling: a non-MOS trigger is "muted" if its price >= sticker (mos×2). Buffett stocks: no ceiling.
// MOS, DMOS, and P-MOS are never muted (all mathematically below Sticker by construction: 0.50/0.45/0.75 < 1.0).
function isTriggerMuted(s,sigKey){if(sigKey==="mos"||sigKey==="pmos"||!s?.cons)return false;if(s.category==="buffett")return false;if(s.category==="highgr"&&sigKey==="pbt")return false;const sticker=s.cons.mos?s.cons.mos*2:null;if(!sticker)return false;const tp=s.cons[sigKey];return tp!=null&&tp>=sticker;}
// Piggyback: a muted trigger deploys when price is below it AND at least one valid (non-muted) signal is firing.
// P-MOS firing counts as a valid signal for piggyback gating (it's never muted; has its own suppression rule).
// `ticker` is optional for backward-compat with legacy callers; without it, P-MOS won't open the piggyback door.
function isPiggyback(s,sigKey,ticker){
  if(!isTriggerMuted(s,sigKey))return false;
  const p=s.currentPrice;const tp=s.cons?.[sigKey];
  if(tp==null||p==null||p>tp)return false;
  if(sigCount_raw(s)>0)return true;
  if(ticker&&pmosFires(ticker))return true;
  return false;
}
function sigCount_raw(s){if(!s?.signals||s.gate===false)return 0;const buf=s.category==="buffett";return(buf?0:(s.signals.mos?1:0))+(s.signals.tenCap?1:0)+(s.signals.pbt?1:0);}
// Deploy count: lit firing signals + piggybacking muted signals + Caca legacy double-MOS (non-Tier-1).
// Tier 1: P-MOS firing (when not suppressed) is included via sigCount.
function deployCount(t,pfKey){
  const s=stocks[t];if(!s?.cons||s.gate===false)return 0;
  const valid=sigCount(t);if(valid===0)return 0;
  let n=valid;
  ["tenCap","pbt"].forEach(k=>{if(isPiggyback(s,k,t))n++;});
  // Caca legacy: MOS counts as 2 deploy slots when firing for NON-Tier-1 PT stocks only.
  // Tier 1 stocks in Caca use the Tier 1 slot structure (P-MOS as 4th slot, no MOS double).
  // The legacy double-MOS for non-Tier-1 is retired in Stage D's Caca rewrite.
  if(pfKey==="nl"&&s.signals?.mos&&!isBuffett(t)&&!isOperationalTier1(t))n++;
  return n;
}
// Discrete trigger slot count — for "X/Y" displays and MOS-reserve unlit counts.
// Buffett: 2 (tenCap+pbt). Non-Tier-1 PT: 3. Tier 1 PT: 4 (adds P-MOS). Caca legacy adds 1 for non-Tier-1 MOS-double.
function validTriggerSlots(t,pfKey){
  const s=stocks[t];if(!s?.cons||s.gate===false)return 0;
  if(isBuffett(t)){let n=0;["tenCap","pbt"].forEach(k=>{if(s.cons[k]!=null)n++;});return n;}
  let n=0;["mos","tenCap","pbt"].forEach(k=>{if(s.cons[k]!=null)n++;});
  // Tier 1: P-MOS as 4th slot (cons.mos populated → pmos derived).
  if(isOperationalTier1(t)&&s.cons.mos!=null)n++;
  // Caca legacy: MOS double-counts as a slot for NON-Tier-1 PT (Stage D will retire).
  if(pfKey==="nl"&&s.cons?.mos!=null&&!isOperationalTier1(t))n++;
  return n;
}
// Weighted slot count for the allocation denominator. Tier 1 Personal: 3.6 (1+1+1+0.6). All others = discrete count × 1.0.
function weightedSlots(t,pfKey){
  const s=stocks[t];if(!s?.cons||s.gate===false)return 0;
  if(isBuffett(t)){let n=0;["tenCap","pbt"].forEach(k=>{if(s.cons[k]!=null)n+=slotWeight(t,k,pfKey);});return n;}
  let n=0;["mos","tenCap","pbt"].forEach(k=>{if(s.cons[k]!=null)n+=slotWeight(t,k,pfKey);});
  if(isOperationalTier1(t)&&s.cons.mos!=null)n+=slotWeight(t,'pmos',pfKey);
  if(pfKey==="nl"&&s.cons?.mos!=null&&!isOperationalTier1(t))n+=slotWeight(t,'mos',pfKey);
  return n;
}
// Weighted lit count for a single stock — sum of slot weights for currently-deploying signals (firing + piggyback).
// On Personal Tier 1 with all four firing (P-MOS not suppressed): 3×1.0 + 0.6 = 3.6. With P-MOS suppressed
// (because MOS/PBT/TenCap firing deeper): equals the three lit weights, P-MOS unlit goes to reserve.
function weightedLit(t,pfKey){
  const s=stocks[t];if(!s?.cons||s.gate===false)return 0;
  let n=0;
  if(!isBuffett(t)&&s.signals?.mos)n+=slotWeight(t,'mos',pfKey);
  if(s.signals?.tenCap)n+=slotWeight(t,'tenCap',pfKey);
  if(s.signals?.pbt)n+=slotWeight(t,'pbt',pfKey);
  if(pmosFires(t))n+=slotWeight(t,'pmos',pfKey);
  if(isPiggyback(s,"tenCap",t))n+=slotWeight(t,'tenCap',pfKey);
  if(isPiggyback(s,"pbt",t))n+=slotWeight(t,'pbt',pfKey);
  if(pfKey==="nl"&&s.signals?.mos&&!isBuffett(t)&&!isOperationalTier1(t))n+=slotWeight(t,'mos',pfKey);
  return n;
}

// === Per-lit-tranche cap (v3.96) ===
// Each lit tranche has a cost-basis target = slotWeight × 5% of base. Standard slot → 5%, P-MOS → 3%.
// "base" is a COST-BASIS anchor (Pool1 cost + Pool3 cost + DP + new income), passed in by the caller.
// A lit tranche's current cost basis = Σ open(bought-sold)×buyPrice over matching tranche rows, in
// stock ccy → base ccy. Room to deploy = max(0, target − current). A signal with no existing tranche
// row is a fresh 0%-filled tranche with full room. Returns one entry per *lit* (firing/piggyback) slot.
function litTrancheTopups(ticker,pfKey,base){
  const s=stocks[ticker];if(!s?.cons||s.gate===false||base<=0)return [];
  const pf=portfolios[pfKey];const pos=pf?.positions?.[ticker];
  const bc=pfBaseCcy(pfKey);
  // Which signals are lit (firing or piggybacking)?
  const lit=[];
  if(!isBuffett(ticker)&&s.signals?.mos)lit.push('mos');
  if(s.signals?.tenCap||isPiggyback(s,'tenCap',ticker))lit.push('tenCap');
  if(s.signals?.pbt||isPiggyback(s,'pbt',ticker))lit.push('pbt');
  if(pmosFires(ticker))lit.push('pmos');
  // Canonical tranche labels per sigKey (mirrors hasTrancheForSignal).
  const labelMap={mos:["MOS"],tenCap:["10Cap","20Cap"],pbt:["PBT","DMOS"],pmos:["P-MOS"]};
  const dispLabel={mos:"MOS",tenCap:isHighgr(ticker)?"20Cap":isBuffett(ticker)?"10Cap":"10Cap",pbt:isHighgr(ticker)?"DMOS":"PBT",pmos:"P-MOS"};
  const out=[];
  lit.forEach(sigKey=>{
    // Current cost basis of this tranche (matching label rows, open shares), in stock ccy → base ccy.
    let curLocal=0;
    if(pos?.tranches){pos.tranches.forEach(tr=>{if(labelMap[sigKey].includes(tr.signal)){const sh=tr.bought-tr.sold;if(sh>0)curLocal+=sh*tr.buyPrice;}});}
    const curBase=fromEUR(toEUR(curLocal,s.currency),bc);
    const targetFrac=slotWeight(ticker,sigKey,pfKey)*0.05;   // 1.0→5%, 0.6→3%
    const targetBase=targetFrac*base;
    const roomBase=Math.max(0,targetBase-curBase);
    const roomLocal=fromEUR(toEUR(roomBase,bc),s.currency);
    out.push({sigKey,label:dispLabel[sigKey],curBase,targetBase,roomBase,roomLocal,ccy:s.currency,targetPct:targetFrac*100});
  });
  return out;
}

// Tranche-ownership check — true when the user already holds shares in a tranche for this signal.
// Used to suppress buy badges and push notifications mid-month so they only appear for signals
// where capital has not yet been deployed. Monthly allocation (deployCount) is intentionally NOT
// gated by this — salary day still tops up existing tranches when their signal is firing.
// Tranche.signal uses canonical labels "MOS"/"10Cap"/"PBT" (or "20Cap"/"DMOS" for highgr-era tranches);
// sigKey uses lowercase column names "mos"/"tenCap"/"pbt". One sigKey may match multiple labels because
// old tranches purchased pre-category-change retain their original label permanently.
function hasTrancheForSignal(ticker,sigKey,pfKey){
  const sigNames=sigKey==="mos"?["MOS"]:sigKey==="tenCap"?["10Cap","20Cap"]:sigKey==="pbt"?["PBT","DMOS"]:sigKey==="pmos"?["P-MOS"]:null;
  if(!sigNames)return false;
  const pfsToCheck=pfKey?[pfKey]:["personal","nl"];
  return pfsToCheck.some(pk=>{
    const pos=portfolios[pk]?.positions?.[ticker];
    if(!pos?.tranches)return false;
    return pos.tranches.some(tr=>sigNames.includes(tr.signal)&&(tr.bought-tr.sold)>0);
  });
}

// Snooze: suppress a stock's signals until end of month
function endOfMonth(){const d=new Date();return new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999).getTime();}
function isSnoozed(t,sig){const s=stocks[t];if(!s?.snoozed)return false;if(sig){const exp=s.snoozed[sig];if(!exp)return false;if(Date.now()>exp){delete s.snoozed[sig];return false;}return true;}return Object.keys(s.snoozed).some(k=>isSnoozed(t,k));}
function snoozeSignal(t,sig){if(!stocks[t].snoozed)stocks[t].snoozed={};stocks[t].snoozed[sig]=endOfMonth();save();render();}
function toggleLimitOrder(t,sig){if(!stocks[t].limitOrders)stocks[t].limitOrders={};const cur=stocks[t].limitOrders[sig];const next=!cur?"personal":cur==="personal"?"both":cur==="both"?"caca":undefined;if(next)stocks[t].limitOrders[sig]=next;else delete stocks[t].limitOrders[sig];save();render();}
function hasLimitOrder(t,sig,pf){const v=stocks[t]?.limitOrders?.[sig];if(!v)return false;if(!pf)return true;if(v==="both")return true;const want=pf==="nl"?"caca":pf;return v===want;}
function loLabel(t,sig){const v=stocks[t]?.limitOrders?.[sig];if(!v)return"";if(v==="personal")return"🧑";if(v==="both")return"🧑🧓";if(v==="caca")return"🧓";return"";}

function snoozeLabel(t){const s=stocks[t];if(!s?.snoozed)return"";const sigs=Object.entries(s.snoozed).filter(([k,v])=>Date.now()<=v);if(!sigs.length)return"";const d=new Date(Math.max(...sigs.map(([k,v])=>v)));const names=sigs.map(([k])=>k==="mos"?"MOS":k==="tenCap"?trigT3Label(t):trigT2Label(t));return names.join("+")+"\u2009until\u2009"+d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});}
// Returns {sticker, mos} or null if any input is missing
// Uses settings.marr (default 10%) as discount rate: divisor = (1 + marr/100)^10
function recalcSticker(eps,gr,pe){
  if(eps==null||gr==null||pe==null)return null;
  const g=gr/100;
  const futureEPS=eps*Math.pow(1+g,10);
  const futurePE=Math.min(2*gr,pe);
  const divisor=Math.pow(1+(settings.marr||10)/100,10);
  const sticker=+(futureEPS*futurePE/divisor).toFixed(2);
  const mos=+(sticker/2).toFixed(2);
  return{sticker,mos};
}

// Apply recalcSticker to a stock's cons object, updating mos+sticker and tracking prevSticker
function applyRecalcSticker(s){
  const r=recalcSticker(s.cons.eps,s.cons.gr,s.cons.pe);
  if(!r)return;
  const oldSticker=s.cons.sticker;
  s.cons.mos=r.mos;s.cons.sticker=r.sticker;
  if(oldSticker&&r.sticker!==oldSticker)s.cons.prevSticker=oldSticker;
}

// Recompute the tenCap and pbt columns from inputs, category-aware.
// MUST be called AFTER applyRecalcSticker so s.cons.mos is current (DMOS depends on it).
//   Standard / Buffett: tenCap = oe*10        ; pbt = 8yr cumulative growing FCF
//   High-Growth      : tenCap = oe*20 (20Cap); pbt = mos*0.9 (DMOS, = sticker*0.45)
function recalcConsTriggers(s){
  if(!s?.cons)return;
  const hg=s.category==="highgr";
  if(s.cons.oe!=null){
    const mult=hg?20:10;
    s.cons.tenCap=+(s.cons.oe*mult).toFixed(2);
  }
  if(hg){
    if(s.cons.mos!=null)s.cons.pbt=+(s.cons.mos*0.90).toFixed(2);
  }else if(s.cons.fcf!=null&&s.cons.gr!=null){
    const g=s.cons.gr/100;let sum=0;
    for(let y=1;y<=8;y++)sum+=s.cons.fcf*Math.pow(1+g,y);
    s.cons.pbt=+sum.toFixed(2);
  }
}

// RingMark — live signal mark SVG. Three concentric rings: outer=PBT(purple), middle=10Cap(blue), inner=MOS(green)
// Each ring state: "buy"=full glow, "hold"=dim signal color, "track"=bright, "warn"=amber, "sell"=red, false/""=dormant
function ringMark(size, pbtState, tcState, mosState, uid) {
  const s=size, cx=s/2, cy=s/2, R=s*0.44;
  const rP=R*0.82, rT=R*0.63, rM=R*0.43;
  const wD=R*0.042, wO=R*0.078;
  const bl=Math.max(0.6, R*0.055);
  const id=uid||Math.random().toString(36).slice(2,6);
  const dim='rgba(255,255,255,0.09)';
  const sigCols={pbt:'#a78bfa',tc:'#60a5fa',mos:'#4ade80'};
  // Resolve state → stroke color, width, whether glow filter needed
  function resolve(state, sigKey) {
    const col=sigCols[sigKey];
    if(state===true||state==="buy") return {stroke:col, w:wO, glow:true};
    if(state==="hold") return {stroke:col+'60', w:wO*0.7, glow:false};  // 38% opacity signal color
    if(state==="track") return {stroke:col, w:wO*0.85, glow:true};
    if(state==="warn") return {stroke:'#fbbf24', w:wO, glow:true};
    if(state==="sell") return {stroke:'#f87171', w:wO, glow:true};
    return {stroke:dim, w:wD, glow:false};
  }
  const rPbt=resolve(pbtState,'pbt'), rTc=resolve(tcState,'tc'), rMos=resolve(mosState,'mos');
  const flt=(fid,col)=>`<filter id="${fid}" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur in="SourceGraphic" stdDeviation="${bl}" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  const needP=rPbt.glow, needT=rTc.glow, needM=rMos.glow;
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" style="flex-shrink:0;vertical-align:middle">
    <defs>
      <radialGradient id="rb${id}" cx="38%" cy="32%"><stop offset="0%" stop-color="#141e38"/><stop offset="60%" stop-color="#0b1228"/><stop offset="100%" stop-color="#060a18"/></radialGradient>
      ${needP?flt('rp'+id):''}${needT?flt('rt'+id):''}${needM?flt('rm'+id):''}
    </defs>
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#rb${id})"/>
    <circle cx="${cx}" cy="${cy}" r="${rP}" fill="none" stroke="${rPbt.stroke}" stroke-width="${rPbt.w}" ${needP?`filter="url(#rp${id})"`:''} style="transition:stroke .5s,stroke-width .5s"/>
    <circle cx="${cx}" cy="${cy}" r="${rT}" fill="none" stroke="${rTc.stroke}" stroke-width="${rTc.w}" ${needT?`filter="url(#rt${id})"`:''} style="transition:stroke .5s,stroke-width .5s"/>
    <circle cx="${cx}" cy="${cy}" r="${rM}" fill="none" stroke="${rMos.stroke}" stroke-width="${rMos.w}" ${needM?`filter="url(#rm${id})"`:''} style="transition:stroke .5s,stroke-width .5s"/>
    <circle cx="${cx}" cy="${cy}" r="${R*0.985}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${R*0.02}"/>
  </svg>`;
}

// Determine ring state for a stock card — checks both buy signals and tranche lifecycle
function ringState(ticker, pfKey) {
  const s=stocks[ticker]; if(!s) return {pbt:false,tc:false,mos:false};
  const pos=portfolios[pfKey]?.positions?.[ticker];
  const result={pbt:false,tc:false,mos:false};
  // Map signal names to ring keys
  const keyMap={PBT:'pbt','10Cap':'tc',MOS:'mos'};
  const sigMap={pbt:'pbt',tenCap:'tc',mos:'mos'};
  // First: check buy signals (highest priority — overrides tranche state). Include piggyback.
  if(s.signals?.pbt||isPiggyback(s,"pbt",ticker)) result.pbt="buy";
  if(s.signals?.tenCap||isPiggyback(s,"tenCap",ticker)) result.tc="buy";
  if(s.signals?.mos) result.mos="buy";
  // Then: check tranche lifecycle for non-buy rings
  if(pos){
    pos.tranches.forEach(tr=>{
      if((tr.bought-tr.sold)<=0) return;
      const rk=keyMap[tr.signal]; if(!rk||result[rk]==="buy") return;
      const state=tr.state||"accumulating";
      if(state==="stopped") result[rk]="sell";
      else if(state==="stopActive"){
        const ath=tr.ath, cp=s.currentPrice;
        const dd=ath&&cp?((ath-cp)/ath*100):0;
        result[rk]=dd>=15?"warn":"track";
      } else result[rk]="hold"; // accumulating or waiting
    });
  }
  return result;
}
function totalSignals(pfKey){return getGrid(pfKey).reduce((s,t)=>s+deployCount(t,pfKey),0);}
function gridSize(pfKey){return getGrid(pfKey).reduce((n,t)=>n+validTriggerSlots(t,pfKey),0);}
function firingGridSize(pfKey){return getGrid(pfKey).filter(t=>sigCount(t)>0).reduce((n,t)=>n+validTriggerSlots(t,pfKey),0);}
function updateSignals(t){const s=stocks[t];if(!s?.currentPrice||!s?.cons)return;const p=s.currentPrice;
  // Store previous signals to detect signal-off events
  const prev=s.signals?{...s.signals}:{mos:false,tenCap:false,pbt:false};
  const buf=s.category==="buffett";
  // Buffett: no MOS, no Sticker Ceiling. Phil Town: tenCap/pbt gated by sticker (mos×2).
  const sticker=buf?null:(s.cons.mos?s.cons.mos*2:null);
  s.signals={
    mos:buf?false:(s.cons.mos?p<=s.cons.mos:false),
    tenCap:s.cons.tenCap?p<=s.cons.tenCap&&(sticker==null||s.cons.tenCap<sticker):false,
    pbt:s.cons.pbt?p<=s.cons.pbt&&(sticker==null||s.cons.pbt<sticker):false
  };
  // Detect signal changes for alerts
  if(!s._sigChanges)s._sigChanges=[];
  ["mos","tenCap","pbt"].forEach(sig=>{
    if(prev[sig]&&!s.signals[sig])s._sigChanges.push({sig,dir:"off"});
    else if(!prev[sig]&&s.signals[sig]){s._sigChanges.push({sig,dir:"on"});if(!window._suppressBuyModal)queueBuyModal(t,sig);}
  });
  // Track per-tranche state machine + ATH
  // v3.59: Pool 1 stocks no longer use trailing stops. Only Pool 3 (risk bucket) and
  // trophy tranches still write tr.ath / tr.state="stopActive"/"stopped". See usesTrailingStop().
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf?.positions?.[t])return;
    pf.positions[t].tranches.forEach(tr=>{
      if((tr.bought-tr.sold)<=0){tr.state="sold";return;}
      if(!tr.state)tr.state="accumulating";
      const base=sellBase(s,tr.signal);
      if(!base)return; // hold signal — no tracking
      // v3.59 gate: Pool 1 (non-risk, non-trophy) tranches skip ATH/trailing-stop logic entirely.
      if(!usesTrailingStop(t,pk,tr))return;
      // Trophy: always track ATH from purchase price (base === -1)
      const isTrophy=(base===-1);
      if(isTrophy){
        if(!tr.ath)tr.ath=tr.buyPrice||p;
        if(p>tr.ath)tr.ath=p;
        tr.state="stopActive";
      }else if(p>=base){
        // Price crossed activation — begin/continue ATH tracking
        if(tr.state==="accumulating")tr._justCrossed=true; // flag for alert
        tr.state="stopActive";
        if(!tr.ath||p>tr.ath)tr.ath=p;
      }
      // Check trailing stop
      if(tr.state==="stopActive"&&tr.ath){

        if(p<=stop)tr.state="stopped"; // flagged for sell

  });
}
function nearestTrigger(t){const s=stocks[t];if(!s)return null;
  // FIX v3.75: include P-MOS for Tier 1 so gap%, sort tiebreaks, and the "approaching buy zone" alert
  // measure to the same trigger the watchlist star now flags. BEHAVIORAL NOTE: Tier 1 stocks now enter
  // the buy-zone alert when within 10% of P-MOS (higher price) rather than within 10% of MOS — i.e. the
  // heads-up fires earlier. To revert ONLY this and keep the star fix, delete the pmos line below.
  const pm=isOperationalTier1(t)?pmosPrice(s):null;
  const tr=[pm,s.cons.mos,!isTriggerMuted(s,"tenCap")?s.cons.tenCap:null,!isTriggerMuted(s,"pbt")?s.cons.pbt:null].filter(Boolean);return tr.length?Math.max(...tr):null;}

// Caca portfolio: total market value (excl trophy) + DP, and tranche size (÷15)
function cacaInfo(){
  const pf=portfolios.nl;if(!pf)return{total:0,tranche:0,totalWithIndex:0};
  let mv=0;
  Object.entries(pf.positions).forEach(([t,pos])=>{const s=stocks[t];if(!s)return;
    const isTrophy=pos.tranches.every(tr=>tr.signal==="trophy");
    if(!isTrophy){const sh=posShares(pos);if(sh>0)mv+=toEUR(sh*s.currentPrice,s.currency);}});
  const total=mv+(pf.dryPowder||0); // Pool 1 MV + Pool 3 MV (trophy excluded) + DP
  const ixVal=indexValue("nl");
  const totalWithIndex=total+ixVal;
  // v3.67 Stage D: tranche = 3% × (Pool 1+3 MV) at deployment, floating (not ÷40).
  // Falls back to legacy `100/nlTranches` derivation if nlTranchePct unset (migration safety).
  const tranchePct=settings.nlTranchePct||(settings.nlTranches?100/settings.nlTranches:3);
  return{total,tranche:Math.round(total*tranchePct/100),mv,totalWithIndex,ixVal,tranchePct};
}
// Per-stock cost allocation status for Caca: target cost vs actual cost
// TRIM RULE (v3.13): target is based on how many triggers the AVERAGE COST sits at-or-below,
// NOT on which signals happen to be lit right now. Philosophy: reward good entries with room
// to hold. If the avg cost beat all triggers historically, earn full allocation even if
// the current price has rallied and no signals are firing anymore.
// Caca allocation status: where this position stands relative to its target tranche count.
// Target is driven by how many tranches are actually deployed (recorded in pos.tranches),
// since avg cost almost always sits between trigger prices and made the old "trBelow"
// comparison unreliable.
// v3.67 Stage D: targetTranches now CAPS at the per-stock category limit so 4×3% targets
// align with Tier 1's 12% cap, 3×3% with non-Tier-1 PT/HIGHGR's 9% cap, and 2×3% with
// Buffett's 6% cap. (Old code mapped 3+ PT tranches to 4 under ÷40 math — that would now
// overshoot a non-Tier-1 PT's cap by ~3 percentage points.)
//   Tier 1 (PT/HIGHGR): max 4 tranches (incl. P-MOS) → 12% target
//   Non-Tier-1 PT/HIGHGR: max 3 tranches → 9% target
//   Buffett: max 2 tranches → 6% target
function cacaAllocStatus(ticker){
  const pf=portfolios.nl;if(!pf)return null;
  const pos=pf.positions?.[ticker];if(!pos)return null;
  const s=stocks[ticker];if(!s)return null;
  const sh=posShares(pos);if(sh<=0)return null;
  const avg=posAvgPrice(pos);
  const costEUR=toEUR(avg*sh,s.currency);
  const ci=cacaInfo();
  const sig=sigCount(ticker);
  // Target = min(deployed tranches, category max) × tranche size. Aligns with per-stock cap.
  const cons=s.cons||{};const buf=isBuffett(ticker);
  const isT1=isOperationalTier1(ticker);
  const nTranches=posTranchesOwned(pos);
  const maxTranches=buf?2:isT1?4:3;
  const targetTranches=Math.min(nTranches,maxTranches);
  const trBelow=nTranches; // kept in return shape for backward compat
  const target=targetTranches*ci.tranche;
  // Buffett: anchor = 20Cap (OE×20). Phil Town: anchor = Sticker. At anchor → capital-recovery.
  // Tier 1 in Caca → null sellRef (forever-hold, never enters sellAll).
  const sellRef=isT1?null:(buf?activationPrice(s,ticker):(s.cons?.mos?s.cons.mos*2:null));
  const aboveSellRef=sellRef&&s.currentPrice>sellRef;
  const diff=costEUR-target;
  const aboveCost=s.currentPrice>=avg;
  // Status: sellAll (above sell reference, 0/N), overAllocated, underAllocated, balanced
  let status="balanced";
  if(sig===0&&aboveSellRef)status="sellAll";
  else if(target===0&&sig===0)status="noTarget";
  else if(diff>ci.tranche*0.15)status="over";
  else if(diff<-ci.tranche*0.15)status="under";
  return{costEUR,target,diff,status,aboveCost,aboveSticker:aboveSellRef,tranche:ci.tranche,trBelow,targetTranches};
}
