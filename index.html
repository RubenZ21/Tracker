          if(k==="dpUSD_nl"&&!empty(val))portfolios.nl.dpUSD=Number(val);
          if(k==="dpEUR_nl"&&!empty(val))portfolios.nl.dpEUR=Number(val);
          if(k==="dpGBP_nl"&&!empty(val))portfolios.nl.dpGBP=Number(val);
          if(k==="dpJPY_nl"&&!empty(val))portfolios.nl.dpJPY=Number(val);
          if(k==="dpCAD_nl"&&!empty(val))portfolios.nl.dpCAD=Number(val);
          if(k==="nlCapAtPersonal"&&!empty(val))settings.nlCapAtPersonal=Number(val)===1;
          if(k==="nlTranches"&&!empty(val))settings.nlTranches=Math.max(1,Number(val));
          if(k==="nlTranchePct"&&!empty(val))settings.nlTranchePct=Math.max(0.1,Math.min(20,Number(val)));
          if(k==="marr"&&!empty(val))settings.marr=Math.max(1,Math.min(30,Number(val)));
          if(k==="pushWorkerUrl"&&!empty(val))settings.pushWorkerUrl=String(val);
          if(k==="indexAllocation"&&!empty(val))settings.indexAllocation=Math.max(0,Number(val));
          if(k==="indexAllocationPct"&&!empty(val))settings.indexAllocationPct=Math.max(0,Math.min(100,Number(val)));
          if(k==="indexUSShares"&&!empty(val)){getIndexPos("personal","us").shares=Number(val);}
          if(k==="indexUSAvgCost"&&!empty(val)){getIndexPos("personal","us").avgCost=Number(val);}
          if(k==="indexEUShares"&&!empty(val)){getIndexPos("personal","eu").shares=Number(val);}
          if(k==="indexEUAvgCost"&&!empty(val)){getIndexPos("personal","eu").avgCost=Number(val);}
          if(k==="nlIndexUSShares"&&!empty(val)){getIndexPos("nl","us").shares=Number(val);}
          if(k==="nlIndexUSAvgCost"&&!empty(val)){getIndexPos("nl","us").avgCost=Number(val);}
          if(k==="nlIndexEUShares"&&!empty(val)){getIndexPos("nl","eu").shares=Number(val);}
          if(k==="nlIndexEUAvgCost"&&!empty(val)){getIndexPos("nl","eu").avgCost=Number(val);}
          // Legacy single-position import (backward compat)
          if(k==="indexShares"&&!empty(val)){getIndexPos("personal","us").shares=Number(val);}
          if(k==="indexAvgCost"&&!empty(val)){getIndexPos("personal","us").avgCost=Number(val);}
          if(k==="nlIndexShares"&&!empty(val)){getIndexPos("nl","us").shares=Number(val);}
          if(k==="nlIndexAvgCost"&&!empty(val)){getIndexPos("nl","us").avgCost=Number(val);}
          if(k==="ibkrWorker"&&!empty(val))settings.ibkrWorker=String(val);
          if(k==="ibkrTokenPersonal"&&!empty(val))settings.ibkrTokenPersonal=String(val);
          if(k==="ibkrQueryPersonal"&&!empty(val))settings.ibkrQueryPersonal=String(val);

          // v3.40: previously-missing settings now roundtrip. Empty value → clear to []/default.
          if(k==="gridStocks_personal"){portfolios.personal.gridStocks=empty(val)?[]:String(val).split(",").filter(Boolean);}
          if(k==="gridStocks_nl"){portfolios.nl.gridStocks=empty(val)?[]:String(val).split(",").filter(Boolean);}
          if(k==="riskStocks_personal"){portfolios.personal.riskStocks=empty(val)?[]:String(val).split(",").filter(Boolean);}
          if(k==="riskStocks_nl"){portfolios.nl.riskStocks=empty(val)?[]:String(val).split(",").filter(Boolean);}
          if(k==="indexTickerUS"&&!empty(val))settings.indexTickerUS=String(val);
          if(k==="indexTickerEU"&&!empty(val))settings.indexTickerEU=String(val);
          if(k==="nlIndexTickerUS"&&!empty(val))settings.nlIndexTickerUS=String(val);
          if(k==="nlIndexTickerEU"&&!empty(val))settings.nlIndexTickerEU=String(val);
          if(k==="nlIndexCap"&&!empty(val))settings.nlIndexCap=Math.max(0,Math.min(100,Number(val)));
          if(k==="nlIndexTranche"&&!empty(val))settings.nlIndexTranche=Math.max(0,Number(val));

          if(k==="dpSliderCaca"&&!empty(val))settings.dpSliderCaca=Math.max(0,Math.min(100,Number(val)));
          if(k==="monthlyStep"&&!empty(val))settings.monthlyStep=Number(val);

          nSet++;

      }

      // Sheet 4: Deploy Log
      let nLog=0;
      if(wb.SheetNames.includes("DeployLog")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["DeployLog"]);
        if(rows.length>0){
          // Merge: imported entries are added to existing log, deduped by date+ticker+signal+shares
          const existing=new Set(deployLog.map(e=>(e.date||"")+"|"+e.ticker+"|"+e.signal+"|"+e.shares));
          rows.forEach(row=>{

            const key=((row.date||"")+"|"+(row.ticker||"")+"|"+(row.signal||"")+"|"+(row.shares||0));
            if(existing.has(key))return; // skip duplicates
            const s=stocks[(row.ticker||"").toUpperCase()];
            deployLog.push({

            });

          });
          // Re-sort by date descending (newest first)
          deployLog.sort((a,b)=>new Date(b.date)-new Date(a.date));
        }
      }

      // Sheet 5: Index Log (v3.40) — restore per-region per-portfolio DCA history
      if(wb.SheetNames.includes("IndexLog")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["IndexLog"]);
        // Build per-(portfolio,region) sets of existing keys so we can merge without duplicates
        const seen={};
        ["personal","nl"].forEach(pk=>{["us","eu"].forEach(rg=>{
          const ip=getIndexPos(pk,rg);if(!ip.deployLog)ip.deployLog=[];
          seen[pk+"|"+rg]=new Set(ip.deployLog.map(e=>(e.date||"")+"|"+(e.shares||0)+"|"+(e.price||0)));
        });});
        rows.forEach(row=>{
          const pk=String(row.portfolio||"personal");const rg=String(row.region||"us");
          if(!portfolios[pk]||(rg!=="us"&&rg!=="eu"))return;
          const ip=getIndexPos(pk,rg);
          const key=(row.date||"")+"|"+(Number(row.shares)||0)+"|"+(Number(row.price)||0);
          if(seen[pk+"|"+rg].has(key))return;
          ip.deployLog.push({
            date:row.date?String(row.date):new Date().toISOString(),
            shares:Number(row.shares)||0,
            price:Number(row.price)||0,
            amount:Number(row.amount)||0});
          seen[pk+"|"+rg].add(key);
        });
        // Sort each log oldest-first to match in-app push order
        ["personal","nl"].forEach(pk=>{["us","eu"].forEach(rg=>{
          const ip=getIndexPos(pk,rg);if(ip.deployLog)ip.deployLog.sort((a,b)=>new Date(a.date)-new Date(b.date));
        });});
      }

      // Backward compat: only derive when Settings sheet did NOT supply gridStocks_* (legacy exports).
      // If a new-format export provided gridStocks_* explicitly (even as empty ""), that is authoritative.
      ["personal","nl"].forEach(pk=>{
        if(gridKeysSeen[pk])return; // authoritative empty/populated grid already applied
        if(!portfolios[pk].gridStocks||!portfolios[pk].gridStocks.length){
          // Check if Stocks sheet had gridPersonal/gridCaca columns
          const colKey=pk==="personal"?"gridPersonal":"gridCaca";
          if(wb.SheetNames.includes("Stocks")){
            const sRows2=XLSX.utils.sheet_to_json(wb.Sheets["Stocks"]);
            const fromCol=sRows2.filter(r=>String(r[colKey]||"").toUpperCase()==="Y").map(r=>String(r.ticker||"").toUpperCase().trim()).filter(Boolean);
            if(fromCol.length){portfolios[pk].gridStocks=fromCol;return;}
          }
          // Fallback: derive from status==="grid"
          portfolios[pk].gridStocks=Object.keys(stocks).filter(t=>stocks[t].status==="grid");
        }
      });
      // Normalize: change status==="grid" to "watchlist" since grid is now per-portfolio
      Object.values(stocks).forEach(s=>{if(s.status==="grid")s.status="watchlist";});

      save();scheduleTrancheSync();render();
      const changes=diffStocks(beforeSnap);
      showImportDiffModal(changes,nStocks,changes.filter(c=>c.isNew).length);
    }catch(err){alert("Import error: "+err.message);}
  };r.readAsArrayBuffer(f);e.target.value="";
}

// The optional `ticker` arg lets callers gate the Tier 1 check (returns null for Tier 1).
// Fair-value anchor (framework §5, June 2 2026 redesign):
//   Buffett        → 20Cap = OE/share × 20  (= 2 × Ten Cap; replaces retired Ten Cap × 1.333)
//   PT / HIGHGR    → Sticker (= MOS × 2)
//   Tier 1         → null (forever-hold, tripwires only)
// Derived from current-year s.cons (oe / mos), so refreshes at each annual review — never frozen.
function activationPrice(s,ticker){
  if(ticker&&isOperationalTier1(ticker))return null;
  if(s.category==="buffett"){const oe=s.cons?.oe;return oe?+(oe*20).toFixed(2):null;}
  const stk=s.cons?.mos?s.cons.mos*2:null;return stk?+stk.toFixed(2):null;
}
// Targeted SELL price for the grid's right block. Phil Town / High-Growth: tranche Sticker = MOS×2
// (sell activation = Sticker×1.333, but the Sticker is the headline "fair value to sell at" the user
// tracks toward). Buffett Category: OE×20 (= activationPrice). Tier 1 compounders hold forever with
// no price-based exit, so there is no sell target — returns null and the row shows "—".
function sellTarget(s,ticker){
  if(ticker&&isOperationalTier1(ticker))return null; // Tier 1: hold forever, tripwire-only exit
  if(s.category==="buffett"){const oe=s.cons?.oe;return oe?+(oe*20).toFixed(2):null;}
  return s.cons?.mos?+(s.cons.mos*2).toFixed(2):null;
}
function sellBase(s,signal){
  if(signal==="trophy")return -1; // special: always tracking, no sticker gate
  if(signal==="hold")return null; // hold — no sell tracking
  // No ticker arg — gated by usesTrailingStop() in trailing-stop paths (Tier 1 returns false there).
  return activationPrice(s);
}

// ============ ALERT SYSTEM ============
let dismissedAlerts=JSON.parse(localStorage.getItem("r1-dismissed")||"{}");
function dismissAlert(key){dismissedAlerts[key]=Date.now();localStorage.setItem("r1-dismissed",JSON.stringify(dismissedAlerts));}
// Clean dismissed alerts older than 7 days
function cleanDismissed(){const week=7*86400000;const now=Date.now();Object.keys(dismissedAlerts).forEach(k=>{if(now-dismissedAlerts[k]>week)delete dismissedAlerts[k];});localStorage.setItem("r1-dismissed",JSON.stringify(dismissedAlerts));}

function checkAlerts(){
  cleanDismissed();
  const alerts=[];
  const GRID=getGrid(),WL=getWatchlist().filter(t=>!isOnAnyGrid(t));const SPEC=getSpeculative();

  // CRITICAL: 4M GATE FAIL — sell all (highest priority)
  Object.entries(stocks).forEach(([t,s])=>{
    if(s.gate===false&&(isOnAnyGrid(t)||isRiskAnywhere(t))){
      const k=`gate-fail-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"critical",icon:"🚫",
        html:`<strong>${s.flag} ${t}</strong> 4M GATE FAILED — SELL ALL tranches immediately!`});}
  });

  // TRIPWIRE FIRING — T6 critical (red pulse) with immediate-action instruction; T1/T3 watch
  // (amber) with audit-pending guidance. Operational gate (isOperationalTier1) enforced —
  // a non-Tier-1 stock with a stale t6Firing flag in CSV does NOT generate an alert (badges
  // are also masked at render). Per operations §7. Each fires once per dismissal cycle.
  // Ordered T6 → T1 → T3 so the most urgent (T6 = immediate sell) sorts highest visually.
  Object.entries(stocks).forEach(([t,s])=>{
    if(!isOperationalTier1(t))return;
    if(s.t6Firing){
      const k=`tripwire-t6-${t}`;
      if(!dismissedAlerts[k])alerts.push({key:k,type:"critical",icon:"🚨",
        html:`<strong>${s.flag} ${t}</strong> — <strong>T6 FIRING</strong>. Reduce to <strong>half-weight at market next session</strong> (IBKR Highest Cost, sequential highest-cost-first). 4M re-audit within 30 days. See operations §7.`});
    }
    if(s.t1Firing){
      const k=`tripwire-t1-${t}`;
      if(!dismissedAlerts[k])alerts.push({key:k,type:"watch",icon:"⚠",
        html:`<strong>${s.flag} ${t}</strong> — <strong>T1 FIRING</strong> (5yr ROIIC &lt; CoC, 3 consecutive years). No position action; 4M re-audit within 30 days. See operations §7.`});
    }
    if(s.t3Firing){
      const k=`tripwire-t3-${t}`;
      if(!dismissedAlerts[k])alerts.push({key:k,type:"watch",icon:"⚠",
        html:`<strong>${s.flag} ${t}</strong> — <strong>T3 FIRING</strong> (Wide→Narrow moat downgrade with structural commentary). No position action; 4M re-audit within 30 days. See operations §7.`});
    }
  });

  // STICKER DROP >20% — flag for re-audit
  Object.entries(stocks).forEach(([t,s])=>{
    if(!s.cons?.prevSticker||!s.cons?.sticker)return;
    if(s.cons.sticker<s.cons.prevSticker*0.80){
      const drop=Math.round((1-s.cons.sticker/s.cons.prevSticker)*100);
      const k=`sticker-drop-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"sell",icon:"📉",
        html:`<strong>${s.flag} ${t}</strong> sticker dropped <strong>${drop}%</strong> (${fmt(s.cons.prevSticker,s.currency)} → ${fmt(s.cons.sticker,s.currency)}). Full 4M re-audit needed!`});}
  });

  // TRAILING STOP — SELL (critical, per-tranche)
  // v3.59: Pool 1 stocks no longer use trailing stops. Only fires for tranches where
  // usesTrailingStop(t,pk,tr) returns true: Pool 3 risk bucket + trophy.
  ["personal","nl"].forEach(pk=>{

        if(tr.state!=="stopped"&&tr.state!=="stopActive")return;
        if(!tr.ath||(tr.bought-tr.sold)<=0)return;
        const base=sellBase(s,tr.signal);if(base===null)return;
        const isTrophy=(base===-1);

        const dd=((tr.ath-s.currentPrice)/tr.ath*100);
        if(dd>=25){const k=`trail-${pk}-${t}-${tr.signal}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"critical",icon:"🚨",

        // STOP BUFFER WARNING — within 5% of stop

          html:`<strong>${s.flag} ${t}</strong> ${tr.signal} approaching stop — <strong>−${dd.toFixed(1)}%</strong> from ATH ${fmt(tr.ath.toFixed(2),s.currency)} in ${pf.name}. Stop at −25%.`});}

        if(tr._justCrossed){

  // is suppressed inside fairValueThreshold(). Persists while above anchor until dismissed.
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;

  // 13F FILING WINDOW — remind during active window (deadline within 14d) and just after (post-deadline check).
  // Per-deadline dismissal key so the alert reappears for each quarterly filing.
  {const f=next13FDeadline();
   if(f){

function marketStatus(){
  const now=new Date();const strip=document.getElementById("market-strip");if(!strip)return;
  // Weekend check (0=Sun, 6=Sat) — approximate, doesn't handle per-market holidays
  const dow=now.getDay();const weekend=dow===0||dow===6;
  let h="";
  MARKETS.forEach(m=>{
    // Get current hours/mins in market's timezone
    const parts=new Intl.DateTimeFormat("en",{timeZone:m.tz,hour:"numeric",minute:"numeric",hour12:false}).formatToParts(now);
    const hr=parseInt(parts.find(p=>p.type==="hour").value);
    const mn=parseInt(parts.find(p=>p.type==="minute").value);
    const mins=hr*60+mn;const openMins=m.open[0]*60+m.open[1];const closeMins=m.close[0]*60+m.close[1];
    const isOpen=!weekend&&mins>=openMins&&mins<closeMins;
    // Convert open/close to Saudi local time for display
    const toLocal=(hh,mm)=>{
      const d=new Date();d.setMilliseconds(0);d.setSeconds(0);
      // Create a date at hh:mm in the market's timezone by brute search (reliable across DST)
      // Use Intl to figure out the UTC offset for the market tz
      const ref=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);
      const utcStr=ref.toLocaleString("en-US",{timeZone:"UTC"});
      const tzStr=ref.toLocaleString("en-US",{timeZone:m.tz});
      const utcMs=new Date(utcStr).getTime();const tzMs=new Date(tzStr).getTime();
      const offsetMs=tzMs-utcMs; // tz ahead of UTC by this much
      // Market local hh:mm → UTC → add 3h for AST
      const marketUTC=hh*60+mm-offsetMs/60000;
      const astMins=marketUTC+180; // UTC+3
      const ah=Math.floor(((astMins%1440)+1440)%1440/60);const am=Math.round(((astMins%1440)+1440)%1440%60);
      return String(ah).padStart(2,"0")+":"+String(am).padStart(2,"0");
    };
    const localOpen=toLocal(m.open[0],m.open[1]);const localClose=toLocal(m.close[0],m.close[1]);
    const dot=isOpen?"#34d399":"#5a6a7a";
    const shortO=localOpen.replace(/:00$/,"");const shortC=localClose.replace(/:00$/,"");
    h+=`<div style="font-size:9px;color:var(--muted);display:flex;align-items:center;gap:2px;line-height:1;cursor:pointer" onclick="showMarketToast('${m.flag} ${m.label} ${localOpen}–${localClose} AST${isOpen?" · OPEN":" · CLOSED"}')">
      <span style="width:5px;height:5px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0;${isOpen?"box-shadow:0 0 4px #34d39980":""}"></span>
      <span>${m.flag}</span>
    </div>`;
  });
  strip.innerHTML=h;
}


// Earnings banner: show stocks reporting within 14 days (upcoming) or stale after reporting
// Dismissals stored in settings.earningsBannerDismissed = { ticker: dismissTimestamp }
// Two snooze modes, inferred from timing of the dismissal relative to earnings day:
//   UPCOMING banner (today < earnings day): dismissed hides until earnings day arrives.
//   STALE banner   (today >= earnings day): dismissed hides for the rest of today only;
//                  the banner reappears the next calendar day so the reminder keeps nagging
//                  until the user actually updates the triggers.
function isEarningsBannerDismissed(t,s){
  const d=settings.earningsBannerDismissed;if(!d||!d[t])return false;
  const today=new Date();today.setHours(0,0,0,0);
  const earnDay=new Date(s.earningsDate);earnDay.setHours(0,0,0,0);
  const dismissDay=new Date(d[t]);dismissDay.setHours(0,0,0,0);
  // Case A: still before the earnings day → "until earnings day" snooze
  // Any prior dismissal counts; it will auto-expire when today crosses earnDay.
  if(today.getTime()<earnDay.getTime())return true;
  // Case B: today is on or after earnings day → "snooze for the day" mode for stale banners
  //   - Dismissal happened before earnings day → earnings day has now rolled in, show again.
  //   - Dismissal happened today → keep hidden for the rest of today.
  //   - Dismissal happened on a prior day (but still post-earnings) → show again.
  if(dismissDay.getTime()<earnDay.getTime())return false;
  return dismissDay.getTime()===today.getTime();
}
function dismissEarningsBanner(t){
  if(!settings.earningsBannerDismissed)settings.earningsBannerDismissed={};
  settings.earningsBannerDismissed[t]=Date.now();
  localStorage.setItem("r1-settings",JSON.stringify(settings));render();
}

    // isEarningsBannerDismissed uses dismissal timing to decide which snooze rule applies.

    const cls=ei.status==="upcoming"?"info":"watch";

      `<strong>${s.flag} ${t}</strong> reported ${ei.label.replace("📅 ","").replace(" → update","")} — <strong>triggers need update</strong>`;
    // Upcoming → hide until earnings day. Stale → snooze for the rest of today.
    const dismissTitle=ei.status==="upcoming"?"Dismiss until earnings day":"Snooze until tomorrow";

    h+=`<div class="alert-item ${cls}" style="padding:8px 12px;margin-bottom:4px;display:flex;align-items:center"><span class="alert-icon">${icon}</span><span class="alert-text" style="font-size:12px;flex:1">${msg}</span>${dismissBtn}</div>`;
  });

}

    fxEl.innerHTML=`<span style="${fxColor}" title="${settings.lastFxError||''}">1€=$${settings.fxRate} · 1€=£${settings.fxGBP} · 1€=C$${settings.fxCAD} · 1€=¥${settings.fxJPY}${ibkrAge?" · ⚡"+ibkrAge:""}${fxErrTxt}</span>`;}
  ["portfolio","watchlist","allocator","settings"].forEach(t=>{const el=document.getElementById("nav-"+t);if(el){el.style.color=currentTab===t?"var(--accent)":"var(--muted)";el.style.fontWeight=currentTab===t?"700":"400";}});
  const _earBanner=renderEarningsBanner();
  const _contentEl=document.getElementById("content");
  ({portfolio:renderPortfolio,allocator:renderAllocator,watchlist:renderWatchlist,settings:renderSettings})[currentTab](_contentEl);
  if(_earBanner&&(currentTab==="portfolio"||currentTab==="watchlist")){_contentEl.innerHTML=_earBanner+_contentEl.innerHTML;}
  // Update watchlist nav badge — count watchlist stocks with any buy signal firing (excluding snoozed)
  const wlFiring=getWatchlist().reduce((n,t)=>{const s=stocks[t];if(!s?.currentPrice||s.gate===false)return n;return n+(s.signals?.mos&&!isSnoozed(t,"mos")?1:0)+(s.signals?.tenCap&&!isSnoozed(t,"tenCap")?1:0)+(s.signals?.pbt&&!isSnoozed(t,"pbt")?1:0);},0);
  const wb=document.getElementById("watch-badge");if(wb){if(wlFiring>0){wb.textContent=wlFiring;wb.style.display="flex";}else{wb.style.display="none";}}
  checkAlerts();
  marketStatus();
}
function switchTab(t){currentTab=t;localStorage.setItem("r1-tab",t);render();window.scrollTo(0,0);}

// ============ SIGNAL CELL STATUS (lifecycle: buy → hold → tracking → sell) ============
function sigCellStatus(ticker, sigKey, pfKey){
  // sigKey: "mos", "tenCap", "pbt"; pfKey: "personal" or "nl" (optional, defaults to checking both)
  const s=stocks[ticker];if(!s)return{cls:"none",label:"",sub:""};
  const p=s.currentPrice;
  const trigger=s.cons?.[sigKey];
  if(!trigger||!p)return{cls:"none",label:"",sub:fmt(trigger,s.currency)||"—"};
  const muted=isTriggerMuted(s,sigKey);
  const owned=hasTrancheForSignal(ticker,sigKey,pfKey);
  // PIGGYBACK: muted trigger but price below it AND a valid signal is also firing — would deploy.
  // If tranche already owned, downgrade to "filled" (no buy badge, no notification path) but
  // still show the trigger price so the grid stays informative.
  if(p<=trigger&&muted&&sigCount(ticker)>0){
    if(owned)return{cls:"filled",label:"✓",sub:fmt(trigger,s.currency),subCls:"",topSub:"owned"};
    return{cls:"buy",label:"B",sub:fmt(trigger,s.currency),subCls:"buy-sub",topSub:"piggyback"};
  }
  // MUTED: price reached trigger but no valid signal firing — cannot deploy alone.
  // Not gated by ownership because the muted state itself is the reason no action is suggested.
  if(p<=trigger&&muted)return{cls:"muted",label:"C",sub:fmt(trigger,s.currency),subCls:"",topSub:"≥ sticker"};
  // BUY: signal firing AND not muted — valid buy signal. Suppress badge if tranche already owned.
  if(p<=trigger){
    if(owned)return{cls:"filled",label:"✓",sub:fmt(trigger,s.currency),subCls:"",topSub:"owned"};
    return{cls:"buy",label:"B",sub:fmt(trigger,s.currency),subCls:"buy-sub"};
  }
  // Above trigger: check if tranche has shares. Match both legacy ("10Cap"/"PBT") and highgr-era
  // ("20Cap"/"DMOS") labels because old tranches keep their original label permanently.
  const sigNames=sigKey==="mos"?["MOS"]:sigKey==="tenCap"?["10Cap","20Cap"]:["PBT","DMOS"];
  let hasShares=false,worst="hold",maxDD=0;
  const pfsToCheck=pfKey?[pfKey]:["personal","nl"];
  pfsToCheck.forEach(pk=>{
    const pos=portfolios[pk]?.positions?.[ticker];if(!pos)return;
    pos.tranches.forEach(tr=>{
      if(!sigNames.includes(tr.signal)||(tr.bought-tr.sold)<=0)return;
      hasShares=true;
      if(tr.state==="stopped"){worst="sell";if(tr.ath){const dd=(tr.ath-p)/tr.ath*100;if(dd>maxDD)maxDD=dd;}}
      else if(tr.state==="stopActive"&&worst!=="sell"){worst="track";if(tr.ath){const dd=(tr.ath-p)/tr.ath*100;if(dd>maxDD)maxDD=dd;}}
    });
  });
  // No shares in this tranche type — show trigger price plus drop % needed from current
  // Gap turns amber when price is within 10% of trigger (close to firing)
  if(!hasShares){
    const gap=p>trigger?Math.round((p-trigger)/p*100):0;
    if(gap<=0)return{cls:"none",label:"",sub:fmt(trigger,s.currency),subCls:""};
    const _gapCol=gap<10?"#d97706":"var(--muted)";
    const _sub=`${fmt(trigger,s.currency)} <span style="color:${_gapCol};font-weight:${gap<10?"700":"400"}">▼${gap}%</span>`;
    // Permanently muted (trigger ≥ Sticker) but price is above trigger — flag visually so the
    // user can see at a glance this trigger will never fire as a primary signal regardless of
    // price action. Different from the cls:"muted" state (firing-but-muted) which uses the "C" badge.
    if(muted)return{cls:"mutedOff",label:"",sub:_sub,subCls:"",topSub:"≥ sticker"};
    return{cls:"none",label:"",sub:_sub,subCls:""};
  }
  // Has shares — show lifecycle state
  if(worst==="sell")return{cls:"sell",label:"S",sub:`−${Math.round(maxDD)}%`,subCls:"sell-sub"};
  if(worst==="track"){
    const cls=maxDD>=15?"warn":"track";
    return{cls,label:cls==="warn"?"!":"↑",sub:Math.round(maxDD)===0?"ATH":`−${Math.round(maxDD)}%`,subCls:cls==="warn"?"warn-sub":"track-sub"};
  }
  // HOLD: circle shows current price, activation above, trigger + drop % below
  // Gap turns amber when within 10% of re-triggering
  const sym=s.currency==="USD"?"$":s.currency==="GBp"?"":s.currency==="CAD"?"C$":"€";
  const sfx=s.currency==="GBp"?"p":"";
  const act=activationPrice(s,ticker);
  const _holdGap=p>trigger?Math.round((p-trigger)/p*100):0;
  let _holdSub;
  if(_holdGap<=0){_holdSub=fmt(trigger,s.currency);}
  else{const _hc=_holdGap<10?"#d97706":"var(--muted)";_holdSub=`${fmt(trigger,s.currency)} <span style="color:${_hc};font-weight:${_holdGap<10?"700":"400"}">▼${_holdGap}%</span>`;}
  return{cls:"hold",label:`${sym}${Math.round(p)}${sfx}`,topSub:act?`act ${fmt(act,s.currency)}`:"",sub:_holdSub,subCls:""};
}

// ============ REFINED GRID — FLEXIBLE CHIP STRIP (v3.71) ============
// Replaces the fixed 4-signal-column grid. Each stock renders only the chips it is eligible for,
// dispatched off `category` + Tier 1 status. No new math — sigCellStatus/sigCount/deployCount and
// the muting/piggyback functions are unchanged; this governs which chips render and their labels.
function chipColor(t,key){
  if(key==='pmos')return '#fbbf24';                       // gold — P-MOS
  if(key==='mos')return '#4ade80';                        // green — MOS
  if(key==='tenCap')return '#60a5fa';                     // blue — 10Cap / 20Cap
  if(key==='pbt')return isHighgr(t)?'#2dd4bf':'#a78bfa';  // DMOS teal-green / PBT purple
  return 'var(--muted)';
}
function chipLabel(t,key){
  if(key==='pmos')return 'P-MOS';
  if(key==='mos')return 'MOS';
  if(key==='tenCap')return trigT3Label(t); // 10Cap / 20Cap
  if(key==='pbt')return trigT2Label(t);    // PBT / DMOS
  return key;
}
// Eligible chips per category + Tier 1, in display order (operations §2 + framework §2.6):
//   Buffett   : 10Cap, PBT          (no MOS)
//   Phil Town : MOS, PBT, 10Cap
//   HIGHGR    : MOS, DMOS, 20Cap    (pbt slot = DMOS, tenCap slot = 20Cap)
//   + Tier 1  : P-MOS leads as the 4th chip on whichever menu applies (e.g. ASML = HIGHGR Tier 1)
function chipKeys(t){
  if(isBuffett(t))return ["tenCap","pbt"];
  const base=["mos","pbt","tenCap"];
  return isOperationalTier1(t)?["pmos",...base]:base;
}
// One chip. Returns "" when excluded: a permanently-muted (non-piggybacking) Ten Cap/20Cap/PBT,
// or P-MOS on a non-Tier-1 row. A muted trigger that IS piggybacking renders a faint chip and
// still deploys via the count (deployCount already includes it). MOS, DMOS, P-MOS are never muted.
// LO marker is wired identically for every key incl. pmos (toggleLimitOrder / loLabel).
function signalChip(t,key,pfKey){
  const s=stocks[t];if(!s)return "";
  const col=chipColor(t,key),lbl=chipLabel(t,key);
  const loTag=hasLimitOrder(t,key)?`<div class="chip-lo">${loLabel(t,key)} LO</div>`:"";
  const wrap=(inner,style,cls,title)=>`<div class="chip ${cls||''}" style="${style||''}" ${title?`title="${title}"`:''} onclick="event.stopPropagation();toggleLimitOrder('${t}','${key}')">${inner}${loTag}</div>`;
  const valFmt=(v)=>v!=null?fmt(v,s.currency):"—";
  // ---- P-MOS (Tier 1 only): firing / suppressed / not-firing. No owned-state (no pmos tranche). ----
  if(key==='pmos'){
    const pmP=pmosPrice(s);if(!isOperationalTier1(t)||pmP==null)return "";
    const valStr=valFmt(pmP);
    if(hasTrancheForSignal(t,'pmos',pfKey)){ // P-MOS tranche held → owned (action done)
      if(pmosFiresRaw(s)) // owned AND price back at/below P-MOS → re-firing, louder treatment
        return wrap(`<div class="chip-lbl" style="color:${col}">${lbl}</div><div class="chip-val" style="color:${col}">${valStr}</div><div class="chip-sub" style="color:#34d399;font-weight:700">✓●fires</div>`,`background:${col}26;border-color:${col};box-shadow:0 0 6px ${col}55`,'','Owned & firing again');
      return wrap(`<div class="chip-lbl" style="color:${col}">${lbl}</div><div class="chip-val" style="color:${col}">${valStr}</div><div class="chip-sub" style="color:#34d399">✓ owned</div>`,`background:${col}12;border-color:${col}55`);
    }
    if(pmosFires(t))
      return wrap(`<div class="chip-lbl" style="color:#000">${lbl}</div><div class="chip-val" style="color:#000">${valStr}</div><div class="chip-sub" style="color:#000">fires</div>`,`background:${col};border-color:${col};box-shadow:0 0 8px ${col}55`);
    if(pmosFiresRaw(s)) // raw firing but suppressed by a deeper signal
      return wrap(`<div class="chip-lbl" style="color:${col}">${lbl}</div><div class="chip-val" style="color:${col}">${valStr}</div><div class="chip-sub" style="color:${col}aa">supp.</div>`,`border-color:${col}80`,'chip-faint');
    const p0=s.currentPrice;let sub0="";
    if(p0&&p0>pmP){const g=Math.round((p0-pmP)/p0*100);const gc=g<10?"#d97706":"#8a90a6";sub0=`<span style="color:${gc};font-weight:${g<10?700:400}">▼${g}%</span>`;}
    return wrap(`<div class="chip-lbl">${lbl}</div><div class="chip-val">${valStr}</div><div class="chip-sub">${sub0}</div>`,"",'chip-dim');
  }
  // ---- MOS / PBT(DMOS) / Ten Cap(20Cap): drive off existing lifecycle status ----
  const st=sigCellStatus(t,key,pfKey);
  const tv=valFmt(s.cons[key]);
  // FIX v3.76: muted triggers were returned as "" (hidden). Now render with dashed amber
  // border + "≥ stkr" caption so the chip stays visible — matches the watchlist convention.
  // Two visual tiers: mutedOff (price above, informational) vs muted (price reached trigger
  // but can't deploy alone, no piggyback firing — slightly more emphatic).
  if(st.cls==='mutedOff'){
    const p2=s.currentPrice,tr2=s.cons[key];
    let gapStr="";
    if(p2&&tr2&&p2>tr2){const g=Math.round((p2-tr2)/p2*100);gapStr=` <span style="color:#d97706">▼${g}%</span>`;}
    return wrap(`<div class="chip-lbl" style="color:#d97706">${lbl} ⌀</div><div class="chip-val" style="color:#d97706;opacity:.7">${tv}</div><div class="chip-sub" style="color:#d97706cc">≥ stkr${gapStr}</div>`,`border-color:#d97706aa`,'chip-faint','Muted: trigger ≥ Sticker — cannot fire as primary signal');
  }
  if(st.cls==='muted'){
    // Price has reached a muted trigger but no other signal is firing → no piggyback deploy.
    return wrap(`<div class="chip-lbl" style="color:#d97706">${lbl} ⌀</div><div class="chip-val" style="color:#d97706">${tv}</div><div class="chip-sub" style="color:#d97706">≥ stkr · muted</div>`,`background:#d9770618;border-color:#d97706;border-style:dashed`,'','Muted: trigger ≥ Sticker — cannot fire as primary signal');
  }
  if(st.cls==='buy'){
    if(st.topSub==='piggyback') // faint piggyback chip — deploys via count, not a standalone signal
      return wrap(`<div class="chip-lbl" style="color:${col}">${lbl}</div><div class="chip-val" style="color:${col}">${tv}</div><div class="chip-sub" style="color:${col}cc">↗ pgbk</div>`,`border-color:${col}80`,'chip-faint');
    // Firing & NOT yet owned = action needed → solid fill + black text + glow, like the P-MOS firing chip.
    return wrap(`<div class="chip-lbl" style="color:#000">${lbl}</div><div class="chip-val" style="color:#000">${tv}</div><div class="chip-sub" style="color:#000">fires</div>`,`background:${col};border-color:${col};box-shadow:0 0 8px ${col}66`);
  }
  if(st.cls==='filled'){
    // OWNED + RE-FIRING: this tranche type is held AND price is back at/below the trigger right now.
    // Visually louder than a quiet hold — tinted fill keeps the "owned" read, but a bright caption +
    // soft glow + dot flag that the signal is live again (add-on opportunity / piggyback territory).
    const act=activationPrice(s,t);
    return wrap(`<div class="chip-lbl" style="color:${col}">${lbl}</div><div class="chip-val" style="color:${col}">${tv}</div><div class="chip-sub" style="color:#34d399;font-weight:700">✓●fires</div>`,`background:${col}26;border-color:${col};box-shadow:0 0 6px ${col}55`,'',act?`Owned & firing again — activation ${fmt(act,s.currency)}`:'Owned & firing again');
  }
  if(st.cls==='hold'){
    // OWNED, QUIET: held but price is above the trigger — no live signal. Faint tint, muted caption.
    const act=activationPrice(s,t);
    return wrap(`<div class="chip-lbl" style="color:${col}">${lbl}</div><div class="chip-val" style="color:${col}">${tv}</div><div class="chip-sub" style="color:#34d399">✓ owned</div>`,`background:${col}12;border-color:${col}55`,'',act?`Owned — activation ${fmt(act,s.currency)}`:'Owned');
  }
  if(st.cls==='track')
    return wrap(`<div class="chip-lbl" style="color:#60a5fa">${lbl}</div><div class="chip-val" style="color:#60a5fa">${st.sub}</div><div class="chip-sub" style="color:#60a5fa">trail</div>`,`background:#60a5fa18;border-color:#60a5fa55`);
  if(st.cls==='warn')
    return wrap(`<div class="chip-lbl" style="color:#fbbf24">${lbl}</div><div class="chip-val" style="color:#fbbf24">${st.sub}</div><div class="chip-sub" style="color:#fbbf24">trail!</div>`,`background:#fbbf2418;border-color:#fbbf2455`);
  if(st.cls==='sell')
    return wrap(`<div class="chip-lbl" style="color:#fca5a5">${lbl}</div><div class="chip-val" style="color:#fca5a5">${st.sub}</div><div class="chip-sub" style="color:#fca5a5">SELL</div>`,`background:#7f1d1d;border-color:#f87171`);
  // none → dim chip: trigger value + drop% needed (amber within 10%)
  const p=s.currentPrice,tr=s.cons[key];let sub="";
  if(p&&tr&&p>tr){const g=Math.round((p-tr)/p*100);const gc=g<10?"#d97706":"#8a90a6";sub=`<span style="color:${gc};font-weight:${g<10?700:400}">▼${g}%</span>`;}
  return wrap(`<div class="chip-lbl">${lbl}</div><div class="chip-val">${tv}</div><div class="chip-sub">${sub}</div>`,"",'chip-dim');
}
// Trigger value backing each chip — used to order the strip high→low.
function chipTrigValue(t,key){
  const s=stocks[t];if(!s)return null;
  if(key==='pmos')return pmosPrice(s);
  return s.cons?s.cons[key]:null;
}
function chipStripHtml(t,pfKey){
  // Order left→right by trigger value, highest first. Null-valued / muted keys sort last and
  // render empty (filtered out). LO wiring is per-key inside signalChip, so reordering is safe.
  const keys=chipKeys(t).slice().sort((a,b)=>{
    const va=chipTrigValue(t,a),vb=chipTrigValue(t,b);
    if(va==null&&vb==null)return 0;if(va==null)return 1;if(vb==null)return -1;
    return vb-va;
  });
  return keys.map(k=>signalChip(t,k,pfKey)).join("");
}
// Full row: ident (flag · cat pill · ticker · ★T1 · shield · M/C · HOLD · 📅 · calc) + chip strip
// + right block (current price shown ONCE + #/N count). isSpec = Pool 3 risk-bucket row.
function sigRowHtml(t,pfKey,isSpec){
  const s=stocks[t];const sig=sigCount(t);const gateFail=s.gate===false;const notFiring=sig===0&&!gateFail;
  const catBadge=isSpec
    ?`<span style="font-size:9px;color:#d97706;background:#d9770620;padding:1px 4px;border-radius:3px;margin-right:4px">RISK</span>`
    :isHighgr(t)?`<span style="font-size:9px;color:#a855f7;background:#a855f720;padding:1px 4px;border-radius:3px;margin-right:4px">HG</span>`
    :isBuffett(t)?`<span style="font-size:9px;color:#38bdf8;background:#38bdf820;padding:1px 4px;border-radius:3px;margin-right:4px">WB</span>`
    :`<span style="font-size:9px;color:#34d399;background:#34d39920;padding:1px 4px;border-radius:3px;margin-right:4px">PT</span>`;
  const mBadge=`<span style="font-size:9px;color:var(--purple);font-family:var(--mono);margin-left:4px;font-weight:400">M${s.priority||"—"}</span>`;
  const cBadge=`<span style="font-size:9px;color:var(--accent);font-family:var(--mono);margin-left:3px;font-weight:400">C${s.compounderPriority||"—"}</span>`;
  const extras=isSpec?"":`${notFiring?` <span style="font-size:9px;color:var(--muted);font-weight:400">HOLD</span>`:""}${(()=>{const ei=earningsInfo(s);return ei&&(ei.soon||ei.status==="stale")?` <span style="font-size:8px;color:${ei.color}" title="${ei.label}">📅</span>`:"";})()}${calcFreshness(s.lastCalcDate).stale?`<span style="font-size:8px;color:${calcFreshness(s.lastCalcDate).color};margin-left:4px;font-weight:400" title="Triggers: ${calcFreshness(s.lastCalcDate).label}">${calcFreshness(s.lastCalcDate).label}</span>`:""}`;
  const ident=`<div style="font-size:13px;font-weight:600">${gateFail?"🚫 ":""}${catBadge}${s.flag} ${t}${tier1Marker(t)}${tripwireShield(t)}${mBadge}${cBadge}${extras}</div>`;
  const dc=deployCount(t,pfKey),vSlots=validTriggerSlots(t,pfKey);
  const priceStr=s.currentPrice!=null?fmt(s.currentPrice,s.currency):"—";
  // Cost line: average buy price of shares held in this portfolio + unrealised gain/loss vs current.
  // Only shown when a position exists; otherwise blank (nothing owned = no cost basis to show).
  let costStr="";
  {
    const _pf=pfKey||"personal";
    const _pos=portfolios[_pf]?.positions?.[t];
    const _avg=_pos?posAvgPrice(_pos):0;
    const _sh=_pos?posShares(_pos):0;
    if(_avg>0&&_sh>0){
      const p=s.currentPrice;
      let glTxt="";
      if(p!=null&&_avg>0){const gl=Math.round((p-_avg)/_avg*100);const glc=gl>0?"#60a5fa":"#34d399";glTxt=` <span style="color:${glc}">${gl>=0?"+":""}${gl}%</span>`;} // below cost = green (cheaper), above = blue
      costStr=`<div style="font-size:8px;font-family:var(--mono);color:#8a90a6" title="Average cost basis (${_sh} sh held)">@${fmt(_avg,s.currency)}${glTxt}</div>`;
    }
  }
  let countTxt,countCol;
  if(isSpec){countTxt=`${dc||"0"}/${vSlots}`;countCol="#d97706";}
  else{
    const _sk=isBuffett(t)?["tenCap","pbt"]:["mos","tenCap","pbt"];
    const hasSell=_sk.some(k=>sigCellStatus(t,k,pfKey).cls==="sell");
    const hasWarn=_sk.some(k=>sigCellStatus(t,k,pfKey).cls==="warn");
    const hasMuted=_sk.some(k=>sigCellStatus(t,k,pfKey).cls==="muted");
    countCol=hasSell?"var(--red)":(dc===vSlots&&dc>0)?"var(--green)":dc?"var(--accent)":hasWarn?"var(--amber)":hasMuted?"#d97706":"var(--muted)";
    countTxt=hasSell?"SELL":`${dc||0}/${vSlots}`;
  }
  const rowStyle=`${gateFail?"opacity:.4;":(notFiring&&!isSpec)?"opacity:.75;":""}${isSpec?"border-top:1px dashed #d9770644;":""}`;
  // Sell-target line: targeted sell price + how far current price is below it (▲X% to reach sell).
  // Tier 1 compounders (incl. risk-bucket Tier 1 like CSU) have no price exit → "hold ∞".
  // Risk rows honor the per-ticker anchor toggle (2× cost default, or Sticker); PT/Buffett use Sticker/20Cap.
  let sellStr="";
  {
    let tgt,tgtLabel;
    if(isSpec){ // Pool 3 risk row — use the toggled anchor (2× cost or Sticker)
      tgt=riskRecoveryAnchor(t,pfKey);
      tgtLabel=riskAnchorMode(t)==="sticker"?"Sticker = MOS×2":"2× avg cost";
    }else{
      tgt=sellTarget(s,t);
      tgtLabel=isBuffett(t)?"OE×20":"Sticker = MOS×2";
    }
    if(isOperationalTier1(t)){
      sellStr=`<div style="font-size:8px;font-family:var(--mono);color:#8a90a6" title="Tier 1 compounder — hold forever, tripwire-only exit">hold ∞</div>`;
    }else if(tgt!=null){
      const p=s.currentPrice;
      let gapTxt="";
      if(p!=null&&p>0){
        const g=Math.round((tgt-p)/p*100);
        if(g>0){const gc=g<=10?"#34d399":"#8a90a6";gapTxt=` <span style="color:${gc};font-weight:${g<=10?700:400}">▲${g}%</span>`;} // within 10% = green, else gray
        else if(g<0){gapTxt=` <span style="color:#f87171;font-weight:700">SELL ${Math.abs(g)}%↑</span>`;} // at/above target
        else gapTxt=` <span style="color:#fbbf24;font-weight:700">@tgt</span>`;
      }
      sellStr=`<div style="font-size:8px;font-family:var(--mono);color:#8a90a6" title="Targeted sell price (${tgtLabel})">🎯${fmt(tgt,s.currency)}${gapTxt}</div>`;
    }
  }
  return `<div class="sig-row" style="${rowStyle}">
    <div class="sig-ident">${ident}</div>
    <div class="chip-strip">${chipStripHtml(t,pfKey)}</div>
    <div class="sig-right"><div style="font-size:12px;font-weight:700;font-family:var(--mono);color:var(--muted)">${priceStr}</div>${costStr}<div style="font-size:13px;font-weight:700;font-family:var(--mono);color:${countCol}">${countTxt}</div>${sellStr}</div>

// ============ SIGNAL CELEBRATION ============
// Track previous signal state to detect new activations
let prevSignals={};
function checkNewSignals(){
  const GRID=getGrid();
  const newFires=[];
  GRID.forEach(t=>{
    const s=stocks[t];if(!s?.signals)return;
    const prev=prevSignals[t]||{mos:false,tenCap:false,pbt:false,pmos:false};
    // Suppress celebration if a tranche for this signal is already owned — the action is done.
    if(s.signals.mos&&!prev.mos&&!hasTrancheForSignal(t,"mos"))newFires.push({ticker:t,signal:"MOS"});
    if(s.signals.tenCap&&!prev.tenCap&&!hasTrancheForSignal(t,"tenCap"))newFires.push({ticker:t,signal:trigT3LongLabel(t)});
    if(s.signals.pbt&&!prev.pbt&&!hasTrancheForSignal(t,"pbt"))newFires.push({ticker:t,signal:isHighgr(t)?"DMOS":"PBT"});
    // FIX v3.75: P-MOS firing isn't stored on s.signals (it's derived). Use operational pmosFires()
    // which already bakes in Tier-1 gate, suppression rule, gate failures, and Buffett exclusion.
    if(pmosFires(t)&&!prev.pmos&&!hasTrancheForSignal(t,"pmos"))newFires.push({ticker:t,signal:"P-MOS"});
  });
  // Also check watchlist + speculative for new fires
  [...getWatchlist(),...getSpeculative()].forEach(t=>{
    if(isOnAnyGrid(t))return; // already counted above
    const s=stocks[t];if(!s?.signals)return;
    const prev=prevSignals[t]||{mos:false,tenCap:false,pbt:false,pmos:false};
    const tag=isRiskAnywhere(t)?"spec":"wl";
    // Same ownership gate — risk-bucket positions like LULU/CSU also have tranche records.
    if(s.signals.mos&&!prev.mos&&!hasTrancheForSignal(t,"mos"))newFires.push({ticker:t,signal:"MOS",wl:true,tag});
    if(s.signals.tenCap&&!prev.tenCap&&!hasTrancheForSignal(t,"tenCap"))newFires.push({ticker:t,signal:trigT3LongLabel(t),wl:true,tag});
    if(s.signals.pbt&&!prev.pbt&&!hasTrancheForSignal(t,"pbt"))newFires.push({ticker:t,signal:isHighgr(t)?"DMOS":"PBT",wl:true,tag});
    // FIX v3.75: P-MOS edge detection for Tier 1 watchlist/risk entries (e.g., MSFT, MA when on watchlist).
    if(pmosFires(t)&&!prev.pmos&&!hasTrancheForSignal(t,"pmos"))newFires.push({ticker:t,signal:"P-MOS",wl:true,tag});
  });
  // Save current state. FIX v3.75: include derived P-MOS state alongside the s.signals trio.
  Object.keys(stocks).forEach(t=>{if(stocks[t].signals)prevSignals[t]={...stocks[t].signals,pmos:pmosFires(t)};});
  return newFires;
}

    const targetTr=settings.nlCapAtPersonal?Math.min(targetTrRaw,Math.round(toEUR(personalTr,pfBaseCcy("personal")))):targetTrRaw;
    const trCapped=settings.nlCapAtPersonal&&targetTr<targetTrRaw;
    const dpCoversRaw=targetTr>0?Math.floor(pf.dryPowder/targetTr):0;
    // v3.67 Stage D: floor = $1,000 USD currency-converted (was €1,500 hardcoded).
    const MIN_FLOOR_USD=1000;
    const MIN_FLOOR=Math.round(toEUR(MIN_FLOOR_USD,"USD"));
    const dpOk=pf.dryPowder>=MIN_FLOOR;

    // MOS reserve / Expansion split removed. All dry powder is available.
    const nlDpAvail=pf.dryPowder;
    const dpCovers=targetTr>0?Math.floor(nlDpAvail/targetTr):0;

    // Tier 2 candidates: 0/N signals AND price > sell reference (sticker for PT, activation for Buffett)
    // v3.66 Stage C: Tier 1 stocks not eligible as Layer 2 sources (framework §5.2) — activationPrice
    // returns null for Tier 1, so they're naturally excluded by the sellRef truthiness check below.
    const tier2=[];
    nlTickers.forEach(t=>{const s=stocks[t];if(!s)return;const sh=posShares(nlPos[t]);if(sh<=0)return;
      const isTrophy=nlPos[t].tranches.every(tr=>tr.signal==="trophy");if(isTrophy)return;
      if(isOperationalTier1(t))return; // T1 forever-hold, not a Layer 2 source
      const sig=sigCount(t);const buf=isBuffett(t);
      const sellRef=buf?activationPrice(s,t):(s.cons?.mos?s.cons.mos*2:s.cons?.sticker||null);
      if(sig===0&&sellRef&&s.currentPrice>sellRef){
        const gap=((s.currentPrice-sellRef)/sellRef*100).toFixed(0);
        const available=toEUR(sh*s.currentPrice,s.currency);
        tier2.push({ticker:t,gap,available,price:s.currentPrice,sticker:sellRef,currency:s.currency});}});
    tier2.sort((a,b)=>b.gap-a.gap); // highest gap above sell reference first

    // Current grid stocks (non-trophy)
    const gridStocks=nlTickers.filter(t=>{const sh=posShares(nlPos[t]);return sh>0&&!nlPos[t].tranches.every(tr=>tr.signal==="trophy");});
    const stockCount=gridStocks.length;

    h+=`<div class="alloc-card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:14px;font-weight:700">Closed Fund</span>
        <span style="font-size:12px;font-family:var(--mono);color:var(--muted)">${stockCount}/${TARGET_STOCKS} stocks · ${slotsFilled}/${TARGET_SLOTS} slots</span></div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div style="flex:1;background:var(--bg);border-radius:6px;padding:8px"><div style="font-size:10px;color:var(--muted)">Portfolio Value <span style="opacity:.6">(excl. trophy)</span></div><div style="font-size:15px;font-weight:700;font-family:var(--mono)">€${Math.round(pvTotal+ixValNl).toLocaleString()}</div></div>
        <div style="flex:1;background:var(--bg);border-radius:6px;padding:8px"><div style="font-size:10px;color:var(--muted)">Target Tranche (${TRANCHE_PCT.toFixed(2).replace(/\.?0+$/,"")}%${trCapped?" · capped":""})</div><div style="font-size:15px;font-weight:700;font-family:var(--mono);color:var(--accent)">€${targetTr.toLocaleString()}</div>${trCapped?`<div style="font-size:9px;color:var(--amber);margin-top:2px">raw €${targetTrRaw.toLocaleString()} → capped at Personal</div>`:""}<div style="display:flex;gap:4px;margin-top:4px;align-items:center"><span style="font-size:9px;color:var(--muted)">%</span><input type="number" step="0.1" min="0.1" max="20" style="width:44px;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-family:var(--mono);padding:2px 4px;text-align:center" value="${TRANCHE_PCT}" onchange="settings.nlTranchePct=Math.max(0.1,Math.min(20,+this.value||3));save();render()"></div><div style="margin-top:4px"><label style="font-size:9px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px"><input type="checkbox" ${settings.nlCapAtPersonal?"checked":""} onchange="settings.nlCapAtPersonal=this.checked;save();render()"> Cap at Personal</label></div></div></div>
      <div style="display:flex;gap:8px">
        <div style="flex:1;background:var(--bg);border-radius:6px;padding:8px"><div style="font-size:10px;color:var(--muted)">Dry Powder</div><div style="font-size:15px;font-weight:700;font-family:var(--mono);color:var(--green)">€${Math.round(pf.dryPowder).toLocaleString()}</div>
          <div style="font-size:9px;color:var(--muted);margin-top:2px;font-family:var(--mono)">${(()=>{const parts=[];if(pf.dpUSD)parts.push("$"+Math.round(pf.dpUSD).toLocaleString());if(pf.dpEUR)parts.push("€"+Math.round(pf.dpEUR).toLocaleString());if(pf.dpGBP)parts.push("£"+Math.round(pf.dpGBP).toLocaleString());if(pf.dpJPY)parts.push("¥"+Math.round(pf.dpJPY).toLocaleString());if(pf.dpCAD)parts.push("C$"+Math.round(pf.dpCAD).toLocaleString());return parts.join(" + ")||"€0"})()}</div>
          ${pf.dryPowder<=0?`<div style="font-size:9px;color:var(--muted);margin-top:2px">via IBKR sync or <span style="cursor:pointer;color:var(--accent)" onclick="editDP('nl')">✏ edit</span></div>`:""}</div>
        <div style="flex:1;background:var(--bg);border-radius:6px;padding:8px"><div style="font-size:10px;color:var(--muted)">DP Covers</div><div style="font-size:15px;font-weight:700;font-family:var(--mono);color:${dpCovers>=3?"var(--green)":dpCovers>=1?"var(--amber)":"var(--red)"}">${dpCovers} tranche${dpCovers!==1?"s":""}</div></div></div></div>`;

    // Scenario: what if N triggers fire?
    // v3.67 Stage D: funding tiers renamed Funded/Recycle/Defer (was Tier 1/2/3) so the
    // wording doesn't collide with Compounder Tier 1 elsewhere in the app.
    h+=`<div class="alloc-card" style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">If a new stock triggers…</div>`;
    [1,2,3].forEach(n=>{
      const need=n*targetTr;const dpShort=Math.max(0,need-nlDpAvail);
      const tier2Avail=tier2.reduce((s,x)=>s+x.available,0);
      const canFund=nlDpAvail>=need;const canTier2=!canFund&&dpShort<=tier2Avail;const mustDefer=!canFund&&!canTier2&&nlDpAvail<MIN_FLOOR;
      const statusIcon=canFund?"✅":canTier2?"🔄":nlDpAvail>=MIN_FLOOR?"⚠️":"❌";
      const statusText=canFund?"Funded — DP covers":canTier2?`Recycle — sell €${Math.round(dpShort).toLocaleString()} from ${tier2[0]?.ticker||"?"}`:nlDpAvail>=MIN_FLOOR?"Defer — undersized entry":`Below $${MIN_FLOOR_USD.toLocaleString()} floor — defer`;
      const statusCol=canFund?"var(--green)":canTier2?"var(--amber)":"var(--red)";
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:var(--bg);border-radius:6px;margin-bottom:4px">
        <div><span style="font-size:12px;font-weight:600">${n} trigger${n>1?"s":""}</span><span style="font-size:11px;color:var(--muted);margin-left:6px">€${Math.round(need).toLocaleString()} needed</span></div>

    h+=`</div>`;

    // Recycle candidates (formerly "Tier 2 Sources") — 0/N firing AND price above sell reference.
    h+=`<div class="alloc-card" style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">Recycle Sources <span style="font-size:10px;color:var(--muted);font-weight:400">0/N + above sticker</span></div>`;
    if(!tier2.length){h+=`<div style="font-size:11px;color:var(--muted);padding:4px 0">None — all grid stocks have active signals or are below sticker.</div>`;}
    else{tier2.forEach(t2=>{
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:var(--bg);border-radius:6px;margin-bottom:4px">
        <div><span style="font-size:13px;font-weight:600">${stocks[t2.ticker]?.flag||""} ${t2.ticker}</span><span style="font-size:10px;color:var(--muted);margin-left:6px">+${t2.gap}% above sticker</span></div>
        <span style="font-size:12px;font-family:var(--mono);color:var(--amber)">€${Math.round(t2.available).toLocaleString()} available</span></div>`;});}
    h+=`</div>`;

    // === RISK BUCKET (Caca) ===
    {
      const _specStocks=getSpeculative("nl");
      const _rbiNL=riskBucketInfo("nl");
      const _rbiNLPct=Math.round((_rbiNL.capPct||0.05)*100);
      const _specInPfNL=_specStocks.filter(t=>pf.positions?.[t]&&posShares(pf.positions[t])>0);
      if(_specStocks.length||_specInPfNL.length){
        h+=`<div class="alloc-card" style="margin-bottom:12px;border:1px solid #d9770633">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:14px;font-weight:700;color:#d97706">⚡ Risk Bucket</span>

            <div style="flex:1;background:var(--bg);border-radius:6px;padding:8px"><div style="font-size:10px;color:var(--muted)">Deployed</div><div style="font-size:14px;font-weight:700;font-family:var(--mono);color:${_rbiNL.used>0?"#d97706":"var(--muted)"}">€${Math.round(_rbiNL.used).toLocaleString()}</div></div>
            <div style="flex:1;background:var(--bg);border-radius:6px;padding:8px"><div style="font-size:10px;color:var(--muted)">Available</div><div style="font-size:14px;font-weight:700;font-family:var(--mono);color:var(--green)">€${Math.round(_rbiNL.available).toLocaleString()}</div></div></div>`;
        _specInPfNL.forEach(t=>{const s=stocks[t];const pos=pf.positions[t];const sh=posShares(pos);const avg=posAvgPrice(pos);const costVal=sh*avg;
          h+=`<div style="padding:6px 8px;background:var(--bg);border-radius:6px;margin-bottom:4px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div><span style="font-size:13px;font-weight:600">${s.flag} ${t}</span><span style="font-size:10px;color:#d97706;margin-left:6px">${sigCount(t)}/${validTriggerSlots(t,"nl")} signals</span></div>
              <span style="font-size:12px;font-family:var(--mono);color:#d97706">${fmt(Math.round(costVal),s.currency)} · ${fmtSh(sh)} sh</span></div>
            ${s.specReason?`<div style="font-size:10px;color:var(--muted);margin-top:2px">${esc(s.specReason)}</div>`:""}</div>`;});
        if(!_specInPfNL.length){h+=`<div style="font-size:11px;color:var(--muted);padding:4px 0">No risk positions in Caca. Use → Risk on a watchlist stock to add one.</div>`;}
        h+=`</div>`;
      }
    }

    // === NEW ENTRY DEPLOYMENT (Caca 3% rule + waterfall) ===
    const fmtAlloc=(v,ccy)=>{if(ccy==="GBp")return"£"+Math.round(v/100).toLocaleString();return fmt(Math.round(v),ccy);};
    const wlNL=Object.keys(stocks).filter(t=>!isRisk(t,"nl"));
    const readyNL=[];
    wlNL.forEach(t=>{const s=stocks[t];if(!s.currentPrice||!s.cons)return;
      const owned=isOnGrid(t,"nl");
      const buf=s.category==="buffett";
      const sticker=buf?null:(s.cons.mos?s.cons.mos*2:null);
      const _t3=trigT3Label(t),_t2=trigT2Label(t);
      const _pm=isOperationalTier1(t)?pmosPrice(s):null;
      const done=(k)=>hasTrancheForSignal(t,k,"nl");
      const triggers=[];
      if(_pm&&pmosFires(t)&&!done("pmos"))triggers.push("P-MOS");
      if(s.cons.pbt&&s.currentPrice<=s.cons.pbt&&!isTriggerMuted(s,"pbt")&&!done("pbt"))triggers.push(_t2);
      if(s.cons.tenCap&&s.currentPrice<=s.cons.tenCap&&!isTriggerMuted(s,"tenCap")&&!done("tenCap"))triggers.push(_t3);
      if(!buf&&s.cons.mos&&s.currentPrice<=s.cons.mos&&!done("mos"))triggers.push("MOS");
      const pending=[];
      if(_pm&&!triggers.includes("P-MOS")&&!done("pmos"))pending.push({name:"P-MOS",price:_pm,gap:((s.currentPrice-_pm)/s.currentPrice*100)});
      if(s.cons.pbt&&!triggers.includes(_t2)&&!isTriggerMuted(s,"pbt")&&!done("pbt"))pending.push({name:_t2,price:s.cons.pbt,gap:((s.currentPrice-s.cons.pbt)/s.currentPrice*100)});
      if(s.cons.tenCap&&!triggers.includes(_t3)&&!isTriggerMuted(s,"tenCap")&&!done("tenCap"))pending.push({name:_t3,price:s.cons.tenCap,gap:((s.currentPrice-s.cons.tenCap)/s.currentPrice*100)});
      if(!buf&&s.cons.mos&&!triggers.includes("MOS")&&!done("mos"))pending.push({name:"MOS",price:s.cons.mos,gap:((s.currentPrice-s.cons.mos)/s.currentPrice*100)});
      if(!triggers.length&&!pending.length)return;
      const nearest=pending.length?Math.min(...pending.map(p=>p.gap)):0;
      readyNL.push({ticker:t,firing:triggers,pending,nearest,firingCount:triggers.length,owned});});
    readyNL.sort((a,b)=>b.firingCount-a.firingCount||a.nearest-b.nearest);

    if(readyNL.length){
      const tier2Avail=tier2.reduce((s,x)=>s+x.available,0);

      if(firingNL.length){

        firingNL.forEach(r=>{const s=stocks[r.ticker];const needEUR=r.firingCount*targetTr;const dpUse=Math.min(nlDpAvail,needEUR);const shortfall=needEUR-dpUse;
          const localDeploy=fromEUR(needEUR,s.currency);const sh=s.currentPrice?Math.floor(localDeploy/s.currentPrice):0;
          // v3.67 Stage D: Funded / Recycle / Defer (was Tier 1/2/3, which clashed with Compounder Tier 1).
          const funded=dpUse>=needEUR?"Funded":shortfall<=tier2Avail?"Recycle":"Defer";
          const fundCol=funded==="Funded"?"var(--green)":funded==="Recycle"?"var(--amber)":"var(--red)";
          h+=`<div style="padding:8px;background:var(--bg);border-radius:6px;margin-bottom:4px;border-left:3px solid var(--green)">

      }
      // Pending stocks
      const pendingNL=readyNL.filter(r=>r.firingCount===0);
      if(pendingNL.length){
        h+=`<div style="font-size:11px;font-weight:700;color:var(--muted);margin:8px 0 4px">CLOSEST TO TRIGGER <span style="font-weight:400;opacity:.7">(watchlist + owned add-ons)</span></div>`;
        pendingNL.slice(0,8).forEach(r=>{const s=stocks[r.ticker];const nearestP=r.pending.reduce((a,b)=>a.gap<b.gap?a:b);

              <div style="text-align:right"><span style="font-size:12px;font-family:var(--mono);color:var(--muted)">${fmtAlloc(localDeploy,s.currency)}</span><span style="font-size:10px;color:var(--muted);margin-left:4px">~${sh} sh</span></div></div>

    }

    // Current holdings summary
    h+=`<div class="alloc-card">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">Current Grid</div>`;
    gridStocks.forEach(t=>{const s=stocks[t];const sh=posShares(nlPos[t]);const sig=sigCount(t);const nTr=posTranchesOwned(nlPos[t]);
      const val=toEUR(sh*s.currentPrice,s.currency);const stk=s.cons?.sticker||(s.cons?.mos?s.cons.mos*2:null);
      const aboveStk=stk&&s.currentPrice>stk;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:var(--bg);border-radius:6px;margin-bottom:4px">

  }

// ============ WATCHLIST ============
// renderWatchlist is the entry point for the Watch tab. It renders a top-level
// Watchlist | Risklist sub-toggle and then dispatches to the appropriate view.
function renderWatchlist(c){
  // Top-level sub-toggle. Risklist is Personal-only by data model; the toggle is
  // always visible (changing portfolios doesn't change Risklist contents).
  const subToggle=`<div class="section-pad" style="padding-bottom:0">
    <div class="pf-toggle" style="margin:0 0 8px">
      <button class="${watchMode==="watchlist"?"active":"inactive"}" onclick="watchMode='watchlist';localStorage.setItem('r1-watchMode','watchlist');render()">👁 Watchlist</button>
      <button class="${watchMode==="risklist"?"active":"inactive"}" onclick="watchMode='risklist';localStorage.setItem('r1-watchMode','risklist');render()">🎯 Risklist</button>
    </div></div>`;
  if(watchMode==="risklist"){
    c.innerHTML=subToggle;
    renderRisklistInto(c);
    return;
  }
  let wl=getWatchlist();
  if(wlView==="priority"){
    wl.sort((a,b)=>{const pa=stocks[a].priority??999,pb=stocks[b].priority??999;return pa!==pb?pa-pb:(gapPct(a)??999)-(gapPct(b)??999);});
  }else if(wlView==="compounder"){
    wl.sort((a,b)=>{const pa=stocks[a].compounderPriority??999,pb=stocks[b].compounderPriority??999;return pa!==pb?pa-pb:(gapPct(a)??999)-(gapPct(b)??999);});
  }else if(wlView==="ir"){
    wl.sort((a,b)=>{const ra=getClosestTriggerReturn(a)?.impliedReturn??-1,rb=getClosestTriggerReturn(b)?.impliedReturn??-1;return rb-ra;});
  }else{
    wl.sort((a,b)=>(gapPct(a)??999)-(gapPct(b)??999));
  }
  let h=subToggle+`<div class="section-pad" style="padding-top:0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

    h+=`</div><div style="display:flex;justify-content:space-between;align-items:center">

      <div style="display:flex;gap:4px;align-items:center;justify-content:flex-end;flex-wrap:wrap">

        <span style="font-size:10px;color:var(--accent);cursor:pointer;padding:4px 14px;background:var(--bg);border:1px solid #60a5fa33;border-radius:4px" onclick="openEditStock('${t}')">✏ Edit</span>
        <span style="font-size:10px;color:var(--green);cursor:pointer;padding:2px 6px;background:#0d332033;border-radius:4px" onclick="promoteToGrid('${t}')">→ Grid</span>

        <span style="font-size:10px;color:var(--red);cursor:pointer;padding:2px 6px;background:#3b111133;border-radius:4px" onclick="removeStock('${t}')">✕</span>
      </div></div>`;
    if(s.phil?.score)h+=`<div style="font-size:10px;color:var(--muted);margin-top:2px">Phil: ${s.phil.score} · GR ${s.phil.gr}% vs ${s.cons.gr}%</div>`;

// ============ RISKLIST RENDER & ACTIONS ============
// renderRisklistInto: render the Risklist view into the container c. Called from
// renderWatchlist when watchMode==="risklist". Container already has the sub-toggle prepended.
function renderRisklistInto(c){
  const entries=getRisklist();
  // Pool 3 cap indicator — combines existing risk-bucket positions and fired Risklist tranches.
  // riskBucketInfo("personal") returns cap/used/pct that already include both. This keeps
  // the Risklist tab and the existing Risk pf cards aligned on the same number.
  const rbi=riskBucketInfo("personal");
  const base=pfBaseCcy("personal");const baseSym=base==="USD"?"$":"€";
  const capWarn=rbi.pct>100;const capFillCls=rbi.pct>100?"over":rbi.pct>80?"":"under";
  const fillPct=Math.min(100,rbi.pct);
  const dp=portfolios.personal?.dryPowder||0;
  let h=`<div class="section-pad" style="padding-top:6px">
    <div class="rl-cap-bar${capWarn?' warn':''}">
      <div class="rl-cap-row">
        <span>Pool 3 cap (15% of Pool 1 cost basis)</span>
        <span class="rl-cap-val${capWarn?' over':rbi.pct>80?' warn':''}">${baseSym}${Math.round(rbi.used).toLocaleString()} / ${baseSym}${Math.round(rbi.cap).toLocaleString()} · ${rbi.pct.toFixed(1)}%</span>
      </div>
      <div class="rl-cap-track"><div class="rl-cap-fill ${capFillCls}" style="width:${fillPct}%"></div></div>
      <div class="rl-cap-row" style="margin-top:6px;margin-bottom:0">
        <span>Legacy Pool 3: ${baseSym}${Math.round(rbi.p3legacy).toLocaleString()} · Risklist fired: ${baseSym}${Math.round(rbi.p3risklist).toLocaleString()}</span>
        <span>DP: ${baseSym}${Math.round(dp).toLocaleString()}</span>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px">
      <div style="font-size:16px;font-weight:700">Risklist</div>
      <div style="display:flex;gap:6px">
        <button class="btn-sm" onclick="document.getElementById('risklist-csv-import').click()" title="Import CSV">⬆</button>
        <button class="btn-sm" onclick="exportRisklistCSV()" title="Export CSV">⬇</button>
        <button class="btn-sm btn-accent" style="padding:6px 14px" onclick="openRisklistAdd()">+ Add</button>
      </div>
    </div>`;
  if(!entries.length){
    h+=`<div class="rl-empty">
      <div class="rl-empty-title">🎯 Risklist is empty</div>
      <div class="rl-empty-text">Risklist is for speculative positions that don't fit the Phil Town framework. Add a stock with three pre-committed buy prices and the reasoning behind them. The app will notify you when prices hit, and you can review your own rationale before deploying.</div>
      <button class="rl-empty-btn" onclick="openRisklistAdd()">+ Add Stock</button>
    </div></div>`;
    c.innerHTML+=h;return;
  }
  // Sort: cards with any eligible-to-fire tranche first (by priority), then the rest (by priority).
  const sorted=entries.slice().sort((a,b)=>{
    const ea=risklistAnyEligible(a)?0:1;const eb=risklistAnyEligible(b)?0:1;
    if(ea!==eb)return ea-eb;
    return (a.priority??999)-(b.priority??999);
  });
  sorted.forEach(e=>{h+=renderRisklistCard(e);});
  h+=`</div>`;
  c.innerHTML+=h;
}

// Render a single Risklist card. Pulled out so renderRisklistInto stays scannable.
function renderRisklistCard(e){
  const s=stocks[e.ticker];const price=risklistCurrentPrice(e.ticker);
  const base=pfBaseCcy("personal");const baseSym=base==="USD"?"$":"€";
  const anyElig=risklistAnyEligible(e);
  const flag=s?.flag||"🌍";
  // Footer aggregates from fired tranches only.
  let totalShares=0,totalCostLocal=0;
  for(let i=1;i<=3;i++){
    if(e["fired"+i]&&e["firedShares"+i]&&e["firedPrice"+i]){
      totalShares+=e["firedShares"+i];
      totalCostLocal+=e["firedShares"+i]*e["firedPrice"+i];
    }
  }
  const avgPrice=totalShares>0?totalCostLocal/totalShares:0;
  const mvLocal=totalShares*(price||0);
  const pnlLocal=mvLocal-totalCostLocal;
  const pnlPct=totalCostLocal>0?(pnlLocal/totalCostLocal*100):0;
  const pnlCol=pnlLocal>=0?"var(--green)":"var(--red)";
  const rationaleId="rl-rat-"+e.ticker.replace(/[^A-Z0-9]/gi,"");
  let h=`<div class="rl-card${anyElig?' eligible':''}" id="rl-card-${e.ticker}">
    <div class="rl-card-hdr">
      <div class="rl-card-l">
        <div><span class="rl-card-ticker">${flag} ${esc(e.ticker)}</span><span class="rl-card-pri">#${e.priority??"—"}</span></div>
        <div class="rl-card-name">${esc(e.name||e.ticker)}</div>
      </div>
      <div class="rl-card-r">
        <div class="rl-card-price">${price?fmt(price,e.currency):"—"}</div>
        <div class="rl-card-price-sub">${s?.lastUpdate?timeAgo(s.lastUpdate):"no price"}</div>
      </div>
    </div>
    <div class="rl-tranches">`;
  for(let i=1;i<=3;i++){
    const fired=!!e["fired"+i];
    const elig=risklistTrancheEligible(e,i);
    const blocked=!fired&&!elig;
    const cls=fired?"fired":elig?"eligible":"blocked";
    const trig=e["trigger"+i];
    const sizePctVal=e["size"+i]||0;
    const sizeAmt=risklistTrancheAmount(e,i); // base currency
    const sizeAmtLocal=risklistTrancheAmountLocal(e,i);
    h+=`<div class="rl-tr ${cls}">
      <div class="rl-tr-label">T${i}</div>
      <div class="rl-tr-trigger">${trig?fmt(trig,e.currency):"—"}</div>
      <div class="rl-tr-size">${sizePctVal.toFixed(2)}% · ${baseSym}${Math.round(sizeAmt).toLocaleString()}</div>`;
    if(fired){
      h+=`<div class="rl-tr-state fired">✓ ${fmt(e["firedPrice"+i],e.currency)}<br>${e["firedShares"+i]} sh</div>`;
    }else if(elig){
      h+=`<button class="rl-tr-buy" onclick="openRisklistBuyModal('${e.ticker}',${i})">BUY</button>`;
    }else{
      // Sequential-rule reason: previous tranche unfired, or price hasn't hit trigger
      const reason=!e["fired"+(i-1)]&&i>1?"locked":(price&&trig&&price>trig?"above":"—");
      h+=`<div class="rl-tr-state blocked">${reason}</div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;
  // Rationale section (collapsible). Default collapsed once content exists.
  if(e.reasoning){
    h+=`<details class="rl-rationale" style="padding:8px 10px" id="${rationaleId}">
      <summary class="rl-rationale-hdr"><span>📝 Rationale</span><span style="opacity:.5">tap to expand</span></summary>
      <div class="rl-rationale-body">${esc(e.reasoning)}</div>
    </details>`;
  }
  if(e.notes){
    h+=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px;padding:6px 10px;background:var(--bg);border-radius:6px"><span style="font-weight:600">Notes:</span> ${esc(e.notes)}</div>`;
  }
  // Footer: cost basis, shares, avg, P&L. P&L informational only — no actions tied to it.
  h+=`<div class="rl-footer">
    <div class="rl-footer-row"><span class="rl-foot-label">Cost</span><span class="rl-foot-val">${totalShares?fmt(totalCostLocal,e.currency):"—"}</span></div>
    <div class="rl-footer-row"><span class="rl-foot-label">Shares</span><span class="rl-foot-val">${totalShares||"—"}</span></div>
    <div class="rl-footer-row"><span class="rl-foot-label">Avg</span><span class="rl-foot-val">${totalShares?fmt(avgPrice,e.currency):"—"}</span></div>
    <div class="rl-footer-row"><span class="rl-foot-label">P&amp;L</span><span class="rl-foot-val" style="color:${totalShares?pnlCol:"var(--muted)"}">${totalShares&&price?(pnlLocal>=0?"+":"")+pnlPct.toFixed(1)+"%":"—"}</span></div>
  </div>
  <div class="rl-card-actions">
    <button class="btn-sm btn-accent" style="flex:1" onclick="openRisklistEdit('${e.ticker}')">✏ Edit</button>
    <button class="btn-sm btn-red" style="flex:0 0 auto" onclick="deleteRisklistEntry('${e.ticker}')">✕</button>
  </div></div>`;
  return h;
}

// ============ RISKLIST: ADD / EDIT MODAL ============
// Builds a custom modal with the 3-row trigger/size grid, validation, and the required
// reasoning textarea. Used for both add (entry=null) and edit (entry=existing).
function openRisklistAdd(){openRisklistAddEditModal(null);}
function openRisklistEdit(ticker){
  const e=findRisklistEntry(ticker);
  if(!e){alert("Entry not found: "+ticker);return;}
  openRisklistAddEditModal(e);
}
function openRisklistAddEditModal(entry){
  const isEdit=!!entry;
  const e=entry||{ticker:"",name:"",currency:"USD",priority:null,
    trigger1:null,trigger2:null,trigger3:null,size1:1.0,size2:1.0,size3:1.0,
    reasoning:"",notes:"",fired1:false,fired2:false,fired3:false};
  const base=pfBaseCcy("personal");const baseSym=base==="USD"?"$":"€";
  const p1=trancheBase("personal");
  // Pre-compute size display rows — these update live via input handler below.
  const sizeRow=(i)=>{
    const sz=e["size"+i]||1.0;
    let amt=p1*(sz/100);
    const floorBase=fromEUR(toEUR(1000,"USD"),base);
    if(amt<floorBase)amt=floorBase;
    return `${baseSym}${Math.round(amt).toLocaleString()} (${sz<floorBase/p1*100?"min $1k floor":sz.toFixed(2)+"% of P1 cost"})`;
  };
  const ov=document.createElement("div");ov.className="modal-overlay";ov.onclick=ev=>{if(ev.target===ov)ov.remove();};
  ov.innerHTML=`<div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-title">🎯 ${isEdit?"Edit":"Add"} Risklist Entry</div>
    <div id="rl-edit-err" style="display:none"></div>
    <div class="modal-field"><label>Ticker *</label><input type="text" id="rl-ticker" value="${esc(e.ticker)}" ${isEdit?"disabled":""} placeholder="IONQ" style="text-transform:uppercase"></div>
    <div class="modal-field"><label>Name *</label><input type="text" id="rl-name" value="${esc(e.name)}" placeholder="IonQ Inc"></div>
    <div class="modal-field"><label>Currency *</label><select id="rl-ccy">
      ${["USD","EUR","GBp","CAD","JPY"].map(c=>`<option value="${c}" ${c===e.currency?"selected":""}>${c}</option>`).join("")}
    </select></div>
    <div class="modal-field"><label>Priority * (lower = higher conviction, decimals OK)</label><input type="number" step="any" id="rl-pri" value="${e.priority??""}" placeholder="1.5"></div>
    <div class="modal-field"><label>Triggers & Sizes (T1 ≥ T2 ≥ T3, total size ≤ 5%)</label>
      <div class="rl-edit-trigger-row">
        <div class="rl-edit-label">T1</div>
        <input type="number" step="any" id="rl-trig1" value="${e.trigger1??""}" placeholder="price" oninput="rlRecomputeSizeRows()">
        <input type="number" step="any" id="rl-size1" value="${e.size1??1.0}" placeholder="1.0" oninput="rlRecomputeSizeRows()">
      </div>
      <div class="rl-edit-size-display" id="rl-sz-disp-1">${sizeRow(1)}</div>
      <div class="rl-edit-trigger-row">
        <div class="rl-edit-label">T2</div>
        <input type="number" step="any" id="rl-trig2" value="${e.trigger2??""}" placeholder="price" oninput="rlRecomputeSizeRows()">
        <input type="number" step="any" id="rl-size2" value="${e.size2??1.0}" placeholder="1.0" oninput="rlRecomputeSizeRows()">
      </div>
      <div class="rl-edit-size-display" id="rl-sz-disp-2">${sizeRow(2)}</div>
      <div class="rl-edit-trigger-row">
        <div class="rl-edit-label">T3</div>
        <input type="number" step="any" id="rl-trig3" value="${e.trigger3??""}" placeholder="price" oninput="rlRecomputeSizeRows()">
        <input type="number" step="any" id="rl-size3" value="${e.size3??1.0}" placeholder="1.0" oninput="rlRecomputeSizeRows()">
      </div>
      <div class="rl-edit-size-display" id="rl-sz-disp-3">${sizeRow(3)}</div>
      <div class="rl-edit-size-display" id="rl-sz-disp-total" style="margin-top:4px;font-weight:600"></div>
    </div>
    <div class="modal-field"><label>Reasoning * (required — your rationale for these three prices)</label>
      <textarea id="rl-reasoning" placeholder="Why these three prices? What does each tranche represent?" style="width:100%;min-height:140px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;line-height:1.5;resize:vertical;box-sizing:border-box">${esc(e.reasoning||"")}</textarea>
    </div>
    <div class="modal-field"><label>Notes (optional)</label>
      <textarea id="rl-notes" placeholder="Any side notes" style="width:100%;min-height:60px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;font-family:inherit;line-height:1.5;resize:vertical;box-sizing:border-box">${esc(e.notes||"")}</textarea>
    </div>
    ${isEdit?renderFiredTrancheControls(e):""}
    <button class="modal-done" id="rl-save-btn">Save</button>
  </div>`;
  document.body.appendChild(ov);
  rlRecomputeSizeRows();
  document.getElementById("rl-save-btn").onclick=()=>{rlHandleSave(isEdit?entry:null,ov);};
}

// Recompute the size$-amount display rows live as the user types.
function rlRecomputeSizeRows(){
  const base=pfBaseCcy("personal");const baseSym=base==="USD"?"$":"€";
  const p1=trancheBase("personal");
  const floorBase=fromEUR(toEUR(1000,"USD"),base);
  let total=0;
  for(let i=1;i<=3;i++){
    const sz=parseFloat(document.getElementById("rl-size"+i)?.value)||0;
    total+=sz;
    let amt=p1*(sz/100);
    let isFloor=false;
    if(amt<floorBase){amt=floorBase;isFloor=true;}
    const disp=document.getElementById("rl-sz-disp-"+i);
    if(disp)disp.textContent=`${baseSym}${Math.round(amt).toLocaleString()}${isFloor?" (USD $1k floor applied)":""}`;
  }
  const tdisp=document.getElementById("rl-sz-disp-total");
  if(tdisp){
    const over=total>5.0;
    tdisp.style.color=over?"var(--red)":"var(--muted)";
    tdisp.textContent=`Total: ${total.toFixed(2)}% / 5.0% max${over?" — OVER LIMIT":""}`;
  }
}
