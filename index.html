<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e17;--card:#111827;--border:#1a2035;--text:#e4e8ee;--muted:#5a6a7a;--accent:#60a5fa;--green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;--blue-bg:#1e3a5f;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.header{padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50}
.header-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px}
.signal-badge{font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 10px;border-radius:6px}
.refresh-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--accent);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:var(--font)}
.content{padding-bottom:68px}
.pf-toggle{display:flex;margin:12px 16px 0;background:var(--card);border-radius:8px;padding:3px}
.pf-toggle button{flex:1;padding:8px 0;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);transition:all .2s}
.pf-toggle .active{background:var(--blue-bg);color:var(--accent)}.pf-toggle .inactive{background:transparent;color:var(--muted)}
.section-pad{padding:12px 16px}
.pos-card{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border);overflow:hidden;min-width:0}
.pos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pos-ticker{font-size:15px;font-weight:700}.pos-badge{font-size:10px;padding:1px 6px;border-radius:4px}
.pos-sub{font-size:11px;color:var(--muted);margin-top:2px}
.pos-price-val{font-size:15px;font-weight:600;font-family:var(--mono)}
.pos-pnl{font-size:11px;font-family:var(--mono)}
.tranche-bar{display:flex;gap:4px}.tranche-seg{flex:1;height:6px;border-radius:3px}
.stat-row{display:flex;gap:8px}.stat-box{flex:1;background:var(--bg);border-radius:6px;padding:6px 8px}
.stat-label{font-size:10px;color:var(--muted)}.stat-val{font-size:13px;font-family:var(--mono);font-weight:600}
.btn-row{display:flex;gap:6px;margin-top:8px}
.btn-sm{padding:6px 10px;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:var(--font);color:var(--muted);text-align:center}
.btn-sm:active{opacity:.6}.btn-accent{color:var(--accent)}.btn-red{color:var(--red);border-color:#3b1111}
.signal-grid{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.sig-header,.sig-row,.sig-total-row{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr 56px;padding:10px 12px;align-items:center}
.sig-header{border-bottom:1px solid var(--border)}.sig-header div{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center}.sig-header div:first-child{text-align:left}
.sig-row{border-bottom:1px solid var(--bg)}.sig-total-row{background:#0d1117}
.sig-cell{text-align:center}
.sig-ind{width:18px;height:18px;border-radius:50%;margin:0 auto 2px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000}
.sig-ind.buy{background:#34d399;box-shadow:0 0 8px #34d39950}
.sig-ind.hold{background:transparent;border:none;color:#888;font-size:10px;letter-spacing:-0.3px}
.sig-ind.track{background:#60a5fa;box-shadow:0 0 8px #60a5fa50}
.sig-ind.warn{background:#fbbf24;box-shadow:0 0 8px #fbbf2450}
.sig-ind.sell{background:#f87171;box-shadow:0 0 8px #f8717150;animation:sigPulse 1.5s ease-in-out infinite}
.sig-ind.none{background:transparent;border:2px solid #333}
@keyframes sigPulse{0%,100%{box-shadow:0 0 8px #f8717150}50%{box-shadow:0 0 16px #f87171aa}}
.sig-sub{font-size:8px;color:var(--muted);font-family:var(--mono);text-align:center;line-height:1.2}
.sig-sub.buy-sub{color:#34d399}.sig-sub.track-sub{color:#60a5fa}.sig-sub.warn-sub{color:#fbbf24}.sig-sub.sell-sub{color:#f87171}
.sell-card{background:var(--card);border-radius:8px;padding:12px;margin-bottom:8px}
.wl-card{background:var(--card);border-radius:8px;padding:12px;border:1px solid var(--border);overflow:hidden}
.wl-trig{flex:1;max-width:33%;background:var(--bg);border-radius:4px;padding:4px;text-align:center;min-width:0;overflow:hidden}
.wl-trig-label{font-size:9px;color:var(--muted)}.wl-trig-val{font-size:11px;font-family:var(--mono)}
.wl-trig-phil{font-size:9px;font-family:var(--mono);color:var(--muted)}
.alloc-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.monthly-banner{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.monthly-banner .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.monthly-banner .mo-label{font-size:15px;font-weight:700;font-family:var(--mono)}
.monthly-banner .mo-deadline{font-size:11px;color:var(--amber);font-family:var(--mono)}
.monthly-pills{display:flex;gap:4px}
.mo-pill{font-size:10px;padding:5px 10px;border-radius:12px;font-family:var(--mono);font-weight:600;background:var(--bg);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.mo-pill:active{opacity:.7}
.mo-pill.done{background:#0d332033;color:var(--green);border-color:#34d39944}
.mo-pill.active{background:var(--blue-bg);color:var(--accent);border-color:var(--accent);box-shadow:0 0 6px rgba(96,165,250,.2)}
.mo-pill.all-done{background:#0d332033;color:var(--green);border-color:#34d39944}
.alloc-waiting{opacity:.4;filter:grayscale(1);pointer-events:none;transition:all .3s ease}
.alloc-waiting input{pointer-events:none}
.alloc-stock{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center}
.input-row{display:flex;gap:8px;margin-bottom:12px}
.input-box{flex:1;background:var(--card);border-radius:8px;padding:10px}
.input-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.input-field{display:flex;align-items:center}
.input-field span{font-size:12px;color:var(--muted);margin-right:4px}
.input-field input{background:transparent;border:none;color:var(--text);font-size:16px;font-family:var(--mono);font-weight:600;width:100%;outline:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;z-index:100}
.modal-sheet{width:100%;max-width:480px;margin:0 auto;background:var(--card);border-radius:16px 16px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
.modal-field input,.modal-field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:15px;font-family:var(--mono);outline:none}
.modal-done{width:100%;padding:12px;background:var(--blue-bg);color:var(--accent);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:8px}
.navbar{position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid var(--border);display:flex;justify-content:center;z-index:50}
.navbar-inner{display:flex;max-width:960px;width:100%}
.nav-btn{flex:1;padding:8px 0 10px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--font);position:relative}
.nav-btn .nav-icon{font-size:18px}.nav-btn .nav-label{font-size:10px}
.settings-section{padding:16px}
.settings-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.settings-title{font-size:13px;font-weight:600;margin-bottom:8px}
.settings-desc{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.settings-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;margin-bottom:8px}
.settings-save{padding:8px 16px;background:var(--blue-bg);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
.settings-save:active{opacity:.6}
.tr-row{display:flex;align-items:center;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px;gap:8px}
.tr-signal{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;min-width:44px;text-align:center}
/* FIX #2: Base grid layouts for mobile */
.pos-grid,.wl-grid,.alloc-grid{display:flex;flex-direction:column;gap:10px}
@media(min-width:580px){
  .header{padding:16px 24px 12px}.section-pad{padding:16px 24px}.pf-toggle{margin:16px 24px 0}
  .pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .sig-header,.sig-row,.sig-total-row{grid-template-columns:1.4fr 1fr 1fr 1fr 64px;padding:12px 16px}
  .wl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .alloc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-sheet{max-width:500px;border-radius:16px;margin:auto}.modal-overlay{align-items:center}
  .settings-section{padding:16px 24px}
}
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:6px 10px;border-radius:10px;font-size:13px;animation:alertSlide .3s ease-out}
.alert-item.buy{background:linear-gradient(135deg,#0d332040,#0d332080);border:1px solid #34d39940}
.alert-item.sell{background:linear-gradient(135deg,#33170d40,#33170d80);border:1px solid #f8717140}
.alert-item.watch{background:linear-gradient(135deg,#332d0d40,#332d0d80);border:1px solid #fbbf2440}
.alert-item.info{background:linear-gradient(135deg,#0d1a3340,#0d1a3380);border:1px solid #60a5fa40}
.alert-item.critical{background:linear-gradient(135deg,#33000040,#33000080);border:1px solid #ef444480;animation:alertSlide .3s ease-out,alertPulse 2s ease-in-out infinite}
.alert-item.watchlist-buy{background:linear-gradient(135deg,#1a330d40,#1a330d80);border:2px solid #34d399;animation:alertSlide .3s ease-out,alertPulse 2s ease-in-out infinite;font-size:14px}
.nav-badge{position:absolute;top:0;right:50%;transform:translateX(20px);min-width:16px;height:16px;border-radius:8px;background:#34d399;color:#000;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;animation:navBadgePulse 2s ease-in-out infinite}
@keyframes navBadgePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.8}}
@keyframes alertPulse{0%,100%{opacity:1}50%{opacity:.7}}
.alert-icon{font-size:20px;flex-shrink:0}
.alert-text{flex:1;line-height:1.35}
.alert-text strong{font-weight:700}
.alert-dismiss{font-size:18px;color:var(--muted);cursor:pointer;padding:4px 8px;flex-shrink:0}
@keyframes alertSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
/* Buy signal modal */
.buy-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;animation:buyFadeIn .3s ease-out}
.buy-modal{width:90%;max-width:400px;border-radius:20px;padding:28px 24px;text-align:center;
  background:linear-gradient(145deg,#0a2e1a,#0d3320,#0a2e1a);
  border:2px solid #34d399;box-shadow:0 0 40px #34d39940,0 0 80px #34d39920;animation:buyPulseGlow 2s ease-in-out infinite}
.buy-modal-icon{font-size:64px;margin-bottom:8px;animation:buyBounce 1s ease-in-out infinite}
.buy-modal-title{font-size:28px;font-weight:800;color:#34d399;letter-spacing:-0.5px;margin-bottom:4px;text-transform:uppercase}
.buy-modal-stock{font-size:22px;font-weight:700;color:var(--text);margin:12px 0 4px}
.buy-modal-signal{display:inline-block;font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;margin:4px 2px}
.buy-modal-price{font-size:18px;font-family:var(--mono);font-weight:600;color:var(--text);margin:14px 0 6px}
.buy-modal-detail{font-size:12px;color:var(--muted);margin-bottom:4px}
.buy-modal-dismiss{width:100%;padding:14px;margin-top:20px;background:#34d39920;color:#34d399;border:2px solid #34d39960;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:0.5px}
.buy-modal-dismiss:active{opacity:.6}
@keyframes buyFadeIn{from{opacity:0}to{opacity:1}}
@keyframes buyPulseGlow{0%,100%{box-shadow:0 0 40px #34d39940,0 0 80px #34d39920}50%{box-shadow:0 0 60px #34d39960,0 0 120px #34d39940}}
@keyframes buyBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
/* DP Slider */
.dp-slider-wrap{margin-top:6px;padding:8px 0 4px}
.dp-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(to right,#0d3b2e 0%,#0d3b2e var(--pct),#172554 var(--pct),#172554 100%);outline:none;cursor:pointer}
.dp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--text);border:2px solid var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(0,0,0,.4)}
.dp-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--text);border:2px solid var(--accent);cursor:pointer}
.dp-slider-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:2px;padding:0 2px}
</style>
</head>

    <span id="header-ringmark"></span><div style="flex:1"><h1 id="app-title">Triple Trigger Tracker</h1><div class="header-sub">Grid: <span id="grid-count">0</span>/<span id="grid-total">9</span> signals <span style="opacity:.4;margin-left:6px">v2.95</span></div></div>

</div>

<div class="content" id="content"></div>

// Earnings calendar: format and classify earnings date relative to today and lastCalcDate
function earningsInfo(s){

  const daysUntil=Math.ceil((ed-now)/86400000);

  // Upcoming: within next 30 days
  if(daysUntil>0&&daysUntil<=30)return{label:"📅 "+fmt,color:"var(--accent)",status:"upcoming",days:daysUntil,soon:daysUntil<=14};
  // Just reported: in the past, check if triggers are stale
  if(daysUntil<=0&&daysUntil>=-90){

    return{label:"📅 "+fmt+" → update",color:"var(--amber)",status:"stale",days:daysUntil,soon:false};
  }
  // Far future (>30 days)
  if(daysUntil>30)return{label:"📅 "+fmt,color:"var(--muted)",status:"future",days:daysUntil,soon:false};
  // Old (>90 days ago)

}

// Returns {sticker, mos} or null if any input is missing
// Uses settings.marr (default 15%) as discount rate: divisor = (1 + marr/100)^10
function recalcSticker(eps,gr,pe){
  if(eps==null||gr==null||pe==null)return null;
  const g=gr/100;
  const futureEPS=eps*Math.pow(1+g,10);
  const futurePE=Math.min(2*gr,pe);
  const divisor=Math.pow(1+(settings.marr||15)/100,10);
  const sticker=+(futureEPS*futurePE/divisor).toFixed(2);
  const mos=+(sticker/2).toFixed(2);
  return{sticker,mos};
}

// Apply recalcSticker to a stock's cons object, updating mos+sticker and tracking prevSticker
function applyRecalcSticker(s){
  const r=recalcSticker(s.cons.eps,s.cons.gr,s.cons.pe);
  if(!r)return;
  const oldSticker=s.cons.sticker;
  s.cons.mos=r.mos;s.cons.sticker=r.sticker;
  if(oldSticker&&r.sticker!==oldSticker)s.cons.prevSticker=oldSticker;
}

  const needP=rPbt.glow, needT=rTc.glow, needM=rMos.glow;

// Determine ring state for a stock card — checks both buy signals and tranche lifecycle
function ringState(ticker, pfKey) {
  const s=stocks[ticker]; if(!s) return {pbt:false,tc:false,mos:false};
  const pos=portfolios[pfKey]?.positions?.[ticker];
  const result={pbt:false,tc:false,mos:false};
  // Map signal names to ring keys
  const keyMap={PBT:'pbt','10Cap':'tc',MOS:'mos'};
  const sigMap={pbt:'pbt',tenCap:'tc',mos:'mos'};
  // First: check buy signals (highest priority — overrides tranche state). Include piggyback.
  if(s.signals?.pbt||isPiggyback(s,"pbt")) result.pbt="buy";
  if(s.signals?.tenCap||isPiggyback(s,"tenCap")) result.tc="buy";
  if(s.signals?.mos) result.mos="buy";
  // Then: check tranche lifecycle for non-buy rings
  if(pos){
    pos.tranches.forEach(tr=>{
      if((tr.bought-tr.sold)<=0) return;
      const rk=keyMap[tr.signal]; if(!rk||result[rk]==="buy") return;
      const state=tr.state||"accumulating";
      if(state==="stopped") result[rk]="sell";
      else if(state==="stopActive"){
        const ath=tr.ath, cp=s.currentPrice;
        const dd=ath&&cp?((ath-cp)/ath*100):0;
        result[rk]=dd>=15?"warn":"track";
      } else result[rk]="hold"; // accumulating or waiting
    });
  }
  return result;
}

function updateSignals(t){const s=stocks[t];if(!s?.currentPrice||!s?.cons)return;const p=s.currentPrice;

// Implied annual return: what you'd earn per year if buying at entryPrice and stock reaches projected future value in 10 years
function calcImpliedReturn(sticker,entryPrice){if(!sticker||!entryPrice||sticker<=0||entryPrice<=0)return null;const fv=sticker*Math.pow(1+(settings.marr||15)/100,10);return Math.pow(fv/entryPrice,1/10)-1;}

function getClosestTriggerReturn(t){const s=stocks[t];const mos=s?.cons?.mos;if(!mos)return null;const sticker=mos*2;
  const triggers=[];if(mos)triggers.push({name:"MOS",price:mos});if(s.cons.tenCap&&!isTriggerMuted(s,"tenCap"))triggers.push({name:"10Cap",price:s.cons.tenCap});if(s.cons.pbt&&!isTriggerMuted(s,"pbt"))triggers.push({name:"PBT",price:s.cons.pbt});

function toEUR(amount,ccy){if(ccy==="EUR")return amount;if(ccy==="USD")return amount/settings.fxRate;if(ccy==="GBp")return(amount/100)/settings.fxGBP;if(ccy==="GBP")return amount/settings.fxGBP;if(ccy==="CAD")return amount/settings.fxCAD;if(ccy==="JPY")return amount/settings.fxJPY;return amount;}
function fromEUR(eur,ccy){if(ccy==="EUR")return eur;if(ccy==="USD")return eur*settings.fxRate;if(ccy==="GBp")return eur*settings.fxGBP*100;if(ccy==="GBP")return eur*settings.fxGBP;if(ccy==="CAD")return eur*settings.fxCAD;if(ccy==="JPY")return eur*settings.fxJPY;return eur;}
// FIX #8: Total portfolio value in EUR
function pfBaseCcy(pfKey){return pfKey==="personal"?(settings.personalBaseCcy||"USD"):"EUR";}
function pfSym(pfKey){const c=pfBaseCcy(pfKey);return c==="EUR"?"€":c==="GBp"?"p":c==="CAD"?"C$":c==="JPY"?"¥":"$";}
function toBase(amount,ccy,pfKey){const base=pfBaseCcy(pfKey);if(ccy===base)return amount;return fromEUR(toEUR(amount,ccy),base);}
function pfIncome(pfKey){if(pfKey!=="personal")return 0;return pfBaseCcy("personal")==="EUR"?(settings.monthlyIncome||0):(settings.monthlyIncomeUSD||0);}
// Phil Town income: total income minus index allocation (only for personal)
function ptIncome(pfKey){if(pfKey!=="personal")return pfIncome(pfKey);return pfIncome(pfKey)-(settings.indexAllocation||0);}
// Index position helpers — dual tracker (XZMU=US, XZEU=EU)
const _emptyIx=(ccy)=>({shares:0,avgCost:0,currency:ccy||"USD",currentPrice:0,lastUpdate:null,priceSource:null,deployLog:[]});
function getIndexPositions(pfKey){const pf=pfKey==="nl"?portfolios.nl:portfolios.personal;if(!pf)return{us:_emptyIx("USD"),eu:_emptyIx("EUR")};const ccyUS=pfKey==="nl"?"EUR":"USD";if(!pf.indexPositions)pf.indexPositions={us:_emptyIx(ccyUS),eu:_emptyIx("EUR")};if(!pf.indexPositions.us)pf.indexPositions.us=_emptyIx(ccyUS);if(!pf.indexPositions.eu)pf.indexPositions.eu=_emptyIx("EUR");return pf.indexPositions;}
function getIndexPos(pfKey,region){return getIndexPositions(pfKey)[region||"us"];}
function indexValueSingle(pfKey,region){const ip=getIndexPos(pfKey,region);return(ip.shares||0)*(ip.currentPrice||0);}
function indexValue(pfKey){const base=pfBaseCcy(pfKey||"personal");let v=0;["us","eu"].forEach(r=>{const ip=getIndexPos(pfKey,r);const raw=(ip.shares||0)*(ip.currentPrice||0);v+=toBase(raw,ip.currency||"USD",pfKey||"personal");});return v;}
function indexCostSingle(pfKey,region){const ip=getIndexPos(pfKey,region);return(ip.shares||0)*(ip.avgCost||0);}
function indexCostBasis(pfKey){let v=0;["us","eu"].forEach(r=>{const ip=getIndexPos(pfKey,r);const raw=(ip.shares||0)*(ip.avgCost||0);v+=toBase(raw,ip.currency||"USD",pfKey||"personal");});return v;}
function indexReturn(pfKey){const v=indexValue(pfKey),c=indexCostBasis(pfKey);if(!c)return null;return((v-c)/c*100);}
// Caca index: how many tranches deployed (across both ETFs), % of portfolio, cap check
function cacaIndexInfo(){const ips=getIndexPositions("nl");const deployed=(ips.us.deployLog||[]).length+(ips.eu.deployLog||[]).length;const cap=settings.nlIndexCap||10;const maxT=(settings.nlIndexMaxTranches||4)*2;const ci=cacaInfo();const ixVal=indexValue("nl");const totalWithIndex=ci.total+ixVal;const pctOfPortfolio=totalWithIndex>0?(ixVal/totalWithIndex*100):0;const capRoom=totalWithIndex>0?Math.max(0,(cap/100)*totalWithIndex-ixVal):0;const atCap=deployed>=maxT||pctOfPortfolio>=cap;return{deployed,maxT,cap,pctOfPortfolio,capRoom,atCap,ixVal};}
function indexTickerForPf(pfKey,region){const r=region||"us";if(pfKey==="nl")return r==="us"?(settings.nlIndexTickerUS||"XZMU.DE"):(settings.nlIndexTickerEU||"XZEU.DE");return r==="us"?(settings.indexTickerUS||"XZMU.L"):(settings.indexTickerEU||"XZEU.L");}
function indexTickerShort(pfKey,region){return indexTickerForPf(pfKey,region).replace(/\.(L|DE|AS)$/,"");}
// Stock-picking half: total value of all PT positions + DP (excl index)
function stockPickingValue(){const pf=portfolios.personal;if(!pf)return 0;let v=0;Object.entries(pf.positions).forEach(([t,pos])=>{const s=stocks[t];if(!s)return;v+=posShares(pos)*(s.currentPrice||0);});return v+(pf.dryPowder||0);}
function stockPickingCostBasis(){const pf=portfolios.personal;if(!pf)return 0;let c=0;Object.entries(pf.positions).forEach(([t,pos])=>{pos.tranches.forEach(tr=>{const sh=tr.bought-tr.sold;if(sh>0)c+=sh*tr.buyPrice;});});return c+(pf.dryPowder||0);}
// Performance snapshots: stored as array of {date, indexValue, indexCost, stockValue, stockCost}
function recordSnapshot(){const snaps=JSON.parse(localStorage.getItem("r1-perfSnaps")||"[]");const today=new Date().toISOString().slice(0,10);if(snaps.length&&snaps[snaps.length-1].date===today)snaps.pop();snaps.push({date:today,indexValue:Math.round(indexValue()),indexCost:Math.round(indexCostBasis()),stockValue:Math.round(stockPickingValue()),stockCost:Math.round(stockPickingCostBasis())});if(snaps.length>365)snaps.splice(0,snaps.length-365);localStorage.setItem("r1-perfSnaps",JSON.stringify(snaps));}
function getPerfSnaps(){return JSON.parse(localStorage.getItem("r1-perfSnaps")||"[]");}
function recalcDP(pfKey){const pf=portfolios[pfKey];if(!pf)return;const base=pfBaseCcy(pfKey);if(pf.dpUSD==null&&pf.dpEUR==null&&pf.dryPowder>0){if(base==="USD"){pf.dpUSD=pf.dryPowder;pf.dpEUR=0;}else{pf.dpEUR=pf.dryPowder;pf.dpUSD=0;}}if(pf.dpUSD==null)pf.dpUSD=0;if(pf.dpEUR==null)pf.dpEUR=0;pf.dryPowder=base==="USD"?Math.round(pf.dpUSD+(pf.dpEUR*settings.fxRate)):Math.round(pf.dpEUR+(pf.dpUSD/settings.fxRate));}

// DP Slider: split total DP into MOS Reserve (capped) and Expansion (remainder)
function getDPSplit(pfKey){
  const pf=portfolios[pfKey];if(!pf)return{totalDP:0,mosReserveMax:0,expansionMin:0,sliderPct:40,overflowing:false};
  const sliderPct=pfKey==="nl"?(settings.dpSliderCaca??50):(settings.dpSlider??40);
  const totalDP=pf.dryPowder||0;
  if(totalDP<=0)return{totalDP:0,mosReserveMax:0,expansionMin:0,sliderPct,overflowing:false};
  const mosReserveMax=Math.round(totalDP*(sliderPct/100));
  const expansionMin=totalDP-mosReserveMax;
  // Check if monthly MOS flow would overflow
  const mb=getMOSBreakdown(pfKey);
  return{totalDP,mosReserveMax,expansionMin,sliderPct,overflowing:mb.totalMosReserved>=mosReserveMax,mosFlowPerMonth:mb.totalMonthlyFlow,totalMosReserved:mb.totalMosReserved};
}

// Per-stock unlit signal counts and MOS reserve breakdown
function getMOSBreakdown(pfKey){
  const pf=portfolios[pfKey];if(!pf)return{stocks:[],totalMonthlyFlow:0,totalMosReserved:0,totalUnlit:0};
  const GRID=getGrid(pfKey);const _bc=pfBaseCcy(pfKey);
  const firingStocks=GRID.filter(t=>sigCount(t)>0);
  const validSlots=firingStocks.reduce((n,t)=>n+validTriggerSlots(t,pfKey),0);
  const expSlots=pfKey==="personal"?(settings.expansionSlots??3):0;
  const denom=validSlots+expSlots;
  const income=pfKey==="personal"?ptIncome("personal"):0;
  const perTr=denom>0?Math.round(income/denom):0;
  const result=[];let totalMonthlyFlow=0;let totalUnlit=0;let totalMosReserved=0;
  firingStocks.forEach(t=>{
    const s=stocks[t];const slots=validTriggerSlots(t,pfKey);const dc=deployCount(t,pfKey);const unlit=slots-dc;
    if(unlit<=0)return;
    // Skip speculative stocks (MOS reserves suppressed)
    if(s.status==="speculative")return;
    // Buffett stocks: unlit goes to expansion, not MOS
    if(isBuffett(t))return;
    const monthlyFlow=unlit*perTr;
    // Calculate actual MOS reserved from position data
    const pos=pf.positions?.[t];let reserved=0;
    if(pos){
      const nTr=posTranchesOwned(pos);const avg=posAvgPrice(pos);const sh=posShares(pos);
      if(nTr>0&&avg>0&&sh>0){
        const resMult=s.currency==="GBp"?100:1;
        reserved=Math.round(avg*sh/nTr/resMult*unlit);
      }
      if(pos.mosReserve!=null)reserved=pos.mosReserve;
    }
    const resCcy=s.currency==="GBp"?"GBP":s.currency;
    const reservedBase=Math.round(fromEUR(toEUR(reserved,resCcy),_bc));
    totalMonthlyFlow+=monthlyFlow;totalUnlit+=unlit;totalMosReserved+=reservedBase;
    result.push({ticker:t,unlit,monthlyFlow,reserved:reservedBase,pctOfFlow:0});
  });
  // Calculate percentage shares
  if(totalUnlit>0)result.forEach(r=>r.pctOfFlow=Math.round(r.unlit/totalUnlit*100));
  return{stocks:result,totalMonthlyFlow,totalMosReserved,totalUnlit};
}
function pfValueEUR(pfKey){const pf=portfolios[pfKey];if(!pf)return 0;let v=0;
  Object.entries(pf.positions).forEach(([t,pos])=>{const s=stocks[t];if(!s)return;v+=toEUR(posShares(pos)*s.currentPrice,s.currency);});
  // Include index positions for personal portfolio (indexValue returns USD base)
  if(pfKey==="personal")v+=toEUR(indexValue("personal"),"USD");
  return v+toEUR(pf.dryPowder,pfBaseCcy(pfKey));}
function pfCostExIndex(pfKey){const pf=portfolios[pfKey];if(!pf)return 0;let v=0;const base=pfBaseCcy(pfKey);
  Object.entries(pf.positions).forEach(([t,pos])=>{const s=stocks[t];if(!s)return;const sh=posShares(pos);const avg=posAvgPrice(pos);v+=fromEUR(toEUR(sh*avg,s.currency),base);});
  return v+(pf.dryPowder||0);}

// Caca portfolio: total market value (excl trophy) + DP, and tranche size (÷15)
function cacaInfo(){
  const pf=portfolios.nl;if(!pf)return{total:0,tranche:0,totalWithIndex:0};
  let mv=0;
  Object.entries(pf.positions).forEach(([t,pos])=>{const s=stocks[t];if(!s)return;
    const isTrophy=pos.tranches.every(tr=>tr.signal==="trophy");
    if(!isTrophy){const sh=posShares(pos);if(sh>0)mv+=toEUR(sh*s.currentPrice,s.currency);}});
  const total=mv+(pf.dryPowder||0);
  const ixVal=indexValue("nl");
  const totalWithIndex=total+ixVal;
  return{total,tranche:Math.round(total/(settings.nlTranches||15)),mv,totalWithIndex,ixVal};
}
// Per-stock cost allocation status for Caca: target cost vs actual cost
function cacaAllocStatus(ticker){
  const pf=portfolios.nl;if(!pf)return null;
  const pos=pf.positions?.[ticker];if(!pos)return null;
  const s=stocks[ticker];if(!s)return null;
  const sh=posShares(pos);if(sh<=0)return null;
  const avg=posAvgPrice(pos);
  const costEUR=toEUR(avg*sh,s.currency);
  const ci=cacaInfo();
  const dc=deployCount(ticker,'nl');const sig=sigCount(ticker);
  // Target = lit signals × tranche; 0/4 stocks get 0 target (Caca: MOS counts as 2 deploy slots)
  const target=dc*ci.tranche;
  // Buffett: sell threshold is activation price (tenCap × 1.333). Phil Town: sell at sticker.
  const buf=isBuffett(ticker);
  const sellRef=buf?activationPrice(s):(s.cons?.mos?s.cons.mos*2:null);
  const aboveSellRef=sellRef&&s.currentPrice>sellRef;
  const diff=costEUR-target;
  const aboveCost=s.currentPrice>=avg;
  // Status: sellAll (above sell reference, 0/N), overAllocated, underAllocated, balanced
  let status="balanced";
  if(sig===0&&aboveSellRef)status="sellAll";
  else if(target===0&&sig===0)status="noTarget";
  else if(diff>ci.tranche*0.15)status="over";
  else if(diff<-ci.tranche*0.15)status="under";
  return{costEUR,target,diff,status,aboveCost,aboveSticker:aboveSellRef,tranche:ci.tranche,dc};
}

    localStorage.setItem("r1-version",String(DATA_VERSION));
    const ss=localStorage.getItem("r1-stocks"),ps=localStorage.getItem("r1-portfolios"),st=localStorage.getItem("r1-settings");

  // Migration: add gate field (default PASS) and prevSticker if missing

    if(s.cons&&s.cons.prevSticker===undefined)s.cons.prevSticker=s.cons.sticker||null;
    // Migration: add oe/fcf fields if missing
    if(s.cons&&s.cons.oe===undefined)s.cons.oe=null;
    if(s.cons&&s.cons.fcf===undefined)s.cons.fcf=null;
    // Migration: add lastCalcDate if missing (trigger freshness tracking)
    if(s.lastCalcDate===undefined)s.lastCalcDate=null;
    if(s.earningsDate===undefined)s.earningsDate=null;
  });
  // Migration: backfill finnhubSymbol from defaults for existing stocks
  Object.entries(STOCK_DEFAULTS).forEach(([k,def])=>{
    if(def.finnhubSymbol&&stocks[k]&&!stocks[k].finnhubSymbol)stocks[k].finnhubSymbol=def.finnhubSymbol;
  });
  // Migration: US stocks without finnhubSymbol get ticker as Yahoo symbol
  Object.entries(stocks).forEach(([t,s])=>{
    if(s.currency==="USD"&&!s.finnhubSymbol)s.finnhubSymbol=t;
    if(s.currency==="GBp"&&!s.finnhubSymbol)s.finnhubSymbol=t+".L";
    if(s.currency==="CAD"&&!s.finnhubSymbol)s.finnhubSymbol=t+".TO";
    if(s.currency==="JPY"&&!s.finnhubSymbol)s.finnhubSymbol=t+".T";
    // Fix CAD stocks that got plain ticker instead of .TO suffix
    if(s.currency==="CAD"&&s.finnhubSymbol===t)s.finnhubSymbol=t+".TO";
    if(s.currency==="JPY"&&s.finnhubSymbol===t)s.finnhubSymbol=t+".T";
  });
  // Migration: fix stocks incorrectly classified as USD
  const FIX_EXCHANGES={
    AUTO:{ccy:"GBp",td:"AUTO:LSE",fh:"AUTO.L"},RMV:{ccy:"GBp",td:"RMV:LSE",fh:"RMV.L"},
    REL:{ccy:"GBp",td:"REL:LSE",fh:"REL.L"},ITRK:{ccy:"GBp",td:"ITRK:LSE",fh:"ITRK.L"},
    LSEG:{ccy:"GBp",td:"LSEG:LSE",fh:"LSEG.L"},SGE:{ccy:"GBp",td:"SGE:LSE",fh:"SGE.L"},
    HLMA:{ccy:"GBp",td:"HLMA:LSE",fh:"HLMA.L"},EXPN:{ccy:"GBp",td:"EXPN:LSE",fh:"EXPN.L"},
    BNZL:{ccy:"GBp",td:"BNZL:LSE",fh:"BNZL.L"},TRN:{ccy:"GBp",td:"TRN:LSE",fh:"TRN.L"},
    WKL:{ccy:"EUR",td:"WKL:AMS",fh:"WKL.AS"},ASML:{ccy:"EUR",td:"ASML:AMS",fh:"ASML.AS"},
    SAP:{ccy:"EUR",td:"SAP:XETR",fh:"SAP.DE"},ADYEN:{ccy:"EUR",td:"ADYEN:AMS",fh:"ADYEN.AS"},
  };
  const ccyFlags={USD:"🇺🇸",EUR:"🇪🇺",GBp:"🇬🇧",CAD:"🇨🇦",JPY:"🇯🇵"};
  Object.entries(FIX_EXCHANGES).forEach(([t,ex])=>{
    if(stocks[t]&&stocks[t].currency!==ex.ccy){
      stocks[t].currency=ex.ccy;stocks[t].tdSymbol=ex.td;stocks[t].finnhubSymbol=ex.fh;stocks[t].flag=ccyFlags[ex.ccy];
    }
  });
  // Migration: derive monthlyIncomeUSD if not set
  if(!settings.monthlyIncomeUSD&&settings.monthlyIncome){settings.monthlyIncomeUSD=Math.round(settings.monthlyIncome*settings.fxRate);}
  // Migration: add dpDivisor and dpFloor if missing
  if(!settings.dpDivisor)settings.dpDivisor=6;
  if(!settings.dpFloor)settings.dpFloor=2000;
  if(!settings.nlTranches)settings.nlTranches=16;
  if(settings.dpSlider==null)settings.dpSlider=40;
  if(settings.dpSliderCaca==null)settings.dpSliderCaca=50;
  // Migration: add dpUSD/dpEUR split if missing (seed from existing dryPowder)
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    if(pf.dpUSD==null&&pf.dpEUR==null){
      if(pfBaseCcy(pk)==="USD"){pf.dpUSD=pf.dryPowder||0;pf.dpEUR=0;}
      else{pf.dpEUR=pf.dryPowder||0;pf.dpUSD=0;}
    }
    recalcDP(pk);
  });
  // Migration: add notification settings if missing
  // Migration: add push notification settings if missing
  if(!settings.pushWorkerUrl)settings.pushWorkerUrl="";
  if(settings.pushSubscribed===undefined)settings.pushSubscribed=false;
  if(!settings.lastPushSync)settings.lastPushSync=null;
  // Migration: add index allocation defaults if missing
  if(settings.indexAllocation===undefined)settings.indexAllocation=0;
  if(!settings.indexTickerUS)settings.indexTickerUS="XZMU.L";
  if(!settings.indexTickerEU)settings.indexTickerEU="XZEU.L";
  // Migration: single indexPosition → dual indexPositions (XZMU+XZEU)
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];const ccyUS=pk==="nl"?"EUR":"USD";const ccyEU="EUR";
    if(!pf.indexPositions)pf.indexPositions={us:{shares:0,avgCost:0,currency:ccyUS,currentPrice:0,lastUpdate:null,priceSource:null,deployLog:[]},eu:{shares:0,avgCost:0,currency:ccyEU,currentPrice:0,lastUpdate:null,priceSource:null,deployLog:[]}};
    if(!pf.indexPositions.us)pf.indexPositions.us={shares:0,avgCost:0,currency:ccyUS,currentPrice:0,lastUpdate:null,priceSource:null,deployLog:[]};
    if(!pf.indexPositions.eu)pf.indexPositions.eu={shares:0,avgCost:0,currency:ccyEU,currentPrice:0,lastUpdate:null,priceSource:null,deployLog:[]};
    // Migrate old single indexPosition into US slot if it had shares and dual hasn't been set up yet
    if(pf.indexPosition&&pf.indexPosition.shares>0&&pf.indexPositions.us.shares===0&&pf.indexPositions.eu.shares===0){pf.indexPositions.us=pf.indexPosition;delete pf.indexPosition;}
    else if(pf.indexPosition){delete pf.indexPosition;}
  });
  // Migrate old single ticker settings
  if(settings.indexTicker&&settings.indexTicker!=="XZW0.L"){settings.indexTickerUS=settings.indexTicker;}delete settings.indexTicker;
  if(settings.nlIndexTicker&&settings.nlIndexTicker!=="XZW0.DE"){settings.nlIndexTickerUS=settings.nlIndexTicker;}delete settings.nlIndexTicker;
  if(!settings.nlIndexTickerUS)settings.nlIndexTickerUS="XZMU.DE";
  if(!settings.nlIndexTickerEU)settings.nlIndexTickerEU="XZEU.DE";
  if(settings.nlIndexCap===undefined)settings.nlIndexCap=10;
  if(settings.nlIndexTranche===undefined)settings.nlIndexTranche=1000;
  if(settings.nlIndexMaxTranches===undefined)settings.nlIndexMaxTranches=4;
  // Migration: seed gridStocks per portfolio from stocks with status==="grid"
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    if(!pf.gridStocks){
      // Seed from stocks with global status==="grid"
      pf.gridStocks=Object.keys(stocks).filter(t=>stocks[t].status==="grid");
    }
    // Clean up: remove gridStocks entries for deleted stocks
    pf.gridStocks=pf.gridStocks.filter(t=>stocks[t]);
    // Clean up: remove gridStocks entries for fully-sold positions (0 shares held)
    pf.gridStocks=pf.gridStocks.filter(t=>{
      const pos=pf.positions[t];
      if(!pos)return true; // ghost card (never bought) — keep on grid
      const shares=posShares(pos);
      if(shares>0)return true; // still holding — keep
      // Fully sold: remove from grid and clean up position
      delete pf.positions[t];
      return false;
    });
    // Clean up orphaned positions: stock not on grid & no special status → stale data
    Object.keys(pf.positions).forEach(t=>{
      if(pf.gridStocks.includes(t))return;
      const s=stocks[t];
      if(s&&(s.status==='speculative'||s.status==='trophy'||s.status==='hold'))return;
      delete pf.positions[t];
    });
  });
  // Change status==="grid" to "watchlist" since grid membership is now per-portfolio
  Object.values(stocks).forEach(s=>{if(s.status==="grid")s.status="watchlist";});
  // Migration: add state to tranches if missing
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.values(pf.positions).forEach(pos=>{
      pos.tranches.forEach(tr=>{if(!tr.state)tr.state=(tr.bought-tr.sold)>0?"accumulating":"sold";});
    });
  });
  // Migration: convert old per-stock snoozedUntil to per-signal snoozed
  Object.values(stocks).forEach(s=>{
    if(s.snoozedUntil&&!s.snoozed){
      s.snoozed={};
      ["mos","tenCap","pbt"].forEach(k=>{if(s.signals?.[k])s.snoozed[k]=s.snoozedUntil;});
      delete s.snoozedUntil;
    }
  });
  // Recalculate all signals from current prices/triggers (suppress buy modals — these aren't new signals)
  window._suppressBuyModal=true;
  Object.keys(stocks).forEach(t=>updateSignals(t));
  window._suppressBuyModal=false;
  // Clean up invalid ATH values (from previous versions or manual testing)
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.entries(pf.positions).forEach(([t,pos])=>{
      const s=stocks[t];if(!s)return;
      pos.tranches.forEach(tr=>{
        if(!tr.ath)return;
        const base=sellBase(s,tr.signal);
        if(base===null)return; // hold — skip
        if(base===-1)return; // trophy — always valid
        if(tr.ath<base){delete tr.ath;tr.state="accumulating";} // ATH below activation = invalid
      });
    });
  });
}

async function fetchPrices(){
  if(!settings.ibkrWorker){document.getElementById("refresh-status").textContent="⚠ Set Worker URL in Settings";return;}
  const el=document.getElementById("refresh-status");el.textContent="Fetching...";

  // Snapshot signal state BEFORE refresh to detect genuine new fires
  const preRefreshSignals={};
  Object.entries(stocks).forEach(([t,s])=>{if(s.signals)preRefreshSignals[t]={...s.signals};});

  // Suppress buy modals during refresh — intermediate price flips between IBKR and Yahoo cause false positives
  window._suppressBuyModal=true;

  // 1. IBKR auto-sync (silent — gets positions + prices for all held stocks)
  let ibkrOk=0;
  try{ibkrOk=await autoSyncAll();}catch(e){}

  // 2. Fetch FX from ECB via frankfurter.app (free, no key)
  let fxOk=false;
  try{const fxR=await fetch("https://api.frankfurter.app/latest?from=EUR&to=USD,GBP,CAD,JPY");
    const fxD=await fxR.json();
    if(fxD.rates?.USD){settings.fxRate=parseFloat(fxD.rates.USD.toFixed(4));settings.lastFxUpdate=Date.now();fxOk=true;}
    if(fxD.rates?.GBP){settings.fxGBP=parseFloat(fxD.rates.GBP.toFixed(4));settings.lastFxUpdate=Date.now();fxOk=true;}
    if(fxD.rates?.CAD){settings.fxCAD=parseFloat(fxD.rates.CAD.toFixed(4));settings.lastFxUpdate=Date.now();fxOk=true;}
    if(fxD.rates?.JPY){settings.fxJPY=parseFloat(fxD.rates.JPY.toFixed(2));settings.lastFxUpdate=Date.now();fxOk=true;}
  }catch(e){}

  // 3. Yahoo Finance for all stocks via Cloudflare Worker proxy
  let yfOk=0;
  if(settings.ibkrWorker){
    const yfStocks=Object.entries(stocks).filter(([t,s])=>s.finnhubSymbol);
    if(yfStocks.length>0){
      try{
        const syms=yfStocks.map(([t,s])=>s.finnhubSymbol).join(",");
        const r=await fetch(`${settings.ibkrWorker}/?action=quote&symbols=${encodeURIComponent(syms)}`);
        const d=await r.json();
        yfStocks.forEach(([t,s])=>{
          const q=d[s.finnhubSymbol];
          if(q&&q.price>0){
            s.currentPrice=q.price*s.priceMult;s.lastUpdate=Date.now();s.priceSource="yahoo";
            if(q.earningsTimestamp&&q.earningsTimestamp>0){s.earningsDate=q.earningsTimestamp*1000;}
            else if(q.earningsDate&&q.earningsDate>0){s.earningsDate=q.earningsDate;}
            updateSignals(t);yfOk++;
          }
        });
      }catch(e){}
    }
  }

  // 3b. Fetch index ETF prices (XZMU+XZEU for Personal and Caca) — not in stocks object
  if(settings.ibkrWorker){
    const indexEntries=[];
    ["personal","nl"].forEach(pk=>{["us","eu"].forEach(r=>{indexEntries.push({ticker:indexTickerForPf(pk,r),pf:pk,region:r});});});
    // Deduplicate fetches by ticker, but track all targets
    const tickerMap={};indexEntries.forEach(e=>{if(!tickerMap[e.ticker])tickerMap[e.ticker]=[];tickerMap[e.ticker].push(e);});
    for(const [ticker,targets] of Object.entries(tickerMap)){
      try{
        const ir=await fetch(`${settings.ibkrWorker}/?action=quote&symbols=${encodeURIComponent(ticker)}`);
        const id=await ir.json();const iq=id[ticker];
        if(iq&&iq.price>0){targets.forEach(t=>{const ip=getIndexPos(t.pf,t.region);ip.currentPrice=iq.price;ip.lastUpdate=Date.now();ip.priceSource="yahoo";});}
      }catch(e){}
    }
  }

  // Re-enable buy modals, then queue for signals that genuinely changed (off before refresh → on after)
  window._suppressBuyModal=false;
  Object.entries(stocks).forEach(([t,s])=>{
    if(!s.signals)return;
    const pre=preRefreshSignals[t]||{mos:false,tenCap:false,pbt:false};
    ["mos","tenCap","pbt"].forEach(sig=>{
      if(!pre[sig]&&s.signals[sig])queueBuyModal(t,sig);
    });
    // If this stock has any snoozed signal, also queue any un-snoozed firing signals
    // (catches: PBT snoozed, 10Cap was already firing but never shown)
    if(s.snoozed&&Object.keys(s.snoozed).length){
      ["mos","tenCap","pbt"].forEach(sig=>{
        if(s.signals[sig])queueBuyModal(t,sig); // dedupes + checks snoozed + shown
      });
    }
  });

  settings.lastFetch=Date.now();save();render();
  // Record daily performance snapshot for index vs stock-picking comparison
  if(settings.indexAllocation>0&&(getIndexPos("personal","us").shares>0||getIndexPos("personal","eu").shares>0))recordSnapshot();
  // Check for new signals and celebrate
  const newFires=checkNewSignals();
  if(newFires.length){
    setTimeout(()=>showSignalCelebration(newFires),500);
    sendTriggerNotification(newFires); // Also push OS notification
  }
  showBuyModals();
  const t=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  const parts=[];
  if(yfOk)parts.push(`YF✓${yfOk}`);
  if(ibkrOk)parts.push(`IBKR✓`);
  if(fxOk)parts.push(`FX✓`);
  el.textContent=`✓ ${parts.join(" · ")} — ${t}`;
}

// ============ IBKR FLEX SYNC ============
function saveIBKR(){
  settings.ibkrWorker=(document.getElementById("ibkr-worker")?.value||"").trim().replace(/\/$/,"");
  settings.ibkrTokenPersonal=(document.getElementById("ibkr-token-personal")?.value||"").trim();
  settings.ibkrQueryPersonal=(document.getElementById("ibkr-query-personal")?.value||"").trim();
  settings.ibkrTokenNl=(document.getElementById("ibkr-token-nl")?.value||"").trim();
  settings.ibkrQueryNl=(document.getElementById("ibkr-query-nl")?.value||"").trim();
  save();
}
function ibkrStatus(msg,err,pf){const el=document.getElementById("ibkr-status-"+(pf||"personal"));if(el){el.textContent=msg;el.style.color=err?"var(--red)":"var(--muted)";}}

async function syncIBKR(pfKey){
  pfKey=pfKey||"personal";
  const w=settings.ibkrWorker;
  const tok=pfKey==="nl"?settings.ibkrTokenNl:settings.ibkrTokenPersonal;
  const qid=pfKey==="nl"?settings.ibkrQueryNl:settings.ibkrQueryPersonal;
  if(!w||!tok||!qid){ibkrStatus("⚠ Fill worker URL + token + query ID",true,pfKey);return;}

  try{
    // Step 1: Request report
    ibkrStatus("Requesting report...",false,pfKey);
    const reqUrl=`${w}/?action=request&token=${encodeURIComponent(tok)}&queryId=${encodeURIComponent(qid)}`;
    const reqResp=await fetch(reqUrl);
    const reqXml=await reqResp.text();
    const refMatch=reqXml.match(/<ReferenceCode>(\d+)<\/ReferenceCode>/);
    if(!refMatch){
      const errMatch=reqXml.match(/<ErrorMessage>([^<]+)<\/ErrorMessage>/);
      const codeMatch=reqXml.match(/<ErrorCode>(\d+)<\/ErrorCode>/);
      const msg=errMatch?errMatch[1]:"No reference code";
      const code=codeMatch?" (code "+codeMatch[1]+")":"";
      ibkrStatus("⚠ "+msg+code,true,pfKey);
      document.getElementById("ibkr-preview-"+pfKey).innerHTML=`<pre style="font-size:10px;color:var(--muted);white-space:pre-wrap;max-height:200px;overflow:auto;padding:8px;background:var(--bg);border-radius:6px;margin-top:8px">${reqXml.replace(/</g,"&lt;")}</pre>`;
      return;
    }
    const refCode=refMatch[1];
    ibkrStatus(`Got ref ${refCode}, waiting...`,false,pfKey);

    // Step 2: Poll for result (IBKR needs time to generate)
    let xml=null;
    for(let attempt=0;attempt<8;attempt++){
      await new Promise(r=>setTimeout(r,3000)); // 3s between polls
      ibkrStatus(`Fetching... (attempt ${attempt+1})`,false,pfKey);
      const fUrl=`${w}/?action=fetch&token=${encodeURIComponent(tok)}&referenceCode=${refCode}`;
      const fResp=await fetch(fUrl);
      const fText=await fResp.text();
      if(fText.includes("<FlexQueryResponse")||fText.includes("<FlexStatements")){xml=fText;break;}
      if(fText.includes("Statement generation in progress")){continue;}
      // Check for error
      const fErr=fText.match(/<ErrorMessage>([^<]+)<\/ErrorMessage>/);
      if(fErr){ibkrStatus("⚠ "+fErr[1],true,pfKey);return;}
    }
    if(!xml){ibkrStatus("⚠ Timed out waiting for report",true,pfKey);return;}

    // Step 3: Parse XML
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,"text/xml");
    const parseErr=doc.querySelector("parsererror");
    if(parseErr){ibkrStatus("⚠ XML parse error",true,pfKey);return;}

    // Build ticker→stock mapping (match by symbol)
    const tickerMap={};
    Object.keys(stocks).forEach(t=>{
      tickerMap[t]=t; // exact match
      if(stocks[t].tdSymbol){
        const base=stocks[t].tdSymbol.split(":")[0];
        tickerMap[base]=t;
      }
    });
    function resolveT(sym){return tickerMap[sym]||tickerMap[sym.replace(/\s+/g,"")]||null;}

    // Parse positions
    const positions=doc.querySelectorAll("OpenPosition");
    const posData={};
    positions.forEach(p=>{
      const sym=p.getAttribute("symbol");
      const qty=parseFloat(p.getAttribute("position")||p.getAttribute("quantity")||0);
      const cost=parseFloat(p.getAttribute("costBasisPrice")||p.getAttribute("costPrice")||0);
      const ccy=p.getAttribute("currency")||"USD";
      const mktVal=parseFloat(p.getAttribute("markPrice")||p.getAttribute("marketPrice")||0);
      if(qty===0)return;
      const t=resolveT(sym);
      // IBKR reports GBP prices in pounds; app uses pence for GBp stocks
      const isGBp=t&&stocks[t]?.currency==="GBp";
      const adjCost=isGBp?cost*100:cost;
      const adjMkt=isGBp?mktVal*100:mktVal;
      if(!posData[sym])posData[sym]={sym,t,qty:0,cost:0,ccy,mktVal:0};
      posData[sym].qty+=qty;
      posData[sym].cost=adjCost;
      posData[sym].mktVal=adjMkt;
    });

    // Parse cash balances
    const cashNodes=doc.querySelectorAll("CashReportCurrency");
    let cashEUR=0,cashUSD=0;
    cashNodes.forEach(cn=>{
      const ccy=cn.getAttribute("currency");
      const bal=parseFloat(cn.getAttribute("endingCash")||cn.getAttribute("endingSettledCash")||0);
      if(ccy==="EUR")cashEUR+=bal;
      else if(ccy==="USD")cashUSD+=bal;
    });
    if(!cashEUR&&!cashUSD){
      const cashBal=doc.querySelectorAll("CashBalance");
      cashBal.forEach(cb=>{
        const ccy=cb.getAttribute("currency");
        const bal=parseFloat(cb.getAttribute("balance")||0);
        if(ccy==="EUR")cashEUR+=bal;
        else if(ccy==="USD")cashUSD+=bal;
      });
    }

    // Parse trades (recent executions)
    const trades=doc.querySelectorAll("Trade, Order");
    const tradeData=[];
    trades.forEach(tr=>{
      const sym=tr.getAttribute("symbol");
      const side=tr.getAttribute("buySell")||tr.getAttribute("side")||"";
      const qty=Math.abs(parseFloat(tr.getAttribute("quantity")||0));
      const price=parseFloat(tr.getAttribute("tradePrice")||tr.getAttribute("price")||0);
      const date=tr.getAttribute("tradeDate")||tr.getAttribute("dateTime")||"";
      const t=resolveT(sym);
      if(qty>0)tradeData.push({sym,t,side,qty,price,date});
    });

    // Step 4: Show preview before applying
    let matched=0,unmatched=[];
    Object.values(posData).forEach(p=>{if(p.t)matched++;else unmatched.push(p.sym);});
    const totalCash=pfBaseCcy(pfKey)==="USD"?cashUSD+(cashEUR*settings.fxRate):cashEUR+cashUSD/settings.fxRate;
    const pfName=pfKey==="nl"?"Caca":"Personal";

    let preview=`<div style="font-size:11px;color:var(--text);margin-top:8px;padding:10px;background:var(--bg);border-radius:8px">
      <div style="font-weight:700;margin-bottom:6px">📋 Preview (${Object.keys(posData).length} positions found)</div>`;
    Object.values(posData).forEach(p=>{
      const col=p.t?"var(--green)":"var(--red)";
      const label=p.t?`→ ${p.t}`:"⚠ no match";
      preview+=`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border)">
        <span>${p.sym} <span style="color:${col}">${label}</span></span>
        <span style="font-family:var(--mono)">${p.qty} @ ${p.cost.toFixed(2)} ${p.ccy}</span></div>`;
      // Show tranche split preview
      if(p.t){
        const s=stocks[p.t];const sigs=[];
        if(s?.signals?.mos)sigs.push("MOS");
        if(s?.signals?.tenCap)sigs.push("10Cap");
        if(s?.signals?.pbt)sigs.push("PBT");
        if(!sigs.length)sigs.push("PBT");
        const SC={MOS:"#34d399","10Cap":"#60a5fa",PBT:"#a78bfa"};
        const per=Math.floor(p.qty/sigs.length*100)/100;
        preview+=`<div style="padding:1px 0 3px 12px;font-size:10px;color:var(--muted)">→ ${sigs.map((sg,i)=>{
          const sh=i===sigs.length-1?(p.qty-per*(sigs.length-1)).toFixed(2):per.toFixed(2);
          return`<span style="color:${SC[sg]||"#a78bfa"}">${sg}</span> ${sh}sh`;}).join(" · ")}</div>`;
      }
    });
    if(totalCash>0)preview+=`<div style="margin-top:4px">Cash: €${Math.round(cashEUR).toLocaleString()} + $${Math.round(cashUSD).toLocaleString()} (€${Math.round(totalCash).toLocaleString()} total)</div>`;
    if(tradeData.length)preview+=`<div>${tradeData.length} recent trades found</div>`;
    if(unmatched.length)preview+=`<div style="color:var(--red);margin-top:4px">Unmatched: ${unmatched.join(", ")} — add these to your stock list first</div>`;
    preview+=`<div style="margin-top:8px">
      <button class="settings-save" onclick="applyIBKR('${pfKey}')">✓ Apply to ${pfName}</button></div></div>`;

    document.getElementById("ibkr-preview-"+pfKey).innerHTML=preview;
    window["_ibkrData_"+pfKey]={posData,cashEUR,cashUSD,tradeData};
    ibkrStatus(`✓ ${matched} matched, ${unmatched.length} unmatched`,false,pfKey);

  }catch(err){
    ibkrStatus("⚠ "+err.message,true,pfKey);
    document.getElementById("ibkr-preview-"+pfKey).innerHTML=`<pre style="font-size:10px;color:var(--red);white-space:pre-wrap;padding:8px;background:var(--bg);border-radius:6px;margin-top:8px">${err.stack||err.message}</pre>`;
  }
}

function applyIBKR(pfKey){
  const data=window["_ibkrData_"+pfKey];
  if(!data){ibkrStatus("⚠ No sync data — sync first",true,pfKey);return;}
  if(!confirm(`Replace all ${portfolios[pfKey].name} positions with IBKR data?`))return;

  const pf=portfolios[pfKey];

  // Clear existing positions for matched stocks
  Object.values(data.posData).forEach(p=>{
    if(!p.t)return;
    const s=stocks[p.t];
    const existing=pf.positions[p.t];
    const existingShares=existing?posShares(existing):0;

    if(existing&&Math.abs(existingShares-p.qty)<0.5){
      // Share count matches — just update cost basis
      existing.tranches.forEach(tr=>{tr.buyPrice=p.cost;});
    }else{
      // Rebuild: split shares equally across active signals for DCA sell targets
      const signals=[];
      if(s?.signals?.mos)signals.push("MOS");
      if(s?.signals?.tenCap)signals.push("10Cap");
      if(s?.signals?.pbt)signals.push("PBT");
      // If no signals firing, use all 3 as placeholders
      if(!signals.length)signals.push("PBT");

      const perTranche=p.qty/signals.length;
      const tranches=signals.map((sig,i)=>{
        // Last tranche gets remainder to avoid rounding loss
        const shares=i===signals.length-1?p.qty-perTranche*(signals.length-1):Math.floor(perTranche*100)/100;
        return{signal:sig,bought:shares,sold:0,buyPrice:p.cost,state:"accumulating"};
      });
      pf.positions[p.t]={tranches};
    }

    // Update current price if IBKR has newer
    if(p.mktVal&&stocks[p.t]){stocks[p.t].currentPrice=p.mktVal;stocks[p.t].lastUpdate=Date.now();stocks[p.t].priceSource="ibkr";updateSignals(p.t);}
  });

  // Update cash as dry powder (base currency depends on portfolio setting)
  const totalCash=pfBaseCcy(pfKey)==="USD"?cashUSD+(cashEUR*settings.fxRate):cashEUR+(cashUSD/settings.fxRate);
  if(totalCash>0){pf.dpUSD=Math.round(cashUSD);pf.dpEUR=Math.round(cashEUR);pf.dryPowder=Math.round(totalCash);pf.dpManual=false;}

  // Auto-demote grid stocks not in IBKR data (fully sold)
  const ibkrTickers=new Set(Object.values(data.posData).map(p=>p.t).filter(Boolean));
  if(pf.gridStocks&&ibkrTickers.size>0){
    const toRemove=pf.gridStocks.filter(t=>!ibkrTickers.has(t)&&pf.positions[t]);
    toRemove.forEach(t=>{
      delete pf.positions[t];
      pf.gridStocks=pf.gridStocks.filter(x=>x!==t);
    });
  }
  // Also clean up non-grid positions that IBKR no longer reports
  if(ibkrTickers.size>0){
    Object.keys(pf.positions).forEach(t=>{
      if(!ibkrTickers.has(t))delete pf.positions[t];
    });
  }

  save();render();showBuyModals();
  ibkrStatus(`✓ Applied to ${pf.name}`,false,pfKey);
  document.getElementById("ibkr-preview-"+pfKey).innerHTML="";
  window["_ibkrData_"+pfKey]=null;
}

// ============ AUTO IBKR SYNC (silent, no preview/confirm) ============
async function autoSyncIBKR(pfKey){
  const w=settings.ibkrWorker;
  const tok=pfKey==="nl"?settings.ibkrTokenNl:settings.ibkrTokenPersonal;
  const qid=pfKey==="nl"?settings.ibkrQueryNl:settings.ibkrQueryPersonal;
  if(!w||!tok||!qid)return false; // silently skip if not configured

  try{
    // Step 1: Request report
    const reqResp=await fetch(`${w}/?action=request&token=${encodeURIComponent(tok)}&queryId=${encodeURIComponent(qid)}`);
    const reqXml=await reqResp.text();
    const refMatch=reqXml.match(/<ReferenceCode>(\d+)<\/ReferenceCode>/);
    if(!refMatch)return false;

    // Step 2: Poll for result
    let xml=null;
    for(let attempt=0;attempt<8;attempt++){
      await new Promise(r=>setTimeout(r,3000));
      const fResp=await fetch(`${w}/?action=fetch&token=${encodeURIComponent(tok)}&referenceCode=${refMatch[1]}`);
      const fText=await fResp.text();
      if(fText.includes("<FlexQueryResponse")||fText.includes("<FlexStatements")){xml=fText;break;}
      if(fText.includes("Statement generation in progress"))continue;
      return false;
    }
    if(!xml)return false;

    // Step 3: Parse + apply directly (no preview)
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,"text/xml");
    if(doc.querySelector("parsererror"))return false;

    const tickerMap={};
    Object.keys(stocks).forEach(t=>{tickerMap[t]=t;if(stocks[t].tdSymbol){tickerMap[stocks[t].tdSymbol.split(":")[0]]=t;}});
    const resolveT=sym=>tickerMap[sym]||tickerMap[sym.replace(/\s+/g,"")]||null;

    // Parse positions
    const pf=portfolios[pfKey];
    const ibkrSeen=new Set();
    doc.querySelectorAll("OpenPosition").forEach(p=>{
      const sym=p.getAttribute("symbol");
      const qty=parseFloat(p.getAttribute("position")||p.getAttribute("quantity")||0);
      const rawCost=parseFloat(p.getAttribute("costBasisPrice")||p.getAttribute("costPrice")||0);
      const rawMkt=parseFloat(p.getAttribute("markPrice")||p.getAttribute("marketPrice")||0);
      if(qty===0)return;
      // Route index ETFs (XZMU, XZEU) to index positions, not regular positions
      const ixSymClean=sym.replace(/\.(L|DE|AS)$/,"");
      const ixRegion=ixSymClean==="XZMU"?"us":ixSymClean==="XZEU"?"eu":ixSymClean==="XZW0"?"us":null;
      if(ixRegion){
        const ip=getIndexPos(pfKey,ixRegion);
        ip.shares=qty;ip.avgCost=rawCost;ip.currentPrice=rawMkt||ip.currentPrice;ip.lastUpdate=Date.now();ip.priceSource="ibkr";
        return;
      }
      const t=resolveT(sym);if(!t)return;
      ibkrSeen.add(t);
      // IBKR reports GBP prices in pounds; app uses pence for GBp stocks
      const isGBp=stocks[t]?.currency==="GBp";
      const cost=isGBp?rawCost*100:rawCost;
      const mktVal=isGBp?rawMkt*100:rawMkt;

      const existing=pf.positions[t];
      const existingShares=existing?posShares(existing):0;
      if(existing&&Math.abs(existingShares-qty)<0.5){
        existing.tranches.forEach(tr=>{tr.buyPrice=cost;});
      }else{
        const sigs=[];
        if(stocks[t]?.signals?.mos)sigs.push("MOS");
        if(stocks[t]?.signals?.tenCap)sigs.push("10Cap");
        if(stocks[t]?.signals?.pbt)sigs.push("PBT");
        if(!sigs.length)sigs.push("PBT");
        const per=qty/sigs.length;
        pf.positions[t]={tranches:sigs.map((sig,i)=>({signal:sig,bought:i===sigs.length-1?qty-per*(sigs.length-1):Math.floor(per*100)/100,sold:0,buyPrice:cost,state:"accumulating"}))};
      }
      if(mktVal&&stocks[t]){stocks[t].currentPrice=mktVal;stocks[t].lastUpdate=Date.now();stocks[t].priceSource="ibkr";updateSignals(t);}
    });

    // Auto-demote grid stocks that IBKR no longer reports (fully sold)
    if(pf.gridStocks&&ibkrSeen.size>0){
      const sold=pf.gridStocks.filter(t=>!ibkrSeen.has(t)&&pf.positions[t]&&posShares(pf.positions[t])>0);
      sold.forEach(t=>{
        // Mark all tranches as fully sold
        pf.positions[t].tranches.forEach(tr=>{tr.sold=tr.bought;});
      });
      // Remove fully-sold stocks from grid → back to watchlist
      const toRemove=pf.gridStocks.filter(t=>!ibkrSeen.has(t)&&pf.positions[t]);
      toRemove.forEach(t=>{
        delete pf.positions[t];
        pf.gridStocks=pf.gridStocks.filter(x=>x!==t);
      });
    }
    // Also clean up non-grid positions that IBKR no longer reports
    if(ibkrSeen.size>0){
      Object.keys(pf.positions).forEach(t=>{
        if(!ibkrSeen.has(t))delete pf.positions[t];
      });
    }

    // Parse cash
    let cashEUR=0,cashUSD=0;
    doc.querySelectorAll("CashReportCurrency").forEach(cn=>{const ccy=cn.getAttribute("currency"),bal=parseFloat(cn.getAttribute("endingCash")||cn.getAttribute("endingSettledCash")||0);if(ccy==="EUR")cashEUR+=bal;else if(ccy==="USD")cashUSD+=bal;});
    if(!cashEUR&&!cashUSD)doc.querySelectorAll("CashBalance").forEach(cb=>{const ccy=cb.getAttribute("currency"),bal=parseFloat(cb.getAttribute("balance")||0);if(ccy==="EUR")cashEUR+=bal;else if(ccy==="USD")cashUSD+=bal;});
    const totalCash=pfBaseCcy(pfKey)==="USD"?cashUSD+(cashEUR*settings.fxRate):cashEUR+(cashUSD/settings.fxRate);
    if(totalCash>0){pf.dpUSD=Math.round(cashUSD);pf.dpEUR=Math.round(cashEUR);pf.dryPowder=Math.round(totalCash);pf.dpManual=false;}

    return true;
  }catch(e){return false;}
}

async function autoSyncAll(){
  // Sync both portfolios silently, return count of successes
  let ok=0;
  if(await autoSyncIBKR("personal"))ok++;
  if(await autoSyncIBKR("nl"))ok++;
  if(ok>0){settings.lastIbkrSync=Date.now();save();render();}
  return ok;
}

function exportCSV(){

  Object.keys(stocks).forEach(t=>{const s=stocks[t];if(!s.cons)return;
    const v=x=>x!=null?x:"";
    const lc=s.lastCalcDate?new Date(s.lastCalcDate).toISOString().slice(0,10):"";
    const ed=s.earningsDate?new Date(s.earningsDate).toISOString().slice(0,10):"";

function handleCSVImport(e){

          status:"watchlist",tdSymbol:td,finnhubSymbol:fh,priceMult:1,currentPrice:0,gate:true,

          phil:null,signals:{mos:false,tenCap:false,pbt:false},lastCalcDate:Date.now()};
        nNew++;
      }
      const s=stocks[t];
      // Update name from CSV if provided (fixes bare-ticker display names on reimport)
      if(hdr.includes("name")&&row.name&&row.name.trim())s.name=row.name.trim();
      // Empty cell = clear to null. Non-empty = set value.
      const set=(key,val)=>{if(val==="")return null;const n=+val;return isNaN(n)?null:n;};
      if(hdr.includes("sticker"))s.cons.sticker=set("sticker",row.sticker);
      if(hdr.includes("mos")){
        const oldSticker=s.cons.sticker;
        s.cons.mos=set("mos",row.mos);s.cons.sticker=s.cons.mos?s.cons.mos*2:s.cons.sticker;
        if(oldSticker&&s.cons.sticker&&s.cons.sticker!==oldSticker)s.cons.prevSticker=oldSticker;
      }
      if(hdr.includes("tencap"))s.cons.tenCap=set("tencap",row.tencap);

      if(hdr.includes("pbtyrs"))s.cons.pbtYrs=set("pbtyrs",row.pbtyrs);

      if(hdr.includes("pe"))s.cons.pe=set("pe",row.pe);
      if(hdr.includes("priority")){const pv=set("priority",row.priority);s.priority=pv;}
      // Set trigger freshness date: use CSV value if present, else mark as updated now
      if(hdr.includes("lastcalc")&&row.lastcalc){const d=new Date(row.lastcalc);s.lastCalcDate=isNaN(d)?Date.now():d.getTime();}
      else{s.lastCalcDate=Date.now();}
      // Import earnings date from CSV
      if(hdr.includes("earningsdate")&&row.earningsdate){const d=new Date(row.earningsdate);s.earningsDate=isNaN(d)?null:d.getTime();}
      // Import category (buffett or philtown/empty)
      if(hdr.includes("category")){const cat=(row.category||"").trim().toLowerCase();s.category=cat==="buffett"?"buffett":undefined;}
      // Auto-calc chain: eps+gr+pe → sticker+mos (overwrites manual MOS if all inputs present)
      applyRecalcSticker(s);
      // Auto-calculate tenCap from OE
      if(s.cons.oe!=null)s.cons.tenCap=+(s.cons.oe*10).toFixed(2);
      // Auto-calculate PBT from FCF+gr
      if(s.cons.fcf!=null&&s.cons.gr!=null){const g=s.cons.gr/100;let sum=0;for(let y=1;y<=8;y++)sum+=s.cons.fcf*Math.pow(1+g,y);s.cons.pbt=+sum.toFixed(2);}
      // If no eps/pe auto-calc, derive sticker from manual MOS
      if(s.cons.eps==null||s.cons.pe==null){s.cons.sticker=s.cons.mos?s.cons.mos*2:s.cons.sticker;}
      updateSignals(t);nUpd++;}
    save();render();alert(`Updated ${nUpd} stocks${nNew?` (${nNew} new)`:""}.`);
    // Auto-sync triggers to push worker if connected
    if(settings.pushSubscribed&&settings.pushWorkerUrl)syncTriggersToCloud();
    };r.readAsText(f);e.target.value="";
}

            if(s.cons.oe!=null)s.cons.tenCap=+(s.cons.oe*10).toFixed(2);
            if(s.cons.fcf!=null&&s.cons.gr!=null){const g=s.cons.gr/100;let sum=0;for(let y=1;y<=8;y++)sum+=s.cons.fcf*Math.pow(1+g,y);s.cons.pbt=+sum.toFixed(2);}

            else{s.cons.sticker=s.cons.mos?s.cons.mos*2:s.cons.sticker;}

          if(k==="ibkrTokenPersonal"&&val!=null&&val!=="")settings.ibkrTokenPersonal=String(val);
          if(k==="ibkrQueryPersonal"&&val!=null&&val!=="")settings.ibkrQueryPersonal=String(val);
          if(k==="ibkrTokenNl"&&val!=null&&val!=="")settings.ibkrTokenNl=String(val);
          if(k==="ibkrQueryNl"&&val!=null&&val!=="")settings.ibkrQueryNl=String(val);
          if(k==="gridStocks_personal"&&val!=null&&val!=="")portfolios.personal.gridStocks=String(val).split(",").filter(Boolean);
          if(k==="gridStocks_nl"&&val!=null&&val!=="")portfolios.nl.gridStocks=String(val).split(",").filter(Boolean);
          nSet++;
        });
      }

      // Sheet 4: Deploy Log
      let nLog=0;
      if(wb.SheetNames.includes("DeployLog")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["DeployLog"]);
        if(rows.length>0){
          // Merge: imported entries are added to existing log, deduped by date+ticker+signal+shares
          const existing=new Set(deployLog.map(e=>(e.date||"")+"|"+e.ticker+"|"+e.signal+"|"+e.shares));
          rows.forEach(row=>{
            const d=row.date?new Date(row.date):new Date();
            const key=((row.date||"")+"|"+(row.ticker||"")+"|"+(row.signal||"")+"|"+(row.shares||0));
            if(existing.has(key))return; // skip duplicates
            const s=stocks[(row.ticker||"").toUpperCase()];
            deployLog.push({
              id:d.getTime()+Math.random()*1000|0,
              date:d.toISOString(),
              ticker:String(row.ticker||""),
              flag:s?.flag||"",
              action:String(row.action||"buy"),
              signal:String(row.signal||""),
              shares:Number(row.shares)||0,
              price:Number(row.price)||0,
              currency:String(row.currency||"USD"),
              portfolio:String(row.portfolio||"personal"),
              triggerPrice:row.triggerPrice?Number(row.triggerPrice):null,
              note:String(row.note||"")
            });
            nLog++;
          });
          // Re-sort by date descending (newest first)
          deployLog.sort((a,b)=>new Date(b.date)-new Date(a.date));
        }
      }

      // Backward compat: if gridStocks not imported, derive from status==="grid" or gridPersonal/gridCaca columns
      ["personal","nl"].forEach(pk=>{
        if(!portfolios[pk].gridStocks||!portfolios[pk].gridStocks.length){
          // Check if Stocks sheet had gridPersonal/gridCaca columns
          const colKey=pk==="personal"?"gridPersonal":"gridCaca";
          if(wb.SheetNames.includes("Stocks")){
            const sRows2=XLSX.utils.sheet_to_json(wb.Sheets["Stocks"]);
            const fromCol=sRows2.filter(r=>String(r[colKey]||"").toUpperCase()==="Y").map(r=>String(r.ticker||"").toUpperCase().trim()).filter(Boolean);
            if(fromCol.length){portfolios[pk].gridStocks=fromCol;return;}
          }
          // Fallback: derive from status==="grid"
          portfolios[pk].gridStocks=Object.keys(stocks).filter(t=>stocks[t].status==="grid");
        }
      });
      // Normalize: change status==="grid" to "watchlist" since grid is now per-portfolio
      Object.values(stocks).forEach(s=>{if(s.status==="grid")s.status="watchlist";});

      save();render();
      alert(`Imported: ${nStocks} stocks, ${nPos} tranches, ${nSet} settings${nLog?`, ${nLog} log entries`:""}. `);
    }catch(err){alert("Import error: "+err.message);}
  };r.readAsArrayBuffer(f);e.target.value="";
}

// Unified activation price: sticker / 0.75 (= sticker × 1.3333...)
// Buffett category: tenCap × 1.3333 (anchored to Ten Cap instead of Sticker)
// Guarantees worst-case sell (ATH = activation+ε, then -25%) lands at sticker/tenCap = intrinsic value
function activationPrice(s){
  if(s.category==="buffett"){const tc=s.cons?.tenCap;return tc?+(tc/0.75).toFixed(2):null;}
  const stk=s.cons?.mos?s.cons.mos*2:null;return stk?+(stk/0.75).toFixed(2):null;
}
function sellBase(s,signal){
  if(signal==="trophy")return -1; // special: always tracking, no sticker gate
  if(signal==="hold")return null; // hold — no sell tracking
  return activationPrice(s); // unified for MOS, 10Cap, PBT
}

function cleanDismissed(){const week=7*86400000;const now=Date.now();Object.keys(dismissedAlerts).forEach(k=>{if(now-dismissedAlerts[k]>week)delete dismissedAlerts[k];});localStorage.setItem("r1-dismissed",JSON.stringify(dismissedAlerts));}

function checkAlerts(){
  cleanDismissed();
  const alerts=[];
  const GRID=getGrid(),WL=getWatchlist().filter(t=>!isOnAnyGrid(t));const SPEC=getSpeculative();

  // CRITICAL: 4M GATE FAIL — sell all (highest priority)
  Object.entries(stocks).forEach(([t,s])=>{

        html:`<strong>${s.flag} ${t}</strong> 4M GATE FAILED — SELL ALL tranches immediately!`});}
  });

  // STICKER DROP >20% — flag for re-audit
  Object.entries(stocks).forEach(([t,s])=>{
    if(!s.cons?.prevSticker||!s.cons?.sticker)return;
    if(s.cons.sticker<s.cons.prevSticker*0.80){
      const drop=Math.round((1-s.cons.sticker/s.cons.prevSticker)*100);
      const k=`sticker-drop-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"sell",icon:"📉",
        html:`<strong>${s.flag} ${t}</strong> sticker dropped <strong>${drop}%</strong> (${fmt(s.cons.prevSticker,s.currency)} → ${fmt(s.cons.sticker,s.currency)}). Full 4M re-audit needed!`});}
  });

  // TRAILING STOP — SELL (critical, per-tranche)
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.entries(pf.positions).forEach(([t,pos])=>{
      const s=stocks[t];if(!s?.currentPrice)return;
      pos.tranches.forEach(tr=>{
        if(tr.state!=="stopped"&&tr.state!=="stopActive")return;
        if(!tr.ath||(tr.bought-tr.sold)<=0)return;
        const base=sellBase(s,tr.signal);if(base===null)return;
        const isTrophy=(base===-1);
        const validATH=isTrophy||tr.ath>=base;
        if(!validATH)return;
        const dd=((tr.ath-s.currentPrice)/tr.ath*100);
        if(dd>=25){const k=`trail-${pk}-${t}-${tr.signal}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"critical",icon:"🚨",
          html:`<strong>${s.flag} ${t}</strong> trailing stop! Down <strong>−${dd.toFixed(1)}%</strong> from ATH ${fmt(tr.ath.toFixed(2),s.currency)} in ${pf.name}. <strong>SELL highest-cost tranche first.</strong>`});}
        // STOP BUFFER WARNING — within 5% of stop
        else if(dd>=20){const k=`buffer-${pk}-${t}-${tr.signal}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"watch",icon:"⚠",
          html:`<strong>${s.flag} ${t}</strong> ${tr.signal} approaching stop — <strong>−${dd.toFixed(1)}%</strong> from ATH ${fmt(tr.ath.toFixed(2),s.currency)} in ${pf.name}. Stop at −25%.`});}
      });
    });
  });

  // ACTIVATION CROSSED — first time price crosses unified activation price (info)
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.entries(pf.positions).forEach(([t,pos])=>{
      const s=stocks[t];if(!s?.currentPrice)return;
      pos.tranches.forEach(tr=>{
        if(tr._justCrossed){
          const k=`crossed-${pk}-${t}-${tr.signal}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"info",icon:"📈",
            html:`<strong>${s.flag} ${t}</strong> crossed activation in ${pf.name}! Trailing stop now active.`});
          delete tr._justCrossed;
        }
      });
    });
  });

  // BUY SIGNALS — grid stocks with active signals (respecting Sticker Ceiling)
  GRID.forEach(t=>{
    const s=stocks[t];if(!s?.currentPrice||s.gate===false)return;
    const p=s.currentPrice, c=s.cons;
    if(c.mos&&p<=c.mos&&!isSnoozed(t,"mos")){const k=`buy-mos-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"buy",icon:"🟢",
      html:`<strong>${s.flag} ${t}</strong> at <strong>${fmt(p,s.currency)}</strong> — below MOS ${fmt(c.mos,s.currency)}! Screaming buy.`});}
    else if(c.tenCap&&p<=c.tenCap&&!isTriggerMuted(s,"tenCap")&&!isSnoozed(t,"tenCap")){const k=`buy-tc-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"buy",icon:"🔵",
      html:`<strong>${s.flag} ${t}</strong> at <strong>${fmt(p,s.currency)}</strong> — below Ten Cap ${fmt(c.tenCap,s.currency)}`});}
    else if(c.pbt&&p<=c.pbt&&!isTriggerMuted(s,"pbt")&&!isSnoozed(t,"pbt")){const k=`buy-pbt-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"buy",icon:"🟣",
      html:`<strong>${s.flag} ${t}</strong> at <strong>${fmt(p,s.currency)}</strong> — below PBT ${fmt(c.pbt,s.currency)}`});}
  });

  // SIGNAL OFF — price rose above a previously active trigger
  Object.entries(stocks).forEach(([t,s])=>{
    if(!s._sigChanges?.length)return;
    const names={mos:"MOS",tenCap:"Ten Cap",pbt:"PBT"};
    s._sigChanges.filter(c=>c.dir==="off").forEach(c=>{
      const k=`sig-off-${t}-${c.sig}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"info",icon:"ℹ️",
        html:`<strong>${s.flag} ${t}</strong> ${names[c.sig]} signal turned off — price above ${fmt(s.cons[c.sig],s.currency)}`});
    });
    s._sigChanges=[];
  });

  // WATCHLIST — within 10% of nearest trigger
  [...WL,...SPEC].forEach(t=>{
    const s=stocks[t],nt=nearestTrigger(t);
    if(!s?.currentPrice||!nt)return;
    const gap=(s.currentPrice-nt)/s.currentPrice;
    if(gap>0&&gap<=0.10&&!isSnoozed(t)){const k=`watch-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"watch",icon:"👁",
      html:`<strong>${s.flag} ${t}</strong> approaching buy zone — ${fmt(s.currentPrice,s.currency)} is ${Math.round(gap*100)}% above trigger ${fmt(nt,s.currency)}`});}
    else if(gap<=0){

      const p=s.currentPrice,c=s.cons,fires=[],buf=s.category==="buffett";
      if(!buf&&c.mos&&p<=c.mos&&!isSnoozed(t,"mos"))fires.push(`🟢 MOS ${fmt(c.mos,s.currency)}`);
      if(c.tenCap&&p<=c.tenCap&&!isTriggerMuted(s,"tenCap")&&!isSnoozed(t,"tenCap"))fires.push(`🔵 10Cap ${fmt(c.tenCap,s.currency)}`);
      if(c.pbt&&p<=c.pbt&&!isTriggerMuted(s,"pbt")&&!isSnoozed(t,"pbt"))fires.push(`🟣 PBT ${fmt(c.pbt,s.currency)}`);
      const isSpec=s.status==="speculative";const maxSigs=buf?2:3;
      if(fires.length){const k=`watch-fire-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"watchlist-buy",icon:isSpec?"⚡":"🔥",
        html:`<strong>${s.flag} ${t}</strong> ${isSpec?"RISK":buf?"BUFFETT":"WATCHLIST"} BUY — ${fmt(p,s.currency)} · ${fires.join(" · ")} · <strong>${fires.length}/${maxSigs} signals${isSpec?"":` — add to grid!`}</strong>`});}
    }
  });

  // BACKUP REMINDER — weekly prompt to export Excel backup
  const backupAge=settings.lastBackup?Date.now()-settings.lastBackup:Infinity;
  if(backupAge>7*86400000){const k="backup-remind";if(!dismissedAlerts[k]){
    const label=settings.lastBackup?`Last backup ${Math.floor(backupAge/86400000)}d ago`:"No backup on record";
    alerts.push({key:k,type:"watch",icon:"💾",
      html:`<strong>${label}</strong> — <span style="cursor:pointer;text-decoration:underline" onclick="exportExcel()">Export Excel backup now</span>`});}}

  // Render
  const el=document.getElementById("alert-banner");
  if(!alerts.length){el.innerHTML="";return;}
  el.innerHTML=alerts.map(a=>`<div class="alert-item ${a.type}">
    <span class="alert-icon">${a.icon}</span>
    <div class="alert-text">${a.html}</div>
    <span class="alert-dismiss" onclick="dismissAlert('${a.key}');checkAlerts()">✕</span>
  </div>`).join("");
}

const MARKETS=[
  {id:"jp",flag:"🇯🇵",label:"JP",tz:"Asia/Tokyo",open:[9,0],close:[15,30]},
  {id:"eu",flag:"🇪🇺",label:"EU",tz:"Europe/Amsterdam",open:[9,0],close:[17,30]},

  {id:"us",flag:"🇺🇸",label:"US",tz:"America/New_York",open:[9,30],close:[16,0]}
];
function marketStatus(){
  const now=new Date();const strip=document.getElementById("market-strip");if(!strip)return;
  // Weekend check (0=Sun, 6=Sat) — approximate, doesn't handle per-market holidays
  const dow=now.getDay();const weekend=dow===0||dow===6;
  let h="";
  MARKETS.forEach(m=>{
    // Get current hours/mins in market's timezone
    const parts=new Intl.DateTimeFormat("en",{timeZone:m.tz,hour:"numeric",minute:"numeric",hour12:false}).formatToParts(now);
    const hr=parseInt(parts.find(p=>p.type==="hour").value);
    const mn=parseInt(parts.find(p=>p.type==="minute").value);
    const mins=hr*60+mn;const openMins=m.open[0]*60+m.open[1];const closeMins=m.close[0]*60+m.close[1];
    const isOpen=!weekend&&mins>=openMins&&mins<closeMins;
    // Convert open/close to Saudi local time for display
    const toLocal=(hh,mm)=>{
      const d=new Date();d.setMilliseconds(0);d.setSeconds(0);
      // Create a date at hh:mm in the market's timezone by brute search (reliable across DST)
      // Use Intl to figure out the UTC offset for the market tz
      const ref=new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0);
      const utcStr=ref.toLocaleString("en-US",{timeZone:"UTC"});
      const tzStr=ref.toLocaleString("en-US",{timeZone:m.tz});
      const utcMs=new Date(utcStr).getTime();const tzMs=new Date(tzStr).getTime();
      const offsetMs=tzMs-utcMs; // tz ahead of UTC by this much
      // Market local hh:mm → UTC → add 3h for AST
      const marketUTC=hh*60+mm-offsetMs/60000;
      const astMins=marketUTC+180; // UTC+3
      const ah=Math.floor(((astMins%1440)+1440)%1440/60);const am=Math.round(((astMins%1440)+1440)%1440%60);
      return String(ah).padStart(2,"0")+":"+String(am).padStart(2,"0");
    };
    const localOpen=toLocal(m.open[0],m.open[1]);const localClose=toLocal(m.close[0],m.close[1]);
    const dot=isOpen?"#34d399":"#5a6a7a";
    const shortO=localOpen.replace(/:00$/,"");const shortC=localClose.replace(/:00$/,"");
    h+=`<div style="font-size:9px;color:var(--muted);display:flex;align-items:center;gap:2px;line-height:1;cursor:pointer" onclick="showMarketToast('${m.flag} ${m.label} ${localOpen}–${localClose} AST${isOpen?" · OPEN":" · CLOSED"}')">
      <span style="width:5px;height:5px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0;${isOpen?"box-shadow:0 0 4px #34d39980":""}"></span>
      <span>${m.flag}</span>
    </div>`;
  });
  strip.innerHTML=h;
}


// Earnings banner: show stocks reporting within 14 days
// Dismissals stored in settings.earningsBannerDismissed = { ticker: dismissTimestamp }
// Dismissed BEFORE earnings day → reappears on earnings day
// Dismissed ON earnings day → stays dismissed for the day
function isEarningsBannerDismissed(t,s){
  const d=settings.earningsBannerDismissed;if(!d||!d[t])return false;
  const dismissTime=d[t];
  const today=new Date();today.setHours(0,0,0,0);
  const earnDay=new Date(s.earningsDate);earnDay.setHours(0,0,0,0);
  const dismissDay=new Date(dismissTime);dismissDay.setHours(0,0,0,0);
  // Dismissed on earnings day itself → stays dismissed
  if(dismissDay.getTime()>=earnDay.getTime())return true;
  // Dismissed before earnings day → reappear on earnings day
  if(today.getTime()>=earnDay.getTime())return false;
  return true;
}
function dismissEarningsBanner(t){
  if(!settings.earningsBannerDismissed)settings.earningsBannerDismissed={};

}

      `<strong>${s.flag} ${t}</strong> reported ${ei.label.replace("📅 ","").replace(" → update","")} — <strong>triggers need update</strong>`;

// ============ SIGNAL CELL STATUS (lifecycle: buy → hold → tracking → sell) ============
function sigCellStatus(ticker, sigKey, pfKey){
  // sigKey: "mos", "tenCap", "pbt"; pfKey: "personal" or "nl" (optional, defaults to checking both)
  const s=stocks[ticker];if(!s)return{cls:"none",label:"",sub:""};
  const p=s.currentPrice;
  const trigger=s.cons?.[sigKey];
  if(!trigger||!p)return{cls:"none",label:"",sub:fmt(trigger,s.currency)||"—"};
  const muted=isTriggerMuted(s,sigKey);
  // PIGGYBACK: muted trigger but price below it AND a valid signal is also firing — deploys
  if(p<=trigger&&muted&&sigCount(ticker)>0)return{cls:"buy",label:"B",sub:fmt(trigger,s.currency),subCls:"buy-sub",topSub:"piggyback"};
  // MUTED: price reached trigger but no valid signal firing — cannot deploy alone
  if(p<=trigger&&muted)return{cls:"muted",label:"C",sub:fmt(trigger,s.currency),subCls:"",topSub:"≥ sticker"};
  // BUY: signal firing AND not muted — valid buy signal
  if(p<=trigger)return{cls:"buy",label:"B",sub:fmt(trigger,s.currency),subCls:"buy-sub"};
  // Above trigger: check if tranche has shares
  const sigName=sigKey==="mos"?"MOS":sigKey==="tenCap"?"10Cap":"PBT";
  let hasShares=false,worst="hold",maxDD=0;
  const pfsToCheck=pfKey?[pfKey]:["personal","nl"];
  pfsToCheck.forEach(pk=>{
    const pos=portfolios[pk]?.positions?.[ticker];if(!pos)return;
    pos.tranches.forEach(tr=>{
      if(tr.signal!==sigName||(tr.bought-tr.sold)<=0)return;
      hasShares=true;
      if(tr.state==="stopped"){worst="sell";if(tr.ath){const dd=(tr.ath-p)/tr.ath*100;if(dd>maxDD)maxDD=dd;}}
      else if(tr.state==="stopActive"&&worst!=="sell"){worst="track";if(tr.ath){const dd=(tr.ath-p)/tr.ath*100;if(dd>maxDD)maxDD=dd;}}
    });
  });
  // No shares in this tranche type → show buy trigger as reference
  if(!hasShares)return{cls:"none",label:"",sub:fmt(trigger,s.currency),subCls:""};
  // Has shares — show lifecycle state
  if(worst==="sell")return{cls:"sell",label:"S",sub:`−${Math.round(maxDD)}%`,subCls:"sell-sub"};
  if(worst==="track"){
    const cls=maxDD>=15?"warn":"track";
    return{cls,label:cls==="warn"?"!":"↑",sub:`−${Math.round(maxDD)}%`,subCls:cls==="warn"?"warn-sub":"track-sub"};
  }
  // HOLD: circle shows current price, activation above, trigger below
  const sym=s.currency==="USD"?"$":s.currency==="GBp"?"":s.currency==="CAD"?"C$":"€";
  const sfx=s.currency==="GBp"?"p":"";
  const act=activationPrice(s);
  return{cls:"hold",label:`${sym}${Math.round(p)}${sfx}`,topSub:act?`act ${fmt(act,s.currency)}`:"",sub:fmt(trigger,s.currency),subCls:""};
}
