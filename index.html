  const IBKR_MIN_INTERVAL=4*60*60*1000; // 4 hours
  const lastIbkrAttempt=settings.lastIbkrAttempt||0;
  if(Date.now()-lastIbkrAttempt>=IBKR_MIN_INTERVAL){
    settings.lastIbkrAttempt=Date.now();
    try{ibkrOk=await autoSyncAll();}catch(e){}
  }else{
    ibkrSkipped=true;
  }

  // 2. Fetch FX from ECB via Frankfurter (free, no key)
  //    Primary: api.frankfurter.dev (current canonical). Fallback: api.frankfurter.app (legacy redirect).
  let fxOk=false,fxErr=null;
  const FX_ENDPOINTS=[
    "https://api.frankfurter.dev/v1/latest?base=EUR&symbols=USD,GBP,CAD,JPY",
    "https://api.frankfurter.app/latest?from=EUR&to=USD,GBP,CAD,JPY"
  ];
  for(const url of FX_ENDPOINTS){
    try{
      const fxR=await fetch(url);
      if(!fxR.ok){fxErr=`HTTP ${fxR.status} ${fxR.statusText||""}`.trim();continue;}
      const fxD=await fxR.json();
      if(!fxD.rates){fxErr="No rates in response";continue;}
      if(fxD.rates.USD){settings.fxRate=parseFloat(fxD.rates.USD.toFixed(4));fxOk=true;}
      if(fxD.rates.GBP){settings.fxGBP=parseFloat(fxD.rates.GBP.toFixed(4));fxOk=true;}
      if(fxD.rates.CAD){settings.fxCAD=parseFloat(fxD.rates.CAD.toFixed(4));fxOk=true;}
      if(fxD.rates.JPY){settings.fxJPY=parseFloat(fxD.rates.JPY.toFixed(2));fxOk=true;}
      if(fxOk){settings.lastFxUpdate=Date.now();settings.lastFxError=null;fxErr=null;break;}
      fxErr="No expected currencies (USD/GBP/CAD/JPY) in response";
    }catch(e){fxErr=e.message||String(e);}
  }
  if(!fxOk){
    settings.lastFxError=fxErr||"Unknown FX error";
    console.warn("FX fetch failed:",fxErr);
  }

  // 3. Yahoo Finance for all stocks via Cloudflare Worker proxy
  // FIX v3.45: defensive symbol normalization (trim + collapse) and priceMult fallback.
  // FIX v3.45: chunk batches of 10 — Yahoo's quote endpoint silently truncates large
  // batches, dropping symbols past the cutoff (typically ~10-20). One batched request
  // of 30+ symbols was returning only the first ~10, leaving MICC and others at price 0.
  // Diagnostic recorded on window._priceDiag so MICC-class lookup misses are debuggable.
  let yfOk=0;
  window._priceDiag={fetched:[],applied:[],missing:[],zeroPriceMult:[],chunks:0};
  if(settings.ibkrWorker){
    Object.values(stocks).forEach(s=>{if(s.finnhubSymbol)s.finnhubSymbol=String(s.finnhubSymbol).replace(/[\s\u200B-\u200F\uFEFF]/g,"");});
    const yfStocks=Object.entries(stocks).filter(([t,s])=>s.finnhubSymbol);
    if(yfStocks.length>0){
      const CHUNK=10;
      const d={};
      for(let i=0;i<yfStocks.length;i+=CHUNK){
        const batch=yfStocks.slice(i,i+CHUNK);
        try{
          const syms=batch.map(([t,s])=>s.finnhubSymbol).join(",");
          const r=await fetch(`${settings.ibkrWorker}/?action=quote&symbols=${encodeURIComponent(syms)}`);
          const part=await r.json();
          Object.assign(d,part||{});
          window._priceDiag.chunks++;
        }catch(e){window._priceDiag.error=String(e);}
      }
      window._priceDiag.fetched=Object.keys(d);
      yfStocks.forEach(([t,s])=>{
        const sym=s.finnhubSymbol;
        const q=d[sym];
        if(q&&q.price>0){
          const mult=(s.priceMult&&s.priceMult>0)?s.priceMult:1;
          if(!s.priceMult||s.priceMult<=0){s.priceMult=1;window._priceDiag.zeroPriceMult.push(t);}
          s.currentPrice=q.price*mult;s.lastUpdate=Date.now();s.priceSource="yahoo";
          if(q.earningsTimestamp&&q.earningsTimestamp>0){s.earningsDate=q.earningsTimestamp*1000;}
          else if(q.earningsDate&&q.earningsDate>0){s.earningsDate=q.earningsDate;}
          updateSignals(t);yfOk++;
          window._priceDiag.applied.push({t,sym,price:q.price});
        }else{
          window._priceDiag.missing.push({t,sym,inResponse:sym in d,raw:d[sym]});
        }
      });
    }
  }

  // 3b. Fetch index ETF prices (XZMU+XZEU for Personal and Caca) — not in stocks object
  if(settings.ibkrWorker){
    const indexEntries=[];
    ["personal","nl"].forEach(pk=>{["us","eu"].forEach(r=>{indexEntries.push({ticker:indexTickerForPf(pk,r),pf:pk,region:r});});});
    // Deduplicate fetches by ticker, but track all targets
    const tickerMap={};indexEntries.forEach(e=>{if(!tickerMap[e.ticker])tickerMap[e.ticker]=[];tickerMap[e.ticker].push(e);});
    for(const [ticker,targets] of Object.entries(tickerMap)){
      try{
        const ir=await fetch(`${settings.ibkrWorker}/?action=quote&symbols=${encodeURIComponent(ticker)}`);
        const id=await ir.json();const iq=id[ticker];
        if(iq&&iq.price>0){targets.forEach(t=>{const ip=getIndexPos(t.pf,t.region);ip.currentPrice=iq.price;ip.lastUpdate=Date.now();ip.priceSource="yahoo";});}
      }catch(e){}
    }
  }

  // Re-enable buy modals, then queue for signals that genuinely changed (off before refresh → on after)
  window._suppressBuyModal=false;
  Object.entries(stocks).forEach(([t,s])=>{
    if(!s.signals)return;
    const pre=preRefreshSignals[t]||{mos:false,tenCap:false,pbt:false};
    ["mos","tenCap","pbt"].forEach(sig=>{
      if(!pre[sig]&&s.signals[sig])queueBuyModal(t,sig);
    });
    // If this stock has any snoozed signal, also queue any un-snoozed firing signals
    // (catches: PBT snoozed, 10Cap was already firing but never shown)
    if(s.snoozed&&Object.keys(s.snoozed).length){
      ["mos","tenCap","pbt"].forEach(sig=>{
        if(s.signals[sig])queueBuyModal(t,sig); // dedupes + checks snoozed + shown
      });
    }
  });

  settings.lastFetch=Date.now();save();render();
  // Record daily performance snapshot for index vs stock-picking comparison
  if(indexAllocationUSD()>0&&(getIndexPos("personal","us").shares>0||getIndexPos("personal","eu").shares>0))recordSnapshot();
  // Check for new signals and celebrate
  const newFires=checkNewSignals();
  if(newFires.length){
    setTimeout(()=>showSignalCelebration(newFires),500);
    sendTriggerNotification(newFires); // Also push OS notification
  }
  // Risklist: detect newly-eligible tranches and notify. Same-day duplicates suppressed.
  const rlFires=checkNewRisklistFires();
  if(rlFires.length)sendRisklistNotification(rlFires);
  // v3.68 Stage E: detect non-Tier-1 owned positions crossing fair value FROM BELOW and
  // Stage E: detect non-Tier-1 owned positions crossing the fair-value anchor FROM BELOW and
  // notify capital-recovery. Tier 1 suppressed inside fairValueThreshold().
  const fvFires=checkFairValueCrossings();
  if(fvFires.length)sendFairValueNotification(fvFires);
  showBuyModals();
  const t=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  const parts=[];
  if(yfOk)parts.push(`YF✓${yfOk}`);
  if(ibkrOk)parts.push(`IBKR✓`);
  else if(ibkrSkipped)parts.push(`IBKR⏸`); // v3.58: skipped due to 4h cooldown
  if(fxOk)parts.push(`FX✓`);
  el.textContent=`✓ ${parts.join(" · ")} — ${t}`;
  }finally{_fetchInFlight=false;}
}

// ============ IBKR FLEX SYNC ============
function saveIBKR(){
  settings.ibkrWorker=(document.getElementById("ibkr-worker")?.value||"").trim().replace(/\/$/,"");
  settings.ibkrTokenPersonal=(document.getElementById("ibkr-token-personal")?.value||"").trim();
  settings.ibkrQueryPersonal=(document.getElementById("ibkr-query-personal")?.value||"").trim();
  settings.ibkrTokenNl=(document.getElementById("ibkr-token-nl")?.value||"").trim();
  settings.ibkrQueryNl=(document.getElementById("ibkr-query-nl")?.value||"").trim();
  save();
}
function ibkrStatus(msg,err,pf){const el=document.getElementById("ibkr-status-"+(pf||"personal"));if(el){el.textContent=msg;el.style.color=err?"var(--red)":"var(--muted)";}}

async function syncIBKR(pfKey){
  pfKey=pfKey||"personal";
  const w=settings.ibkrWorker;
  const tok=pfKey==="nl"?settings.ibkrTokenNl:settings.ibkrTokenPersonal;
  const qid=pfKey==="nl"?settings.ibkrQueryNl:settings.ibkrQueryPersonal;
  if(!w||!tok||!qid){ibkrStatus("⚠ Fill worker URL + token + query ID",true,pfKey);return;}

  try{
    // Step 1: Request report
    ibkrStatus("Requesting report...",false,pfKey);
    const reqUrl=`${w}/?action=request&token=${encodeURIComponent(tok)}&queryId=${encodeURIComponent(qid)}`;
    const reqResp=await fetch(reqUrl);
    const reqXml=await reqResp.text();
    const refMatch=reqXml.match(/<ReferenceCode>(\d+)<\/ReferenceCode>/);
    if(!refMatch){
      const errMatch=reqXml.match(/<ErrorMessage>([^<]+)<\/ErrorMessage>/);
      const codeMatch=reqXml.match(/<ErrorCode>(\d+)<\/ErrorCode>/);
      const msg=errMatch?errMatch[1]:"No reference code";
      const code=codeMatch?" (code "+codeMatch[1]+")":"";
      ibkrStatus("⚠ "+msg+code,true,pfKey);
      document.getElementById("ibkr-preview-"+pfKey).innerHTML=`<pre style="font-size:10px;color:var(--muted);white-space:pre-wrap;max-height:200px;overflow:auto;padding:8px;background:var(--bg);border-radius:6px;margin-top:8px">${reqXml.replace(/</g,"&lt;")}</pre>`;
      return;
    }
    const refCode=refMatch[1];
    ibkrStatus(`Got ref ${refCode}, waiting...`,false,pfKey);

    // Step 2: Poll for result (IBKR needs time to generate)
    let xml=null;
    for(let attempt=0;attempt<8;attempt++){
      await new Promise(r=>setTimeout(r,3000)); // 3s between polls
      ibkrStatus(`Fetching... (attempt ${attempt+1})`,false,pfKey);
      const fUrl=`${w}/?action=fetch&token=${encodeURIComponent(tok)}&referenceCode=${refCode}`;
      const fResp=await fetch(fUrl);
      const fText=await fResp.text();
      if(fText.includes("<FlexQueryResponse")||fText.includes("<FlexStatements")){xml=fText;break;}
      if(fText.includes("Statement generation in progress")){continue;}
      // Check for error
      const fErr=fText.match(/<ErrorMessage>([^<]+)<\/ErrorMessage>/);
      if(fErr){ibkrStatus("⚠ "+fErr[1],true,pfKey);return;}
    }
    if(!xml){ibkrStatus("⚠ Timed out waiting for report",true,pfKey);return;}

    // Step 3: Parse XML
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,"text/xml");
    const parseErr=doc.querySelector("parsererror");
    if(parseErr){ibkrStatus("⚠ XML parse error",true,pfKey);return;}

    // Build ticker→stock mapping (match by symbol)
    const tickerMap={};
    Object.keys(stocks).forEach(t=>{
      tickerMap[t]=t; // exact match
      if(stocks[t].tdSymbol){
        const base=stocks[t].tdSymbol.split(":")[0];
        tickerMap[base]=t;
      }
      // Also map the full Yahoo symbol (e.g. "MONY.L" → "MONY") so IBKR symbols
      // with exchange suffixes resolve correctly.
      if(stocks[t].finnhubSymbol)tickerMap[stocks[t].finnhubSymbol]=t;
    });
    // Try exact, whitespace-stripped, then suffix-stripped lookups.
    function resolveT(sym){
      if(!sym)return null;
      const direct=tickerMap[sym]||tickerMap[sym.replace(/\s+/g,"")];
      if(direct)return direct;
      const stripped=sym.replace(/\.(L|DE|AS|T|TO)$/,"");
      return tickerMap[stripped]||null;
    }

    // Parse positions
    const positions=doc.querySelectorAll("OpenPosition");
    const posData={};
    positions.forEach(p=>{
      const sym=p.getAttribute("symbol");
      const qty=parseFloat(p.getAttribute("position")||p.getAttribute("quantity")||0);
      const cost=parseFloat(p.getAttribute("costBasisPrice")||p.getAttribute("costPrice")||0);
      const ccy=p.getAttribute("currency")||"USD";
      const mktVal=parseFloat(p.getAttribute("markPrice")||p.getAttribute("marketPrice")||0);
      if(qty===0)return;
      const t=resolveT(sym);
      // IBKR reports GBP prices in pounds; app uses pence for GBp stocks
      const isGBp=t&&stocks[t]?.currency==="GBp";
      const adjCost=isGBp?cost*100:cost;
      const adjMkt=isGBp?mktVal*100:mktVal;
      if(!posData[sym])posData[sym]={sym,t,qty:0,cost:0,ccy,mktVal:0};
      posData[sym].qty+=qty;
      posData[sym].cost=adjCost;
      posData[sym].mktVal=adjMkt;
    });

    // Parse cash balances
    const cashNodes=doc.querySelectorAll("CashReportCurrency");
    let cashEUR=0,cashUSD=0,cashGBP=0,cashJPY=0,cashCAD=0;
    cashNodes.forEach(cn=>{
      const ccy=cn.getAttribute("currency");
      const bal=parseFloat(cn.getAttribute("endingCash")||cn.getAttribute("endingSettledCash")||0);
      if(ccy==="EUR")cashEUR+=bal;
      else if(ccy==="USD")cashUSD+=bal;
      else if(ccy==="GBP")cashGBP+=bal;
      else if(ccy==="JPY")cashJPY+=bal;
      else if(ccy==="CAD")cashCAD+=bal;
    });
    if(!cashEUR&&!cashUSD&&!cashGBP&&!cashJPY&&!cashCAD){
      const cashBal=doc.querySelectorAll("CashBalance");
      cashBal.forEach(cb=>{
        const ccy=cb.getAttribute("currency");
        const bal=parseFloat(cb.getAttribute("balance")||0);
        if(ccy==="EUR")cashEUR+=bal;
        else if(ccy==="USD")cashUSD+=bal;
        else if(ccy==="GBP")cashGBP+=bal;
        else if(ccy==="JPY")cashJPY+=bal;
        else if(ccy==="CAD")cashCAD+=bal;
      });
    }

    // Parse trades (recent executions)
    const trades=doc.querySelectorAll("Trade, Order");
    const tradeData=[];
    trades.forEach(tr=>{
      const sym=tr.getAttribute("symbol");
      const side=tr.getAttribute("buySell")||tr.getAttribute("side")||"";
      const qty=Math.abs(parseFloat(tr.getAttribute("quantity")||0));
      const price=parseFloat(tr.getAttribute("tradePrice")||tr.getAttribute("price")||0);
      const date=tr.getAttribute("tradeDate")||tr.getAttribute("dateTime")||"";
      const t=resolveT(sym);
      if(qty>0)tradeData.push({sym,t,side,qty,price,date});
    });

    // Step 4: Show preview before applying
    let matched=0,unmatched=[];
    Object.values(posData).forEach(p=>{if(p.t)matched++;else unmatched.push(p.sym);});
    const totalCashEUR=cashEUR+(cashUSD/settings.fxRate)+(cashGBP/settings.fxGBP)+(cashJPY/settings.fxJPY)+(cashCAD/settings.fxCAD);
    const totalCash=pfBaseCcy(pfKey)==="USD"?totalCashEUR*settings.fxRate:totalCashEUR;
    const pfName=pfKey==="nl"?"Caca":"Personal";

    let preview=`<div style="font-size:11px;color:var(--text);margin-top:8px;padding:10px;background:var(--bg);border-radius:8px">
      <div style="font-weight:700;margin-bottom:6px">📋 Preview (${Object.keys(posData).length} positions found)</div>`;
    Object.values(posData).forEach(p=>{
      const col=p.t?"var(--green)":"var(--red)";
      const label=p.t?`→ ${p.t}`:"⚠ no match";
      preview+=`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border)">
        <span>${p.sym} <span style="color:${col}">${label}</span></span>
        <span style="font-family:var(--mono)">${p.qty} @ ${p.cost.toFixed(2)} ${p.ccy}</span></div>`;
      // Show tranche split preview
      if(p.t){
        const s=stocks[p.t];const sigs=[];
        if(s?.signals?.mos)sigs.push("MOS");
        if(s?.signals?.tenCap)sigs.push(trigT3Label(p.t));
        if(s?.signals?.pbt)sigs.push(trigT2Label(p.t));
        if(!sigs.length)sigs.push(trigT2Label(p.t));
        const SC={MOS:"#34d399","10Cap":"#60a5fa",PBT:"#a78bfa","20Cap":"#60a5fa",DMOS:"#a78bfa","P-MOS":"#fbbf24"};
        const per=Math.floor(p.qty/sigs.length*100)/100;
        preview+=`<div style="padding:1px 0 3px 12px;font-size:10px;color:var(--muted)">→ ${sigs.map((sg,i)=>{
          const sh=i===sigs.length-1?(p.qty-per*(sigs.length-1)).toFixed(2):per.toFixed(2);
          return`<span style="color:${SC[sg]||"#a78bfa"}">${sg}</span> ${sh}sh`;}).join(" · ")}</div>`;
      }
    });
    if(totalCash>0){let cashParts=[];if(cashUSD)cashParts.push("$"+Math.round(cashUSD).toLocaleString());if(cashEUR)cashParts.push("€"+Math.round(cashEUR).toLocaleString());if(cashGBP)cashParts.push("£"+Math.round(cashGBP).toLocaleString());if(cashJPY)cashParts.push("¥"+Math.round(cashJPY).toLocaleString());if(cashCAD)cashParts.push("C$"+Math.round(cashCAD).toLocaleString());preview+=`<div style="margin-top:4px">Cash: ${cashParts.join(" + ")} (${pfBaseCcy(pfKey)==="USD"?"$":"€"}${Math.round(totalCash).toLocaleString()} total)</div>`;}
    if(tradeData.length)preview+=`<div>${tradeData.length} recent trades found</div>`;
    if(unmatched.length)preview+=`<div style="color:var(--red);margin-top:4px">Unmatched: ${unmatched.join(", ")} — add these to your stock list first</div>`;
    preview+=`<div style="margin-top:8px">
      <button class="settings-save" onclick="applyIBKR('${pfKey}')">✓ Apply to ${pfName}</button></div></div>`;

    document.getElementById("ibkr-preview-"+pfKey).innerHTML=preview;
    window["_ibkrData_"+pfKey]={posData,cashEUR,cashUSD,cashGBP,cashJPY,cashCAD,tradeData};
    ibkrStatus(`✓ ${matched} matched, ${unmatched.length} unmatched`,false,pfKey);

  }catch(err){
    ibkrStatus("⚠ "+err.message,true,pfKey);
    document.getElementById("ibkr-preview-"+pfKey).innerHTML=`<pre style="font-size:10px;color:var(--red);white-space:pre-wrap;padding:8px;background:var(--bg);border-radius:6px;margin-top:8px">${err.stack||err.message}</pre>`;
  }
}

function applyIBKR(pfKey){
  const data=window["_ibkrData_"+pfKey];
  if(!data){ibkrStatus("⚠ No sync data — sync first",true,pfKey);return;}
  if(!confirm(`Replace all ${portfolios[pfKey].name} positions with IBKR data?`))return;

  const pf=portfolios[pfKey];

  // Clear existing positions for matched stocks
  Object.values(data.posData).forEach(p=>{
    if(!p.t)return;
    const s=stocks[p.t];
    const existing=pf.positions[p.t];
    const existingShares=existing?posShares(existing):0;

    if(existing&&Math.abs(existingShares-p.qty)<0.5){
      // Share count matches — just update cost basis
      existing.tranches.forEach(tr=>{tr.buyPrice=p.cost;});
    }else{
      // Rebuild: split shares equally across active signals for DCA sell targets
      const signals=[];
      if(s?.signals?.mos)signals.push("MOS");
      if(s?.signals?.tenCap)signals.push(trigT3Label(p.t));
      if(s?.signals?.pbt)signals.push(trigT2Label(p.t));
      // If no signals firing, use all 3 as placeholders
      if(!signals.length)signals.push(trigT2Label(p.t));

      const perTranche=p.qty/signals.length;
      const tranches=signals.map((sig,i)=>{
        // Last tranche gets remainder to avoid rounding loss
        const shares=i===signals.length-1?p.qty-perTranche*(signals.length-1):Math.floor(perTranche*100)/100;
        return{signal:sig,bought:shares,sold:0,buyPrice:p.cost,state:"accumulating"};
      });
      pf.positions[p.t]={tranches};
    }

    // Update current price if IBKR has newer
    if(p.mktVal&&stocks[p.t]){stocks[p.t].currentPrice=p.mktVal;stocks[p.t].lastUpdate=Date.now();stocks[p.t].priceSource="ibkr";updateSignals(p.t);}
  });

  // Update cash as dry powder (base currency depends on portfolio setting)
  const{cashEUR,cashUSD,cashGBP,cashJPY,cashCAD}=data;
  const totalCashEUR=cashEUR+(cashUSD/settings.fxRate)+(cashGBP/settings.fxGBP)+(cashJPY/settings.fxJPY)+(cashCAD/settings.fxCAD);
  const totalCash=pfBaseCcy(pfKey)==="USD"?totalCashEUR*settings.fxRate:totalCashEUR;
  if(totalCash>0){pf.dpUSD=Math.round(cashUSD);pf.dpEUR=Math.round(cashEUR);pf.dpGBP=Math.round(cashGBP);pf.dpJPY=Math.round(cashJPY);pf.dpCAD=Math.round(cashCAD);pf.dryPowder=Math.round(totalCash);pf.dpManual=false;}

  // Auto-demote grid stocks not in IBKR data (fully sold).
  // SAFETY: if any IBKR symbol failed to resolve to a stocks{} entry, skip the cleanup
  // entirely. Without this, unresolved positions silently get deleted, which is how
  // MONY-style disappearances happen.
  const ibkrUnresolved=Object.values(data.posData).filter(p=>!p.t).map(p=>p.sym);
  const ibkrTickers=new Set(Object.values(data.posData).map(p=>p.t).filter(Boolean));
  if(ibkrUnresolved.length>0){
    console.warn("applyIbkrSync: skipping position cleanup — unresolved IBKR symbols:",ibkrUnresolved);
  }else if(pf.gridStocks&&ibkrTickers.size>0){
    const toRemove=pf.gridStocks.filter(t=>!ibkrTickers.has(t)&&pf.positions[t]);
    toRemove.forEach(t=>{
      delete pf.positions[t];
      pf.gridStocks=pf.gridStocks.filter(x=>x!==t);
    });
  }
  // Also clean up non-grid positions that IBKR no longer reports (same safety guard).
  if(ibkrUnresolved.length===0&&ibkrTickers.size>0){
    Object.keys(pf.positions).forEach(t=>{
      if(!ibkrTickers.has(t))delete pf.positions[t];
    });
  }

  save();render();showBuyModals();
  ibkrStatus(`✓ Applied to ${pf.name}`,false,pfKey);
  document.getElementById("ibkr-preview-"+pfKey).innerHTML="";
  window["_ibkrData_"+pfKey]=null;
}

// ============ AUTO IBKR SYNC (silent, no preview/confirm) ============
async function autoSyncIBKR(pfKey){
  const w=settings.ibkrWorker;
  const tok=pfKey==="nl"?settings.ibkrTokenNl:settings.ibkrTokenPersonal;
  const qid=pfKey==="nl"?settings.ibkrQueryNl:settings.ibkrQueryPersonal;
  if(!w||!tok||!qid)return false; // silently skip if not configured

  try{
    // Step 1: Request report
    const reqResp=await fetch(`${w}/?action=request&token=${encodeURIComponent(tok)}&queryId=${encodeURIComponent(qid)}`);
    const reqXml=await reqResp.text();
    const refMatch=reqXml.match(/<ReferenceCode>(\d+)<\/ReferenceCode>/);
    if(!refMatch)return false;

    // Step 2: Poll for result
    let xml=null;
    for(let attempt=0;attempt<8;attempt++){
      await new Promise(r=>setTimeout(r,3000));
      const fResp=await fetch(`${w}/?action=fetch&token=${encodeURIComponent(tok)}&referenceCode=${refMatch[1]}`);
      const fText=await fResp.text();
      if(fText.includes("<FlexQueryResponse")||fText.includes("<FlexStatements")){xml=fText;break;}
      if(fText.includes("Statement generation in progress"))continue;
      return false;
    }
    if(!xml)return false;

    // Step 3: Parse + apply directly (no preview)
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,"text/xml");
    if(doc.querySelector("parsererror"))return false;

    const tickerMap={};
    Object.keys(stocks).forEach(t=>{
      tickerMap[t]=t;
      if(stocks[t].tdSymbol)tickerMap[stocks[t].tdSymbol.split(":")[0]]=t;
      if(stocks[t].finnhubSymbol)tickerMap[stocks[t].finnhubSymbol]=t;
    });
    const resolveT=sym=>{
      if(!sym)return null;
      const direct=tickerMap[sym]||tickerMap[sym.replace(/\s+/g,"")];
      if(direct)return direct;
      const stripped=sym.replace(/\.(L|DE|AS|T|TO)$/,"");
      return tickerMap[stripped]||null;
    };

    // Parse positions
    const pf=portfolios[pfKey];
    const ibkrSeen=new Set();
    const ibkrUnresolved=[]; // raw symbols IBKR reported that we couldn't map to stocks{}
    doc.querySelectorAll("OpenPosition").forEach(p=>{
      const sym=p.getAttribute("symbol");
      const qty=parseFloat(p.getAttribute("position")||p.getAttribute("quantity")||0);
      const rawCost=parseFloat(p.getAttribute("costBasisPrice")||p.getAttribute("costPrice")||0);
      const rawMkt=parseFloat(p.getAttribute("markPrice")||p.getAttribute("marketPrice")||0);
      if(qty===0)return;
      // Route index ETFs (XZMU, XZEU) to index positions, not regular positions
      const ixSymClean=sym.replace(/\.(L|DE|AS)$/,"");
      const ixRegion=ixSymClean==="XZMU"?"us":ixSymClean==="XZEU"?"eu":ixSymClean==="XZW0"?"us":null;
      if(ixRegion){
        const ip=getIndexPos(pfKey,ixRegion);
        ip.shares=qty;ip.avgCost=rawCost;ip.currentPrice=rawMkt||ip.currentPrice;ip.lastUpdate=Date.now();ip.priceSource="ibkr";
        return;
      }
      const t=resolveT(sym);
      if(!t){ibkrUnresolved.push(sym);return;}
      ibkrSeen.add(t);
      // IBKR reports GBP prices in pounds; app uses pence for GBp stocks
      const isGBp=stocks[t]?.currency==="GBp";
      const cost=isGBp?rawCost*100:rawCost;
      const mktVal=isGBp?rawMkt*100:rawMkt;

      const existing=pf.positions[t];
      const existingShares=existing?posShares(existing):0;
      if(existing&&Math.abs(existingShares-qty)<0.5){
        existing.tranches.forEach(tr=>{tr.buyPrice=cost;});
      }else{
        const sigs=[];
        if(stocks[t]?.signals?.mos)sigs.push("MOS");
        if(stocks[t]?.signals?.tenCap)sigs.push(trigT3Label(t));
        if(stocks[t]?.signals?.pbt)sigs.push(trigT2Label(t));
        if(!sigs.length)sigs.push(trigT2Label(t));
        const per=qty/sigs.length;
        pf.positions[t]={tranches:sigs.map((sig,i)=>({signal:sig,bought:i===sigs.length-1?qty-per*(sigs.length-1):Math.floor(per*100)/100,sold:0,buyPrice:cost,state:"accumulating"}))};
      }
      if(mktVal&&stocks[t]){stocks[t].currentPrice=mktVal;stocks[t].lastUpdate=Date.now();stocks[t].priceSource="ibkr";updateSignals(t);}
    });

    // Auto-demote grid stocks that IBKR no longer reports (fully sold).
    // SAFETY: only run cleanup if every IBKR position resolved cleanly. If any symbols
    // were unresolved, IBKR may be reporting positions whose stocks{} entries are missing
    // (e.g. ticker not yet in defaults, holdings CSV import didn't create skeleton), and
    // running the cleanup would silently delete them. Better to leave positions intact
    // and let the user investigate via the manual sync preview.
    if(ibkrUnresolved.length>0){
      console.warn("autoSyncIBKR: skipping position cleanup — unresolved IBKR symbols:",ibkrUnresolved);
    }else if(pf.gridStocks&&ibkrSeen.size>0){
      const sold=pf.gridStocks.filter(t=>!ibkrSeen.has(t)&&pf.positions[t]&&posShares(pf.positions[t])>0);
      sold.forEach(t=>{
        // Mark all tranches as fully sold
        pf.positions[t].tranches.forEach(tr=>{tr.sold=tr.bought;});
      });
      // Remove fully-sold stocks from grid → back to watchlist
      const toRemove=pf.gridStocks.filter(t=>!ibkrSeen.has(t)&&pf.positions[t]);
      toRemove.forEach(t=>{
        delete pf.positions[t];
        pf.gridStocks=pf.gridStocks.filter(x=>x!==t);
      });
    }
    // Also clean up non-grid positions that IBKR no longer reports (same safety guard).
    if(ibkrUnresolved.length===0&&ibkrSeen.size>0){
      Object.keys(pf.positions).forEach(t=>{
        if(!ibkrSeen.has(t))delete pf.positions[t];
      });
    }

    // Parse cash
    let cashEUR=0,cashUSD=0,cashGBP=0,cashJPY=0,cashCAD=0;
    doc.querySelectorAll("CashReportCurrency").forEach(cn=>{const ccy=cn.getAttribute("currency"),bal=parseFloat(cn.getAttribute("endingCash")||cn.getAttribute("endingSettledCash")||0);if(ccy==="EUR")cashEUR+=bal;else if(ccy==="USD")cashUSD+=bal;else if(ccy==="GBP")cashGBP+=bal;else if(ccy==="JPY")cashJPY+=bal;else if(ccy==="CAD")cashCAD+=bal;});
    if(!cashEUR&&!cashUSD&&!cashGBP&&!cashJPY&&!cashCAD)doc.querySelectorAll("CashBalance").forEach(cb=>{const ccy=cb.getAttribute("currency"),bal=parseFloat(cb.getAttribute("balance")||0);if(ccy==="EUR")cashEUR+=bal;else if(ccy==="USD")cashUSD+=bal;else if(ccy==="GBP")cashGBP+=bal;else if(ccy==="JPY")cashJPY+=bal;else if(ccy==="CAD")cashCAD+=bal;});
    const totalCashEUR2=cashEUR+(cashUSD/settings.fxRate)+(cashGBP/settings.fxGBP)+(cashJPY/settings.fxJPY)+(cashCAD/settings.fxCAD);
    const totalCash=pfBaseCcy(pfKey)==="USD"?totalCashEUR2*settings.fxRate:totalCashEUR2;
    if(totalCash>0){pf.dpUSD=Math.round(cashUSD);pf.dpEUR=Math.round(cashEUR);pf.dpGBP=Math.round(cashGBP);pf.dpJPY=Math.round(cashJPY);pf.dpCAD=Math.round(cashCAD);pf.dryPowder=Math.round(totalCash);pf.dpManual=false;}

    return true;
  }catch(e){return false;}
}

function snapshotStocks(){
  const snap={};
  Object.entries(stocks).forEach(([t,s])=>{
    const o={name:s.name,category:s.category,gate:s.gate,priority:s.priority,compounderPriority:s.compounderPriority,t1Firing:s.t1Firing?true:null,t3Firing:s.t3Firing?true:null,t6Firing:s.t6Firing?true:null,earningsDate:s.earningsDate||null,lastCalcDate:s.lastCalcDate||null};
    if(s.cons){Object.keys(s.cons).forEach(k=>o["cons."+k]=s.cons[k]);}
    snap[t]=o;
  });
  return snap;
}
function diffStocks(before){
  const changes=[];
  Object.entries(stocks).forEach(([t,s])=>{
    const old=before[t];
    if(!old){changes.push({ticker:t,name:s.name,isNew:true,fields:[]});return;}
    const fields=[];
    DIFF_FIELDS.forEach(df=>{
      let oldVal,newVal;
      if(df.path.length===2){oldVal=old["cons."+df.path[1]];newVal=s[df.path[0]]?.[df.path[1]];}
      else{oldVal=old[df.path[0]];newVal=s[df.path[0]];}
      // Normalize: treat undefined as null
      if(oldVal===undefined)oldVal=null;
      if(newVal===undefined)newVal=null;
      // boolDisplay: map truthy/falsy to display strings (e.g. tripwire firing flags)
      if(df.boolDisplay){
        oldVal=oldVal?df.boolDisplay[0]:df.boolDisplay[1];
        newVal=newVal?df.boolDisplay[0]:df.boolDisplay[1];
      }
      // Compare with tolerance for floats, day-level for dates
      if(oldVal===newVal)return;
      if(df.isDate&&typeof oldVal==="number"&&typeof newVal==="number"&&Math.abs(oldVal-newVal)<86400000)return;
      if(!df.isDate&&typeof oldVal==="number"&&typeof newVal==="number"&&Math.abs(oldVal-newVal)<0.005)return;
      fields.push({label:df.label,oldVal,newVal,isDate:!!df.isDate});
    });
    if(fields.length)changes.push({ticker:t,name:s.name||t,isNew:false,fields});
  });
  return changes;
}
function fmtDiffVal(v){
  if(v===null||v===undefined)return null;
  if(typeof v==="number")return Number.isInteger(v)?v.toString():v.toFixed(2);
  if(typeof v==="boolean")return v?"PASS":"FAIL";
  return String(v);
}
function showImportDiffModal(changes,nUpd,nNew){
  // Remove any existing diff modal
  const existing=document.getElementById("import-diff-overlay");
  if(existing)existing.remove();
  const overlay=document.createElement("div");
  overlay.id="import-diff-overlay";
  overlay.className="diff-overlay";
  const nChanged=changes.filter(c=>!c.isNew).length;
  const nNewStocks=changes.filter(c=>c.isNew).length;
  let bodyHTML="";
  if(!changes.length){
    bodyHTML=`<div class="diff-no-changes">No trigger values changed — all values identical.</div>`;
  }else{
    // New stocks first, then changed
    const sorted=[...changes.filter(c=>c.isNew),...changes.filter(c=>!c.isNew)];
    sorted.forEach(c=>{
      let chipsHTML="";
      if(c.isNew){
        chipsHTML=`<span class="diff-chip"><span class="diff-set">New stock added to watchlist</span></span>`;
      }else{
        c.fields.forEach(f=>{
          const fmtV=v=>f.isDate&&typeof v==="number"?new Date(v).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}):fmtDiffVal(v);
          const oldStr=fmtV(f.oldVal);
          const newStr=fmtV(f.newVal);
          if(oldStr===null&&newStr!==null){
            chipsHTML+=`<span class="diff-chip"><span class="diff-field">${f.label}:</span><span class="diff-set">${newStr}</span></span>`;
          }else if(oldStr!==null&&newStr===null){
            chipsHTML+=`<span class="diff-chip"><span class="diff-field">${f.label}:</span><span class="diff-old">${oldStr}</span><span class="diff-cleared">cleared</span></span>`;
          }else{
            chipsHTML+=`<span class="diff-chip"><span class="diff-field">${f.label}:</span><span class="diff-old">${oldStr}</span><span class="diff-arrow">→</span><span class="diff-new-val">${newStr}</span></span>`;
          }
        });
      }
      const badge=c.isNew?`<span class="diff-stock-badge new">NEW</span>`:`<span class="diff-stock-badge changed">CHANGED</span>`;
      bodyHTML+=`<div class="diff-stock ${c.isNew?'diff-new':''}">
        <div class="diff-stock-hdr"><span class="diff-stock-ticker">${c.ticker}</span><span class="diff-stock-name">${c.name}</span>${badge}</div>
        <div class="diff-changes">${chipsHTML}</div></div>`;
    });
  }
  const summaryParts=[];
  if(nNewStocks)summaryParts.push(`${nNewStocks} new`);
  if(nChanged)summaryParts.push(`${nChanged} changed`);
  if(nUpd-nChanged-nNewStocks>0)summaryParts.push(`${nUpd-nChanged-nNewStocks} unchanged`);
  overlay.innerHTML=`<div class="diff-modal">
    <div class="diff-modal-header"><h2>Import Results</h2><span class="diff-summary">${summaryParts.join(" · ")}</span></div>
    <div class="diff-modal-body">${bodyHTML}</div>
    <button class="diff-dismiss" onclick="document.getElementById('import-diff-overlay').remove()">Done</button></div>`;
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

// Full-file CSV parser. Handles RFC 4180-style quoted fields with embedded
// newlines, commas, and escaped quotes (""). Strips BOM. Trims cells.
// Returns rows[] where each row is a string[]. Skips fully blank rows.
// FIX v3.44: replaces previous line-by-line approach that corrupted any row
// containing a notes/specReason value with an embedded newline (the export
// quotes them correctly; the old import split on "\n" before parsing quotes).
function parseCSVText(src){
  if(!src)return[];
  if(src.charCodeAt(0)===0xFEFF)src=src.slice(1);
  const rows=[];let row=[],cur="",inQ=false;
  for(let i=0;i<src.length;i++){
    const c=src[i];
    if(inQ){
      if(c==='"'){if(src[i+1]==='"'){cur+='"';i++;}else inQ=false;}
      else cur+=c;
    }else{
      if(c==='"'&&cur===""){inQ=true;}
      else if(c===','){row.push(cur.trim());cur="";}
      else if(c==='\r'||c==='\n'){
        if(c==='\r'&&src[i+1]==='\n')i++;
        row.push(cur.trim());cur="";
        if(row.some(x=>x!==""))rows.push(row);
        row=[];
      }else cur+=c;
    }
  }
  if(cur!==""||row.length>0){
    row.push(cur.trim());
    if(row.some(x=>x!==""))rows.push(row);
  }
  return rows;
}

function handleCSVImport(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=function(ev){
    const rows=parseCSVText(ev.target.result);
    if(rows.length<2)return alert("Empty CSV");
    const hdr=rows[0].map(h=>h.trim().toLowerCase());let nUpd=0,nNew=0;
    const beforeSnap=snapshotStocks();
    for(let i=1;i<rows.length;i++){const v=rows[i];const row={};hdr.forEach((h,j)=>row[h]=v[j]??"");
      const t=(row.ticker||"").toUpperCase();if(!t)continue;
      // Auto-create stock if ticker doesn't exist yet
      if(!stocks[t]){
        // FIX v3.70: use the shared module-level _EXCHANGES table (defined below near the
        // holdings importer) instead of a separate inline literal. _EXCHANGES is a strict
        // superset (adds CSU, ULVR, 3064, 7741, AMS, etc.) and is the single source of truth
        // for ticker→currency/symbol metadata. Safe to reference here: it's a module-level
        // const, and this code only runs at import time, long after the module has loaded.
        const csvCcy=(row.currency||"").trim();
        const ex=_EXCHANGES[t];
        let ccy=csvCcy||ex?.ccy||"USD";
        const flags={USD:"🇺🇸",EUR:"🇪🇺",GBp:"🇬🇧",CAD:"🇨🇦",JPY:"🇯🇵"};
        let td=ex?.td||(ccy==="GBp"?t+":LSE":t);
        let fh=ex?.fh||(ccy==="GBp"?t+".L":ccy==="CAD"?t+".TO":ccy==="JPY"?t+".T":ccy==="EUR"?undefined:t);
        const csvName=(row.name||"").trim();
        stocks[t]={name:csvName||ex?.name||t,currency:ccy,moat:"Wide",sector:ex?.sector||"",flag:flags[ccy]||"🌍",
          status:"watchlist",tdSymbol:td,finnhubSymbol:fh,priceMult:1,currentPrice:0,gate:true,
          cons:{sticker:null,mos:null,tenCap:null,pbt:null,pbtYrs:null,gr:null,oe:null,fcf:null,eps:null,pe:null,prevSticker:null},
          phil:null,signals:{mos:false,tenCap:false,pbt:false},lastCalcDate:Date.now()};
        nNew++;
      }
      const s=stocks[t];
      // Update name from CSV if provided (fixes bare-ticker display names on reimport)
      if(hdr.includes("name")&&row.name&&row.name.trim())s.name=row.name.trim();
      // Empty cell = clear to null. Non-empty = set value.
      const set=(key,val)=>{if(val==="")return null;const n=+val;return isNaN(n)?null:n;};
      if(hdr.includes("sticker"))s.cons.sticker=set("sticker",row.sticker);
      if(hdr.includes("mos")){
        const oldSticker=s.cons.sticker;
        s.cons.mos=set("mos",row.mos);s.cons.sticker=s.cons.mos?s.cons.mos*2:s.cons.sticker;
        if(oldSticker&&s.cons.sticker&&s.cons.sticker!==oldSticker)s.cons.prevSticker=oldSticker;
      }
      if(hdr.includes("tencap"))s.cons.tenCap=set("tencap",row.tencap);
      if(hdr.includes("pbt"))s.cons.pbt=set("pbt",row.pbt);
      if(hdr.includes("pbtyrs"))s.cons.pbtYrs=set("pbtyrs",row.pbtyrs);
      if(hdr.includes("gr"))s.cons.gr=set("gr",row.gr);
      if(hdr.includes("oe"))s.cons.oe=set("oe",row.oe);
      if(hdr.includes("fcf"))s.cons.fcf=set("fcf",row.fcf);
      if(hdr.includes("eps"))s.cons.eps=set("eps",row.eps);
      if(hdr.includes("pe"))s.cons.pe=set("pe",row.pe);
      if(hdr.includes("priority")){const pv=set("priority",row.priority);s.priority=pv;}
      if(hdr.includes("compounderpriority")){const cp=set("compounderpriority",row.compounderpriority);s.compounderPriority=cp;}
      // Set trigger freshness date: use CSV value if present, else mark as updated now
      if(hdr.includes("lastcalc")&&row.lastcalc){const d=new Date(row.lastcalc);s.lastCalcDate=isNaN(d)?Date.now():d.getTime();}
      else{s.lastCalcDate=Date.now();}
      // Import earnings date from CSV
      if(hdr.includes("earningsdate")&&row.earningsdate){const d=new Date(row.earningsdate);s.earningsDate=isNaN(d)?null:d.getTime();}
      // Import category (buffett, highgr, or philtown/empty)
      if(hdr.includes("category")){const cat=(row.category||"").trim().toLowerCase();s.category=cat==="buffett"?"buffett":cat==="highgr"?"highgr":undefined;}
      // Import notes (general stock comments)
      if(hdr.includes("notes")){const nv=(row.notes||"").trim();if(nv)s.notes=nv;else delete s.notes;}
      // Import specReason (risk thesis text). v3.31: text-only sync — risk-bucket membership
      // is now per-portfolio and managed in Settings, not auto-toggled by CSV import.
      if(hdr.includes("specreason")){const sr=(row.specreason||"").trim();
        if(sr)s.specReason=sr;else delete s.specReason;}
      // Import tripwire firing flags (T1/T3/T6 — Stage F v3.69). "Y"/"YES"/"TRUE"/"1" → firing;
      // anything else (incl. empty, "N", absent column) → not firing. Operationally gated
      // by isOperationalTier1() at render — a non-Tier-1 stock with a stale flag is masked
      // but the flag persists in storage. Manual toggle through tripwireBadges UI.
      [["t1firing","t1Firing"],["t3firing","t3Firing"],["t6firing","t6Firing"]].forEach(([col,key])=>{
        if(hdr.includes(col)){
          const raw=(row[col]||"").toString().trim().toUpperCase();
          const fires=raw==="Y"||raw==="YES"||raw==="TRUE"||raw==="1";
          if(fires)s[key]=true;else delete s[key];
        }
      });
      // Auto-calc chain: eps+gr+pe → sticker+mos (overwrites manual MOS if all inputs present)
      applyRecalcSticker(s);
      // Auto-calc tenCap + pbt (category-aware: highgr uses 20Cap/DMOS formulas)
      recalcConsTriggers(s);
      // If no eps/pe auto-calc, derive sticker from manual MOS
      if(s.cons.eps==null||s.cons.pe==null){s.cons.sticker=s.cons.mos?s.cons.mos*2:s.cons.sticker;}
      updateSignals(t);nUpd++;}
    save();render();
    const changes=diffStocks(beforeSnap);
    showImportDiffModal(changes,nUpd,nNew);
    // Auto-sync triggers to push worker if connected
    if(settings.pushSubscribed&&settings.pushWorkerUrl)syncTriggersToCloud();
    };r.readAsText(f);e.target.value="";
}

// ============ HOLDINGS CSV (import/export, separate from triggers CSV) ============
// Format: portfolio,ticker,stockType,trancheType,shares,buyPrice,buyDate,notes
// portfolio: "personal" or "caca" (CSV) ↔ "personal" or "nl" (internal pfKey)
// trancheType enum (CSV) ↔ tranche.signal (internal):
//   initial ↔ "initial"        mos ↔ "MOS"
//   tenCap/buffettTenCap ↔ "10Cap"   pbt/buffettPbt ↔ "PBT"
//   trophy ↔ "trophy"          risk ↔ "risk" (also adds ticker to pf.riskStocks)
//   index → writes to pf.indexPositions[us|eu] aggregate (shares/avgCost) — not as a tranche
const HOLDINGS_TRANCHE_TYPES=["initial","mos","pmos","tenCap","pbt","buffettTenCap","buffettPbt","risk","trophy","index","cash"];
// v3.96: stockType column — the framework classification of the stock in that portfolio.
// "risk" is per-portfolio (pf.riskStocks); phil_town/buffett/highgr come from s.category.
const HOLDINGS_STOCK_TYPES=["phil_town","buffett","highgr","risk","index","cash"];
function _stockTypeForExport(t,pfKey){
  if(isRisk(t,pfKey))return"risk";
  const c=stocks[t]?.category;
  return c==="buffett"?"buffett":c==="highgr"?"highgr":"phil_town";
}
const HOLDINGS_CASH_CCYS=["USD","EUR","GBP","JPY","CAD"];

// Exchange lookup: bare ticker → currency + Yahoo/td symbols. Used by triggers CSV import
// AND holdings CSV import to create skeleton stocks{} entries with correct metadata.
// Unknown tickers default to USD (caller can override or user can edit later).

// Create a skeleton stocks{} entry for tickers that show up in positions/holdings but
// don't yet have stock metadata. Triggers will be filled in via triggers CSV import or
// manual edit. Idempotent: returns false if stock already exists.
function _ensureStockEntry(ticker){
  if(!ticker||stocks[ticker])return false;
  const ex=_EXCHANGES[ticker];
  const ccy=ex?.ccy||"USD";
  const flags={USD:"🇺🇸",EUR:"🇪🇺",GBp:"🇬🇧",CAD:"🇨🇦",JPY:"🇯🇵"};
  const td=ex?.td||(ccy==="GBp"?ticker+":LSE":ticker);
  const fh=ex?.fh||(ccy==="GBp"?ticker+".L":ccy==="CAD"?ticker+".TO":ccy==="JPY"?ticker+".T":ccy==="EUR"?undefined:ticker);
  stocks[ticker]={
    name:ex?.name||ticker,currency:ccy,moat:"Wide",sector:ex?.sector||"",
    flag:flags[ccy]||"🌍",status:"watchlist",tdSymbol:td,finnhubSymbol:fh,
    priceMult:1,currentPrice:0,gate:true,
    cons:{sticker:null,mos:null,tenCap:null,pbt:null,pbtYrs:null,gr:null,oe:null,fcf:null,eps:null,pe:null,prevSticker:null},
    phil:null,signals:{mos:false,tenCap:false,pbt:false},lastCalcDate:null
  };
  return true;
}
const _PF_CSV_TO_KEY={personal:"personal",caca:"nl"};
const _PF_KEY_TO_CSV={personal:"personal",nl:"caca"};

function _trancheTypeForExport(t,pfKey,signal){
  // Index ETFs are emitted by a separate loop, so this is for stock tranches only.
  // v3.96: the stock's framework type now lives in its own stockType column, so we no longer
  // collapse every tranche of a risk stock to "risk". A tranche's type reflects its OWN signal —
  // e.g. a risk stock can hold both an "mos" tranche and a "risk" tranche, each preserved.
  if(signal==="trophy")return"trophy";
  if(signal==="initial")return"initial";
  if(signal==="risk")return"risk";
  const buf=isBuffett(t);
  if(signal==="MOS")return"mos";
  if(signal==="P-MOS")return"pmos";
  // 20Cap and 10Cap both live in the tenCap column → same CSV trancheType.
  // DMOS and PBT both live in the pbt column → same CSV trancheType.
  if(signal==="10Cap"||signal==="20Cap")return buf?"buffettTenCap":"tenCap";
  if(signal==="PBT"||signal==="DMOS")return buf?"buffettPbt":"pbt";
  return"initial"; // unknown / fallback
}
// ticker context lets us pick highgr-era labels on round-trip; if a tenCap-column tranche is being
// imported into a stock that's currently highgr, give it the "20Cap" label rather than "10Cap".
function _trancheTypeToSignal(tt,ticker){
  if(tt==="mos")return"MOS";
  if(tt==="pmos")return"P-MOS";
  if(tt==="tenCap"||tt==="buffettTenCap")return ticker&&isHighgr(ticker)?"20Cap":"10Cap";
  if(tt==="pbt"||tt==="buffettPbt")return ticker&&isHighgr(ticker)?"DMOS":"PBT";
  if(tt==="trophy")return"trophy";
  if(tt==="initial")return"initial";
  if(tt==="risk")return"risk";
  return null; // index handled separately
}
// Determine if a CSV ticker refers to one of the index ETF legs and which region it maps to.
function _indexRegionForTicker(ticker,pfKey){
  if(!ticker)return null;
  const tup=ticker.toUpperCase();
  // Match against configured tickers for this portfolio (full form, e.g. XZMU.L)
  const us=indexTickerForPf(pfKey,"us").toUpperCase();
  const eu=indexTickerForPf(pfKey,"eu").toUpperCase();
  if(tup===us)return"us";
  if(tup===eu)return"eu";
  // Also match by short prefix (XZMU/XZEU/XZW0) for resilience to .L/.DE variations
  const short=tup.replace(/\.(L|DE|AS|TO|T)$/,"");
  if(short==="XZMU")return"us";
  if(short==="XZEU")return"eu";
  if(short==="XZW0")return"us"; // legacy world ticker → US slot
  return null;
}

function exportHoldingsCSV(){
  const q=x=>{if(x==null||x==="")return"";const str=String(x);return /[",\n\r]/.test(str)?`"${str.replace(/"/g,'""')}"`:str;};
  const rows=[];
  // 1. Stock tranches across both portfolios
  Object.entries(portfolios).forEach(([pk,pf])=>{
    const csvPf=_PF_KEY_TO_CSV[pk];if(!csvPf||!pf?.positions)return;
    Object.entries(pf.positions).forEach(([t,pos])=>{
      if(!pos?.tranches)return;
      pos.tranches.forEach(tr=>{
        const sh=(tr.bought||0)-(tr.sold||0);
        if(sh<=0)return; // skip fully-sold tranches
        const tt=_trancheTypeForExport(t,pk,tr.signal);
        const st=_stockTypeForExport(t,pk);
        const buyDate=tr.buyDate?new Date(tr.buyDate).toISOString().slice(0,10):"";
        const notes=tr.notes||"";
        rows.push({portfolio:csvPf,ticker:t,stockType:st,trancheType:tt,shares:sh,buyPrice:tr.buyPrice||0,buyDate,notes});
      });
    });
  });
  // 2. Index ETF aggregate positions (one row per non-zero leg per portfolio)
  Object.keys(portfolios).forEach(pk=>{
    const csvPf=_PF_KEY_TO_CSV[pk];if(!csvPf)return;
    ["us","eu"].forEach(region=>{
      const ip=getIndexPos(pk,region);
      if(!ip||!(ip.shares>0))return;
      const ticker=indexTickerForPf(pk,region);
      rows.push({portfolio:csvPf,ticker,stockType:"index",trancheType:"index",shares:ip.shares,buyPrice:ip.avgCost||0,buyDate:"",notes:""});
    });
  });
  // 3. Cash (dry powder) per currency per portfolio (one row per non-zero leg)
  Object.entries(portfolios).forEach(([pk,pf])=>{
    const csvPf=_PF_KEY_TO_CSV[pk];if(!csvPf||!pf)return;
    HOLDINGS_CASH_CCYS.forEach(ccy=>{
      const amt=pf["dp"+ccy];
      if(amt==null||amt<=0)return;
      rows.push({portfolio:csvPf,ticker:ccy,stockType:"cash",trancheType:"cash",shares:amt,buyPrice:1,buyDate:"",notes:""});
    });
  });
  // 4. Sort: portfolio asc, then ordering class (positions/index < cash), then ticker asc, then buyDate asc (empty last)
  const _classOf=tt=>tt==="cash"?2:1;
  rows.sort((a,b)=>{
    if(a.portfolio!==b.portfolio)return a.portfolio<b.portfolio?-1:1;
    const ca=_classOf(a.trancheType),cb=_classOf(b.trancheType);
    if(ca!==cb)return ca-cb;
    if(a.ticker!==b.ticker)return a.ticker<b.ticker?-1:1;
    const ad=a.buyDate||"\uffff",bd=b.buyDate||"\uffff";
    return ad<bd?-1:ad>bd?1:0;
  });
  // 5. Build CSV (no spaces after commas; quote notes only when needed)
  let csv="portfolio,ticker,stockType,trancheType,shares,buyPrice,buyDate,notes\n";
  rows.forEach(r=>{
    csv+=`${r.portfolio},${r.ticker},${r.stockType},${r.trancheType},${r.shares},${r.buyPrice},${r.buyDate},${q(r.notes)}\n`;
  });
  dlFile("holdings_"+dateStr()+".csv",csv,"text/csv");
}

// Modal: validation errors (no partial import on failure)
function showHoldingsErrorModal(errors){
  const existing=document.getElementById("holdings-modal-overlay");
  if(existing)existing.remove();
  const overlay=document.createElement("div");
  overlay.id="holdings-modal-overlay";
  overlay.className="diff-overlay";
  let body=`<div style="padding:14px 4px"><div style="font-size:13px;color:var(--red);margin-bottom:10px;line-height:1.45"><strong>${errors.length} validation error${errors.length!==1?"s":""}</strong> — no rows were imported. Fix the CSV and try again.</div>`;
  errors.slice(0,40).forEach(err=>{
    body+=`<div class="diff-stock"><div class="diff-stock-hdr"><span class="diff-stock-ticker">Line ${err.line}</span><span class="diff-stock-name">${esc(err.msg)}</span></div></div>`;
  });
  if(errors.length>40)body+=`<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px">…and ${errors.length-40} more</div>`;
  body+="</div>";
  overlay.innerHTML=`<div class="diff-modal">
    <div class="diff-modal-header"><h2>Holdings Import Failed</h2><span class="diff-summary">${errors.length} error${errors.length!==1?"s":""}</span></div>
    <div class="diff-modal-body">${body}</div>
    <button class="diff-dismiss" onclick="document.getElementById('holdings-modal-overlay').remove()">Close</button></div>`;
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

// Compact cash formatter (uses currency code, not GBp pence convention)
function _fmtCash(v,ccy){
  if(v==null)return"—";
  const n=Number(v);
  if(ccy==="EUR")return"€"+n.toLocaleString("en",{maximumFractionDigits:0});
  if(ccy==="GBP")return"£"+n.toLocaleString("en",{maximumFractionDigits:0});
  if(ccy==="CAD")return"C$"+n.toLocaleString("en",{maximumFractionDigits:0});
  if(ccy==="JPY")return"¥"+n.toLocaleString("en",{maximumFractionDigits:0});
  return"$"+n.toLocaleString("en",{maximumFractionDigits:0});
}

// Compute holdings diff: compares current state vs proposed (parsed) state.
// Returns {diff:{stocks,index,cash}, totals:{stocks,index,cash,total}}.
function _computeHoldingsDiff(parsed){
  const after={personal:{stocks:{},index:{us:null,eu:null},cash:{}},nl:{stocks:{},index:{us:null,eu:null},cash:{}}};
  Object.keys(after).forEach(pk=>HOLDINGS_CASH_CCYS.forEach(c=>after[pk].cash[c]=0));
  const indexAgg={};
  parsed.forEach(row=>{
    const {pfKey,ticker,tt,shares,buyPrice,buyDate,notes}=row;
    if(!after[pfKey])return;
    const a=after[pfKey];
    if(tt==="index"){
      const region=_indexRegionForTicker(ticker,pfKey);
      if(!region)return;
      const k=pfKey+":"+region;
      if(!indexAgg[k])indexAgg[k]={shares:0,costSum:0};
      indexAgg[k].shares+=shares;
      indexAgg[k].costSum+=shares*buyPrice;
      return;
    }
    if(tt==="cash"){a.cash[ticker]=(a.cash[ticker]||0)+shares;return;}
    const sig=_trancheTypeToSignal(tt,ticker);
    if(!a.stocks[ticker])a.stocks[ticker]=[];
    a.stocks[ticker].push({signal:sig,shares,buyPrice,buyDate:buyDate||null,notes:notes||""});
  });
  Object.entries(indexAgg).forEach(([k,agg])=>{
    const [pk,r]=k.split(":");
    after[pk].index[r]={shares:agg.shares,avgCost:agg.shares>0?+(agg.costSum/agg.shares).toFixed(4):0};
  });
  // Build "before" snapshot from current portfolios
  const before={personal:{stocks:{},index:{us:null,eu:null},cash:{}},nl:{stocks:{},index:{us:null,eu:null},cash:{}}};
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    HOLDINGS_CASH_CCYS.forEach(c=>before[pk].cash[c]=pf["dp"+c]||0);
    Object.entries(pf.positions||{}).forEach(([t,pos])=>{
      const trs=(pos.tranches||[]).filter(tr=>((tr.bought||0)-(tr.sold||0))>0);
      if(trs.length)before[pk].stocks[t]=trs.map(tr=>({signal:tr.signal,shares:(tr.bought||0)-(tr.sold||0),buyPrice:tr.buyPrice,buyDate:tr.buyDate||null,notes:tr.notes||""}));
    });
    ["us","eu"].forEach(r=>{const ip=getIndexPos(pk,r);if(ip&&ip.shares>0)before[pk].index[r]={shares:ip.shares,avgCost:ip.avgCost};});
  });
  // Compute diff per portfolio
  const out={stocks:{personal:[],nl:[]},index:{personal:[],nl:[]},cash:{personal:[],nl:[]}};
  ["personal","nl"].forEach(pk=>{
    const tickers=new Set([...Object.keys(before[pk].stocks),...Object.keys(after[pk].stocks)]);
    [...tickers].sort().forEach(t=>{
      const b=before[pk].stocks[t]||null;
      const a=after[pk].stocks[t]||null;
      if(!b&&a)out.stocks[pk].push({ticker:t,kind:"new",before:null,after:a});
      else if(b&&!a)out.stocks[pk].push({ticker:t,kind:"removed",before:b,after:null});
      else{
        // Canonical key (sorted) for tranche-list equality
        const key=trs=>trs.slice().map(tr=>`${tr.signal}|${(+tr.shares).toFixed(6)}|${(+tr.buyPrice).toFixed(6)}|${tr.buyDate||""}|${tr.notes||""}`).sort().join(";");
        if(key(b)!==key(a))out.stocks[pk].push({ticker:t,kind:"changed",before:b,after:a});
      }
    });
    ["us","eu"].forEach(r=>{
      const b=before[pk].index[r],a=after[pk].index[r];
      if(!b&&a)out.index[pk].push({region:r,kind:"new",before:null,after:a});
      else if(b&&!a)out.index[pk].push({region:r,kind:"removed",before:b,after:null});
      else if(b&&a){
        const ds=Math.abs(b.shares-a.shares),dc=Math.abs((b.avgCost||0)-(a.avgCost||0));
        if(ds>0.0001||dc>0.005)out.index[pk].push({region:r,kind:"changed",before:b,after:a});
      }
    });
    HOLDINGS_CASH_CCYS.forEach(c=>{
      const bv=before[pk].cash[c]||0,av=after[pk].cash[c]||0;
      if(Math.abs(bv-av)>0.005)out.cash[pk].push({ccy:c,before:bv,after:av,kind:bv===0?"new":(av===0?"removed":"changed")});
    });
  });
  let s=0,ix=0,csh=0;
  ["personal","nl"].forEach(pk=>{s+=out.stocks[pk].length;ix+=out.index[pk].length;csh+=out.cash[pk].length;});
  return{diff:out,totals:{stocks:s,index:ix,cash:csh,total:s+ix+csh}};
}

// Diff preview modal (replaces simple confirm modal). User reviews changes, then Apply or Cancel.
function showHoldingsDiffModal(parsed,warnings,applyFn){
  const existing=document.getElementById("holdings-modal-overlay");
  if(existing)existing.remove();
  const {diff,totals}=_computeHoldingsDiff(parsed);
  const overlay=document.createElement("div");
  overlay.id="holdings-modal-overlay";
  overlay.className="diff-overlay";
  // Header summary line
  const sumParts=[];
  if(totals.stocks)sumParts.push(`${totals.stocks} stock${totals.stocks!==1?"s":""}`);
  if(totals.index)sumParts.push(`${totals.index} index`);
  if(totals.cash)sumParts.push(`${totals.cash} cash`);
  const summary=totals.total>0?sumParts.join(" · ")+" change"+(totals.total!==1?"s":""):"No changes";
  // Body: per-portfolio sections
  let body="";
  ["personal","nl"].forEach(pk=>{
    const pfLabel=pk==="personal"?"🧑 Personal":"🧓 Caca";
    const stockChanges=diff.stocks[pk],indexChanges=diff.index[pk],cashChanges=diff.cash[pk];
    if(!stockChanges.length&&!indexChanges.length&&!cashChanges.length)return;
    body+=`<div class="diff-section-hdr">${pfLabel}</div>`;
    // Stock-level changes
    stockChanges.forEach(c=>{
      const s=stocks[c.ticker];
      const ccy=s?.currency||"USD";
      const flag=s?.flag||"";
      const badge=c.kind==="new"?`<span class="diff-stock-badge new">NEW</span>`:c.kind==="removed"?`<span class="diff-stock-badge removed">REMOVED</span>`:`<span class="diff-stock-badge changed">CHANGED</span>`;
      const cardClass=c.kind==="new"?"diff-new":(c.kind==="removed"?"diff-removed":"");
      // Build canonical keys to mark unchanged tranche lines
      const trKey=tr=>`${tr.signal}|${(+tr.shares).toFixed(6)}|${(+tr.buyPrice).toFixed(6)}|${tr.buyDate||""}|${tr.notes||""}`;
      const beforeKeys=new Set((c.before||[]).map(trKey));
      const afterKeys=new Set((c.after||[]).map(trKey));
      const fmtTr=(tr,cls)=>`<div class="diff-tranche-line ${cls}">${cls==="added"?"+ ":cls==="removed"?"− ":"  "}${esc(tr.signal)} · ${fmtSh(tr.shares)} × ${fmt(tr.buyPrice,ccy)}${tr.notes?` · <span style="opacity:.7">${esc(tr.notes)}</span>`:""}</div>`;
      const sumLine=(lbl,trs)=>{const totSh=trs.reduce((s,tr)=>s+tr.shares,0);const totCost=trs.reduce((s,tr)=>s+tr.shares*tr.buyPrice,0);return `<div class="diff-tranche-summary">${lbl}: ${trs.length} tranche${trs.length!==1?"s":""} · ${fmtSh(totSh)} sh · ${fmt(totCost,ccy)}</div>`;};
      let tHTML="";
      if(c.kind==="new"){
        tHTML+=sumLine("New",c.after);
        tHTML+=`<div class="diff-tranche-list">${c.after.map(tr=>fmtTr(tr,"added")).join("")}</div>`;
      }else if(c.kind==="removed"){
        tHTML+=sumLine("Removed",c.before);
        tHTML+=`<div class="diff-tranche-list">${c.before.map(tr=>fmtTr(tr,"removed")).join("")}</div>`;
      }else{
        // Changed: show before list with unchanged in muted, removed in red
        tHTML+=sumLine("Before",c.before);
        tHTML+=`<div class="diff-tranche-list">${c.before.map(tr=>fmtTr(tr,afterKeys.has(trKey(tr))?"same":"removed")).join("")}</div>`;
        tHTML+=sumLine("After",c.after);
        tHTML+=`<div class="diff-tranche-list">${c.after.map(tr=>fmtTr(tr,beforeKeys.has(trKey(tr))?"same":"added")).join("")}</div>`;
      }
      body+=`<div class="diff-stock ${cardClass}"><div class="diff-stock-hdr"><span class="diff-stock-ticker">${flag} ${c.ticker}</span><span class="diff-stock-name">${esc(s?.name||c.ticker)}</span>${badge}</div>${tHTML}</div>`;
    });
    // Index-leg changes
    indexChanges.forEach(c=>{
      const region=c.region.toUpperCase();
      const ticker=indexTickerForPf(pk,c.region);
      const ccy=c.region==="us"?"USD":"EUR";
      const beforeStr=c.before?`${fmtSh(c.before.shares)} sh @ ${fmt(c.before.avgCost,ccy)}`:"—";
      const afterStr=c.after?`${fmtSh(c.after.shares)} sh @ ${fmt(c.after.avgCost,ccy)}`:"—";
      const badge=c.kind==="new"?`<span class="diff-stock-badge new">NEW</span>`:c.kind==="removed"?`<span class="diff-stock-badge removed">REMOVED</span>`:`<span class="diff-stock-badge changed">CHANGED</span>`;
      body+=`<div class="diff-stock"><div class="diff-stock-hdr"><span class="diff-stock-ticker">🌍 ${ticker}</span><span class="diff-stock-name">Index ${region}</span>${badge}</div><div class="diff-changes"><span class="diff-chip"><span class="diff-old">${beforeStr}</span><span class="diff-arrow">→</span><span class="diff-new-val">${afterStr}</span></span></div></div>`;
    });
    // Cash-leg changes (grouped into single card per portfolio)
    if(cashChanges.length){
      let chips="";
      cashChanges.forEach(c=>{chips+=`<span class="diff-chip"><span class="diff-field">${c.ccy}:</span><span class="diff-old">${_fmtCash(c.before,c.ccy)}</span><span class="diff-arrow">→</span><span class="diff-new-val">${_fmtCash(c.after,c.ccy)}</span></span>`;});
      body+=`<div class="diff-stock"><div class="diff-stock-hdr"><span class="diff-stock-ticker">💵 Cash</span><span class="diff-stock-name">Dry powder per currency</span><span class="diff-stock-badge changed">CHANGED</span></div><div class="diff-changes">${chips}</div></div>`;
    }
  });
  if(!body)body=`<div class="diff-no-changes">No changes detected — imported CSV matches current state exactly.</div>`;
  // Warnings panel (orphan tickers, unmatched index legs, etc.)
  let warnHTML="";
  if(warnings&&warnings.length){
    warnHTML=`<div class="diff-section-hdr" style="color:var(--amber);border-top:1px solid var(--border);padding-top:10px;margin-top:14px">⚠ Warnings (${warnings.length})</div>`;
    warnings.slice(0,15).forEach(w=>{warnHTML+=`<div class="diff-chip" style="display:block;margin:3px 0;background:var(--bg)"><span class="diff-field">Line ${w.line}:</span> ${esc(w.msg)}</div>`;});
    if(warnings.length>15)warnHTML+=`<div style="font-size:10px;color:var(--muted);margin-top:4px;padding-left:4px">…and ${warnings.length-15} more</div>`;
  }
  const footer=totals.total>0?
    `<div style="display:flex;border-top:1px solid var(--border)">
      <button class="diff-dismiss" style="border-right:1px solid var(--border);color:var(--muted)" id="holdings-cancel-btn">Cancel</button>
      <button class="diff-dismiss" style="color:var(--amber)" id="holdings-apply-btn">Apply Changes</button>
    </div>`:
    `<button class="diff-dismiss" id="holdings-cancel-btn">Close</button>`;
  overlay.innerHTML=`<div class="diff-modal">
    <div class="diff-modal-header"><h2>Holdings Import Preview</h2><span class="diff-summary">${summary}</span></div>
    <div class="diff-modal-body">${body}${warnHTML}</div>
    ${footer}</div>`;
  document.body.appendChild(overlay);
  document.getElementById("holdings-cancel-btn").onclick=()=>overlay.remove();
  const applyBtn=document.getElementById("holdings-apply-btn");
  if(applyBtn)applyBtn.onclick=()=>{overlay.remove();applyFn();};
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
}

    if(warns.length>20)warnHTML+=`<div style="font-size:10px;color:var(--muted);margin-top:4px">…and ${warns.length-20} more</div>`;
    warnHTML+=`</div>`;
  }
  overlay.innerHTML=`<div class="diff-modal" style="max-width:440px">
    <div class="diff-modal-header"><h2>Holdings Imported</h2><span class="diff-summary">${stats.imported} tranche${stats.imported!==1?"s":""}</span></div>
    <div class="diff-modal-body" style="padding:16px 18px">
      <div style="font-size:13px;line-height:1.6">
        <div>🧑 Personal: <strong>${stats.personal}</strong> stock tranche${stats.personal!==1?"s":""}${stats.personalIndex?` + ${stats.personalIndex} index leg${stats.personalIndex!==1?"s":""}`:""}${stats.personalCash?` + ${stats.personalCash} cash leg${stats.personalCash!==1?"s":""}`:""}</div>
        <div>🧓 Caca: <strong>${stats.caca}</strong> stock tranche${stats.caca!==1?"s":""}${stats.cacaIndex?` + ${stats.cacaIndex} index leg${stats.cacaIndex!==1?"s":""}`:""}${stats.cacaCash?` + ${stats.cacaCash} cash leg${stats.cacaCash!==1?"s":""}`:""}</div>
      </div>
      ${warnHTML}
    </div>
    <button class="diff-dismiss" onclick="document.getElementById('holdings-modal-overlay').remove()">Done</button></div>`;
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

function handleHoldingsCSVImport(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(ev){
    // FIX v3.44: parseCSVText handles embedded newlines inside quoted notes;
    // the previous split(/\r?\n/) approach truncated any row whose notes value
    // contained a literal newline and could spawn phantom ticker rows.
    const rows=parseCSVText(ev.target.result);
    if(rows.length<2){alert("Empty CSV — needs header row + at least one data row.");e.target.value="";return;}
    const REQUIRED=["portfolio","ticker","tranchetype","shares","buyprice"];
    const hdr=rows[0].map(h=>h.toLowerCase());
    const missing=REQUIRED.filter(c=>!hdr.includes(c));
    if(missing.length){
      showHoldingsErrorModal([{line:1,msg:`Header missing required column${missing.length>1?"s":""}: ${missing.join(", ")}. Expected: portfolio,ticker,stockType,trancheType,shares,buyPrice,buyDate,notes`}]);
      e.target.value="";return;
    }
    const idx=name=>hdr.indexOf(name);
    const iPf=idx("portfolio"),iTk=idx("ticker"),iSt=idx("stocktype"),iTt=idx("tranchetype"),iSh=idx("shares"),iBp=idx("buyprice"),iBd=idx("buydate"),iNo=idx("notes");
    const errors=[],warnings=[],parsed=[];
    for(let i=1;i<rows.length;i++){
      const cells=rows[i];
      const lineNo=i+1; // 1-indexed file line (approximate after multi-line cells)
      const pfRaw=(cells[iPf]||"").toLowerCase();
      const ticker=(cells[iTk]||"").toUpperCase();
      const tt=cells[iTt]||"";
      const stRaw=iSt>=0?String(cells[iSt]||"").trim().toLowerCase():"";
      // stockType is optional (older CSVs omit it). Validate only when present.
      if(stRaw&&!HOLDINGS_STOCK_TYPES.includes(stRaw)){
        errors.push({line:lineNo,msg:`Invalid stockType "${stRaw}" — must be one of: ${HOLDINGS_STOCK_TYPES.join(", ")}`});continue;
      }
      const shStr=cells[iSh]||"";
      const bpStr=cells[iBp]||"";
      const bdStr=iBd>=0?(cells[iBd]||""):"";
      const notes=iNo>=0?(cells[iNo]||""):"";
      // Validate portfolio
      if(!_PF_CSV_TO_KEY[pfRaw]){errors.push({line:lineNo,msg:`Invalid portfolio "${pfRaw}" — must be "personal" or "caca"`});continue;}
      // Validate ticker
      if(!ticker){errors.push({line:lineNo,msg:"Missing ticker"});continue;}
      // Validate trancheType
      if(!HOLDINGS_TRANCHE_TYPES.includes(tt)){errors.push({line:lineNo,msg:`Invalid trancheType "${tt}" — must be one of: ${HOLDINGS_TRANCHE_TYPES.join(", ")}`});continue;}
      // Validate shares
      const shares=Number(shStr);
      if(!isFinite(shares)||shares<=0){errors.push({line:lineNo,msg:`Invalid shares "${shStr}" — must be a positive number`});continue;}
      // Validate buyPrice — required > 0 for everything except cash (where it's a placeholder; empty/0/1 all accepted)
      let buyPrice;
      if(tt==="cash"){
        buyPrice=bpStr===""?1:Number(bpStr);
        if(!isFinite(buyPrice))buyPrice=1; // tolerate garbage in placeholder column for cash rows
      }else{
        buyPrice=Number(bpStr);
        if(!isFinite(buyPrice)||buyPrice<=0){errors.push({line:lineNo,msg:`Invalid buyPrice "${bpStr}" — must be a positive number`});continue;}
      }
      // Cash rows: ticker must be a supported currency code
      if(tt==="cash"&&!HOLDINGS_CASH_CCYS.includes(ticker)){
        errors.push({line:lineNo,msg:`Invalid cash currency "${ticker}" — must be one of: ${HOLDINGS_CASH_CCYS.join(", ")}`});continue;
      }
      // Validate buyDate (optional)
      let buyDate=null;
      if(bdStr){
        const d=new Date(bdStr);
        if(isNaN(d)){errors.push({line:lineNo,msg:`Invalid buyDate "${bdStr}" — must be YYYY-MM-DD or empty`});continue;}
        buyDate=d.getTime();
      }
      const pfKey=_PF_CSV_TO_KEY[pfRaw];
      // Orphan ticker check (warn only; skip for index + cash rows since their tickers aren't in stocks{})
      if(tt!=="index"&&tt!=="cash"&&!stocks[ticker]){
        warnings.push({line:lineNo,msg:`Ticker "${ticker}" not found in triggers data (orphan — kept anyway)`});
      }
      parsed.push({lineNo,pfKey,pfRaw,ticker,st:stRaw,tt,shares,buyPrice,buyDate,notes});
    }
    if(errors.length){showHoldingsErrorModal(errors);e.target.value="";return;}
    if(!parsed.length){showHoldingsErrorModal([{line:0,msg:"No valid rows found in CSV."}]);e.target.value="";return;}
    showHoldingsDiffModal(parsed,warnings,()=>{
      _applyHoldingsImport(parsed,warnings);
    });
    e.target.value="";
  };
  r.readAsText(f);
}

// Apply parsed holdings import: replaces all positions across both portfolios with the imported set.
// Index rows go to pf.indexPositions[us|eu] aggregates. Risk rows auto-add ticker to pf.riskStocks.
function _applyHoldingsImport(parsed,warnings){
  const stats={imported:parsed.length,personal:0,caca:0,personalIndex:0,cacaIndex:0,personalCash:0,cacaCash:0,warnings:warnings||[]};
  // 1. Wipe all existing stock positions, zero out index legs, zero per-currency dry powder
  //    (preserve currency/currentPrice/lastUpdate metadata on index legs)
  Object.keys(portfolios).forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    pf.positions={};
    ["us","eu"].forEach(r=>{
      const ip=getIndexPos(pk,r); // ensures it exists
      ip.shares=0;ip.avgCost=0;
    });
    HOLDINGS_CASH_CCYS.forEach(ccy=>{pf["dp"+ccy]=0;});
  });
  // 1.5 (v3.96) PRE-PASS: set framework classification from the stockType column BEFORE building
  // tranches, so _trancheTypeToSignal sees the correct category (20Cap vs 10Cap etc.) regardless of
  // row order. Only rebuild risk membership when at least one row carries an explicit stockType
  // (i.e. a v3.96+ CSV); legacy CSVs fall back to per-tranche risk handling in the main loop.
  const _hasStockTypeCol=parsed.some(r=>r.st);
  if(_hasStockTypeCol){
    // Clear risk membership for the portfolios being imported; it's rebuilt from stockType below.
    Object.keys(portfolios).forEach(pk=>{if(portfolios[pk])portfolios[pk].riskStocks=[];});
  }
  parsed.forEach(row=>{
    const {pfKey,ticker,st,tt}=row;
    if(tt==="index"||tt==="cash"||!ticker)return;
    if(!stocks[ticker])_ensureStockEntry(ticker);
    if(!stocks[ticker])return;
    if(st==="buffett")stocks[ticker].category="buffett";
    else if(st==="highgr")stocks[ticker].category="highgr";
    else if(st==="phil_town"||st==="risk")delete stocks[ticker].category; // risk stocks have no buffett/highgr category
    if(st==="risk"){
      const pf=portfolios[pfKey];if(!pf)return;
      if(!pf.riskStocks)pf.riskStocks=[];
      if(!pf.riskStocks.includes(ticker))pf.riskStocks.push(ticker);
      if(pf.gridStocks&&pf.gridStocks.includes(ticker))pf.gridStocks=pf.gridStocks.filter(x=>x!==ticker);
    }
  });
  // 2. Pre-aggregate index rows by (pfKey, region) for weighted-average cost; cash rows accumulate per (pfKey, ccy)
  // Stock tranches are appended directly.
  const indexAgg={}; // key: pk+":"+region → {shares,costSum}
  parsed.forEach(row=>{
    const {pfKey,ticker,st,tt,shares,buyPrice,buyDate,notes}=row;
    const pf=portfolios[pfKey];if(!pf)return;
    const csvPf=_PF_KEY_TO_CSV[pfKey];
    if(tt==="index"){
      const region=_indexRegionForTicker(ticker,pfKey);
      if(!region){
        warnings.push({line:row.lineNo,msg:`Index ticker "${ticker}" did not match a configured index leg — row skipped`});
        return;
      }
      const key=pfKey+":"+region;
      if(!indexAgg[key])indexAgg[key]={shares:0,costSum:0};
      indexAgg[key].shares+=shares;
      indexAgg[key].costSum+=shares*buyPrice;
      if(csvPf==="personal")stats.personalIndex++;else stats.cacaIndex++;
      return;
    }
    if(tt==="cash"){
      // ticker is the currency code (validated earlier). Multiple cash rows for same ccy accumulate.
      pf["dp"+ticker]=(pf["dp"+ticker]||0)+shares;
      if(csvPf==="personal")stats.personalCash++;else stats.cacaCash++;
      return;
    }
    // Stock tranche
    // Auto-create skeleton stocks{} entry if missing. Without this, the auto IBKR sync
    // cleanup would silently delete this position because the resolver can't map it.
    // The skeleton has no triggers yet — fill in via triggers CSV import or manual edit.
    if(_ensureStockEntry(ticker)){
      if(!stats.newStocks)stats.newStocks=[];
      stats.newStocks.push(ticker);
    }
    if(!pf.positions[ticker])pf.positions[ticker]={tranches:[]};
    const sig=_trancheTypeToSignal(tt,ticker);
    const tr={signal:sig,bought:shares,sold:0,buyPrice,state:"accumulating"};
    if(buyDate)tr.buyDate=buyDate;
    if(notes)tr.notes=notes;
    pf.positions[ticker].tranches.push(tr);
    // Classification handled in the pre-pass (step 1.5) when stockType is present. For LEGACY CSVs
    // without a stockType column, fall back to the old behavior: a "risk" tranche type implies the
    // ticker is a risk-bucket holding in that portfolio.
    if(!st&&tt==="risk"){
      if(!pf.riskStocks)pf.riskStocks=[];
      if(!pf.riskStocks.includes(ticker))pf.riskStocks.push(ticker);
      if(pf.gridStocks&&pf.gridStocks.includes(ticker))pf.gridStocks=pf.gridStocks.filter(x=>x!==ticker);
    }
    if(csvPf==="personal")stats.personal++;else stats.caca++;
  });
  // 3. Apply aggregated index legs (weighted-avg cost across all rows for that leg)
  Object.entries(indexAgg).forEach(([key,agg])=>{
    const [pk,region]=key.split(":");
    const ip=getIndexPos(pk,region);
    ip.shares=agg.shares;
    ip.avgCost=agg.shares>0?+(agg.costSum/agg.shares).toFixed(4):0;
  });
  // 4. Recalculate aggregate dryPowder from per-currency values (uses current FX rates)
  ["personal","nl"].forEach(pk=>{if(typeof recalcDP==="function")recalcDP(pk);});
  // 5. Refresh signals for all imported tickers (so trigger states reflect current price)
  Object.keys(stocks).forEach(t=>updateSignals(t));
  // 6. Persist + re-render
  save();scheduleTrancheSync();render();
  showHoldingsSuccessModal(stats);
}

function handleExcelImport(e){
  const f=e.target.files[0];if(!f)return;
  if(typeof XLSX==="undefined"){alert("SheetJS loading... try again.");e.target.value="";return;}
  if(!confirm("This will overwrite stocks, positions & settings with the Excel file. Continue?")){e.target.value="";return;}
  const r=new FileReader();
  r.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:"array"});
      let nStocks=0,nPos=0,nSet=0;
      const vn=x=>(x!=null&&x!=="")?Number(x):null;
      const beforeSnap=snapshotStocks();

      // Sheet 1: Stocks — update or create
      if(wb.SheetNames.includes("Stocks")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Stocks"]);
        // Detect whether the sheet has a "category" column at all by reading the header row directly.
        // sheet_to_json drops empty cells, so we can't infer column presence from the row objects when
        // every row's category cell is blank. Read row 1 with header:1 → array of header names.
        const _hdr=XLSX.utils.sheet_to_json(wb.Sheets["Stocks"],{header:1,range:0})[0]||[];
        const hasCategoryCol=_hdr.map(h=>String(h||"").toLowerCase()).includes("category");
        rows.forEach(row=>{
          const t=String(row.ticker||"").toUpperCase().trim();if(!t)return;
          if(stocks[t]){
            const s=stocks[t];
            if(row.name!=null)s.name=String(row.name);
            if(row.currency!=null)s.currency=String(row.currency);
            if(row.moat!=null)s.moat=String(row.moat);
            if(row.status!=null)s.status=String(row.status);
            if(row.tdSymbol!=null)s.tdSymbol=String(row.tdSymbol);
            if(row.finnhubSymbol!=null&&row.finnhubSymbol!=="")s.finnhubSymbol=String(row.finnhubSymbol);
            if(row.currentPrice!=null)s.currentPrice=vn(row.currentPrice)??s.currentPrice;
            s.cons.mos=vn(row.mos);s.cons.tenCap=vn(row.tenCap);
            s.cons.pbt=vn(row.pbt);s.cons.pbtYrs=vn(row.pbtYrs);s.cons.gr=vn(row.gr);
            s.cons.oe=vn(row.oe);s.cons.fcf=vn(row.fcf);
            s.cons.eps=vn(row.eps);s.cons.pe=vn(row.pe);
            if(row.prevSticker!=null)s.cons.prevSticker=vn(row.prevSticker);
            if(row.gate!=null)s.gate=String(row.gate)==="FAIL"?false:true;
            if(row.specReason!=null)s.specReason=String(row.specReason);
            if(row.specDate!=null)s.specDate=vn(row.specDate);
            if(row.notes!=null&&row.notes!=="")s.notes=String(row.notes);else if(row.notes==="")delete s.notes;
            if(row.priority!=null)s.priority=vn(row.priority);
            if(row.compounderPriority!=null)s.compounderPriority=vn(row.compounderPriority);
            // Stage F (v3.69): tripwire firing flags. Excel restore reads same Y/string sentinel as CSV.
            [["t1Firing","t1Firing"],["t3Firing","t3Firing"],["t6Firing","t6Firing"]].forEach(([col,key])=>{
              if(row[col]!=null){
                const raw=String(row[col]||"").toUpperCase().trim();
                const fires=raw==="Y"||raw==="YES"||raw==="TRUE"||raw==="1";
                if(fires)s[key]=true;else delete s[key];
              }
            });
            // Category: "buffett"/"highgr" → set; empty cell in present column → clear; column absent → preserve.
            // MUST happen before recalcConsTriggers below so highgr formulas apply.
            if(hasCategoryCol){const cat=String(row.category||"").trim().toLowerCase();if(cat==="buffett")s.category="buffett";else if(cat==="highgr")s.category="highgr";else delete s.category;}
            // Auto-calc chain: eps+gr+pe → sticker+mos
            applyRecalcSticker(s);
            // Auto-calc tenCap + pbt (category-aware: highgr → 20Cap/DMOS)
            recalcConsTriggers(s);
            // If no eps/pe auto-calc, derive sticker from manual MOS
            if(s.cons.eps==null||s.cons.pe==null){s.cons.sticker=s.cons.mos?s.cons.mos*2:(vn(row.sticker)||null);}
            else{s.cons.sticker=s.cons.mos?s.cons.mos*2:s.cons.sticker;}
            if(row.sector!=null&&row.sector!=="")s.sector=String(row.sector);
            // Trigger freshness: read lastCalcDate from sheet, default to now if absent
            if(row.lastCalcDate){const d=new Date(row.lastCalcDate);s.lastCalcDate=isNaN(d)?Date.now():d.getTime();}
            else{s.lastCalcDate=Date.now();}
            // Earnings date: read from sheet (independent of lastCalcDate)
            if(row.earningsDate){const d=new Date(row.earningsDate);s.earningsDate=isNaN(d)?null:d.getTime();}
            if(row.philSticker!=null||row.philGR!=null){
              s.phil={sticker:vn(row.philSticker),mos:vn(row.philMOS),tenCap:vn(row.philTenCap),
                pbt:vn(row.philPBT),gr:vn(row.philGR),score:row.philScore?String(row.philScore):null};}
          }else{
            const ccy=String(row.currency||"USD");const flags={USD:"🇺🇸",EUR:"🇪🇺",GBp:"🇬🇧",CAD:"🇨🇦",JPY:"🇯🇵"};
            let mos=vn(row.mos);const eps=vn(row.eps);const pe=vn(row.pe);const gr=vn(row.gr);
            const rc=recalcSticker(eps,gr,pe);if(rc)mos=rc.mos;
            let tc=vn(row.tenCap);const oe=vn(row.oe);if(oe!=null)tc=+(oe*10).toFixed(2);
            let pbt=vn(row.pbt);const fcf=vn(row.fcf);if(fcf!=null&&gr!=null){const g=gr/100;let sum=0;for(let y=1;y<=8;y++)sum+=fcf*Math.pow(1+g,y);pbt=+sum.toFixed(2);}
            const catRaw=row.category!=null?String(row.category).trim().toLowerCase():"";
            stocks[t]={name:String(row.name||t),currency:ccy,moat:String(row.moat||"Wide"),sector:String(row.sector||""),
              flag:flags[ccy]||"🌍",status:String(row.status||"watchlist"),tdSymbol:String(row.tdSymbol||t),
              finnhubSymbol:row.finnhubSymbol?String(row.finnhubSymbol):undefined,
              priceMult:1,currentPrice:vn(row.currentPrice)||0,gate:String(row.gate||"")==="FAIL"?false:true,
              cons:{sticker:rc?rc.sticker:(mos?mos*2:(vn(row.sticker)||null)),mos:mos,tenCap:tc,pbt:pbt,pbtYrs:vn(row.pbtYrs),gr:gr,oe:oe,fcf:fcf,eps:eps,pe:pe,prevSticker:vn(row.prevSticker)||null},
              phil:null,signals:{mos:false,tenCap:false,pbt:false},
              specReason:row.specReason?String(row.specReason):undefined,specDate:vn(row.specDate)||undefined,
              notes:row.notes?String(row.notes):undefined,
              lastCalcDate:row.lastCalcDate?new Date(row.lastCalcDate).getTime():Date.now(),
              earningsDate:row.earningsDate?(isNaN(new Date(row.earningsDate))?null:new Date(row.earningsDate).getTime()):null,
              priority:vn(row.priority)||null,
              compounderPriority:vn(row.compounderPriority)||null};
            if(catRaw==="buffett")stocks[t].category="buffett";
            // Stage F (v3.69): seed tripwire firing flags on new-stock Excel restore.
            [["t1Firing","t1Firing"],["t3Firing","t3Firing"],["t6Firing","t6Firing"]].forEach(([col,key])=>{
              const raw=String(row[col]||"").toUpperCase().trim();
              if(raw==="Y"||raw==="YES"||raw==="TRUE"||raw==="1")stocks[t][key]=true;
            });
            // Restore Phil (Toolbox) data for new stocks
            if(row.philSticker!=null||row.philGR!=null){
              stocks[t].phil={sticker:vn(row.philSticker),mos:vn(row.philMOS),tenCap:vn(row.philTenCap),
                pbt:vn(row.philPBT),gr:vn(row.philGR),score:row.philScore?String(row.philScore):null};}
          }
          updateSignals(t);nStocks++;
        });
      }

      // Sheet 2: Positions — parse first, then replace
      if(wb.SheetNames.includes("Positions")){

        if(rows.length>0){

          const newPos={};Object.keys(portfolios).forEach(pk=>{newPos[pk]={};});
          rows.forEach(row=>{

            // Skip reserve-only placeholder rows (synthesized when position has mosReserve but no real tranches)

            newPos[pk][t].tranches.push({
              signal:String(row.signal||"PBT"),bought:Number(row.bought)||0,

      // Sheet 3: Settings
      const gridKeysSeen={personal:false,nl:false};

          if(k==="dpEUR_personal"&&!empty(val))portfolios.personal.dpEUR=Number(val);
