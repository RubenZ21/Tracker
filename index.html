// Validate and save the Add/Edit modal contents. Returns nothing — closes modal on success.
function rlHandleSave(originalEntry,ov){
  const errBox=document.getElementById("rl-edit-err");
  const showErr=(msg)=>{errBox.className="rl-validation-err";errBox.style.display="block";errBox.textContent=msg;};
  const ticker=(document.getElementById("rl-ticker").value||"").trim().toUpperCase();
  const name=(document.getElementById("rl-name").value||"").trim();
  const currency=document.getElementById("rl-ccy").value;
  const priority=parseFloat(document.getElementById("rl-pri").value);
  const reasoning=(document.getElementById("rl-reasoning").value||"").trim();
  const notes=(document.getElementById("rl-notes").value||"").trim();
  if(!ticker){showErr("Ticker is required.");return;}
  if(!name){showErr("Name is required.");return;}
  if(isNaN(priority)){showErr("Priority is required (decimal allowed).");return;}
  if(!reasoning){showErr("Reasoning is required — explain why these three prices are correct.");return;}
  const t1=parseFloat(document.getElementById("rl-trig1").value);
  const t2=parseFloat(document.getElementById("rl-trig2").value);
  const t3=parseFloat(document.getElementById("rl-trig3").value);
  if(isNaN(t1)||isNaN(t2)||isNaN(t3)){showErr("All three trigger prices are required.");return;}
  if(t1<t2){showErr("Trigger 1 must be ≥ Trigger 2.");return;}
  if(t2<t3){showErr("Trigger 2 must be ≥ Trigger 3.");return;}
  const s1=parseFloat(document.getElementById("rl-size1").value)||0;
  const s2=parseFloat(document.getElementById("rl-size2").value)||0;
  const s3=parseFloat(document.getElementById("rl-size3").value)||0;
  if(s1<=0||s2<=0||s3<=0){showErr("All three tranche sizes must be > 0.");return;}
  if(s1+s2+s3>5.0){showErr("Total size ("+(s1+s2+s3).toFixed(2)+"%) exceeds 5% cap.");return;}
  // For edits: if a fired tranche's trigger is being changed, confirm.
  if(originalEntry){
    for(let i=1;i<=3;i++){
      const newTrig=[t1,t2,t3][i-1];
      if(originalEntry["fired"+i]&&originalEntry["trigger"+i]!==newTrig){
        if(!confirm(`Tranche ${i} fired at ${fmt(originalEntry["firedPrice"+i],currency)} on ${originalEntry["firedDate"+i]}. Are you sure you want to change its trigger price from ${fmt(originalEntry["trigger"+i],currency)} to ${fmt(newTrig,currency)}?`))return;
      }
    }
  }
  // Build/update entry. Preserve fired metadata on edit.
  if(originalEntry){
    Object.assign(originalEntry,{name,currency,priority,trigger1:t1,trigger2:t2,trigger3:t3,size1:s1,size2:s2,size3:s3,reasoning,notes});
  }else{
    // Duplicate-ticker check on add
    if(findRisklistEntry(ticker)){showErr(ticker+" already exists in Risklist.");return;}
    risklist.push({ticker,name,currency,priority,trigger1:t1,trigger2:t2,trigger3:t3,size1:s1,size2:s2,size3:s3,reasoning,notes,
      fired1:false,fired2:false,fired3:false,firedDate1:null,firedDate2:null,firedDate3:null,
      firedPrice1:null,firedPrice2:null,firedPrice3:null,firedShares1:null,firedShares2:null,firedShares3:null,
      dateAdded:new Date().toISOString().slice(0,10)});
  }
  saveRisklist();
  syncRisklistStockStubs();save(); // save() to persist any stub additions to stocks{}
  ov.remove();render();
}

// ============ RISKLIST: BUY CONFIRMATION MODAL ============
// Opens when an eligible tranche's Buy button is tapped. Requires the user to enter
// the actual fill price (which can differ from trigger due to slippage) and shares.
// Displays the full rationale prominently — re-reading own rationale at moment of buy
// is the key behavioural guardrail.
function openRisklistBuyModal(ticker,n){
  const e=findRisklistEntry(ticker);if(!e)return;
  if(!risklistTrancheEligible(e,n)){alert("Tranche "+n+" is not eligible to fire.");return;}
  const s=stocks[ticker];const price=risklistCurrentPrice(ticker);
  const base=pfBaseCcy("personal");const baseSym=base==="USD"?"$":"€";
  const sizePct=e["size"+n];
  const amtBase=risklistTrancheAmount(e,n);
  const amtLocal=risklistTrancheAmountLocal(e,n);
  const trig=e["trigger"+n];
  const dp=portfolios.personal?.dryPowder||0;
  // Cap warnings — informational, do not block.
  const rbi=riskBucketInfo("personal");
  const projectedTotal=rbi.used+amtBase;
  const projectedPct=rbi.cap>0?(projectedTotal/rbi.cap*100):0;
  const overPool3=projectedTotal>rbi.cap;
  // Per-stock 5% cap (against same Pool1+Pool3 denominator)
  const thisStockCost=risklistEntryCostBasis(e);
  const perStockCap=(pool1CostBasis("personal")+rbi.used)*0.05;
  const overPerStock=(thisStockCost+amtBase)>perStockCap;
  // Default shares: amtLocal/trigger. User can adjust.
  const defaultShares=trig>0?Math.floor((amtLocal/trig)*100)/100:0;
  let warnHTML="";
  if(overPool3)warnHTML+=`<div class="rl-warn-banner">⚠ This fire would push Pool 3 to ${projectedPct.toFixed(1)}% (cap is 100%). You'll be over the 15% limit.</div>`;
  if(overPerStock)warnHTML+=`<div class="rl-warn-banner">⚠ This fire would push ${ticker}'s position to ${baseSym}${Math.round(thisStockCost+amtBase).toLocaleString()}, over the 5% per-stock cap (${baseSym}${Math.round(perStockCap).toLocaleString()}).</div>`;
  if(amtLocal>(base===e.currency?dp:fromEUR(toEUR(dp,base),e.currency)))warnHTML+=`<div class="rl-warn-banner">⚠ Tranche size (${fmt(amtLocal,e.currency)}) may exceed available DP (${baseSym}${Math.round(dp).toLocaleString()}).</div>`;
  const ov=document.createElement("div");ov.className="modal-overlay";
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200";
  ov.onclick=ev=>{if(ev.target===ov)ov.remove();};
  ov.innerHTML=`<div class="rl-confirm-modal" onclick="event.stopPropagation()">
    <div class="rl-confirm-title">🎯 Fire Tranche ${n}</div>
    <div class="rl-confirm-sub">${s?.flag||""} ${esc(ticker)} — ${esc(e.name||ticker)}</div>
    ${warnHTML}
    <div class="rl-confirm-row"><span class="rl-c-l">Trigger</span><span class="rl-c-r">${fmt(trig,e.currency)}</span></div>
    <div class="rl-confirm-row"><span class="rl-c-l">Current price</span><span class="rl-c-r">${fmt(price,e.currency)}</span></div>
    <div class="rl-confirm-row"><span class="rl-c-l">Tranche size</span><span class="rl-c-r">${sizePct.toFixed(2)}% · ${baseSym}${Math.round(amtBase).toLocaleString()} · ${fmt(amtLocal,e.currency)}</span></div>
    <div class="rl-confirm-row"><span class="rl-c-l">Available DP</span><span class="rl-c-r">${baseSym}${Math.round(dp).toLocaleString()}</span></div>
    <div class="rl-rationale-box">${esc(e.reasoning||"(No rationale recorded)")}</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <div style="flex:1"><label style="font-size:10px;color:var(--muted)">Fill price (${e.currency})</label>
        <input type="number" step="any" id="rl-fill-price" value="${price||trig}" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-family:var(--mono);box-sizing:border-box"></div>
      <div style="flex:1"><label style="font-size:10px;color:var(--muted)">Shares</label>
        <input type="number" step="any" id="rl-fill-shares" value="${defaultShares}" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-family:var(--mono);box-sizing:border-box"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="modal-done" style="flex:1;background:#34d39920;color:#34d399;border:2px solid #34d39960" id="rl-confirm-fire">Confirm Buy</button>
      <button class="modal-done" style="flex:0;background:var(--bg);color:var(--muted)" id="rl-cancel-fire">Cancel</button>
    </div>

    if(isNaN(fp)||fp<=0){alert("Enter a valid fill price.");return;}
    if(isNaN(sh)||sh<=0){alert("Enter a valid share count.");return;}
    confirmRisklistFire(ticker,n,fp,sh);
    ov.remove();
  };
  document.getElementById("rl-cancel-fire").onclick=()=>ov.remove();
}

// Record a tranche firing: mark fired, decrement DP from the matching currency bucket
// (recalcDP recomputes pf.dryPowder afterward). Does NOT touch pf.positions — Risklist
// tranches are tracked separately so they don't enter the Pool 1 monthly allocator math.
function confirmRisklistFire(ticker,n,fillPrice,shares){
  const e=findRisklistEntry(ticker);if(!e)return;
  if(!risklistTrancheEligible(e,n)){alert("No longer eligible.");return;}
  e["fired"+n]=true;
  e["firedDate"+n]=new Date().toISOString().slice(0,10);
  e["firedPrice"+n]=fillPrice;
  e["firedShares"+n]=shares;
  saveRisklist();
  // Decrement DP from the matching currency bucket. GBp prices are in pence, but DP is GBP.
  const pf=portfolios.personal;
  let localCost=fillPrice*shares;
  let bucket=e.currency;
  if(e.currency==="GBp"){localCost=localCost/100;bucket="GBP";}
  const dpKey="dp"+bucket;
  if(pf[dpKey]==null)pf[dpKey]=0;
  pf[dpKey]-=localCost; // may go negative — user manages funding
  recalcDP("personal");
  pf.dpManual=true; // mark as user-edited so IBKR sync warns before overwrite
  save();render();
}

// Reset a fired tranche to unfired. Used from the Edit modal. Confirms first.
function resetRisklistTranche(ticker,n){
  const e=findRisklistEntry(ticker);if(!e||!e["fired"+n])return;
  if(!confirm(`Reset T${n} of ${ticker}? This will clear the fired state and the fill record — DP will not be auto-restored.`))return;
  e["fired"+n]=false;e["firedDate"+n]=null;e["firedPrice"+n]=null;e["firedShares"+n]=null;
  saveRisklist();
  // Re-render the modal so the controls update. Close and reopen as the simplest approach.
  const ov=document.querySelector(".modal-overlay");if(ov)ov.remove();
  openRisklistEdit(ticker);
  render();
}

// Delete a Risklist entry. Confirms first. Does not affect brokerage holdings.
function deleteRisklistEntry(ticker){
  const e=findRisklistEntry(ticker);if(!e)return;
  const fired=[1,2,3].some(i=>e["fired"+i]);
  const msg=fired
    ?`Delete ${ticker} from Risklist?\n\nThis stock has fired tranches — the tracking will be removed but your actual brokerage holdings are not affected. The Pool 3 cap calculation will drop accordingly.`
    :`Delete ${ticker} from Risklist?`;
  if(!confirm(msg))return;
  risklist=risklist.filter(x=>x.ticker!==ticker);
  saveRisklist();render();
}

// ============ RISKLIST: CSV IMPORT/EXPORT ============
// Separate CSV from the Pool 1 triggers CSV. Filename: risklist_YYYY-MM-DD.csv.
// Includes all fields from the data model. Field names match the model exactly.
function exportRisklistCSV(){
  const fields=["ticker","name","currency","priority","trigger1","size1","fired1","firedDate1","firedPrice1","firedShares1",
    "trigger2","size2","fired2","firedDate2","firedPrice2","firedShares2",
    "trigger3","size3","fired3","firedDate3","firedPrice3","firedShares3",
    "reasoning","notes","dateAdded"];
  // CSV-escape: wrap in quotes and double internal quotes if value contains comma, quote, or newline.
  const q=x=>{if(x==null||x==="")return"";const str=String(x);return /[",\n\r]/.test(str)?`"${str.replace(/"/g,'""')}"`:str;};
  let csv=fields.join(",")+"\n";
  risklist.forEach(e=>{csv+=fields.map(f=>q(e[f])).join(",")+"\n";});
  dlFile("risklist_"+dateStr()+".csv",csv,"text/csv");
}

function handleRisklistCSVImport(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=evt=>{
    // FIX v3.44: parseCSVText handles embedded newlines in quoted fields.
    const rows=parseCSVText(evt.target.result);
    if(rows.length<2){alert("Empty CSV");return;}
    const hdr=rows[0].map(h=>h.trim());
    const idx=(name)=>hdr.indexOf(name);
    let added=0,updated=0,skipped=0;
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      const ticker=(row[idx("ticker")]||"").trim().toUpperCase();
      if(!ticker)continue;
      const num=(name)=>{const v=row[idx(name)];if(v==null||v==="")return null;const n=parseFloat(v);return isNaN(n)?null:n;};
      const bool=(name)=>{const v=row[idx(name)];return v==="true"||v==="TRUE"||v==="1";};
      const str=(name)=>{const v=row[idx(name)];return v==null?"":String(v).trim();};
      const entry={ticker,
        name:str("name"),currency:str("currency")||"USD",priority:num("priority"),
        trigger1:num("trigger1"),size1:num("size1")??1.0,
        trigger2:num("trigger2"),size2:num("size2")??1.0,
        trigger3:num("trigger3"),size3:num("size3")??1.0,
        fired1:bool("fired1"),firedDate1:str("firedDate1")||null,firedPrice1:num("firedPrice1"),firedShares1:num("firedShares1"),
        fired2:bool("fired2"),firedDate2:str("firedDate2")||null,firedPrice2:num("firedPrice2"),firedShares2:num("firedShares2"),
        fired3:bool("fired3"),firedDate3:str("firedDate3")||null,firedPrice3:num("firedPrice3"),firedShares3:num("firedShares3"),
        reasoning:str("reasoning"),notes:str("notes"),
        dateAdded:str("dateAdded")||new Date().toISOString().slice(0,10)};
      const existing=findRisklistEntry(ticker);
      if(existing){
        if(confirm(`${ticker} exists in Risklist. Overwrite?`)){
          Object.assign(existing,entry);updated++;
        }else skipped++;
      }else{risklist.push(entry);added++;}
    }
    saveRisklist();syncRisklistStockStubs();save();render();
    alert(`Risklist import: ${added} added, ${updated} updated, ${skipped} skipped.`);
    ev.target.value="";
  };
  r.readAsText(f);
}

// ============ RISKLIST: FOREGROUND NOTIFICATIONS ============
// Foreground-only push: when fetchPrices runs and a tranche becomes newly eligible
// (was not eligible last tick, now is), fire a notification via the service worker.
// Suppress duplicates within the same day via the lastNotifiedDate map.
let prevRisklistEligible={}; // {"TICKER-N": true} — eligibility on the prior tick
function checkNewRisklistFires(){
  const fires=[];
  risklist.forEach(e=>{
    for(let n=1;n<=3;n++){
      const key=e.ticker+"-"+n;
      const eligNow=risklistTrancheEligible(e,n);
      const eligPrev=!!prevRisklistEligible[key];
      if(eligNow&&!eligPrev){
        fires.push({entry:e,n,price:risklistCurrentPrice(e.ticker)});
      }
      prevRisklistEligible[key]=eligNow;
    }
  });
  return fires;
}
function sendRisklistNotification(fires){
  if(!fires.length)return;
  if(typeof Notification==="undefined"||Notification.permission!=="granted")return;
  // Suppress same-day duplicates via localStorage map
  const today=new Date().toISOString().slice(0,10);
  const shown=JSON.parse(localStorage.getItem("r1-rlNotifShown")||"{}");
  navigator.serviceWorker.ready.then(reg=>{
    fires.forEach(f=>{
      const key=f.entry.ticker+"-"+f.n;
      if(shown[key]===today)return; // already notified today for this tranche
      const price=fmt(f.price,f.entry.currency);const trig=fmt(f.entry["trigger"+f.n],f.entry.currency);
      reg.showNotification(`🎯 Risk: ${f.entry.ticker} T${f.n} at ${price}`,{
        body:`${f.entry.name||f.entry.ticker} hit ${trig} trigger — review rationale before deploying.`,
        tag:`ttt-risk-${f.entry.ticker}-${f.n}`,
        renotify:true,
        requireInteraction:true,
        data:{url:`./#risklist:${f.entry.ticker}`}
      }).catch(()=>{});
      shown[key]=today;
    });
    localStorage.setItem("r1-rlNotifShown",JSON.stringify(shown));
  });
}

function dpPreviewTotal(pfKey){
  const u=+(document.getElementById("dp-usd").value)||0;const e=+(document.getElementById("dp-eur").value)||0;
  const g=+(document.getElementById("dp-gbp").value)||0;const j=+(document.getElementById("dp-jpy").value)||0;const c=+(document.getElementById("dp-cad").value)||0;
  const base=pfBaseCcy(pfKey);
  const eurTotal=e+(u/settings.fxRate)+(g/settings.fxGBP)+(j/settings.fxJPY)+(c/settings.fxCAD);
  const total=base==="USD"?Math.round(eurTotal*settings.fxRate):Math.round(eurTotal);
  const sym=base==="USD"?"$":"€";
  document.getElementById("dp-total").textContent=sym+total.toLocaleString();
}
function dpSliderPreview(el,pfKey){
  const val=+el.value;
  el.style.setProperty('--pct',val+'%');
  const pf=portfolios[pfKey];if(!pf)return;
  const totalDP=pf.dryPowder||0;
  if(totalDP<=0)return;
  const mosAmt=Math.round(totalDP*(val/100));
  const expAmt=Math.round(totalDP-mosAmt);
  const ccy=pfKey==='nl'?'€':'$';
  const mosEl=document.getElementById('dp-mos-label');
  if(mosEl)mosEl.textContent='MOS '+ccy+mosAmt.toLocaleString();
  const pctEl=document.getElementById('dp-pct-toggle');
  if(pctEl)pctEl.textContent=val+'%';
  const expEl=document.getElementById('dp-exp-label');
  if(expEl)expEl.textContent='EXP '+ccy+expAmt.toLocaleString();
  const lbl=document.getElementById('dp-slider-pct-label');
  if(lbl){const pfc=pfCostExIndex(pfKey);if(pfc>0){const dpPct=(totalDP/pfc*100).toFixed(1);const mosPct=(mosAmt/pfc*100).toFixed(1);lbl.textContent='DP '+dpPct+'% · MOS reserve '+mosPct+'%';}}
}
function dpManualEdit(which,pfKey){
  const pf=portfolios[pfKey];if(!pf)return;
  const totalDP=pf.dryPowder||0;
  if(totalDP<=0)return;
  const ccy=pfKey==='nl'?'€':'$';
  const dps=getDPSplit(pfKey);
  const current=which==='mos'?Math.round(dps.mosReserveMax):Math.round(dps.expansionMin);
  const label=which==='mos'?'MOS reserve':'Expansion';
  const input=prompt(label+' amount ('+ccy+'):',current);
  if(input==null)return;
  const amt=Math.max(0,Math.min(totalDP,+input||0));
  const exactPct=which==='mos'?(amt/totalDP*100):((totalDP-amt)/totalDP*100);
  const clamped=Math.max(0,Math.min(100,exactPct));
  dpSliderCommit(pfKey,clamped);
}
function dpSliderCommit(pfKey,val){
  if(pfKey==="nl")settings.dpSliderCaca=val;else settings.dpSlider=val;
  save();render();
  // Reopen slider after render
  const ctrl=document.getElementById('dp-slider-ctrl');
  if(ctrl)ctrl.style.display='block';
}

// ============ DEPLOYMENT LOG ============
function logDeploy(opts){
  // opts: {ticker, action, signal, shares, price, currency, portfolio, triggerPrice, note}
  const s=stocks[opts.ticker];
  deployLog.unshift({
    id:Date.now(),
    date:new Date().toISOString(),
    ticker:opts.ticker,
    flag:s?.flag||"",
    action:opts.action||"buy",
    signal:opts.signal||"",
    shares:opts.shares||0,
    price:opts.price||0,
    currency:opts.currency||s?.currency||"USD",
    portfolio:opts.portfolio||currentPf,
    triggerPrice:opts.triggerPrice||null,
    note:opts.note||""
  });
  save();
}
function editLogNote(id){
  const entry=deployLog.find(e=>e.id===id);if(!entry)return;
  const ov=document.createElement("div");ov.className="modal-overlay";ov.onclick=e=>{if(e.target===ov)ov.remove();};
  const s=stocks[entry.ticker];
  const sigCol=entry.signal==="MOS"?"#34d399":entry.signal==="10Cap"?"#60a5fa":"#a78bfa";
  const dateStr=new Date(entry.date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
  ov.innerHTML=`<div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-title">${entry.flag} ${entry.ticker} — ${entry.action==="sell"?"Sell":"Buy"} Note</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${dateStr} · <span style="color:${sigCol}">${entry.signal}</span> · ${entry.shares} sh @ ${fmt(entry.price,entry.currency)} · ${entry.portfolio==="nl"?"Caca":"Personal"}</div>
    <textarea id="log-note-ta" style="width:100%;min-height:120px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:14px;font-family:inherit;line-height:1.5;resize:vertical;box-sizing:border-box" placeholder="Why this trade? What was the thesis?">${entry.note||""}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="modal-done" style="flex:1" id="log-note-save">Save</button>
      <button class="modal-done" style="flex:0;background:var(--bg);color:var(--muted)" id="log-note-cancel">Cancel</button>
    </div></div>`;
  document.body.appendChild(ov);
  const ta=document.getElementById("log-note-ta");ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
  document.getElementById("log-note-save").onclick=()=>{entry.note=ta.value.trim();save();ov.remove();render();};
  document.getElementById("log-note-cancel").onclick=()=>ov.remove();
}
function deleteLogEntry(id){
  if(!confirm("Delete this log entry?"))return;
  deployLog=deployLog.filter(e=>e.id!==id);save();render();
}
function exportDeployLog(){
  if(!deployLog.length){alert("No log entries to export.");return;}
  let csv="date,ticker,action,signal,shares,price,currency,portfolio,triggerPrice,note\n";
  deployLog.forEach(e=>{
    const d=new Date(e.date).toISOString().slice(0,10);
    const note=(e.note||"").replace(/"/g,'""').replace(/[\r\n]+/g," ");
    csv+=`${d},${e.ticker},${e.action},${e.signal},${e.shares},${e.price},${e.currency},${e.portfolio},${e.triggerPrice||""},"${note}"\n`;
  });
  dlFile("deploy_log_"+dateStr()+".csv",csv,"text/csv");
}

// ============ STOCK MANAGEMENT ============
// v3.31: Grid and Risk are both per-portfolio AND mutually exclusive within a portfolio.
// promoteToGrid / promoteToSpec / graduateToGrid / demoteSpec / demoteFromGrid all operate
// on currentPf only. Mutual exclusion: adding to one bucket removes from the other.
function promoteToGrid(t){
  const pf=portfolios[currentPf];
  if(!pf)return;
  if(!pf.gridStocks)pf.gridStocks=[];
  if(!pf.riskStocks)pf.riskStocks=[];
  // Mutual exclusion: remove from currentPf risk bucket if present
  pf.riskStocks=pf.riskStocks.filter(x=>x!==t);
  if(!pf.gridStocks.includes(t))pf.gridStocks.push(t);
  // If no portfolio still treats this as risk, clear thesis (intrinsic to risk status)
  if(!isRiskAnywhere(t)){delete stocks[t].specReason;delete stocks[t].specDate;}
  updateSignals(t);save();
  currentTab="portfolio";render();
  window.scrollTo(0,0);
}
function promoteToSpec(t){
  const s=stocks[t];
  const pf=portfolios[currentPf];
  if(!pf)return;
  if(!pf.riskStocks)pf.riskStocks=[];
  if(pf.riskStocks.includes(t)){save();render();return;}
  const reason=prompt(`Conviction thesis for ${t} in ${pf.name} (optional):\ne.g. 'AI leader, IPO play, potential wide moat'`,s.specReason||"");
  if(reason===null)return;
  // Mutual exclusion: remove from currentPf grid if present
  if(pf.gridStocks)pf.gridStocks=pf.gridStocks.filter(x=>x!==t);
  pf.riskStocks.push(t);
  if(reason)s.specReason=reason;
  s.specDate=s.specDate||Date.now();
  updateSignals(t);save();
  currentTab="portfolio";render();
  window.scrollTo(0,0);
}
function graduateToGrid(t){
  const pf=portfolios[currentPf];
  if(!pf)return;
  if(!confirm(`Graduate ${t} to ${pf.name} grid? This stock must now pass all 4Ms.`))return;
  if(!pf.gridStocks)pf.gridStocks=[];
  if(!pf.riskStocks)pf.riskStocks=[];
  pf.riskStocks=pf.riskStocks.filter(x=>x!==t);
  if(!pf.gridStocks.includes(t))pf.gridStocks.push(t);
  if(!isRiskAnywhere(t)){delete stocks[t].specReason;delete stocks[t].specDate;}
  updateSignals(t);save();render();
}
function demoteSpec(t){
  const pf=portfolios[currentPf];
  if(!pf)return;
  if(!confirm(`Remove ${t} from ${pf.name}'s risk bucket? (Position keeps tracking if shares held. Other portfolios unaffected.)`))return;
  if(pf.riskStocks)pf.riskStocks=pf.riskStocks.filter(x=>x!==t);
  // Clear thesis only if no other portfolio still considers this risk
  if(!isRiskAnywhere(t)){delete stocks[t].specReason;delete stocks[t].specDate;}
  save();render();
}
function demoteFromGrid(t){
  const pf=portfolios[currentPf];
  if(!pf)return;
  const hasShares=pf.positions?.[t]&&pf.positions[t].tranches.some(tr=>(tr.bought-tr.sold)>0);
  if(hasShares){
    if(!confirm(`${t} has shares held in ${pf.name}. Remove from grid? (Position keeps tracking.)`))return;
  }else{
    if(!confirm(`Remove ${t} from ${pf.name} grid?`))return;
    // Clean up empty position entries only when no shares
    if(pf.positions?.[t])delete pf.positions[t];
  }
  if(pf.gridStocks)pf.gridStocks=pf.gridStocks.filter(x=>x!==t);
  save();render();
}

function logIndexBuy(pfKey,region){
  pfKey=pfKey||"personal";region=region||"us";
  const ip=getIndexPos(pfKey,region);
  const ccy=ip.currency||"USD";const sym=ccy==="EUR"?"€":"$";
  const label=region==="us"?"XZMU":"XZEU";
  // Caca per-tranche is nominally EUR (nlIndexTranche/2 = €500). If the target position is
  // USD-denominated (XZMU.L on LSE in USD), convert €500 → USD at the current EUR/USD rate.
  let defAmt;
  if(pfKey==="nl"){
    const perTrancheEUR=(settings.nlIndexTranche||1000)/2;
    defAmt=ccy==="USD"?Math.round(perTrancheEUR*(settings.fxRate||1)):perTrancheEUR;
  }else{
    defAmt=pfKey==="personal"&&region==="eu"?Math.round((indexAllocationUSD()||6000)/2/settings.fxRate):((indexAllocationUSD()||6000)/2);
  }
  // Caca cap check
  if(pfKey==="nl"){const cii=cacaIndexInfo();if(cii.atCap){alert(`Cap reached: ${cii.deployed}/${cii.maxT} tranches, ${cii.pctOfPortfolio.toFixed(1)}% of portfolio (cap ${cii.cap}%)`);return;}}
  const perTrancheEUR=(settings.nlIndexTranche||1000)/2;
  const promptMsg=(pfKey==="nl"&&ccy==="USD")
    ?`${label} — Amount invested (${sym}):\n€${perTrancheEUR.toLocaleString()} × ${(settings.fxRate||1).toFixed(4)} ≈ $${Math.round(defAmt).toLocaleString()}`
    :`${label} — Amount invested (${sym}):`;
  const amt=prompt(promptMsg,String(Math.round(defAmt)));if(!amt)return;
  const price=prompt(`${label} — Price per share (${sym}):`,ip.currentPrice?ip.currentPrice.toFixed(2):"");if(!price)return;
  const a=parseFloat(amt),p=parseFloat(price);if(isNaN(a)||isNaN(p)||p<=0)return alert("Invalid input");
  const sh=a/p;
  const oldCost=ip.shares*ip.avgCost;const newCost=oldCost+a;const newShares=ip.shares+sh;
  ip.avgCost=newShares>0?newCost/newShares:0;ip.shares=newShares;
  if(!ip.deployLog)ip.deployLog=[];
  ip.deployLog.push({date:new Date().toISOString(),shares:+sh.toFixed(4),price:p,amount:a});
  // Caca: reduce DP by amount (convert to EUR if position is USD-denominated)
  if(pfKey==="nl"){const pf=portfolios.nl;const fx=settings.fxRate||1;const amtEUR=ccy==="USD"?(a/fx):a;pf.dpEUR=Math.max(0,(pf.dpEUR||0)-amtEUR);recalcDP("nl");}
  deployLog.push({id:Date.now()+Math.random()*1000|0,date:new Date().toISOString(),ticker:label,flag:"🌍",action:"buy",signal:"INDEX",shares:+sh.toFixed(4),price:p,currency:ccy,portfolio:pfKey,triggerPrice:null,note:`Index DCA ${sym}${a.toLocaleString()}`});
  localStorage.setItem("r1-deployLog",JSON.stringify(deployLog));
  save();render();
}

    {id:"es-gr",label:"Growth %",val:s.cons.gr,type:"number"},
    {id:"es-pe",label:"Historical P/E",val:s.cons.pe,type:"number"},

    {id:"es-fcf",label:"FCF/share (→ PBT)",val:s.cons.fcf,type:"number"},
    "— Buy Triggers (auto-calc from inputs above) —",
    {id:"es-mos",label:"MOS (= Sticker ÷ 2)",val:s.cons.mos,type:"number"},
    {id:"es-tc",label:"Ten Cap (= OE × 10)",val:s.cons.tenCap,type:"number"},
    {id:"es-pbt",label:"PBT Price (= 8yr FCF)",val:s.cons.pbt,type:"number"},
    {id:"es-pbtyrs",label:"PBT Years",val:s.cons.pbtYrs,type:"number"},
    "— Earnings —",
    {id:"es-earn",label:"Next Earnings Date (YYYY-MM-DD)",val:s.earningsDate?new Date(s.earningsDate).toISOString().slice(0,10):"",placeholder:"2026-04-23"},
    "— 4M Gate —",
    {id:"es-gate",label:"4M Gate",val:s.gate===false?"FAIL":"PASS",select:["PASS","FAIL"]},
    "— Category —",
    {id:"es-cat",label:"Framework",val:isRisk(t,currentPf)?"Risk":(s.category==="buffett"?"Buffett":s.category==="highgr"?"High-Growth":"Phil Town"),select:["Phil Town","Buffett","High-Growth","Risk"]},
  ],()=>{
    s.name=gv("es-name")||s.name;const fhv=(gv("es-fh")||"").replace(/[\s\u200B-\u200F\uFEFF]/g,"");if(fhv)s.finnhubSymbol=fhv;else delete s.finnhubSymbol;const mv=gv("es-moat");s.moat=mv==="Excellent"?"Wide":mv==="Strong"?"Narrow":mv||s.moat;
    s.currentPrice=nv("es-price")??s.currentPrice;
    s.cons.eps=nv("es-eps");s.cons.gr=nv("es-gr")??s.cons.gr;s.cons.pe=nv("es-pe");
    s.cons.oe=nv("es-oe");s.cons.fcf=nv("es-fcf");
    // Read manual trigger values (may be overwritten by auto-calc below)
    s.cons.mos=nv("es-mos");s.cons.tenCap=nv("es-tc");
    s.cons.pbt=nv("es-pbt");s.cons.pbtYrs=nv("es-pbtyrs");
    // Auto-calc chain: eps+gr+pe → sticker+mos (overwrites manual MOS if all inputs present)
    applyRecalcSticker(s);
    // Auto-calc tenCap + pbt (category-aware: highgr → 20Cap/DMOS).
    // NOTE: category change via Framework dropdown is committed below (line ~5380); for
    // safety we recompute again after that. This first call handles same-category edits.
    recalcConsTriggers(s);
    // If no eps/pe auto-calc happened, derive sticker from manual MOS
    if(s.cons.eps==null||s.cons.pe==null){
      const oldSticker=s.cons.sticker;
      s.cons.sticker=s.cons.mos?s.cons.mos*2:null;
      if(oldSticker&&s.cons.sticker&&s.cons.sticker!==oldSticker)s.cons.prevSticker=oldSticker;
    }
    // 4M gate — confirm before setting to FAIL (triggers sell-all alert)
    const gateVal=gv("es-gate");
    if(gateVal==="FAIL"&&s.gate!==false){
      if(!confirm(`⚠️ Setting ${t} gate to FAIL triggers a SELL ALL alert.\n\nThis means the business fundamentals have broken down and all tranches should be sold immediately.\n\nAre you sure?`)){return false;}
    }
    const earnVal=gv("es-earn");if(earnVal){const ed=new Date(earnVal+"T12:00:00Z");if(!isNaN(ed))s.earningsDate=ed.getTime();}else{s.earningsDate=null;}
    s.gate=(gateVal==="FAIL")?false:true;
    // Category — Phil Town / Buffett / Risk (Risk is per-portfolio: applies to currentPf only)
    const catVal=gv("es-cat");
    const wasSpec=isRisk(t,currentPf);
    if(catVal==="Risk"){
      if(!wasSpec){
        const reason=prompt("Conviction thesis (optional):\ne.g. 'AI leader, IPO play, potential wide moat'","");
        if(reason===null){return false;}
        const _pf=portfolios[currentPf];
        if(!_pf.riskStocks)_pf.riskStocks=[];
        if(!_pf.riskStocks.includes(t))_pf.riskStocks.push(t);
        // Mutual exclusion: remove from this portfolio's grid if present
        if(_pf.gridStocks)_pf.gridStocks=_pf.gridStocks.filter(x=>x!==t);
        if(reason)s.specReason=reason;
        s.specDate=s.specDate||Date.now();
      }
      // category preserved (Risk can sit on top of Phil Town or Buffett underlying framework)
    }else{
      if(wasSpec){
        if(!confirm(`Remove ${t} from ${portfolios[currentPf].name}'s risk bucket? (Position keeps tracking if shares held. Other portfolios unaffected.)`)){return false;}
        const _pf=portfolios[currentPf];
        if(_pf.riskStocks)_pf.riskStocks=_pf.riskStocks.filter(x=>x!==t);
        // Clear thesis only if no portfolio still treats this as risk
        if(!isRiskAnywhere(t)){delete s.specReason;delete s.specDate;}
      }
      s.category=catVal==="Buffett"?"buffett":catVal==="High-Growth"?"highgr":undefined;
    }
    // Recompute tenCap + pbt after category change in case formulas switched (e.g. Phil Town → High-Growth)
    recalcConsTriggers(s);
    // Mark triggers as freshly calculated
    s.lastCalcDate=Date.now();
    updateSignals(t);save();
  });
}

function gv(id){const el=document.getElementById(id);return el?el.value:"";}
function nv(id){const v=parseFloat(gv(id));return isNaN(v)?null:v;}

function showModal(title,fields,onSave,onDelete){
  const ov=document.createElement("div");ov.className="modal-overlay";ov.onclick=e=>{if(e.target===ov)ov.remove();};
  let fhtml="";
  fields.forEach(f=>{
    if(typeof f==="string"){fhtml+=`<div style="font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 4px">${f}</div>`;return;}
    if(f.select){
      const opts=f.select.map(o=>`<option value="${o}" ${o===f.val||o.startsWith(f.val)?"selected":""}>${o}</option>`).join("");
      fhtml+=`<div class="modal-field"><label>${f.label}</label><select id="${f.id}">${opts}</select></div>`;
    }else{
      fhtml+=`<div class="modal-field"><label>${f.label}</label><input type="${f.type||"text"}" step="any" id="${f.id}" value="${f.val??""}" ${f.placeholder?`placeholder="${f.placeholder}"`:""}></div>`;
    }
  });
  let btns=`<button class="modal-done" id="modal-save-btn">Save</button>`;
  if(onDelete)btns+=`<button class="modal-done" style="background:#3b1111;color:var(--red);margin-top:4px" id="modal-del-btn">Delete</button>`;
  ov.innerHTML=`<div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-title">${title}</div>${fhtml}${btns}</div>`;
  document.body.appendChild(ov);
  document.getElementById("modal-save-btn").onclick=()=>{const r=onSave();if(r===false)return;ov.remove();render();};
  if(onDelete)document.getElementById("modal-del-btn").onclick=()=>{const r=onDelete();if(r===false)return;ov.remove();render();};
}

// ============ PUSH ALERTS (Cloudflare Worker — true background) ============
// VAPID public key — replace with your key from generate-vapid-keys.js
const VAPID_PUBLIC_KEY = "BJqqXRKb8FtS8gn7ttPZd4eAtV365xC741Orgn0zEOXU2qdoCMGow73DUcgDoIW8WGHPvtlmRZTG4HD6ILxVp28";

function urlBase64ToUint8Array(base64String){
  const p=base64String.replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(p);const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);return out;
}

// Subscribe to Web Push via service worker
async function subscribePush(){
  if(!settings.pushWorkerUrl){alert("Set Push Worker URL first");return;}
  if(!VAPID_PUBLIC_KEY){alert("VAPID_PUBLIC_KEY not set in code — see deployment guide");return;}
  try{
    const reg=await navigator.serviceWorker.ready;
    // Request notification permission if not already granted
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){alert("Notification permission denied");return;}
    // Subscribe with VAPID
    const sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    // Send subscription to Cloudflare Worker
    const resp=await fetch(`${settings.pushWorkerUrl}/subscribe`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(sub.toJSON())
    });
    const data=await resp.json();
    if(!data.ok)throw new Error(data.error||"Subscribe failed");
    settings.pushSubscribed=true;save();render();
    // Auto-sync triggers after subscribing
    await syncTriggersToCloud();
  }catch(e){alert("Push subscribe failed: "+e.message);}
}

// Unsubscribe from Web Push
async function unsubscribePush(){
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub)await sub.unsubscribe();
    settings.pushSubscribed=false;settings.lastPushSync=null;save();render();
  }catch(e){alert("Unsubscribe failed: "+e.message);}
}

// Sync trigger config to Cloudflare Worker KV
async function syncTriggersToCloud(){
  if(!settings.pushWorkerUrl)return;
  const el=document.getElementById("push-sync-status");
  if(el)el.textContent="Syncing...";
  try{
    const alertStocks=[];
    Object.entries(stocks).forEach(([t,s])=>{
      if(!s.cons)return;
      const hasTriggers=s.cons.mos||s.cons.tenCap||s.cons.pbt;
      if(!hasTriggers)return;
      alertStocks.push({
        ticker:t,symbol:s.finnhubSymbol||null,
        currency:s.currency,priceMult:s.priceMult||1,
        category:s.category||"philtown",
        sticker:s.category==="buffett"?null:(s.cons.mos?s.cons.mos*2:null),
        // FIX v3.75: include P-MOS in cloud payload. Client gates pmos to non-Buffett Tier 1 here
        // so worker can stay dumb — if triggers.pmos is null, no P-MOS push detection happens.
        // signals.pmos uses pmosFires() (operational state w/ suppression) so the worker's baseline
        // doesn't false-fire on first cron after sync if P-MOS is already firing.
        triggers:{mos:s.category==="buffett"?null:s.cons.mos||null,tenCap:s.cons.tenCap||null,pbt:s.cons.pbt||null,
          pmos:isOperationalTier1(t)&&s.category!=="buffett"&&s.cons.mos?pmosPrice(s):null},
        signals:{mos:!!s.signals?.mos,tenCap:!!s.signals?.tenCap,pbt:!!s.signals?.pbt,pmos:pmosFires(t)},
        // Per-signal ownership snapshot — worker uses this to suppress mid-month notifications
        // for tranches that have already been bought. Re-synced every time save() runs, so the
        // worker's view stays current as soon as a buy is recorded in the app.
        owned:{mos:hasTrancheForSignal(t,"mos"),tenCap:hasTrancheForSignal(t,"tenCap"),pbt:hasTrancheForSignal(t,"pbt"),pmos:hasTrancheForSignal(t,"pmos")},
        // v3.79 Stage E (server port): capital-recovery-at-fair-value descriptors. The Worker
        // CANNOT derive the Buffett 20Cap anchor (needs OE/share), the risk 2×-cost anchor, invested
        // capital, or open share counts — so we precompute them here per OWNED, NON-Tier-1 position
        // and ship them. One ticker can be held in BOTH portfolios → array (backward-compatible with
        // the ticker-keyed structure). Tier 1 (forever-hold) and non-owned → [] (Worker does nothing).
        // anchor is in the stock's NATIVE quote units (same as currentPrice); Worker applies priceMult.
        recovery:buildRecoveryEntries(t,s)
      });
    });
    const resp=await fetch(`${settings.pushWorkerUrl}/triggers`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({stocks:alertStocks,workerUrl:settings.ibkrWorker||"",payloadVersion:2})
    });
    const data=await resp.json();
    if(!data.ok)throw new Error(data.error||"Sync failed");
    settings.lastPushSync=Date.now();save();render();
    if(el)el.textContent=`✓ Synced ${data.count} stocks`;
  }catch(e){
    if(el)el.textContent="✕ "+e.message;
  }
}

// Reset Worker signal state to all-false then immediately check prices.
// This forces the Worker to treat every currently-firing trigger as a fresh
// off→on transition, sending a push notification for each one.
async function resetWorkerSignals(){
  if(!settings.pushWorkerUrl)return;
  if(!confirm("This resets all Worker signal states to OFF, then checks prices.\n\nYou'll get a notification for EVERY currently-firing trigger (grid + watchlist + risk).\n\nContinue?"))return;
  const el=document.getElementById("push-sync-status");
  if(el)el.textContent="Resetting signals...";
  try{
    // Step 1: sync triggers with all signals forced to false
    const alertStocks=[];
    Object.entries(stocks).forEach(([t,s])=>{
      if(!s.cons)return;
      const hasTriggers=s.cons.mos||s.cons.tenCap||s.cons.pbt;
      if(!hasTriggers)return;
      alertStocks.push({
        ticker:t,symbol:s.finnhubSymbol||null,
        currency:s.currency,priceMult:s.priceMult||1,
        sticker:s.cons.mos?s.cons.mos*2:null,
        triggers:{mos:s.cons.mos||null,tenCap:s.cons.tenCap||null,pbt:s.cons.pbt||null},
        signals:{mos:false,tenCap:false,pbt:false},
        // Include owned flags so the reset+check flow exercises the same gating logic as cron.
        owned:{mos:hasTrancheForSignal(t,"mos"),tenCap:hasTrancheForSignal(t,"tenCap"),pbt:hasTrancheForSignal(t,"pbt")}
      });
    });
    const syncResp=await fetch(`${settings.pushWorkerUrl}/triggers`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({stocks:alertStocks,workerUrl:settings.ibkrWorker||""})
    });
    const syncData=await syncResp.json();
    if(!syncData.ok)throw new Error(syncData.error||"Sync failed");
    if(el)el.textContent=`Reset ${syncData.count} stocks — checking prices...`;
    // Step 2: immediately trigger a price check so notifications fire now
    const checkResp=await fetch(`${settings.pushWorkerUrl}/check`,{method:"POST"});
    const checkData=await checkResp.json();
    if(checkData.error)throw new Error(checkData.error);
    if(el)el.textContent=checkData.fires?`🔥 ${checkData.fires} notification(s) sent!`:`✓ Checked ${checkData.checked} stocks — no triggers currently firing`;
    // Step 3: re-sync with real signal state so future checks are correct
    await syncTriggersToCloud();
  }catch(e){if(el)el.textContent="✕ "+e.message;}
}

// ============ AUTO-REFRESH ============
// Market hours in UTC for each exchange family
function isMarketOpen(ccy){
  const now=new Date();const d=now.getUTCDay();if(d===0||d===6)return false;
  const hm=now.getUTCHours()*60+now.getUTCMinutes();
  if(ccy==="GBp")return hm>=480&&hm<=990;      // LSE 08:00-16:30
  if(ccy==="EUR")return hm>=540&&hm<=1050;      // Euronext 09:00-17:30
  return hm>=870&&hm<=1260;                      // NYSE/TSX 14:30-21:00 (USD, CAD)
}
function isAnyMarketOpen(){
  return ["USD","EUR","GBp","CAD"].some(c=>isMarketOpen(c));
}

// Send browser notification for new trigger fires (via SW for Android compatibility)
// This fires when the app is open and a new signal is detected during auto-refresh.
// The Cloudflare Worker handles notifications when the app is closed.
function sendTriggerNotification(fires){
  if(!fires.length)return;
  if(Notification.permission!=="granted")return;
  navigator.serviceWorker.ready.then(reg=>{
    fires.forEach(f=>{
      const s=stocks[f.ticker];if(!s)return;
      const price=s.currentPrice?fmt(s.currentPrice,s.currency):"?";
      const label=f.tag==="spec"?"⚡ Spec":f.wl?"📡 Watchlist":"🔥 Grid";
      reg.showNotification(`${label}: ${f.ticker} hit ${f.signal}`,{
        body:`${s.name} at ${price}`,tag:`ttt-${f.ticker}-${f.signal}`,renotify:true
      }).catch(()=>{});
    });
  });
}

// v3.68 Stage E: push notification for non-Tier-1 positions crossing fair value from below.
// Same-day dedup via localStorage as defense in depth — prevAboveFVT state should already
// limit firing to once per crossing, but multi-tab or state-corruption scenarios could
// double-fire. Tier 1 and Pool 3 already filtered upstream in fairValueThreshold().
function sendFairValueNotification(fires){
  if(!fires.length)return;
  if(typeof Notification==="undefined"||Notification.permission!=="granted")return;
  const today=new Date().toISOString().slice(0,10);
  const shown=JSON.parse(localStorage.getItem("r1-fvNotifShown")||"{}");
  navigator.serviceWorker.ready.then(reg=>{
    fires.forEach(f=>{
      const dedupKey=`${f.pk}-${f.ticker}`;
      if(shown[dedupKey]===today)return;
      const s=stocks[f.ticker];if(!s)return;
      const priceStr=fmt(f.price,s.currency);
      const fvtStr=fmt(f.fvt,s.currency);
      const fvtLabel=f.risk?"2× cost":(f.buf?"20Cap":"Sticker");
      const pos=portfolios[f.pk]?.positions?.[f.ticker];
      const szl=pos?capitalRecoverySizing(pos,f.fvt):null;
      const action=szl?`Sell ${szl.sellShares.toFixed(2)} shares (highest-cost first) to recover ${fmt(szl.invested,s.currency)}; hold residual ${szl.residualShares.toFixed(2)} forever.`:`Sell invested÷anchor shares (highest-cost first) to recover invested capital; hold residual forever.`;
      reg.showNotification(`🎯 Recover capital: ${s.flag} ${f.ticker} hit fair value`,{
        body:`${s.name||f.ticker} at ${priceStr} crossed ${fvtLabel} (${fvtStr}) in ${f.pfName}. ${action}`,
        tag:`ttt-caprecover-${f.pk}-${f.ticker}`,
        renotify:true,
        requireInteraction:true
      }).catch(()=>{});
      shown[dedupKey]=today;
    });
    localStorage.setItem("r1-fvNotifShown",JSON.stringify(shown));
  });
}

// Silent auto-refresh: keeps prices current while app is open
let refreshTimer=null;
const REFRESH_MS=15*60*1000; // 15 min

async function autoRefresh(){
  if(!isAnyMarketOpen())return;
  await fetchPrices();
}

function startRefreshTimer(){
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(autoRefresh,REFRESH_MS);
}

// Deeplink handler: a Risklist push notification carries url=./#risklist:TICKER. The SW
// posts a message to the focused client; the app then switches to the Watch tab in
// Risklist mode and scrolls to the card.
function handleRisklistDeeplink(hash){
  const m=hash.match(/^#risklist:(.+)$/);if(!m)return;
  const ticker=m[1].toUpperCase();
  currentTab="watchlist";localStorage.setItem("r1-tab","watchlist");
  watchMode="risklist";localStorage.setItem("r1-watchMode","risklist");
  render();
  // Scroll after render flush
  setTimeout(()=>{const card=document.getElementById("rl-card-"+ticker);if(card)card.scrollIntoView({behavior:"smooth",block:"start"});},100);
  // Clear hash so refresh doesn't re-trigger
  history.replaceState(null,"",location.pathname+location.search);
}
if(location.hash)handleRisklistDeeplink(location.hash);
if('serviceWorker' in navigator){
  navigator.serviceWorker.addEventListener('message',ev=>{
    if(ev.data&&ev.data.type==='deeplink'&&ev.data.url){
      const hash=ev.data.url.split('#')[1];if(hash)handleRisklistDeeplink('#'+hash);
    }
  });
}

// Catch up when app regains focus (Android suspends background timers)
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible'){
    const last=settings.lastFetch||0;
    if(Date.now()-last>=REFRESH_MS)autoRefresh();
  }
});
