*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0e17;--card:#111827;--border:#1a2035;--text:#e4e8ee;--muted:#5a6a7a;--accent:#60a5fa;--green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;--blue-bg:#1e3a5f;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.header{padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px}
.signal-badge{font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 10px;border-radius:6px}
.refresh-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--accent);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:var(--font)}
.content{padding-bottom:68px}
.pf-toggle{display:flex;margin:12px 16px 0;background:var(--card);border-radius:8px;padding:3px}
.pf-toggle button{flex:1;padding:8px 0;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);transition:all .2s}
.pf-toggle .active{background:var(--blue-bg);color:var(--accent)}.pf-toggle .inactive{background:transparent;color:var(--muted)}
.section-pad{padding:12px 16px}
.pos-card{background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border)}
.pos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pos-ticker{font-size:15px;font-weight:700}.pos-badge{font-size:10px;padding:1px 6px;border-radius:4px}
.pos-sub{font-size:11px;color:var(--muted);margin-top:2px}
.pos-price-val{font-size:15px;font-weight:600;font-family:var(--mono)}
.pos-pnl{font-size:11px;font-family:var(--mono)}
.tranche-bar{display:flex;gap:4px}.tranche-seg{flex:1;height:6px;border-radius:3px}
.stat-row{display:flex;gap:8px}.stat-box{flex:1;background:var(--bg);border-radius:6px;padding:6px 8px}
.stat-label{font-size:10px;color:var(--muted)}.stat-val{font-size:13px;font-family:var(--mono);font-weight:600}
.btn-row{display:flex;gap:6px;margin-top:8px}
.btn-sm{padding:6px 10px;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:var(--font);color:var(--muted);text-align:center}
.btn-sm:active{opacity:.6}.btn-accent{color:var(--accent)}.btn-red{color:var(--red);border-color:#3b1111}
.signal-grid{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
.sig-header,.sig-row,.sig-total-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 50px;padding:10px 12px}
.sig-header{border-bottom:1px solid var(--border)}.sig-header div{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.sig-row{border-bottom:1px solid var(--bg);align-items:center}.sig-total-row{background:#0d1117}
.sig-dot{font-size:16px;text-align:center}.sig-price{font-size:9px;color:var(--muted);font-family:var(--mono);text-align:center}
.sell-card{background:var(--card);border-radius:8px;padding:12px;margin-bottom:8px}
.wl-card{background:var(--card);border-radius:8px;padding:12px;border:1px solid var(--border)}
.wl-trig{flex:1;background:var(--bg);border-radius:4px;padding:4px;text-align:center}
.wl-trig-label{font-size:9px;color:var(--muted)}.wl-trig-val{font-size:11px;font-family:var(--mono)}
.wl-trig-phil{font-size:9px;font-family:var(--mono);color:var(--muted)}
.alloc-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.alloc-stock{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center}
.input-row{display:flex;gap:8px;margin-bottom:12px}
.input-box{flex:1;background:var(--card);border-radius:8px;padding:10px}
.input-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.input-field{display:flex;align-items:center}
.input-field span{font-size:12px;color:var(--muted);margin-right:4px}
.input-field input{background:transparent;border:none;color:var(--text);font-size:16px;font-family:var(--mono);font-weight:600;width:100%;outline:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;z-index:100}
.modal-sheet{width:100%;max-width:480px;margin:0 auto;background:var(--card);border-radius:16px 16px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
.modal-field input,.modal-field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:15px;font-family:var(--mono);outline:none}
.modal-done{width:100%;padding:12px;background:var(--blue-bg);color:var(--accent);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:8px}
.navbar{position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid var(--border);display:flex;justify-content:center;z-index:50}
.navbar-inner{display:flex;max-width:960px;width:100%}
.nav-btn{flex:1;padding:8px 0 10px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--font)}
.nav-btn .nav-icon{font-size:18px}.nav-btn .nav-label{font-size:10px}
.settings-section{padding:16px}
.settings-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.settings-title{font-size:13px;font-weight:600;margin-bottom:8px}
.settings-desc{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.settings-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;margin-bottom:8px}
.settings-save{padding:8px 16px;background:var(--blue-bg);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
.settings-save:active{opacity:.6}
.tr-row{display:flex;align-items:center;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px;gap:8px}
.tr-signal{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;min-width:44px;text-align:center}
/* FIX #2: Base grid layouts for mobile */
.pos-grid,.wl-grid,.alloc-grid{display:flex;flex-direction:column;gap:10px}
@media(min-width:580px){
  .header{padding:16px 24px 12px}.section-pad{padding:16px 24px}.pf-toggle{margin:16px 24px 0}
  .pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .sig-header,.sig-row,.sig-total-row{grid-template-columns:1.4fr 1fr 1fr 1fr 60px;padding:12px 16px}
  .wl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .alloc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-sheet{max-width:500px;border-radius:16px;margin:auto}.modal-overlay{align-items:center}
  .settings-section{padding:16px 24px}
}
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:6px 10px;border-radius:10px;font-size:13px;animation:alertSlide .3s ease-out}
.alert-item.buy{background:linear-gradient(135deg,#0d332040,#0d332080);border:1px solid #34d39940}
.alert-item.sell{background:linear-gradient(135deg,#33170d40,#33170d80);border:1px solid #f8717140}
.alert-item.watch{background:linear-gradient(135deg,#332d0d40,#332d0d80);border:1px solid #fbbf2440}
.alert-item.info{background:linear-gradient(135deg,#0d1a3340,#0d1a3380);border:1px solid #60a5fa40}
.alert-item.critical{background:linear-gradient(135deg,#33000040,#33000080);border:1px solid #ef444480;animation:alertSlide .3s ease-out,alertPulse 2s ease-in-out infinite}
@keyframes alertPulse{0%,100%{opacity:1}50%{opacity:.7}}
.alert-icon{font-size:20px;flex-shrink:0}
.alert-text{flex:1;line-height:1.35}
.alert-text strong{font-weight:700}
.alert-dismiss{font-size:18px;color:var(--muted);cursor:pointer;padding:4px 8px;flex-shrink:0}
@keyframes alertSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
/* Buy signal modal */
.buy-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;animation:buyFadeIn .3s ease-out}
.buy-modal{width:90%;max-width:400px;border-radius:20px;padding:28px 24px;text-align:center;
  background:linear-gradient(145deg,#0a2e1a,#0d3320,#0a2e1a);
  border:2px solid #34d399;box-shadow:0 0 40px #34d39940,0 0 80px #34d39920;animation:buyPulseGlow 2s ease-in-out infinite}
.buy-modal-icon{font-size:64px;margin-bottom:8px;animation:buyBounce 1s ease-in-out infinite}
.buy-modal-title{font-size:28px;font-weight:800;color:#34d399;letter-spacing:-0.5px;margin-bottom:4px;text-transform:uppercase}
.buy-modal-stock{font-size:22px;font-weight:700;color:var(--text);margin:12px 0 4px}
.buy-modal-signal{display:inline-block;font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;margin:4px 2px}
.buy-modal-price{font-size:18px;font-family:var(--mono);font-weight:600;color:var(--text);margin:14px 0 6px}
.buy-modal-detail{font-size:12px;color:var(--muted);margin-bottom:4px}
.buy-modal-dismiss{width:100%;padding:14px;margin-top:20px;background:#34d39920;color:#34d399;border:2px solid #34d39960;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:0.5px}
.buy-modal-dismiss:active{opacity:.6}
@keyframes buyFadeIn{from{opacity:0}to{opacity:1}}
@keyframes buyPulseGlow{0%,100%{box-shadow:0 0 40px #34d39940,0 0 80px #34d39920}50%{box-shadow:0 0 60px #34d39960,0 0 120px #34d39940}}
@keyframes buyBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>

function getGrid(){return Object.keys(stocks).filter(t=>stocks[t].status==="grid");}
function getWatchlist(){return Object.keys(stocks).filter(t=>stocks[t].status==="watchlist");}
function posShares(p){if(!p?.tranches)return 0;return p.tranches.reduce((s,t)=>s+(t.bought-t.sold),0);}
function posAvgPrice(p){if(!p?.tranches)return 0;let c=0,s=0;p.tranches.forEach(t=>{const sh=t.bought-t.sold;if(sh>0){c+=sh*t.buyPrice;s+=sh;}});return s>0?c/s:0;}
function posTranchesOwned(p){if(!p?.tranches)return 0;return p.tranches.filter(t=>(t.bought-t.sold)>0).length;}
function timeAgo(ts){if(!ts)return"—";const d=Date.now()-ts,m=Math.floor(d/60000),h=Math.floor(d/3600000),dy=Math.floor(d/86400000);if(m<1)return"just now";if(m<60)return m+"m ago";if(h<24)return h+"h ago";return dy+"d ago";}
function fmt(v,ccy){if(v==null)return"—";const n=Number(v);if(isNaN(n))return"—";if(ccy==="EUR")return"€"+n.toLocaleString("en",{maximumFractionDigits:n>=100?0:2});if(ccy==="GBp")return n.toLocaleString("en",{maximumFractionDigits:0})+"p";return"$"+n.toLocaleString("en",{maximumFractionDigits:n>=100?0:2});}
function fmtSh(n){if(n==null)return"0";return Number.isInteger(n)?String(n):n.toFixed(2);}
function sigCount(t){const s=stocks[t];if(!s?.signals||s.gate===false)return 0;return(s.signals.mos?1:0)+(s.signals.tenCap?1:0)+(s.signals.pbt?1:0);}
function totalSignals(){return getGrid().reduce((s,t)=>s+sigCount(t),0);}
function gridSize(){return getGrid().length*3;}
function updateSignals(t){const s=stocks[t];if(!s?.currentPrice||!s?.cons)return;const p=s.currentPrice;
  // Store previous signals to detect signal-off events
  const prev=s.signals?{...s.signals}:{mos:false,tenCap:false,pbt:false};
  s.signals={mos:s.cons.mos?p<=s.cons.mos:false,tenCap:s.cons.tenCap?p<=s.cons.tenCap:false,pbt:s.cons.pbt?p<=s.cons.pbt:false};
  // Detect signal changes for alerts
  if(!s._sigChanges)s._sigChanges=[];
  ["mos","tenCap","pbt"].forEach(sig=>{
    if(prev[sig]&&!s.signals[sig])s._sigChanges.push({sig,dir:"off"});
    else if(!prev[sig]&&s.signals[sig]){s._sigChanges.push({sig,dir:"on"});if(s.status==="grid"||s.status==="watchlist")queueBuyModal(t,sig);}
  });
  // Track per-tranche state machine + ATH
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf?.positions?.[t])return;
    pf.positions[t].tranches.forEach(tr=>{
      if((tr.bought-tr.sold)<=0){tr.state="sold";return;}
      if(!tr.state)tr.state="accumulating";
      const base=sellBase(s,tr.signal);
      if(!base)return; // hold signal — no tracking
      // Trophy: always track ATH from purchase price (base === -1)
      const isTrophy=(base===-1);
      if(isTrophy){
        if(!tr.ath)tr.ath=tr.buyPrice||p;
        if(p>tr.ath)tr.ath=p;
        tr.state="stopActive";
      }else if(p>=base){
        // Price crossed sell sticker — begin/continue ATH tracking
        if(tr.state==="accumulating")tr._justCrossed=true; // flag for alert
        tr.state="stopActive";
        if(!tr.ath||p>tr.ath)tr.ath=p;
      }
      // Check trailing stop
      if(tr.state==="stopActive"&&tr.ath){
        const stop=tr.ath*0.75;
        if(p<=stop)tr.state="stopped"; // flagged for sell
      }
    });
  });
}
function nearestTrigger(t){const s=stocks[t];if(!s)return null;const tr=[s.cons.mos,s.cons.tenCap,s.cons.pbt].filter(Boolean);return tr.length?Math.max(...tr):null;}
function gapPct(t){const s=stocks[t],nt=nearestTrigger(t);if(!s||!nt||!s.currentPrice)return null;return Math.round((s.currentPrice-nt)/s.currentPrice*100);}
// FIX #5: Convert any currency amount to EUR for allocation
function toEUR(amount,ccy){if(ccy==="EUR")return amount;if(ccy==="USD")return amount/settings.fxRate;if(ccy==="GBp")return(amount/100)/settings.fxGBP;return amount;}
function fromEUR(eur,ccy){if(ccy==="EUR")return eur;if(ccy==="USD")return eur*settings.fxRate;if(ccy==="GBp")return eur*settings.fxGBP*100;return eur;}
// FIX #8: Total portfolio value in EUR
function pfValueEUR(pfKey){const pf=portfolios[pfKey];if(!pf)return 0;let v=0;
  Object.entries(pf.positions).forEach(([t,pos])=>{const s=stocks[t];if(!s)return;v+=toEUR(posShares(pos)*s.currentPrice,s.currency);});
  return v+pf.dryPowder;}

function load(){
  try{
    if(localStorage.getItem("r1-version")!==String(DATA_VERSION)){localStorage.clear();localStorage.setItem("r1-version",String(DATA_VERSION));}
    const ss=localStorage.getItem("r1-stocks"),ps=localStorage.getItem("r1-portfolios"),st=localStorage.getItem("r1-settings");
    stocks=ss?JSON.parse(ss):JSON.parse(JSON.stringify(STOCK_DEFAULTS));
    portfolios=ps?JSON.parse(ps):JSON.parse(JSON.stringify(PF_DEFAULTS));
    if(st)settings={...settings,...JSON.parse(st)};
    Object.keys(STOCK_DEFAULTS).forEach(k=>{if(!stocks[k])stocks[k]=JSON.parse(JSON.stringify(STOCK_DEFAULTS[k]));});
  }catch(e){stocks=JSON.parse(JSON.stringify(STOCK_DEFAULTS));portfolios=JSON.parse(JSON.stringify(PF_DEFAULTS));}
  // Migration: add gate field (default PASS) and prevSticker if missing
  Object.values(stocks).forEach(s=>{
    if(s.gate===undefined)s.gate=true;
    if(s.cons&&s.cons.prevSticker===undefined)s.cons.prevSticker=s.cons.sticker||null;
    // Migration: add oe/fcf fields if missing
    if(s.cons&&s.cons.oe===undefined)s.cons.oe=null;
    if(s.cons&&s.cons.fcf===undefined)s.cons.fcf=null;
  });
  // Migration: add state to tranches if missing
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.values(pf.positions).forEach(pos=>{
      pos.tranches.forEach(tr=>{if(!tr.state)tr.state=(tr.bought-tr.sold)>0?"accumulating":"sold";});
    });
  });
  // Recalculate all signals from current prices/triggers
  Object.keys(stocks).forEach(t=>updateSignals(t));
  // Clean up invalid ATH values (from previous versions or manual testing)
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.entries(pf.positions).forEach(([t,pos])=>{
      const s=stocks[t];if(!s)return;
      pos.tranches.forEach(tr=>{
        if(!tr.ath)return;
        const base=sellBase(s,tr.signal);
        if(base===null)return; // hold — skip
        if(base===-1)return; // trophy — always valid
        if(tr.ath<base){delete tr.ath;tr.state="accumulating";} // ATH below sell sticker = invalid
      });
    });
  });
}
function save(){localStorage.setItem("r1-version",String(DATA_VERSION));localStorage.setItem("r1-stocks",JSON.stringify(stocks));localStorage.setItem("r1-portfolios",JSON.stringify(portfolios));localStorage.setItem("r1-settings",JSON.stringify(settings));}

async function fetchPrices(){
  if(!settings.apiKey){document.getElementById("refresh-status").textContent="⚠ Set API key";return;}
  const el=document.getElementById("refresh-status");el.textContent="Fetching...";

  // 1. IBKR auto-sync (silent — gets positions + prices for all held stocks)
  let ibkrOk=0;
  try{ibkrOk=await autoSyncAll();}catch(e){}

  // 2. Fetch FX from ECB via frankfurter.app (free, no key)
  let fxOk=false;
  try{const fxR=await fetch("https://api.frankfurter.app/latest?from=EUR&to=USD,GBP");
    const fxD=await fxR.json();
    if(fxD.rates?.USD){settings.fxRate=parseFloat(fxD.rates.USD.toFixed(4));settings.lastFxUpdate=Date.now();fxOk=true;}
    if(fxD.rates?.GBP){settings.fxGBP=parseFloat(fxD.rates.GBP.toFixed(4));settings.lastFxUpdate=Date.now();fxOk=true;}
  }catch(e){}

  // 3. Twelve Data for US watchlist stocks (not held in IBKR)
  const map={};Object.keys(stocks).forEach(t=>{if(stocks[t].tdSymbol)map[stocks[t].tdSymbol]=t;});
  const syms=Object.keys(map);const batches=[];for(let i=0;i<syms.length;i+=8)batches.push(syms.slice(i,i+8));
  let ok=0;
  for(const b of batches){
    try{const r=await fetch(`https://api.twelvedata.com/price?symbol=${encodeURIComponent(b.join(","))}&apikey=${settings.apiKey}`);const d=await r.json();
      if(b.length===1){if(d.price){stocks[map[b[0]]].currentPrice=parseFloat(d.price)*stocks[map[b[0]]].priceMult;stocks[map[b[0]]].lastUpdate=Date.now();stocks[map[b[0]]].priceSource="api";updateSignals(map[b[0]]);ok++;}}
      else b.forEach(s=>{const e=d[s];if(e?.price){stocks[map[s]].currentPrice=parseFloat(e.price)*stocks[map[s]].priceMult;stocks[map[s]].lastUpdate=Date.now();stocks[map[s]].priceSource="api";updateSignals(map[s]);ok++;}});
      if(batches.indexOf(b)<batches.length-1)await new Promise(r=>setTimeout(r,1200));
    }catch(e){}
  }
  settings.lastFetch=Date.now();save();render();
  if(!window._initialLoadDone){window._initialLoadDone=true;buyModalQueue=[];}// Suppress modals on first load
  else showBuyModals();
  const t=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  const parts=[`${ok} prices`];
  if(ibkrOk)parts.push(`IBKR✓`);
  if(fxOk)parts.push(`FX✓`);
  el.textContent=`✓ ${parts.join(" · ")} — ${t}`;
}

// ============ IBKR FLEX SYNC ============
function saveIBKR(){
  settings.ibkrWorker=(document.getElementById("ibkr-worker")?.value||"").trim().replace(/\/$/,"");
  settings.ibkrTokenPersonal=(document.getElementById("ibkr-token-personal")?.value||"").trim();
  settings.ibkrQueryPersonal=(document.getElementById("ibkr-query-personal")?.value||"").trim();
  settings.ibkrTokenNl=(document.getElementById("ibkr-token-nl")?.value||"").trim();
  settings.ibkrQueryNl=(document.getElementById("ibkr-query-nl")?.value||"").trim();
  save();
}
function ibkrStatus(msg,err,pf){const el=document.getElementById("ibkr-status-"+(pf||"personal"));if(el){el.textContent=msg;el.style.color=err?"var(--red)":"var(--muted)";}}

async function syncIBKR(pfKey){
  pfKey=pfKey||"personal";
  const w=settings.ibkrWorker;
  const tok=pfKey==="nl"?settings.ibkrTokenNl:settings.ibkrTokenPersonal;
  const qid=pfKey==="nl"?settings.ibkrQueryNl:settings.ibkrQueryPersonal;
  if(!w||!tok||!qid){ibkrStatus("⚠ Fill worker URL + token + query ID",true,pfKey);return;}

  try{
    // Step 1: Request report
    ibkrStatus("Requesting report...",false,pfKey);
    const reqUrl=`${w}/?action=request&token=${encodeURIComponent(tok)}&queryId=${encodeURIComponent(qid)}`;
    const reqResp=await fetch(reqUrl);
    const reqXml=await reqResp.text();
    const refMatch=reqXml.match(/<ReferenceCode>(\d+)<\/ReferenceCode>/);
    if(!refMatch){
      const errMatch=reqXml.match(/<ErrorMessage>([^<]+)<\/ErrorMessage>/);
      const codeMatch=reqXml.match(/<ErrorCode>(\d+)<\/ErrorCode>/);
      const msg=errMatch?errMatch[1]:"No reference code";
      const code=codeMatch?" (code "+codeMatch[1]+")":"";
      ibkrStatus("⚠ "+msg+code,true,pfKey);
      document.getElementById("ibkr-preview-"+pfKey).innerHTML=`<pre style="font-size:10px;color:var(--muted);white-space:pre-wrap;max-height:200px;overflow:auto;padding:8px;background:var(--bg);border-radius:6px;margin-top:8px">${reqXml.replace(/</g,"&lt;")}</pre>`;
      return;
    }
    const refCode=refMatch[1];
    ibkrStatus(`Got ref ${refCode}, waiting...`,false,pfKey);

    // Step 2: Poll for result (IBKR needs time to generate)
    let xml=null;
    for(let attempt=0;attempt<8;attempt++){
      await new Promise(r=>setTimeout(r,3000)); // 3s between polls
      ibkrStatus(`Fetching... (attempt ${attempt+1})`,false,pfKey);
      const fUrl=`${w}/?action=fetch&token=${encodeURIComponent(tok)}&referenceCode=${refCode}`;
      const fResp=await fetch(fUrl);
      const fText=await fResp.text();
      if(fText.includes("<FlexQueryResponse")||fText.includes("<FlexStatements")){xml=fText;break;}
      if(fText.includes("Statement generation in progress")){continue;}
      // Check for error
      const fErr=fText.match(/<ErrorMessage>([^<]+)<\/ErrorMessage>/);
      if(fErr){ibkrStatus("⚠ "+fErr[1],true,pfKey);return;}
    }
    if(!xml){ibkrStatus("⚠ Timed out waiting for report",true,pfKey);return;}

    // Step 3: Parse XML
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,"text/xml");
    const parseErr=doc.querySelector("parsererror");
    if(parseErr){ibkrStatus("⚠ XML parse error",true,pfKey);return;}

    // Build ticker→stock mapping (match by symbol)
    const tickerMap={};
    Object.keys(stocks).forEach(t=>{
      tickerMap[t]=t; // exact match
      if(stocks[t].tdSymbol){
        const base=stocks[t].tdSymbol.split(":")[0];
        tickerMap[base]=t;
      }
    });
    function resolveT(sym){return tickerMap[sym]||tickerMap[sym.replace(/\s+/g,"")]||null;}

    // Parse positions
    const positions=doc.querySelectorAll("OpenPosition");
    const posData={};
    positions.forEach(p=>{
      const sym=p.getAttribute("symbol");
      const qty=parseFloat(p.getAttribute("position")||p.getAttribute("quantity")||0);
      const cost=parseFloat(p.getAttribute("costBasisPrice")||p.getAttribute("costPrice")||0);
      const ccy=p.getAttribute("currency")||"USD";
      const mktVal=parseFloat(p.getAttribute("markPrice")||p.getAttribute("marketPrice")||0);
      if(qty===0)return;
      const t=resolveT(sym);
      if(!posData[sym])posData[sym]={sym,t,qty:0,cost:0,ccy,mktVal};
      posData[sym].qty+=qty;
      posData[sym].cost=cost;
      posData[sym].mktVal=mktVal;
    });

    // Parse cash balances
    const cashNodes=doc.querySelectorAll("CashReportCurrency");
    let cashEUR=0,cashUSD=0;
    cashNodes.forEach(cn=>{
      const ccy=cn.getAttribute("currency");
      const bal=parseFloat(cn.getAttribute("endingCash")||cn.getAttribute("endingSettledCash")||0);
      if(ccy==="EUR")cashEUR+=bal;
      else if(ccy==="USD")cashUSD+=bal;
    });
    if(!cashEUR&&!cashUSD){
      const cashBal=doc.querySelectorAll("CashBalance");
      cashBal.forEach(cb=>{
        const ccy=cb.getAttribute("currency");
        const bal=parseFloat(cb.getAttribute("balance")||0);
        if(ccy==="EUR")cashEUR+=bal;
        else if(ccy==="USD")cashUSD+=bal;
      });
    }

    // Parse trades (recent executions)
    const trades=doc.querySelectorAll("Trade, Order");
    const tradeData=[];
    trades.forEach(tr=>{
      const sym=tr.getAttribute("symbol");
      const side=tr.getAttribute("buySell")||tr.getAttribute("side")||"";
      const qty=Math.abs(parseFloat(tr.getAttribute("quantity")||0));
      const price=parseFloat(tr.getAttribute("tradePrice")||tr.getAttribute("price")||0);
      const date=tr.getAttribute("tradeDate")||tr.getAttribute("dateTime")||"";
      const t=resolveT(sym);
      if(qty>0)tradeData.push({sym,t,side,qty,price,date});
    });

    // Step 4: Show preview before applying
    let matched=0,unmatched=[];
    Object.values(posData).forEach(p=>{if(p.t)matched++;else unmatched.push(p.sym);});
    const totalCash=cashEUR+cashUSD/settings.fxRate;
    const pfName=pfKey==="nl"?"Caca":"Personal";

    let preview=`<div style="font-size:11px;color:var(--text);margin-top:8px;padding:10px;background:var(--bg);border-radius:8px">
      <div style="font-weight:700;margin-bottom:6px">📋 Preview (${Object.keys(posData).length} positions found)</div>`;
    Object.values(posData).forEach(p=>{
      const col=p.t?"var(--green)":"var(--red)";
      const label=p.t?`→ ${p.t}`:"⚠ no match";
      preview+=`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border)">
        <span>${p.sym} <span style="color:${col}">${label}</span></span>
        <span style="font-family:var(--mono)">${p.qty} @ ${p.cost.toFixed(2)} ${p.ccy}</span></div>`;
      // Show tranche split preview
      if(p.t){
        const s=stocks[p.t];const sigs=[];
        if(s?.signals?.mos)sigs.push("MOS");
        if(s?.signals?.tenCap)sigs.push("10Cap");
        if(s?.signals?.pbt)sigs.push("PBT");
        if(!sigs.length)sigs.push("PBT");
        const SC={MOS:"#34d399","10Cap":"#60a5fa",PBT:"#a78bfa"};
        const per=Math.floor(p.qty/sigs.length*100)/100;
        preview+=`<div style="padding:1px 0 3px 12px;font-size:10px;color:var(--muted)">→ ${sigs.map((sg,i)=>{
          const sh=i===sigs.length-1?(p.qty-per*(sigs.length-1)).toFixed(2):per.toFixed(2);
          return`<span style="color:${SC[sg]||"#a78bfa"}">${sg}</span> ${sh}sh`;}).join(" · ")}</div>`;
      }
    });
    if(totalCash>0)preview+=`<div style="margin-top:4px">Cash: €${Math.round(cashEUR).toLocaleString()} + $${Math.round(cashUSD).toLocaleString()} (€${Math.round(totalCash).toLocaleString()} total)</div>`;
    if(tradeData.length)preview+=`<div>${tradeData.length} recent trades found</div>`;
    if(unmatched.length)preview+=`<div style="color:var(--red);margin-top:4px">Unmatched: ${unmatched.join(", ")} — add these to your stock list first</div>`;
    preview+=`<div style="margin-top:8px">
      <button class="settings-save" onclick="applyIBKR('${pfKey}')">✓ Apply to ${pfName}</button></div></div>`;

    document.getElementById("ibkr-preview-"+pfKey).innerHTML=preview;
    window["_ibkrData_"+pfKey]={posData,cashEUR,cashUSD,tradeData};
    ibkrStatus(`✓ ${matched} matched, ${unmatched.length} unmatched`,false,pfKey);

  }catch(err){
    ibkrStatus("⚠ "+err.message,true,pfKey);
    document.getElementById("ibkr-preview-"+pfKey).innerHTML=`<pre style="font-size:10px;color:var(--red);white-space:pre-wrap;padding:8px;background:var(--bg);border-radius:6px;margin-top:8px">${err.stack||err.message}</pre>`;
  }
}

function applyIBKR(pfKey){
  const data=window["_ibkrData_"+pfKey];
  if(!data){ibkrStatus("⚠ No sync data — sync first",true,pfKey);return;}
  if(!confirm(`Replace all ${portfolios[pfKey].name} positions with IBKR data?`))return;

  const pf=portfolios[pfKey];

  // Clear existing positions for matched stocks
  Object.values(data.posData).forEach(p=>{
    if(!p.t)return;
    const s=stocks[p.t];
    const existing=pf.positions[p.t];
    const existingShares=existing?posShares(existing):0;

    if(existing&&Math.abs(existingShares-p.qty)<0.5){
      // Share count matches — just update cost basis
      existing.tranches.forEach(tr=>{tr.buyPrice=p.cost;});
    }else{
      // Rebuild: split shares equally across active signals for DCA sell targets
      const signals=[];
      if(s?.signals?.mos)signals.push("MOS");
      if(s?.signals?.tenCap)signals.push("10Cap");
      if(s?.signals?.pbt)signals.push("PBT");
      // If no signals firing, use all 3 as placeholders
      if(!signals.length)signals.push("PBT");

      const perTranche=p.qty/signals.length;
      const tranches=signals.map((sig,i)=>{
        // Last tranche gets remainder to avoid rounding loss
        const shares=i===signals.length-1?p.qty-perTranche*(signals.length-1):Math.floor(perTranche*100)/100;
        return{signal:sig,bought:shares,sold:0,buyPrice:p.cost,state:"accumulating"};
      });
      pf.positions[p.t]={tranches};
    }

    // Update current price if IBKR has newer
    if(p.mktVal&&stocks[p.t]){stocks[p.t].currentPrice=p.mktVal;stocks[p.t].lastUpdate=Date.now();stocks[p.t].priceSource="ibkr";updateSignals(p.t);}
  });

  // Update cash as dry powder
  const totalCash=data.cashEUR+(data.cashUSD/settings.fxRate);
  if(totalCash>0)pf.dryPowder=Math.round(totalCash);

  save();render();showBuyModals();
  ibkrStatus(`✓ Applied to ${pf.name}`,false,pfKey);
  document.getElementById("ibkr-preview-"+pfKey).innerHTML="";
  window["_ibkrData_"+pfKey]=null;
}

// ============ AUTO IBKR SYNC (silent, no preview/confirm) ============
async function autoSyncIBKR(pfKey){
  const w=settings.ibkrWorker;
  const tok=pfKey==="nl"?settings.ibkrTokenNl:settings.ibkrTokenPersonal;
  const qid=pfKey==="nl"?settings.ibkrQueryNl:settings.ibkrQueryPersonal;
  if(!w||!tok||!qid)return false; // silently skip if not configured

  try{
    // Step 1: Request report
    const reqResp=await fetch(`${w}/?action=request&token=${encodeURIComponent(tok)}&queryId=${encodeURIComponent(qid)}`);
    const reqXml=await reqResp.text();
    const refMatch=reqXml.match(/<ReferenceCode>(\d+)<\/ReferenceCode>/);
    if(!refMatch)return false;

    // Step 2: Poll for result
    let xml=null;
    for(let attempt=0;attempt<8;attempt++){
      await new Promise(r=>setTimeout(r,3000));
      const fResp=await fetch(`${w}/?action=fetch&token=${encodeURIComponent(tok)}&referenceCode=${refMatch[1]}`);
      const fText=await fResp.text();
      if(fText.includes("<FlexQueryResponse")||fText.includes("<FlexStatements")){xml=fText;break;}
      if(fText.includes("Statement generation in progress"))continue;
      return false;
    }
    if(!xml)return false;

    // Step 3: Parse + apply directly (no preview)
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,"text/xml");
    if(doc.querySelector("parsererror"))return false;

    const tickerMap={};
    Object.keys(stocks).forEach(t=>{tickerMap[t]=t;if(stocks[t].tdSymbol){tickerMap[stocks[t].tdSymbol.split(":")[0]]=t;}});
    const resolveT=sym=>tickerMap[sym]||tickerMap[sym.replace(/\s+/g,"")]||null;

    // Parse positions
    const pf=portfolios[pfKey];
    doc.querySelectorAll("OpenPosition").forEach(p=>{
      const sym=p.getAttribute("symbol");
      const qty=parseFloat(p.getAttribute("position")||p.getAttribute("quantity")||0);
      const cost=parseFloat(p.getAttribute("costBasisPrice")||p.getAttribute("costPrice")||0);
      const mktVal=parseFloat(p.getAttribute("markPrice")||p.getAttribute("marketPrice")||0);
      if(qty===0)return;
      const t=resolveT(sym);if(!t)return;

      const existing=pf.positions[t];
      const existingShares=existing?posShares(existing):0;
      if(existing&&Math.abs(existingShares-qty)<0.5){
        existing.tranches.forEach(tr=>{tr.buyPrice=cost;});
      }else{
        const sigs=[];
        if(stocks[t]?.signals?.mos)sigs.push("MOS");
        if(stocks[t]?.signals?.tenCap)sigs.push("10Cap");
        if(stocks[t]?.signals?.pbt)sigs.push("PBT");
        if(!sigs.length)sigs.push("PBT");
        const per=qty/sigs.length;
        pf.positions[t]={tranches:sigs.map((sig,i)=>({signal:sig,bought:i===sigs.length-1?qty-per*(sigs.length-1):Math.floor(per*100)/100,sold:0,buyPrice:cost,state:"accumulating"}))};
      }
      if(mktVal&&stocks[t]){stocks[t].currentPrice=mktVal;stocks[t].lastUpdate=Date.now();stocks[t].priceSource="ibkr";updateSignals(t);}
    });

    // Parse cash
    let cashEUR=0,cashUSD=0;
    doc.querySelectorAll("CashReportCurrency").forEach(cn=>{const ccy=cn.getAttribute("currency"),bal=parseFloat(cn.getAttribute("endingCash")||cn.getAttribute("endingSettledCash")||0);if(ccy==="EUR")cashEUR+=bal;else if(ccy==="USD")cashUSD+=bal;});
    if(!cashEUR&&!cashUSD)doc.querySelectorAll("CashBalance").forEach(cb=>{const ccy=cb.getAttribute("currency"),bal=parseFloat(cb.getAttribute("balance")||0);if(ccy==="EUR")cashEUR+=bal;else if(ccy==="USD")cashUSD+=bal;});
    const totalCash=cashEUR+(cashUSD/settings.fxRate);
    if(totalCash>0)pf.dryPowder=Math.round(totalCash);

    return true;
  }catch(e){return false;}
}

function handleCSVImport(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=function(ev){
    const lines=ev.target.result.split("\n").filter(l=>l.trim());if(lines.length<2)return alert("Empty CSV");
    const hdr=lines[0].split(",").map(h=>h.trim().toLowerCase());let n=0;
    for(let i=1;i<lines.length;i++){const v=lines[i].split(",").map(x=>x.trim());const row={};hdr.forEach((h,j)=>row[h]=v[j]??"");
      const t=(row.ticker||"").toUpperCase();if(!t||!stocks[t])continue;const s=stocks[t];
      // Empty cell = clear to null. Non-empty = set value.
      const set=(key,val)=>{if(val==="")return null;const n=+val;return isNaN(n)?null:n;};
      if(hdr.includes("sticker"))s.cons.sticker=set("sticker",row.sticker);
      if(hdr.includes("mos")){
        const oldSticker=s.cons.sticker;
        s.cons.mos=set("mos",row.mos);s.cons.sticker=s.cons.mos?s.cons.mos*2:s.cons.sticker;
        if(oldSticker&&s.cons.sticker&&s.cons.sticker!==oldSticker)s.cons.prevSticker=oldSticker;
      }
      if(hdr.includes("tencap"))s.cons.tenCap=set("tencap",row.tencap);
      if(hdr.includes("pbt"))s.cons.pbt=set("pbt",row.pbt);
      if(hdr.includes("pbtyrs"))s.cons.pbtYrs=set("pbtyrs",row.pbtyrs);
      if(hdr.includes("gr"))s.cons.gr=set("gr",row.gr);
      if(hdr.includes("oe"))s.cons.oe=set("oe",row.oe);
      if(hdr.includes("fcf"))s.cons.fcf=set("fcf",row.fcf);
      // Auto-calculate tenCap from OE
      if(s.cons.oe!=null)s.cons.tenCap=+(s.cons.oe*10).toFixed(2);
      // Auto-calculate PBT from FCF+gr
      if(s.cons.fcf!=null&&s.cons.gr!=null){const g=s.cons.gr/100;let sum=0;for(let y=1;y<=8;y++)sum+=s.cons.fcf*Math.pow(1+g,y);s.cons.pbt=+sum.toFixed(2);}
      updateSignals(t);n++;}
    save();render();alert(`Updated ${n} stocks.`);};r.readAsText(f);e.target.value="";
}

function handleExcelImport(e){
  const f=e.target.files[0];if(!f)return;
  if(typeof XLSX==="undefined"){alert("SheetJS loading... try again.");e.target.value="";return;}
  if(!confirm("This will overwrite stocks, positions & settings with the Excel file. Continue?")){e.target.value="";return;}

        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Stocks"]);
        rows.forEach(row=>{
          const t=String(row.ticker||"").toUpperCase().trim();if(!t)return;

            if(row.name!=null)s.name=String(row.name);

            if(row.status!=null)s.status=String(row.status);
            if(row.tdSymbol!=null)s.tdSymbol=String(row.tdSymbol);
            if(row.currentPrice!=null)s.currentPrice=vn(row.currentPrice)??s.currentPrice;
            s.cons.mos=vn(row.mos);s.cons.tenCap=vn(row.tenCap);
            s.cons.pbt=vn(row.pbt);s.cons.pbtYrs=vn(row.pbtYrs);s.cons.gr=vn(row.gr);
            s.cons.oe=vn(row.oe);s.cons.fcf=vn(row.fcf);
            // Auto-calc tenCap from OE, PBT from FCF+gr
            if(s.cons.oe!=null)s.cons.tenCap=+(s.cons.oe*10).toFixed(2);
            if(s.cons.fcf!=null&&s.cons.gr!=null){const g=s.cons.gr/100;let sum=0;for(let y=1;y<=8;y++)sum+=s.cons.fcf*Math.pow(1+g,y);s.cons.pbt=+sum.toFixed(2);}
            s.cons.sticker=s.cons.mos?s.cons.mos*2:(vn(row.sticker)||null);
            if(row.prevSticker!=null)s.cons.prevSticker=vn(row.prevSticker);
            if(row.gate!=null)s.gate=String(row.gate)==="FAIL"?false:true;
            if(row.philSticker!=null||row.philGR!=null){
              s.phil={sticker:vn(row.philSticker),mos:vn(row.philMOS),tenCap:vn(row.philTenCap),
                pbt:vn(row.philPBT),gr:vn(row.philGR),score:row.philScore?String(row.philScore):null};}
          }else{
            const ccy=String(row.currency||"USD");const flags={USD:"🇺🇸",EUR:"🇪🇺",GBp:"🇬🇧"};
            const mos=vn(row.mos);
            stocks[t]={name:String(row.name||t),currency:ccy,moat:String(row.moat||"Wide"),sector:"",
              flag:flags[ccy]||"🌍",status:String(row.status||"watchlist"),tdSymbol:String(row.tdSymbol||t),
              priceMult:1,currentPrice:vn(row.currentPrice)||0,gate:row.gate==="FAIL"?false:true,
              cons:{sticker:mos?mos*2:(vn(row.sticker)||null),mos:mos,tenCap:vn(row.tenCap),pbt:vn(row.pbt),pbtYrs:vn(row.pbtYrs),gr:vn(row.gr),oe:vn(row.oe),fcf:vn(row.fcf),prevSticker:vn(row.prevSticker)||null},
              phil:null,signals:{mos:false,tenCap:false,pbt:false}};
          }
          updateSignals(t);nStocks++;
        });
      }

      // Sheet 2: Positions — parse first, then replace
      if(wb.SheetNames.includes("Positions")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Positions"]);
        if(rows.length>0){
          // Build new positions map first
          const newPos={};Object.keys(portfolios).forEach(pk=>{newPos[pk]={};});
          rows.forEach(row=>{
            const pk=String(row.portfolio||"personal");const t=String(row.ticker||"").toUpperCase().trim();
            if(!t||!newPos[pk])return;
            if(!newPos[pk][t])newPos[pk][t]={tranches:[]};
            newPos[pk][t].tranches.push({
              signal:String(row.signal||"PBT"),bought:Number(row.bought)||0,
              sold:Number(row.sold)||0,buyPrice:Number(row.buyPrice)||0,
              ath:row.ath?Number(row.ath):undefined,state:String(row.state||"accumulating")});
            nPos++;
          });
          // Only replace after successful parse
          Object.keys(newPos).forEach(pk=>{if(portfolios[pk])portfolios[pk].positions=newPos[pk];});
        }
      }

      // Sheet 3: Settings
      if(wb.SheetNames.includes("Settings")){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets["Settings"]);
        rows.forEach(row=>{
          const k=String(row.key||""),val=row.value;

      save();render();

    }catch(err){alert("Import error: "+err.message);}
  };r.readAsArrayBuffer(f);e.target.value="";
}

// Sell target base per signal type: "sticker" for that method
function sellBase(s,signal){
  // Sell sticker = 2× buy trigger for each signal type
  if(signal==="MOS")return s.cons.mos?s.cons.mos*2:null;
  if(signal==="10Cap")return s.cons.tenCap?s.cons.tenCap*2:null;
  if(signal==="PBT")return s.cons.pbt?s.cons.pbt*2:null;
  if(signal==="trophy")return -1; // special: always tracking, no sticker gate
  return null; // hold — no sell sticker
}

// ============ ALERT SYSTEM ============
let dismissedAlerts=JSON.parse(localStorage.getItem("r1-dismissed")||"{}");
function dismissAlert(key){dismissedAlerts[key]=Date.now();localStorage.setItem("r1-dismissed",JSON.stringify(dismissedAlerts));}
// Clean dismissed alerts older than 7 days
function cleanDismissed(){const week=7*86400000;const now=Date.now();Object.keys(dismissedAlerts).forEach(k=>{if(now-dismissedAlerts[k]>week)delete dismissedAlerts[k];});localStorage.setItem("r1-dismissed",JSON.stringify(dismissedAlerts));}

function checkAlerts(){
  cleanDismissed();
  const alerts=[];
  const GRID=getGrid(),WL=getWatchlist();

  // CRITICAL: 4M GATE FAIL — sell all (highest priority)
  Object.entries(stocks).forEach(([t,s])=>{
    if(s.gate===false&&(s.status==="grid"||s.status==="trophy")){
      const k=`gate-fail-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"critical",icon:"🚫",
        html:`<strong>${s.flag} ${t}</strong> 4M GATE FAILED — SELL ALL tranches immediately!`});}
  });

  // STICKER DROP >20% — flag for re-audit
  Object.entries(stocks).forEach(([t,s])=>{
    if(!s.cons?.prevSticker||!s.cons?.sticker)return;
    if(s.cons.sticker<s.cons.prevSticker*0.80){
      const drop=Math.round((1-s.cons.sticker/s.cons.prevSticker)*100);
      const k=`sticker-drop-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"sell",icon:"📉",
        html:`<strong>${s.flag} ${t}</strong> sticker dropped <strong>${drop}%</strong> (${fmt(s.cons.prevSticker,s.currency)} → ${fmt(s.cons.sticker,s.currency)}). Full 4M re-audit needed!`});}
  });

  // TRAILING STOP — SELL (critical, per-tranche)
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.entries(pf.positions).forEach(([t,pos])=>{
      const s=stocks[t];if(!s?.currentPrice)return;
      pos.tranches.forEach(tr=>{
        if(tr.state!=="stopped"&&tr.state!=="stopActive")return;
        if(!tr.ath||(tr.bought-tr.sold)<=0)return;
        const base=sellBase(s,tr.signal);if(base===null)return;
        const isTrophy=(base===-1);
        const validATH=isTrophy||tr.ath>=base;
        if(!validATH)return;
        const dd=((tr.ath-s.currentPrice)/tr.ath*100);
        if(dd>=25){const k=`trail-${pk}-${t}-${tr.signal}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"critical",icon:"🚨",
          html:`<strong>${s.flag} ${t}</strong> ${tr.signal} trailing stop! Down <strong>−${dd.toFixed(1)}%</strong> from ATH ${fmt(tr.ath.toFixed(2),s.currency)} in ${pf.name}. <strong>SELL ${tr.signal} tranche.</strong>`});}
        // STOP BUFFER WARNING — within 5% of stop
        else if(dd>=20){const k=`buffer-${pk}-${t}-${tr.signal}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"watch",icon:"⚠",
          html:`<strong>${s.flag} ${t}</strong> ${tr.signal} approaching stop — <strong>−${dd.toFixed(1)}%</strong> from ATH ${fmt(tr.ath.toFixed(2),s.currency)} in ${pf.name}. Stop at −25%.`});}
      });
    });
  });

  // STICKER CROSSED — first time price crosses tranche sticker (info)
  ["personal","nl"].forEach(pk=>{
    const pf=portfolios[pk];if(!pf)return;
    Object.entries(pf.positions).forEach(([t,pos])=>{
      const s=stocks[t];if(!s?.currentPrice)return;
      pos.tranches.forEach(tr=>{
        if(tr._justCrossed){
          const k=`crossed-${pk}-${t}-${tr.signal}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"info",icon:"📈",
            html:`<strong>${s.flag} ${t}</strong> ${tr.signal} tranche crossed sell sticker in ${pf.name}! ATH tracking now active.`});
          delete tr._justCrossed;
        }
      });
    });
  });

  // BUY SIGNALS — grid stocks with active signals
  GRID.forEach(t=>{
    const s=stocks[t];if(!s?.currentPrice||s.gate===false)return;
    const p=s.currentPrice, c=s.cons;
    if(c.mos&&p<=c.mos){const k=`buy-mos-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"buy",icon:"🟢",
      html:`<strong>${s.flag} ${t}</strong> at <strong>${fmt(p,s.currency)}</strong> — below MOS ${fmt(c.mos,s.currency)}! Screaming buy.`});}
    else if(c.tenCap&&p<=c.tenCap){const k=`buy-tc-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"buy",icon:"🔵",
      html:`<strong>${s.flag} ${t}</strong> at <strong>${fmt(p,s.currency)}</strong> — below Ten Cap ${fmt(c.tenCap,s.currency)}`});}
    else if(c.pbt&&p<=c.pbt){const k=`buy-pbt-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"buy",icon:"🟣",
      html:`<strong>${s.flag} ${t}</strong> at <strong>${fmt(p,s.currency)}</strong> — below PBT ${fmt(c.pbt,s.currency)}`});}
  });

  // SIGNAL OFF — price rose above a previously active trigger
  Object.entries(stocks).forEach(([t,s])=>{
    if(!s._sigChanges?.length)return;
    const names={mos:"MOS",tenCap:"Ten Cap",pbt:"PBT"};
    s._sigChanges.filter(c=>c.dir==="off").forEach(c=>{
      const k=`sig-off-${t}-${c.sig}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"info",icon:"ℹ️",
        html:`<strong>${s.flag} ${t}</strong> ${names[c.sig]} signal turned off — price above ${fmt(s.cons[c.sig],s.currency)}`});
    });
    s._sigChanges=[];
  });

  // WATCHLIST — within 10% of nearest trigger
  WL.forEach(t=>{
    const s=stocks[t],nt=nearestTrigger(t);
    if(!s?.currentPrice||!nt)return;
    const gap=(s.currentPrice-nt)/s.currentPrice;
    if(gap>0&&gap<=0.10){const k=`watch-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"watch",icon:"👁",
      html:`<strong>${s.flag} ${t}</strong> approaching buy zone — ${fmt(s.currentPrice,s.currency)} is ${Math.round(gap*100)}% above trigger ${fmt(nt,s.currency)}`});}
    else if(gap<=0){const k=`watch-fire-${t}`;if(!dismissedAlerts[k])alerts.push({key:k,type:"buy",icon:"⚡",
      html:`<strong>${s.flag} ${t}</strong> on watchlist just hit a trigger! Price ${fmt(s.currentPrice,s.currency)} ≤ ${fmt(nt,s.currency)} — consider adding to grid`});}
  });

  // Render
  const el=document.getElementById("alert-banner");
  if(!alerts.length){el.innerHTML="";return;}
  el.innerHTML=alerts.map(a=>`<div class="alert-item ${a.type}">
    <span class="alert-icon">${a.icon}</span>
    <div class="alert-text">${a.html}</div>
    <span class="alert-dismiss" onclick="dismissAlert('${a.key}');checkAlerts()">✕</span>
  </div>`).join("");
}

// ============ BUY SIGNAL MODAL ============
let buyModalQueue=[];
function queueBuyModal(ticker,signal){
  // Only queue if not already dismissed recently (1 hour cooldown per signal)
  const k=`buymodal-${ticker}-${signal}`;
  if(dismissedAlerts[k]&&Date.now()-dismissedAlerts[k]<3600000)return;
  if(!buyModalQueue.find(q=>q.ticker===ticker&&q.signal===signal))
    buyModalQueue.push({ticker,signal});
}
function showBuyModals(){
  if(!buyModalQueue.length){document.getElementById("buy-modal").innerHTML="";return;}
  const q=buyModalQueue[0]; // Show one at a time
  const s=stocks[q.ticker];if(!s)return;
  const sigNames={mos:"MOS — Margin of Safety",tenCap:"10Cap — Owner's Earnings",pbt:"PBT — Payback Time"};
  const sigColors={mos:"#34d399",tenCap:"#60a5fa",pbt:"#a78bfa"};
  const sigIcons={mos:"🟢",tenCap:"🔵",pbt:"🟣"};
  const triggerPrice=q.signal==="mos"?s.cons.mos:q.signal==="tenCap"?s.cons.tenCap:s.cons.pbt;
  const discount=triggerPrice?Math.round((1-s.currentPrice/triggerPrice)*100):0;
  document.getElementById("buy-modal").innerHTML=`
    <div class="buy-modal-overlay" onclick="if(event.target===this)dismissBuyModal()">
      <div class="buy-modal">
        <div class="buy-modal-icon">${sigIcons[q.signal]||"🚀"}</div>
        <div class="buy-modal-title">New Buy Signal!</div>
        <div class="buy-modal-stock">${s.flag} ${q.ticker}</div>
        <div style="font-size:13px;color:var(--muted)">${s.name}</div>
        <div class="buy-modal-signal" style="background:${sigColors[q.signal]}20;color:${sigColors[q.signal]};border:1px solid ${sigColors[q.signal]}40">${sigNames[q.signal]||q.signal}</div>
        <div class="buy-modal-price">${fmt(s.currentPrice,s.currency)}</div>
        <div class="buy-modal-detail">Trigger: ${fmt(triggerPrice,s.currency)}${discount>0?` · ${discount}% below`:" · at trigger"}</div>
        <div class="buy-modal-detail">Grid now: ${totalSignals()}/${gridSize()} signals</div>
        <button class="buy-modal-dismiss" onclick="dismissBuyModal()">GOT IT</button>
      </div>
    </div>`;
}
function dismissBuyModal(){
  if(buyModalQueue.length){
    const q=buyModalQueue.shift();
    dismissAlert(`buymodal-${q.ticker}-${q.signal}`);
  }
  if(buyModalQueue.length)showBuyModals(); // Show next in queue
  else document.getElementById("buy-modal").innerHTML="";
}

function render(){
  const ts=totalSignals(),gs=gridSize();
  document.getElementById("grid-count").textContent=ts;
  document.getElementById("grid-total").textContent=gs; // FIX #1
  const b=document.getElementById("grid-badge");b.textContent=ts+"/"+gs;
  b.style.background=ts>=gs*.66?"#0d3320":ts>=gs*.33?"#332d0d":"#331a0d";
  b.style.color=ts>=gs*.66?"#34d399":ts>=gs*.33?"#fbbf24":"#f87171";
  if(settings.lastFetch){document.getElementById("refresh-status").textContent="✓ "+new Date(settings.lastFetch).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}
  // Show selected portfolio value
  const totalV=pfValueEUR(currentPf);
  const pfLabel=currentPf==="personal"?"🧑":"🧓";

    <button class="${currentPf==="personal"?"active":"inactive"}" onclick="currentPf='personal';render()">🧑 Personal</button>
    <button class="${currentPf==="nl"?"active":"inactive"}" onclick="currentPf='nl';render()">🧓 Caca</button>
  </div><div class="section-pad">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:11px;color:var(--muted);background:var(--card);padding:3px 8px;border-radius:4px">${pf.type==="closed"?"Closed":"Rolling €"+settings.monthlyIncome.toLocaleString()+"/mo"}</span>
    <span style="font-size:13px;font-weight:700;font-family:var(--mono);color:var(--accent)">€${Math.round(val).toLocaleString()}</span>
  </div>`;

  // Signal summary grid (compact)

    [{on:s.signals.mos,p:s.cons.mos},{on:s.signals.tenCap,p:s.cons.tenCap},{on:s.signals.pbt,p:s.cons.pbt}].forEach(({on,p})=>{
      h+=`<div><div class="sig-dot">${on?"🟢":"⚫"}</div><div class="sig-price">${fmt(p,s.currency)}</div></div>`;});
    h+=`<div style="text-align:center;font-size:14px;font-weight:700;font-family:var(--mono);color:${sig===3?"var(--green)":sig?"var(--accent)":"var(--muted)"}">${sig}/3</div></div>`;});
  h+=`<div class="sig-total-row"><div style="font-size:12px;font-weight:700;color:var(--muted)">TOTAL</div>
    <div style="text-align:center;font-size:12px;font-family:var(--mono);color:var(--muted)">${GRID.filter(t=>stocks[t].signals.mos).length}/${GRID.length}</div>
    <div style="text-align:center;font-size:12px;font-family:var(--mono);color:var(--muted)">${GRID.filter(t=>stocks[t].signals.tenCap).length}/${GRID.length}</div>
    <div style="text-align:center;font-size:12px;font-family:var(--mono);color:var(--muted)">${GRID.filter(t=>stocks[t].signals.pbt).length}/${GRID.length}</div>
    <div style="text-align:center;font-size:14px;font-weight:700;font-family:var(--mono);color:var(--accent)">${ts}/${gs}</div></div></div>`;

  // Per-stock unified cards
  h+=`<div class="pos-grid">`;
  const tickers=Object.keys(pf.positions);
  if(!tickers.length)h+=`<div style="color:var(--muted);font-size:13px;padding:20px;text-align:center">No positions. Tap + Add below.</div>`;
  const SC={MOS:"#34d399","10Cap":"#60a5fa",PBT:"#a78bfa",trophy:"#c084fc",hold:"#818cf8"};
  tickers.forEach(ticker=>{
    const pos=pf.positions[ticker];const s=stocks[ticker];if(!s)return;
    const shares=posShares(pos);if(shares<=0&&!pos.tranches.length)return;
    const avg=posAvgPrice(pos);const sig=sigCount(ticker);const nTr=posTranchesOwned(pos);
    const posVal=shares*(s.currentPrice||0);const pnl=avg&&s.currentPrice?((s.currentPrice-avg)/avg*100):0;
    const badge=s.status==="trophy"?`<span class="pos-badge" style="background:#332d0d;color:var(--amber)">TROPHY</span>`:
      s.status==="hold"?`<span class="pos-badge" style="background:#1a1a2e;color:#818cf8">HOLD</span>`:
      s.status==="grid"?`<span class="pos-badge" style="background:#0d3320;color:var(--green)">GRID ${sig}/3</span>`:"";

    h+=`<div class="pos-card">
      <div class="pos-header"><div><div style="display:flex;align-items:center;gap:6px"><span class="pos-ticker">${s.flag} ${ticker}</span>${badge}</div><div class="pos-sub">${s.name} · ${s.moat}</div></div>
        <div style="text-align:right"><div class="pos-price-val">${fmt(s.currentPrice,s.currency)}</div><div class="pos-pnl" style="color:${pnl>=0?"var(--green)":"var(--red)"}">${pnl>=0?"+":""}${pnl.toFixed(1)}%</div><div style="font-size:9px;color:var(--muted);font-family:var(--mono)">${s.priceSource==="ibkr"?"⚡":""}${timeAgo(s.lastUpdate)}</div></div></div>`;

    // Stats row
    h+=`<div class="stat-row" style="margin:8px 0">
      <div class="stat-box"><div class="stat-label">Shares</div><div class="stat-val">${fmtSh(shares)}</div></div>
      <div class="stat-box"><div class="stat-label">Avg</div><div class="stat-val">${fmt(avg.toFixed(2),s.currency)}</div></div>
      <div class="stat-box"><div class="stat-label">Value</div><div class="stat-val">${fmt(Math.round(posVal),s.currency)}</div></div></div>`;

    // Tranche rows with sell stickers inline
    const active=pos.tranches.filter(t=>(t.bought-t.sold)>0);
    active.forEach((tr,i)=>{
      const origIdx=pos.tranches.indexOf(tr);
      const sh=tr.bought-tr.sold;const col=SC[tr.signal]||"var(--muted)";
      const isTrophy=tr.signal==="trophy";const isHold=tr.signal==="hold";
      const buyTrigger=tr.signal==="MOS"?s.cons.mos:tr.signal==="10Cap"?s.cons.tenCap:tr.signal==="PBT"?s.cons.pbt:null;
      const sellSticker=sellBase(s,tr.signal);
      const hasSellSticker=sellSticker&&sellSticker>0;
      const ath=tr.ath;const cp=s.currentPrice;
      const dd=ath&&cp?((ath-cp)/ath*100):0;
      const ddCol=dd>=25?"var(--red)":dd>=15?"var(--amber)":"var(--green)";
      const stopHit=dd>=25;
      const state=tr.state||"accumulating";
      const stateIcon=state==="stopped"?"🚨":state==="stopActive"?"📈":"";

      h+=`<div style="padding:8px;background:var(--bg);border-radius:8px;border-left:3px solid ${col};margin-bottom:4px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="tr-signal" style="background:${col}22;color:${col}">${tr.signal}</span>
            <span style="font-size:13px;font-family:var(--mono);font-weight:600">${fmtSh(sh)} sh</span>
            <span style="font-size:10px;color:var(--muted)">@ ${fmt(tr.buyPrice,s.currency)}</span>
          </div>
          <span style="font-size:10px;color:var(--accent);cursor:pointer;padding:2px 6px" onclick="openTrEdit('${currentPf}','${ticker}',${origIdx})">edit</span>
        </div>`;

      // Sell info row
      if(isTrophy){
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:10px;color:var(--muted)">
          <span>25% trail from ATH</span>`;
        if(ath){h+=`<span style="font-family:var(--mono);color:${ddCol};font-weight:600">${stateIcon} ATH ${fmt(ath.toFixed(2),s.currency)} · −${dd.toFixed(1)}%</span>`;}
        h+=`</div>`;
      }else if(!isHold&&hasSellSticker){
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:10px">
          <span style="color:var(--muted)">sell ${fmt(+sellSticker.toFixed(2),s.currency)}</span>`;
        if(ath&&(state==="stopActive"||state==="stopped")){
          h+=`<span style="font-family:var(--mono);color:${ddCol};font-weight:600">${stateIcon} ATH ${fmt(ath.toFixed(2),s.currency)} · −${dd.toFixed(1)}%</span>`;
        }else{
          h+=`<span style="color:var(--muted)">⏳ waiting</span>`;
        }
        h+=`</div>`;
        // Progress bar for active trailing stops
        if(ath&&(state==="stopActive"||state==="stopped")){
          h+=`<div style="margin-top:3px;background:var(--card);border-radius:2px;height:3px;overflow:hidden">
            <div style="height:100%;width:${Math.min(dd/25*100,100)}%;background:${ddCol};border-radius:2px"></div></div>`;
          if(stopHit)h+=`<div style="font-size:9px;color:var(--red);font-weight:700;margin-top:2px">⚠ SELL — stop @ ${fmt((ath*0.75).toFixed(2),s.currency)}</div>`;
        }
      }
      h+=`</div>`;
    });

    // 4M gate badge
    if(s.gate===false){
      h+=`<div style="margin-top:6px;padding:6px;background:#3b111180;border:1px solid var(--red);border-radius:6px;text-align:center">
        <span style="font-size:11px;color:var(--red);font-weight:700">🚫 4M GATE FAILED — SELL ALL</span></div>`;
    }

    h+=`<div class="btn-row">
      <button class="btn-sm btn-accent" style="flex:1" onclick="openAddTranche('${currentPf}','${ticker}')">+ Tranche</button>
      <button class="btn-sm btn-accent" style="flex:0 0 auto" onclick="openEditStock('${ticker}')">✏ Triggers</button>
      <button class="btn-sm btn-red" style="flex:0 0 auto" onclick="removePosition('${currentPf}','${ticker}')">✕</button>
    </div></div>`;
  });

  h+=`</div><button class="btn-sm btn-accent" style="width:100%;padding:10px;margin-top:12px;font-size:13px;font-weight:600" onclick="openAddPosition('${currentPf}')">+ Add Stock to ${pf.name}</button>
  <div style="margin-top:8px;font-size:10px;color:var(--muted);text-align:center">DP: €${pf.dryPowder.toLocaleString()}</div></div>`;
  c.innerHTML=h;
}

      <button class="settings-save" style="background:#3b1111;color:var(--red)" onclick="if(confirm('⚠ Delete ALL data and reset to defaults?')&&confirm('This cannot be undone. Are you sure?')){localStorage.clear();location.reload();}">Wipe & Reset</button></div>
  </div>`;c.innerHTML=h;
}

// ============ STOCK MANAGEMENT ============
function promoteToGrid(t){
  const s=stocks[t];s.status="grid";
  updateSignals(t);save();
  currentTab="signals";render();
  window.scrollTo(0,0);
}
function demoteFromGrid(t){if(!confirm(`Move ${t} to watchlist?`))return;stocks[t].status="watchlist";save();render();}
function removeStock(t){if(!confirm(`Delete ${t} everywhere?`))return;delete stocks[t];["nl","personal"].forEach(p=>{if(portfolios[p]&&portfolios[p].positions)delete portfolios[p].positions[t];});save();render();}
function removePosition(pk,t){if(!confirm(`Remove ${t} from ${portfolios[pk].name}?`))return;delete portfolios[pk].positions[t];save();render();}

// FIX #3+#4: Universal stock edit modal — triggers + metadata + 4M gate
function openEditStock(t){
  const s=stocks[t];if(!s)return;
  showModal(`Edit — ${t}`,[
    {id:"es-name",label:"Name",val:s.name},
    {id:"es-td",label:"TwelveData Symbol",val:s.tdSymbol},
    {id:"es-price",label:"Current Price",val:s.currentPrice,type:"number"},
    {id:"es-moat",label:"Moat (Wide/Narrow)",val:s.moat},
    {id:"es-gr",label:"Growth %",val:s.cons.gr,type:"number"},
    "— Cash Flow Inputs —",
    {id:"es-oe",label:"OE/share (→ Ten Cap)",val:s.cons.oe,type:"number"},
    {id:"es-fcf",label:"FCF/share (→ PBT)",val:s.cons.fcf,type:"number"},
    "— Buy Triggers —",
    {id:"es-mos",label:"MOS (buy trigger)",val:s.cons.mos,type:"number"},
    {id:"es-tc",label:"Ten Cap (buy trigger)",val:s.cons.tenCap,type:"number"},
    {id:"es-pbt",label:"PBT Price (buy trigger)",val:s.cons.pbt,type:"number"},
    {id:"es-pbtyrs",label:"PBT Years",val:s.cons.pbtYrs,type:"number"},
    "— 4M Gate —",
    {id:"es-gate",label:"4M Gate",val:s.gate===false?"FAIL":"PASS",select:["PASS","FAIL"]},
  ],()=>{
    s.name=gv("es-name")||s.name;s.tdSymbol=gv("es-td")||s.tdSymbol;s.moat=gv("es-moat")||s.moat;
    s.currentPrice=nv("es-price")??s.currentPrice;s.cons.gr=nv("es-gr")??s.cons.gr;
    s.cons.oe=nv("es-oe");s.cons.fcf=nv("es-fcf");
    s.cons.mos=nv("es-mos");s.cons.tenCap=nv("es-tc");
    s.cons.pbt=nv("es-pbt");s.cons.pbtYrs=nv("es-pbtyrs");
    // Auto-calculate tenCap from OE if OE provided
    if(s.cons.oe!=null)s.cons.tenCap=+(s.cons.oe*10).toFixed(2);
    // Auto-calculate PBT from FCF+gr if both provided
    if(s.cons.fcf!=null&&s.cons.gr!=null){const g=s.cons.gr/100;let sum=0;for(let y=1;y<=8;y++)sum+=s.cons.fcf*Math.pow(1+g,y);s.cons.pbt=+sum.toFixed(2);}
    // Save previous sticker before recalculating
    const oldSticker=s.cons.sticker;
    // Sticker = 2× MOS (auto-calculated)
    s.cons.sticker=s.cons.mos?s.cons.mos*2:null;
    // Track sticker change for >20% drop detection
    if(oldSticker&&s.cons.sticker&&s.cons.sticker!==oldSticker)s.cons.prevSticker=oldSticker;
    // 4M gate
    const gateVal=gv("es-gate");
    s.gate=(gateVal==="FAIL")?false:true;
    updateSignals(t);save();
  });
}

function openAddStock(){
  showModal("Add New Stock",[
    {id:"ns-ticker",label:"Ticker",val:"",placeholder:"COST"},
    {id:"ns-name",label:"Name",val:"",placeholder:"Costco"},
    {id:"ns-ccy",label:"Currency",val:"USD",select:["USD","EUR","GBp"]},
    {id:"ns-moat",label:"Moat",val:"Wide",select:["Wide","Narrow"]},
    {id:"ns-td",label:"TwelveData Symbol",val:"",placeholder:"COST or AUTO:LSE"},
    {id:"ns-price",label:"Current Price",val:"",type:"number"},
    "— Cash Flow Inputs —",
    {id:"ns-oe",label:"OE/share (→ Ten Cap)",val:"",type:"number"},
    {id:"ns-fcf",label:"FCF/share (→ PBT)",val:"",type:"number"},
    "— Buy Triggers —",
    {id:"ns-mos",label:"MOS",val:"",type:"number"},
    {id:"ns-tc",label:"Ten Cap",val:"",type:"number"},
    {id:"ns-pbt",label:"PBT Price",val:"",type:"number"},
    {id:"ns-gr",label:"Growth %",val:"",type:"number"},
    {id:"ns-pbtyrs",label:"PBT Years",val:"",type:"number"},
  ],()=>{
    const t=(gv("ns-ticker")||"").toUpperCase().trim();if(!t){alert("Enter ticker");return false;}
    if(stocks[t]){alert(t+" exists");return false;}
    const ccy=gv("ns-ccy")||"USD";const flags={USD:"🇺🇸",EUR:"🇪🇺",GBp:"🇬🇧"};
    const mos=nv("ns-mos");const oe=nv("ns-oe");const fcf=nv("ns-fcf");const gr=nv("ns-gr");
    let tc=nv("ns-tc");let pbt=nv("ns-pbt");
    if(oe!=null)tc=+(oe*10).toFixed(2);
    if(fcf!=null&&gr!=null){const g=gr/100;let sum=0;for(let y=1;y<=8;y++)sum+=fcf*Math.pow(1+g,y);pbt=+sum.toFixed(2);}
    stocks[t]={name:gv("ns-name")||t,currency:ccy,moat:gv("ns-moat")||"Wide",sector:"",flag:flags[ccy]||"🌍",
      status:"watchlist",tdSymbol:gv("ns-td")||t,priceMult:1,currentPrice:nv("ns-price")||0,gate:true,
      cons:{sticker:mos?mos*2:null,mos,tenCap:tc,pbt,pbtYrs:nv("ns-pbtyrs"),gr,oe,fcf,prevSticker:null},
      phil:null,signals:{mos:false,tenCap:false,pbt:false}};
    updateSignals(t);save();
  });
}

function openAddPosition(pk){
  const existing=Object.keys(portfolios[pk].positions);
  const avail=Object.keys(stocks).filter(t=>!existing.includes(t));
  if(!avail.length){alert("All stocks in portfolio. Use + Tranche.");return;}
  showModal("Add to "+portfolios[pk].name,[
    {id:"ap-t",label:"Stock",val:avail[0],select:avail.map(t=>t+" — "+stocks[t].name)},
    {id:"ap-sig",label:"Signal",val:"PBT",select:["MOS","10Cap","PBT","hold","trophy"]},
    {id:"ap-sh",label:"Shares",val:0,type:"number"},
    {id:"ap-bp",label:"Buy Price",val:0,type:"number"},
  ],()=>{
    const raw=gv("ap-t");const t=raw.split(" — ")[0].trim();if(!t)return;
    portfolios[pk].positions[t]={tranches:[{signal:gv("ap-sig")||"PBT",bought:nv("ap-sh")||0,sold:0,buyPrice:nv("ap-bp")||0,state:"accumulating"}]};save();
  });
}

// ============ TRANCHE MODALS ============
function openTrEdit(pk,t,i){
  const tr=portfolios[pk].positions[t].tranches[i];const s=stocks[t];
  showModal(`${t} — ${tr.signal}`,[
    {id:"ed-b",label:"Bought",val:tr.bought,type:"number"},
    {id:"ed-s",label:"Sold",val:tr.sold,type:"number"},
    {id:"ed-p",label:"Buy Price ("+s.currency+")",val:tr.buyPrice,type:"number"},
    {id:"ed-l",label:"Signal",val:tr.signal},
    {id:"ed-ath",label:"ATH (trailing stop)",val:tr.ath||"",type:"number"},
    {id:"ed-st",label:"State",val:tr.state||"accumulating",select:["accumulating","stopActive","stopped","sold"]},
  ],()=>{tr.bought=nv("ed-b")||0;tr.sold=nv("ed-s")||0;tr.buyPrice=nv("ed-p")||0;tr.signal=gv("ed-l")||"avg";const a=nv("ed-ath");tr.ath=a||undefined;tr.state=gv("ed-st")||"accumulating";save();},
  ()=>{if(!confirm("Delete tranche?"))return false;portfolios[pk].positions[t].tranches.splice(i,1);if(!portfolios[pk].positions[t].tranches.length)delete portfolios[pk].positions[t];save();return true;});
}
function openAddTranche(pk,t){
  const s=stocks[t];
  showModal("Add Tranche — "+t,[
    {id:"at-sig",label:"Signal",val:"PBT",select:["MOS","10Cap","PBT","hold","trophy"]},
    {id:"at-sh",label:"Shares",val:0,type:"number"},
    {id:"at-p",label:"Buy Price ("+s.currency+")",val:s.currentPrice||0,type:"number"},
  ],()=>{if(!portfolios[pk].positions[t])portfolios[pk].positions[t]={tranches:[]};
    portfolios[pk].positions[t].tranches.push({signal:gv("at-sig")||"PBT",bought:nv("at-sh")||0,sold:0,buyPrice:nv("at-p")||0,state:"accumulating"});save();});
}

// ============ GENERIC MODAL ============
function gv(id){const el=document.getElementById(id);return el?el.value:"";}
function nv(id){const v=parseFloat(gv(id));return isNaN(v)?null:v;}

function showModal(title,fields,onSave,onDelete){
  const ov=document.createElement("div");ov.className="modal-overlay";ov.onclick=e=>{if(e.target===ov)ov.remove();};
  let fhtml="";
  fields.forEach(f=>{
    if(typeof f==="string"){fhtml+=`<div style="font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 4px">${f}</div>`;return;}
    if(f.select){
      const opts=f.select.map(o=>`<option value="${o}" ${o===f.val||o.startsWith(f.val)?"selected":""}>${o}</option>`).join("");
      fhtml+=`<div class="modal-field"><label>${f.label}</label><select id="${f.id}">${opts}</select></div>`;
    }else{
      fhtml+=`<div class="modal-field"><label>${f.label}</label><input type="${f.type||"text"}" step="any" id="${f.id}" value="${f.val??""}" ${f.placeholder?`placeholder="${f.placeholder}"`:""}></div>`;
    }
  });
  let btns=`<button class="modal-done" id="modal-save-btn">Save</button>`;
  if(onDelete)btns+=`<button class="modal-done" style="background:#3b1111;color:var(--red);margin-top:4px" id="modal-del-btn">Delete</button>`;
  ov.innerHTML=`<div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-title">${title}</div>${fhtml}${btns}</div>`;
  document.body.appendChild(ov);
  document.getElementById("modal-save-btn").onclick=()=>{const r=onSave();if(r===false)return;ov.remove();render();};
  if(onDelete)document.getElementById("modal-del-btn").onclick=()=>{const r=onDelete();if(r===false)return;ov.remove();render();};
}

if(settings.apiKey&&(!settings.lastFetch||Date.now()-settings.lastFetch>settings.fetchInterval))fetchPrices();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');
</script>
